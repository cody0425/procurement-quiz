":22,"stem":"採「機關委託技術服務廠商評選及計費辦法」辦理評選作業，其由 廠商報列技術服務費用者，廠商之報價應於議價時開啟，方得與廠 商議價。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"採「機關委託技術服務廠商評選及計費辦法」辦理評選作業，其由 廠商報列技術服務費用者，應將價格納入評選。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託專業服務廠商評選採固定費用或費率者，評選優勝廠 商時，廠商報價應列為評選項目之一，並至少占20%以上配分。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託專業服務廠商評選，評選優勝廠商時，即將廠商報價 納入考量。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託專業服務其服務成本加公費法之公費，得按直接薪資 及管理費之金額依一定比率增加，且全部公費不得超過直接薪資扣 除非經常性給與之獎金後與管理費用合計金額之百分之三十。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託專業服務其服務成本加公費法之公費，應為定額，不 得按直接薪資及管理費之金額依一定比率增加，且全部公費不得超 過直接薪資扣除非經常性給與之獎金後與管理費用合計金額之百分 之二十五。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理專業服務，其採服務成本加公費法者，其公費係指廠商提 供專業服務所得之報酬，包括風險、利潤及有關之稅捐等，其金額 應為定額，且不得超過直接薪資扣除非經常性給與之獎金後與管理 費用合計金額之百分之五十。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理專業服務，其採服務成本加公費法者，其公費係指廠商提 供專業服務所得之報酬，包括風險、利潤及有關之稅捐等，其金額 應為定額，且不得超過直接薪資扣除非經常性給與之獎金後與管理 費用合計金額之百分之二十五。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"對於未達公告金額之採購，通案不採公告方式辦理是不正確之作 法。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"對於未達公告金額之採購，可敘明理由通案簽經機關首長或其授權 人員核准不採公告方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"機關辦理位於原住民地區未達採購法公告金額之採購，應由原住民 個人、機構、法人或團體承包。但原住民個人、機構、法人或團體 無法承包者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"位於原住民地區之機關辦理未達採購法公告金額之採購，應由原住 民個人、機構、法人或團體承包。但原住民個人、機構、法人或團 體無法承包者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"公告金額以上之採購，若於第1次公開招標公告前即已簽經機關首 長或其授權人員核准，未達3家廠商投標，即改採限制性招標方式 辦理者，得逕依實際家數改採議、比價方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"未達公告金額之採購，可依向廠商詢價結果報價金額未達公告金額 認定之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"機關辦理位於原住民地區未達公告金額之採購案，即使符合採購法 第22條第1項第3款「遇有不可預見之緊急事故，致無法以公開或選 擇性招標程序適時辦理，且確有必要者」，仍應依原住民族工作權 保障法規定，優先決標予原住民廠商。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"機關辦理採購，其服務費用在公告金額十分之一以下者，不得依採 購法第49條規定以公開取得書面報價或企劃書方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"縣政府得自行訂定未達公告金額採購之招標方式，但應符合採購法 第49條規定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"地方政府得依地方制度法自行訂定未達公告金額採購之招標方式， 不受採購法限制。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"未達公告金額採購之招標，其金額逾公告金額十分之一者，機關依 「中央機關未達公告金額採購招標辦法」第2條第1項第2款規定， 符合採購法第22條第1項第16款者，須簽報機關首長或其授權人員 核准免報經主管機關認定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":23,"stem":"未達公告金額採購之招標，其金額逾公告金額十分之一者，機關依 「中央機關未達公告金額採購招標辦法」第2條第1項第2款規定， 符合採購法第22條第1項第16款者，免報經主管機關認定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"根據統包實施辦法規定，統包之範圍，於財物採購，包含細部設 計、供應及安裝。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，得於招標文件中規定允許一定家數內之廠商 共同投標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理採購，不得將監造納入。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理採購，應將監造一併納入，以減少機關之管理介 面。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，設計有變更之必要者，得不經機關同意或依 機關之通知辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，得標廠商設計成果之智慧財產權，機關得視 需要預為規定取得部分或全部權利或取得授權。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標並規定廠商於投標時提出設計圖者，應就所有 未得標廠商，依招標文件之規定，發給獎勵金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關基於效率及品質之要求，得將建築工程之設計與施工併於同一 採購契約一併以統包方式辦理招標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關基於效率及品質之要求，不得將建築工程之設計與施工併於同 一採購契約一併以統包方式辦理招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標並規定廠商於投標時提出設計圖者，得就審查 達一定分數或名次之未得標廠商，依招標文件之規定，發給獎勵 金。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標並規定廠商於投標時提出設計圖者，不得於招 標文件規定就審查達一定分數或名次之未得標廠商，發給獎勵金， 以撙節公帑。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，招標文件所規定之評審標準，應包括廠商之 技術能力，至於設計之完整性及可行性可於履約前再予審查。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關基於效率及品質之要求，得依細部設計結果將建築構造物、空 調、機電設備等工程之施工以統包方式辦理招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，應於招標文件中規定允許一定家數內之廠商 共同投標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"根據統包實施辦法規定，統包之範圍，於財物採購，不得包含營 運。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"根據統包實施辦法規定，統包之範圍，於財物採購，得包含營運。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"勞務性質採購，得依「統包實施辦法」規定，以統包方式辦理招 標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"財物或工程性質採購，得依「統包實施辦法」規定，以統包方式辦 理招標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，其設計屬得標廠商履約行為，招標文件不得 規定設計應送經機關審查後方得施工或供應。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，應於招標文件規定得標廠商之設計應送機關 或其指定機構審查後，始得據以施工或供應。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關以統包辦理招標，得依採購法第22條第1項第9款經公開客觀評 選為優勝者之方式為之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關以統包辦理招標，不得依採購法第22條第1項第9款經公開客觀 評選為優勝者之方式為之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，設計有變更之必要者，仍應經機關同意或依 機關之通知辦理。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，應於招標文件規定得標廠商設計成果之智慧 財產權歸屬及侵害第三人合法權益時由廠商負責處理並承擔一切法 律責任。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，招標文件應規定設計結果不符合契約規定或 無法依機關之通知變更者，機關應終止或解除契約，但報經上級機 關同意者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，招標文件應規定設計結果不符合契約規定或 無法依機關之通知變更者，機關得終止或解除契約。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，不得於招標文件中規定投標廠商或其分包廠 商關於設計之履約能力資格。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，得依實際需要，於招標文件中規定投標廠商 或其分包廠商關於設計之履約能力資格。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，其設計有必要變更者，廠商均得向機關請求 償付履約所增加之必要費用。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，其設計有必要變更且係不可歸責於廠商者， 廠商得向機關請求償付履約所增加之必要費用。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"根據統包實施辦法規定，統包之範圍，於財物採購，包含供應及安 裝，不包含細部設計。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關以統包辦理招標，得標廠商設計成果之智慧財產權，機關皆應 預為規定取得全部權利，以維護機關權益。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":24,"stem":"機關基於效率及品質之要求，得以統包辦理招標。但查核金額以上 者應報經上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標廠商得標後各成員之履約實績，不可由共同投標廠商於驗 收後提出各成員實際履約實績證明認定之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標廠商得標後各成員之履約實績，可由共同投標廠商於驗收 後提出各成員實際履約實績證明認定之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，得於招標文件中規定，押標金及保證金各由 共同投標廠商共同繳納，不得由共同投標協議書所指定之代表廠商 繳納。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，應於招標文件中規定，押標金及保證金由共 同投標廠商共同繳納，或由共同投標協議書所指定之代表廠商繳 納。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標廠商於投標時應附之協議書內容，應載明共同投標廠商成 員有破產或其他重大情事，致無法繼續共同履約者，同意將其契約 之一切權利義務由其他成員另覓之廠商或其他成員繼受。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理採購，允許廠商共同投標者，得就共同投標廠商各成員主 辦事項之金額，於其共同投標協議書所載之比率上限予以限制。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理採購，允許廠商共同投標者，得就共同投標廠商各成員主 辦事項之金額，於其共同投標協議書所載之比率下限予以限制。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關既已允許共同投標，故採共同投標方式得標之廠商，不得再依 採購法第67條規定分包予其他廠商。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標廠商於投標時應檢附由各成員之負責人或其代理人共同具 名，且經公證或認證之共同投標協議書，無須載明各成員之主辦項 目及所占契約金額比率，但應載明各成員於得標後連帶負履行契約 責任。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關得視個別採購之特性，於招標文件中規定允許一定家數內之廠 商共同投標。但查核金額以上者應報經上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，得視案件性質於招標文件規定共同投標廠商 得免檢附共同投標協議書。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，應於招標文件中規定共同投標廠商之契約價 金應由代表廠商統一請(受)領，不得由各成員分別請(受)領。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，於招標文件中規定共同投標廠商之成員，不 得對同一採購另行提出投標文件或為另一共同投標廠商之成員，係 屬限制競爭之作法，不得採行。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理特殊或巨額之採購，允許共同投標時，不得於招標文件中 規定共同投標廠商各成員及代表廠商之特定資格。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關得視個別採購之特性，於招標文件中規定允許一定家數內之廠 商共同投標。共同投標之廠商於得標後應共同具名簽約，就其承攬 工程或提供財物、勞務之部分，分別負瑕疵擔保責任。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關得視個別採購之特性，於招標文件中規定允許一定家數內之廠 商共同投標。共同投標之廠商於得標後應共同具名簽約，連帶負履 行採購契約之責。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理採購，允許共同投標時，得規定代表廠商資格，但不得於 招標文件中規定共同投標廠商各成員及代表廠商之基本資格。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理採購，允許共同投標時，得於招標文件中規定共同投標廠 商各成員及代表廠商之基本資格。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標協議書內容與契約規定不符時，因共同投標協議書已經機 關審查，故應以共同投標協議書為準。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標協議書內容與契約規定不符者，以契約規定為準。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標廠商於投標時應檢附由各成員之負責人或其代理人共同具 名，且經公證或認證之共同投標協議書內容，若於得標後變更者， 無須經機關同意，但須經共同投標廠商其他成員同意。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標廠商於投標時應檢附由各成員之負責人或其代理人共同具 名，且經公證或認證之共同投標協議書內容，若於得標後變更者， 須經機關同意。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理特殊或巨額之採購，允許共同投標時，得於招標文件中規 定共同投標廠商各成員及代表廠商之特定資格。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，得於招標文件中規定共同投標廠商之投標文 件限由各成員共同具名。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，應於招標文件中規定共同投標廠商之投標文 件應由各成員共同具名，或由共同投標協議書指定之代表人簽署。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，其對共同投標廠商押標金不予發還之通知， 對共同投標廠商成員之一為通知，仍具效力。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，應於招標文件中規定其對共同投標廠商之代 表人之通知，與對共同投標廠商所有成員之通知具同等效力。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，得於招標文件中規定廠商僅得共同投標不得 單獨投標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，應於招標文件中規定共同投標廠商之成員， 不得對同一採購另行提出投標文件或為另一共同投標廠商之成員。 但有該採購涉及專利或特殊之工法或技術，或預估合於招標文件規 定之投標廠商競爭不足，為增加廠商競爭，則不在此限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，應於招標文件中載明廠商得單獨投標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標以能增加廠商之競爭或無不當限制競爭者為限，故不得允 許廠商採同業共同投標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標以能增加廠商之競爭或無不當限制競爭者為限。同業共同 投標應符合公平交易法第15條第1項但書各款之規定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理採購，參加共同投標之廠商，其成員中有3家為不同行 業，有2家屬同一行業者，視為異業共同投標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關辦理採購，參加共同投標之廠商有2家以上屬同一行業者，視 同同業共同投標，應符合公平交易法第15條第1項但書各款之規 定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關於招標文件中規定允許一定家數內之廠商共同投標者，以不超 過3家為原則。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關於招標文件中規定允許一定家數內之廠商共同投標者，以不超 過5家為原則。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關可於招標文件規定允許廠商共同投標，且該採購係外國廠商得 參與者，涉及外國廠商之共同投標協議書，不得以外文書寫。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關可於招標文件規定允許廠商共同投標，且該採購係外國廠商得 參與者，涉及外國廠商之共同投標協議書，得以外文書寫，附經公 證或認證之中文譯本，並於招標文件中訂明。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，如共同投標廠商於投標文件敘明契約價金由 各成員分別請（受）領者，無須先載明各成員分別請（受）領之項 目及金額。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，應於招標文件中規定共同投標廠商於投標 文件敘明契約價金由代表廠商統一請（受）領，或由各成員分別請 （受）領；其屬分別請（受）領者，並應載明各成員分別請（受） 領之項目及金額。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"依採購法規定，機關允許共同投標時，投標文件之補充或更正及契 約文件之簽訂、補充或更正，僅得由共同投標協議書指定之代表人 簽署。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，投標文件之補充或更正及契約文件之簽訂、 補充或更正，應於招標文件中規定共同投標廠商應由各成員共同具 名，或由共同投標協議書指定之代表人簽署。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，共同投標廠商於投標時應檢附之共同投標協 議書，只需各成員之負責人或代理人共同具名即可，惟得標後須經 公證或認證並列入契約。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"機關允許共同投標時，共同投標廠商於投標時應檢附由各成員之負 責人或其代理人共同具名，且經公證或認證之共同投標協議書，於 得標後列入契約。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":25,"stem":"共同投標廠商於投標時應附之協議書內容，應載明共同投標廠商成 員有破產或其他重大情事，致無法繼續共同履約者，同意將其契約 之一切權利義務由招標機關另覓其他廠商繼受。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關辦理公告金額以上且非適用我國締結之政府採購條約或協定之 採購，招標文件限定廠商必須以我國產品供應，不違反採購法第26 條規定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關辦理公告金額以上且非適用我國締結之政府採購條約或協定之 採購，招標文件限定廠商必須以我國產品供應，違反採購法 規定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關擬定之技術規格無國際標準或國家標準，且無法以精確之方式 說明招標要求，其於招標文件提及特定之廠牌時，只須於招標文件 註明「或同等品」字樣即可，無須考量該等廠牌之價格、功能、效 益、標準及特性是否相當。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關就廠商所提出之同等品比較表等資料，其採自行審查者，係指 簽報機關首長或其授權人員核定是否為同等品。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關或受機關委託研擬招標文件內容之廠商，基於採購特性及實 際需要訂定特殊技術規格，或於招標文件要求或提及特定之商標或 商名、專利、設計或型式、特定來源地、生產者或供應者時，應依 「政府採購法第26條執行注意事項」所定的審查方式審查之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"招標文件允許投標廠商提出同等品者，得於招標文件註明「或同 等品」字樣，並規定得標廠商如欲提出同等品者，得於使用同等品 前，向機關提出，及機關審查同等品所需時間。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關就廠商所提出之同等品比較表等資料之審查結果，其非同等品 者，機關無須敘明原因書面通知廠商。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關擬訂定之技術規格有國際標準或國家標準，其未能符合機關採 購需求，須於招標文件載明其他標準（例如JIS、ACI、ASTM等）或 訂定較嚴之規格者，可依「政府採購法第26條執行注意事項」所載 審查方式審查後再行辦理。如其有審查前例者，得免重複為之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"採購法第26條第3項所稱同等品，指經機關審查認定，其功能、效 益、標準或特性不低於招標文件所要求或提及者。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"採購法第26條第3項所稱同等品，指經機關審查認定，其功能、效 益、標準或特性優於招標文件所要求或提及者。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"招標文件允許得標廠商得於使用同等品前提出同等品者，廠商提出 時，應敘明同等品之廠牌、價格及功能、效益、標準或特性比較表 等相關資料，以供機關審查。其經審查為同等品者，方得使用。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"招標文件允許得標廠商得於使用同等品前提出同等品者，廠商提出 時，應敘明同等品之廠牌、價格及功能、效益、標準或特性比較表 等相關資料，以供上級機關審查。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"廠商得標後提出之同等品，其價格如較契約所載為高，應以原契約 價金為準，不得加價。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"廠商得標後提出之同等品，其價格如較契約所載為高，機關得視實 際情形酌予加價。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關就廠商所提出之同等品比較表等資料，其採開會審查者，係指 簽報機關首長或其授權人員召開審查會議，並得邀請專家學者、廠 商代表、原設計者與會，以確認是否為同等品。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關就廠商所提出之同等品比較表等資料，其採開會審查者，應成 立審查委員會，並準用採購評選委員會組織準則第4條第1項有關組 成人數之規定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"招標文件允許投標廠商提出同等品者，得於招標文件註明「或同等 品」字樣，並規定廠商如欲提出同等品者，應於投標文件內預先提 出。其經審查非同等品者，為不合格之廠商。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"招標文件允許投標廠商提出同等品者，得於招標文件註明「或同等 品」字樣，並規定廠商如欲提出同等品者，應於投標文件內預先提 出。未提出同等品者，為不合格之廠商。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關辦理公告金額以上之採購，應依功能或效益訂定招標文件。 機關所擬定、採用或適用之技術規格，不應以有3家以上廠商可供 應，即認定為無限制競爭之虞。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關辦理公告金額以上之採購，應依功能或效益訂定招標文件。機 關所擬定、採用或適用之技術規格，如有3家以上廠商可供應，則 可認定為無限制競爭之虞。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關辦理採購，不得尋求或接受在特定採購中有商業利益之廠商之 任何建議，以免妨礙競爭。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關辦理公告金額以上之採購，採購規格明訂產品須取得環保標 章，符合採購法第26條規定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關辦理未達公告金額之採購，不適用採購法第26條之規定，故於 招標文件要求或提及特定之廠牌，並無違反採購法規定之虞。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"採購法第26條第3項所稱之同等品，於採最有利標成立評選委員會 時，應由評選委員會審查認定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關擬定之技術規格無國際標準或國家標準，且無法以精確之方式 說明招標要求，其於招標文件提及特定之廠牌時，只須於招標文件 註明「或同等品」字樣即可，無須考量該等廠牌目前是否均有製 造。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關就廠商所提出之同等品比較表等資料，應以自行審查、開會審 查或委託審查之方式之一審查之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關就廠商所提出之同等品比較表等資料，以機關自行審查為原 則，以開會或委託審查為例外。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關就廠商所提出之同等品比較表等資料之審查結果，其非同等品 者，機關應敘明原因書面通知廠商。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"各機關不得以足以構成妨礙競爭之方式，尋求或接受在特定採購中 有商業利益之廠商之建議。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":26,"stem":"機關擬定之技術規格無國際標準或國家標準，且無法以精確之方式 說明招標要求，其於招標文件提及特定之廠牌時，非只須於招標文 件註明「或同等品」字樣即可，仍須考量該等廠牌目前是否均有製 造、供應，容易取得，價格合理，能確保採購品質，且無代理商、 經銷商有公平交易法所稱之獨占或聯合行為之情事。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 26 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":27,"stem":"機關辦理採購，招標公告或招標文件不得公開預算金額。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 27 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":27,"stem":"政府採購公報按日發行，全年無休。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 27 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"採購法第28條第1項所稱公告日，指上傳政府採購資訊公告系統之 日；邀標日，指廠商收到機關邀請廠商投標通知單之日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":27,"stem":"政府採購公報除星期例假日、放假日及特殊情形外，按日發行。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 27 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":27,"stem":"機關辦理採購，採公開招標方式辦理者，如於開標前取消採購，則 應刊登無法決標公告。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 27 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":27,"stem":"財物變賣或出租公告資訊應公開於政府採購資訊網站，必要時並得 刊登政府採購公報。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 27 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":27,"stem":"財物變賣或出租公告資訊得公開於政府採購資訊網站，並刊登政府 採購公報。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 27 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":27,"stem":"未達公告金額採購之決標公告資訊得公開於政府採購資訊網站，必 要時並得刊登政府採購公報。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 27 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關辦理巨額採購，第1次選擇性招標之廠商資格預先審查，其公 告自刊登政府採購公報日起至截止收件日止之等標期，（未提供電 子領投標及公開閱覽），除條約或協定另有規定者外，應訂定28日 以上之合理期限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關辦理巨額採購，第1次選擇性招標之廠商資格預先審查，其公 告自刊登政府採購公報日起至截止收件日止之等標期，（未提供電 子領投標及公開閱覽），除條約或協定另有規定者外，應訂定14日 以上之合理期限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"採購法第28條第1項所稱公告日，指刊登於政府採購公報之日；邀 標日，指符合資格之廠商接獲通知邀請投標之日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關於等標期截止前變更招標文件內原訂物價指數調整門檻，非屬 招標文件內容之重大變更，如於原訂截止日前5日公告或書面通知 各廠商者，得免延長等標期。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"採購法第28條第1項所稱公告日，指刊登於政府採購公報之日；邀 標日，指發出通知邀請符合資格之廠商投標之日。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關辦理未達公告金額之公開招標（未提供電子領投標及公開閱 覽），除我國締結之條約或協定另有規定者外，依招標期限標準之 規定，其等標期不得少於7日。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關辦理採購金額新臺幣200萬元之特殊採購，採公開招標，資格 有實績規定，其公告自刊登政府採購公報日起至截止投標日止第1 次招標之等標期，至少要有28日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定辦理公告金額以上採購之公開 評選，其自公告日起至截止收件日止之等標期（未提供電子領投 標及公開閱覽），應訂定10日以上之合理期限。第2次以後之等標 期，由機關視需要合理訂定之。但不得少於5日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第11款規定辦理公告金額以上未達查核 金額之公開徵求房地產採購，其自公告日起至截止收件日止之等 標期（未提供電子領投標及公開閱覽），應訂定14日以上之合理期 限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"未達公告金額之採購，以公開取得3家以上廠商之書面報價或企劃 書方式辦理者，於收受廠商之書面報價或企劃書及審查符合需要者 之過程，屬詢價性質，可於公告文件載明截止收件日期，不必載明 開標時間及地點。如載明開標時間及地點，非屬公開招標，第1次 公告之等標期不可少於7日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"未達公告金額之採購，以公開取得3家以上廠商之書面報價或企劃 書方式辦理者，於收受廠商之書面報價或企劃書及審查符合需要者 之過程，屬詢價性質，可於公告文件載明截止收件日期，不必載明 開標時間及地點。如載明開標時間及地點，非屬公開招標，第1次 公告之等標期可少於7日，但不得少於5日。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關辦理未達公告金額之公開招標（未提供電子領投標及公開閱 覽），除我國締結之條約或協定另有規定者外，依招標期限標準之 規定，其等標期不得少於5日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關訂定等標期，應視採購個案之規模、複雜程度及性質，考量廠 商準備及遞送投標文件所必須之時間，予以「合理」訂定，不得逕 以下限期限訂之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關以公開取得廠商書面報價或企劃書辦理未達公告金額之採購， 如選擇於主管機關之資訊網路公開而不刊登政府採購公報者，上班 日下午4點傳輸資料至網路，其等標期自傳輸至該系統之次一上班 日起計算。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":28,"stem":"機關以公開取得廠商書面報價或企劃書辦理未達公告金額之採購， 如選擇於主管機關之資訊網路公開而不刊登政府採購公報者，上 班日下午4點傳輸資料至網路，其等標期自傳輸至該系統之日起計 算，上傳當日算1日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":29,"stem":"領標方式中之「公開發售」，機關可以就書面方式以外，增列電 子領標方式。對於以郵遞方式領標者，可以將領標期限提前一天截 止，並規定不得以廠商名稱領標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 29 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":29,"stem":"機關辦理公開招標，廠商之投標文件，應以書面密封，於投標截止 期限前，以郵遞或專人送達招標機關或其指定之場所，機關不得僅 限親自送達。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 29 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":29,"stem":"機關辦理公開招標，廠商之投標文件，應以書面密封，於投標截止 期限前，以郵遞或專人送達招標機關或其指定之場所，機關得僅限 親自送達。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 29 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理未達公告金額之各種採購，均得免收押標金、保證金。但 招標文件另有規定者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"未達公告金額之採購，機關雖未於招標文件中規定得標廠商應繳納 之履約保證金得以符合招標文件所定投標廠商資格條件之其他廠商 之履約及賠償連帶保證代之，惟廠商向招標機關提出其履約保證金 將以其他廠商履約保證替代，機關經評估之後仍得同意。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"差額保證金之繳納，其有效期、內容、發還及不發還等事項，準 用履約保證金之規定，是以，廠商依採購法第58條繳納差額保證金 者，毋須再繳交招標文件規定之履約保證金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"公告金額以上之採購，機關得於招標文件中規定得標廠商提出符 合招標文件所定投標廠商資格條件之其他廠商之履約及賠償連帶保 證，其應繳納之履約保證金得減收百分之五十內。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"依採購法規定，廠商以郵政匯票、金融機構簽發之本票或支票、或 取具金融機構之書面連帶保證繳納押標金，機關不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"押標金及保證金應以投標廠商或得標廠商名義繳納，是以，如以設 定質權之金融機構定期存款單繳納，該定期存款單之存款人與投標 商或得標商非同一人，機關不可接受。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"廠商原係以現金繳納履約保證金，即不得再向機關提出申請轉換保 證金繳納方式。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"廠商原係以現金繳納履約保證金，如向機關提出申請轉換保證金方 式，且經機關同意，得改以政府公債繳納之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"押標金或保證金以設定質權之金融機構定期存款單繳納者，應不受 特定存款金融機構之限制；其向金融機構申請設定質權時，應由質 權人會同辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"押標金或保證金以設定質權之金融機構定期存款單繳納者，應不受 特定存款金融機構之限制；其向金融機構申請設定質權時，無需由 質權人會同辦理。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關得於招標文件中擇定履約保證金之額度為一定金額，並以不逾 預算金額或預估採購總額之百分之十五為原則。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關得於招標文件中擇定履約保證金之額度為一定金額，並以不逾 預算金額或預估採購總額之百分之十為原則。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理非條約協定採購，得於招標文件中規定全球化廠商應繳納 之押標金、履約保證金或保固保證金金額得予減收，其額度以不逾 各原定應繳總額之百分之五十為限，不併入招標文件中規定優良廠 商應繳納之押標金、履約保證金或保固保證金金額得予減收之額度 計算。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理非條約協定採購，得於招標文件中規定全球化廠商應繳納 之押標金、履約保證金或保固保證金金額得予減收，其額度以不逾 各原定應繳總額之百分之三十為限，不併入招標文件中規定優良廠 商應繳納之押標金、履約保證金或保固保證金金額得予減收之額度 計算。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，廠商不得以郵政匯票之方式繳納押標金或保證金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，廠商得以郵政匯票之方式繳納押標金或保證金。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理簽約，應以廠商先繳納履約保證金為條件。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理簽約，得不以廠商先繳納履約保證金為條件。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關以議價方式辦理採購金額新臺幣150萬元以上之財物採購，均 得於招標文件中規定得標後免收履約保證金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"保固保證金之額度，得為一定金額或契約金額之一定比率，由機關 於招標文件中擇定之。一定金額者，以不逾預算金額或預估採購總 額之百分之三為原則；一定比率者，以不逾契約金額之百分之三為 原則。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"保固保證金之額度，得為一定金額或契約金額之一定比率，由機關 於招標文件中擇定之。一定金額者，以不逾預算金額或預估採購總 額之百分之十為原則；一定比率者，以不逾契約金額之百分之五為 原則。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"押標金或保證金以銀行本行本票、支票或保付支票繳納者，應為即 期並以機關為受款人。未填寫受款人者，仍應接受。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關得視案件性質及實際需要，於招標文件中規定得標廠商得支領 預付款及其金額，並訂明廠商支領預付款前應先提供同額預付款還 款保證。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"招標文件載明押標金為一定金額者，以不逾預算金額或預估採購總 額之百分之十為原則。但不得逾新臺幣5,000萬元。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"招標文件載明押標金為一定金額者，以不逾預算金額或預估採購總 額之百分之五為原則。但不得逾新臺幣5,000萬元。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"履約保證金之繳納期限，由機關視案件性質及實際需要，於招標文 件中合理訂定之；公告金額以上之採購應訂定14日以上之合理期 限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"履約保證金之繳納期限，由機關視案件性質及實際需要，於招標文 件中合理訂定之；查核金額以上之採購應訂定14日以上之合理期 限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"依「押標金保證金暨其他擔保作業辦法」規定，同一廠商同時作為 各機關採購契約之連帶保證廠商者，以5個契約為限，且機關應將 該規定於招標文件載明之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"依「押標金保證金暨其他擔保作業辦法」規定，同一廠商同時作為 各機關採購契約之連帶保證廠商者，以2契約為限，且機關應將該 規定於招標文件載明之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"押標金之額度，得為一定金額或標價之一定比率，由機關於招標文 件中擇定之。採單價決標之採購，亦同。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"押標金之額度，得為一定金額或標價之一定比率，由機關於招標文 件中擇定之。採單價決標之採購，押標金應為一定金額。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，其履約保證金額度為新臺幣（下同）50萬元，得標 廠商不得以25萬元現金及25萬元之郵政匯票向招標機關繳納作為履 約保證金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，其履約保證金額度為新臺幣（下同）50萬元，得標 廠商得以25萬元現金及25萬元之郵政匯票向招標機關繳納作為履約 保證金。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，得於招標文件中規定優良廠商應繳納之押標金、履 約保證金或保固保證金金額得予減收，依法其額度以不逾原定應繳 總額之百分之三十為限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，得於招標文件中規定優良廠商應繳納之押標金、履 約保證金或保固保證金金額得予減收，依法其額度以不逾原定應繳 總額之百分之五十為限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"廠商總標價偏低但在底價七成以上，以差額保證金作為採購法第58 條規定之擔保者，擔保金額為總標價與底價之差額。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"廠商總標價偏低但在底價七成以上，以差額保證金作為採購法第58 條規定之擔保者，擔保金額為總標價與底價八成之差額。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，得於招標文件中規定具有一定條件之優良廠商，其 應繳納之押標金、履約保證金或保固保證金金額得予減收。減收後 獎勵期間屆滿者，應補繳減收之金額。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理採購，得於招標文件中規定具有一定條件之優良廠商，其 應繳納之押標金、履約保證金或保固保證金金額得予減收。減收後 獎勵期間屆滿者，免補繳減收之金額。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"機關辦理未達公告金額之採購，不得收押標金、保證金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"招標文件規定廠商須繳納押標金者，得併載明廠商得將以現金繳納 之押標金附於投標文件內遞送，以簡化作業。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":30,"stem":"押標金或保證金以銀行本行本票、支票或保付支票繳納者，應為即 期並以機關為受款人。未填寫受款人者，不得接受。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"採購法第31條第2項關於不予發還廠商所繳納之押標金之情形，機 關可於招標文件中增列其他情形，後續即可依招標文件之規定不發 還廠商所繳納之押標金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"機關辦理採購，廠商容許他人借用本人名義或證件參加投標，非屬 採購法第31條第2項規定情形。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"機關辦理採購，廠商容許他人借用本人名義或證件參加投標，屬採 購法第31條第2項規定情形。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"機關辦理採購，廠商或其代表人、代理人、受雇人或其他從業人 員，就有關招標、審標、決標事項，對公務員行求、期約或交付賄 賂或其他不正利益，非屬採購法第31條第2項規定「對採購有關人 員行求、期約或交付不正利益」情形。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"機關辦理採購，廠商或其代表人、代理人、受雇人或其他從業人 員，就有關招標、審標、決標事項，對公務員行求、期約或交付不 正利益，屬採購法第31條第2項規定「對採購有關人員行求、期約 或交付不正利益」情形。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"機關得於招標文件中規定，得標廠商未於規定期限內提出正本之資 格文件供查驗者，按逾期天數沒收一定比率之押標金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"採購法第31條第2項關於不予發還廠商所繳納之押標金之情形，機 關係逕依該條規定處理。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"投標廠商有採購法第31條第2項及第101條第1項規定情形，其變更 公司名稱及統一編號後，不適用前揭規定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":31,"stem":"投標廠商有採購法第31條第2項及第101條第1項規定情形，其變更 公司名稱及統一編號後，仍適用前揭規定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 31 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":32,"stem":"機關得於招標文件中規定，得發還得標廠商所繳納之保證金之孳 息。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 32 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"廠商投標時標封上或容器外應標示廠商名稱及地址。其交寄或付郵 所在地，機關不得予以限制。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"有一機關辦理採購採一次投標，資格、規格、價格分段開標，且於 招標文件中規定允許廠商於開標前補正非契約必要之點之文件。因 此，廠商於開價格標前之資格審查時要求補正非契約必要之點之文 件，機關仍得接受。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"有一機關辦理採購採一次投標，資格、規格、價格分段開標，且於 招標文件中規定允許廠商於開標前補正非契約必要之點之文件。因 此，廠商於開價格標前之資格審查時要求補正非契約必要之點之文 件，機關不得接受。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"廠商將投標文件置於不透明之紙箱，以塑膠繩封裝，因未使用機關 所提供之標封，應為不合格標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"廠商投標時標封上或容器外應標示廠商名稱及地址。其交寄或付郵 所在地與廠商地址不同時，為不合格標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"依採購法施行細則第33條第1項規定，同一投標廠商就同一採購之 投標，以一標為限。今有甲公司與乙公司就同一採購分別投標，其 投標文件所載負責人為同一人，未違反上開規定，惟如有採購法第 50條第1項第5款規定情形，機關應不予開標決標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"廠商將投標文件置於不透明之信封或容器內，以釘書針封裝者，符 合採購法第33條第1項所稱書面密封。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"依據採購法規定，機關須於招標文件規定投標廠商之標封須密封並 於封口加蓋廠商印章，所送影本亦應加蓋廠商印章。大標封內之證 件封、價格封比照辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"機關辦理採購，其招標文件免附契約條款，俟決標後與廠商簽約時 再附上即可。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":33,"stem":"依採購法規定，廠商之投標文件，是否於投標截止期限前送達招標 機關或其指定之場所，得以郵戳為認定基準。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"機關辦理查核金額以上之工程採購，應於公告招標前辦理招標文件 之公開閱覽，但有特殊情形報經上級機關核准者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第3款辦理巨額之工程採購，仍應於公告 招標前辦理招標文件之公開閱覽。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第3款辦理巨額之工程採購，無須於公告 招標前辦理招標文件之公開閱覽。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"機關辦理開標、審標、比價、議價、決標等作業，應依採購法規定 允許廠商「自行錄音錄影」，以維公平、公開之採購程序。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"按採購法第34條第4項規定，機關辦理開標、審標、比價、議價、 決標等作業，如涉及廠商投標文件內容，除法令另有規定外，應保 守秘密，不得允許廠商「自行錄音錄影」。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"機關辦理查核金額以上之工程採購，應於公告招標前辦理招標文件 之公開閱覽，並無例外。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"機關辦理採購，底價於開標後決標前仍應保密，廢標後縱使有特殊 情形亦同。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"機關辦理採購，底價於開標後仍應保密，但廢標後除有特殊情形 外，應予公開。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"機關辦理採購，其招標文件於公告前應予保密。底價於決標後除有 特殊情形外，應予公開。但機關依實際需要認有於招標文件公開底 價之必要者，應先報經上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":34,"stem":"機關辦理採購，其招標文件於公告前應予保密。底價於決標後除有 特殊情形外，應予公開。但機關得依實際需要，於招標文件中公告 底價。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許投標廠商於截止投標期限前提出替代方 案者，招標文件應訂明替代方案標封於主方案經審查合於招標文件 規定後，再予開封及審查。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關得於招標文件中規定允許廠商於得標後提出替代方案且訂定 獎勵措施，但其獎勵額度，以不逾所減省契約價金之百分之三十為 限。所減省之契約價金，並應扣除機關為處理替代方案所增加之必 要費用。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許投標廠商於截止投標期限前提出替代方 案者，廠商履行替代方案所需之調查、研究、試驗、設計等費用， 得由雙方分攤。機關實施替代方案所增加之必要費用，亦同。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許投標廠商於截止投標期限前提出替代方 案者，主方案經審查不合於招標文件之規定，而替代方案經審查合 格者，得予接受。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關得於招標文件中規定允許廠商於得標後提出替代方案且訂定 獎勵措施，但其獎勵額度，以不逾所減省契約價金之百分之五十為 限。所減省之契約價金，並應扣除機關為處理替代方案所增加之必 要費用。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許投標廠商於截止投標期限前即提出替代 方案者，機關同時審查替代方案及主方案，屬採購法第1條所稱提 升採購效率之作法，採購法並無禁止。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許廠商於得標後在不降低原有功能條件下 得就技術、工法、材料或設備，提出可縮減工期、減省經費或提高 效率之替代方案，並無違反採購法規定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許投標廠商於截止投標期限前提出替代方 案者，廠商之替代方案應單獨密封，標封外標示其為替代方案，且 每一項目得提出數個替代方案。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許投標廠商於截止投標期限前提出替代方 案者，廠商之替代方案應單獨密封，標封外標示其為替代方案，且 每一項目以提出一個替代方案為限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"招標文件規定允許提替代方案者，廠商提出之替代方案經審查有降 低招標文件所規定之原有功能條件者，縱經機關評估該替代方案之 總體效益更利於機關，仍不得採用。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"招標文件規定允許提替代方案者，廠商提出之替代方案經審查有降 低招標文件所規定之原有功能條件者，應不予採用。但招標文件規 定得協商更改之項目或廠商提出之替代方案經綜合評估各有利不利 情形，其總體效益更有利於機關者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":35,"stem":"機關於招標文件中規定允許廠商於得標後在不降低原有功能條件下 得就技術、工法、材料或設備，提出可縮減工期、減省經費或提高 效率之替代方案，違反採購法規定，不得採行。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"營業稅或所得稅之納稅證明，得以與最近一期或前一期證明相同期 間內主管稽徵機關核發之無違章欠稅之查復表代之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關規定投標廠商之基本資格，得於招標文件明定廠商須具有維 修、維護或售後服務能力之證明，並對其人員之人數予以限制。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關規定投標廠商之基本資格，得於招標文件明定廠商須具有維 修、維護或售後服務能力之證明，除依法令就一定專門技能人員之 人數為規定者外，不得對其人數予以限制。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"新臺幣2,000萬元之一般工程採購，機關不可訂定投標廠商須檢附 曾完成與招標標的類似之承作文件。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"新臺幣2,000萬元之一般工程採購，機關可訂定投標廠商須檢附曾 完成與招標標的類似之承作文件。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關訂定投標廠商之特定資格時，如評估可能符合特定資格之廠商 家數有三家以上，即無不當限制競爭之情形。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理採購，有關投標廠商資格之訂定，應依「投標廠商資格與 特殊或巨額採購認定標準」辦理。但採購標的內之重要項目，訂定 有分包廠商資格者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理新臺幣1億5,000萬元之一般工程採購，得訂定實收資本額 為不低於新臺幣1,500萬元之投標廠商資格。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理資訊服務採購，如屬經濟部投資審議司公告「具敏感性 或國安（含資安）疑慮之業務範疇」，為免發生國安或資安疑慮， 依「機關辦理涉及國家安全採購之廠商資格限制條件及審查作業辦 法」及「投標廠商資格與特殊或巨額採購認定標準」第4條第1項第 6款規定，於招標文件載明不允許經濟部投資審議司公告之陸資資 訊服務業參與。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商基本資格之廠商具有維修、維護或售後服務能力之證明，可限 定廠商投標時須提出已設立自有維修站或場所之證明。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商基本資格之廠商具有維修、維護或售後服務能力之證明，不可 限定廠商投標時須提出已設立自有維修站或場所之證明。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關採複數決標或分批辦理巨額採購，其個別項目或數量或分批採 購之預算金額未達巨額採購認定標準者，仍可適用巨額採購有關廠 商資格之規定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關採複數決標或分批辦理巨額採購，其個別項目或數量或分批採 購之預算金額未達巨額採購認定標準者，不適用巨額採購有關廠商 資格之規定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商特定資格之具有相當設備者，得為完成與招標標的同性質或相 當之工程、財物或勞務所需之自有設備。其尚無自有者，尚不得以 租賃、租賃承諾證明或採購中或得標後承諾採購證明代之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商特定資格之具有相當設備者，得為完成與招標標的同性質或 相當之工程、財物或勞務所需之自有設備。其尚無自有者，得以租 賃、租賃承諾證明或採購中或得標後承諾採購證明代之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理採購，對於廠商履行契約所必須具備之財務、商業或技術 資格條件，得就廠商在我國之商業活動為考量，並得以其為政府機 關、公立學校或公營事業所完成者為限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理採購，對於廠商履行契約所必須具備之財務、商業或技術 資格條件，應就廠商在我國或外國之商業活動為整體考量，不以其 為政府機關、公立學校或公營事業所完成者為限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商納稅證明，其屬營業稅繳稅證明者，為營業稅繳款書收據聯及 主管稽徵機關核章之最近一期營業人銷售額與稅額申報書收執聯。 廠商不及提出最近一期證明者，得以前一期之納稅證明代之。新設 立且未屆第一期營業稅繳納期限者，得以營業稅主管稽徵機關核發 之核准設立登記公函或申領統一發票購票證相關文件代之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商納稅證明，其屬營業稅繳稅證明者，為營業稅繳款書收據聯或 主管稽徵機關核章之最近一期營業人銷售額與稅額申報書收執聯。 廠商不及提出最近一期證明者，得以前一期之納稅證明代之。新設 立且未屆第一期營業稅繳納期限者，得以營業稅主管稽徵機關核發 之核准設立登記公函代之；經核定使用統一發票者，應一併檢附申 領統一發票購票證相關文件。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關訂定招標文件，對於投標廠商之設立或所在地，基於履約地點 之需要，得予以限制。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關訂定招標文件，對於投標廠商之設立或所在地，除其他法令另 有規定者外，不得予以限制。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"為確保廠商履約能力與誠信，凡有欠稅情形之廠商，一律不得參與 政府採購之投標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"個案採購之投標廠商資格條件，得不以檢具納稅證明文件為必要。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商投標時須否附具依法加入工業或商業團體之證明，由機關自行 依採購案之特性及實務需要於招標文件載明之。投標廠商為外國廠 商者，仍應附具。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商投標時須否附具依法加入工業或商業團體之證明，由機關自行 依採購案之特性及實務需要於招標文件載明之。但投標廠商為外國 廠商者，得免附具。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理特殊採購或巨額採購以採購金額訂定資格條件者，應於招 標公告或招標文件載明採購金額。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理特殊採購或巨額採購以預算金額訂定資格條件者，應於招 標公告或招標文件載明預算金額。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"投標廠商應提出之資格證明文件，除招標文件另有規定者外，以影 本為原則。影本之尺寸與正本不一致，或未載明與正本相符、未加 蓋廠商印章等情事，而不影響辨識其內容或真偽者，機關不得拒 絕。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商加入工業或商業團體之證明，得由招標機關限制由特定區域之 團體出具；投標廠商為外國廠商者，得免附具。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商加入工業或商業團體之證明，除法令另有規定外，不得限制由 特定區域之團體出具；投標廠商為外國廠商者，得免附具。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"投標廠商應提出之資格證明文件，除招標文件另有規定者外，以正 本為原則。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"投標廠商應提出之資格證明文件，除招標文件另有規定者外，以影 本為原則。但機關得通知投標廠商提出正本供查驗。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"採購兼有工程、財物或勞務二種以上性質，而以其中之一認定其歸 屬者，其他性質符合特殊採購情形之一，不得以該其他性質於該採 購所占比例或相關部分訂定特定資格。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"採購兼有工程、財物或勞務二種以上性質，而以其中之一認定其歸 屬者，其他性質符合特殊採購情形之一，得以該其他性質於該採購 所占比例或相關部分訂定特定資格。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商登記或設立之證明，機關規定須具有特定營業項目方可參與投 標者，其所規定之營業項目，不得不當限制競爭，至多以經濟部編 訂之公司行號營業項目代碼表所列之小類為限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"廠商登記或設立之證明，機關規定須具有特定營業項目方可參與投 標者，其所規定之營業項目，不得不當限制競爭，並應以經濟部編 訂之公司行號營業項目代碼表所列之大類、中類、小類或細類項目 為基準。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理採購，有關設立或具有或承諾於得標後一定期間內建立自 有或特約維修站或場所之證明係屬特定資格，非屬特殊或巨額採購 不得訂定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關訂定與履約能力有關之基本資格時，得依採購案件之特性及實 際需要，就投標廠商資格與特殊或巨額採購認定標準之規定，擇定 廠商應附具之物品。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關訂定廠商信用證明之基本資格，可包括票據交換機構於等標期 內所出具之非拒絕往來戶或最近3年內無退票紀錄證明、會計師簽 證之財務報表或金融機構或徵信機構出具之信用證明等。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理某巨額工程採購經評估有訂定廠商特定資格之需要，機關 訂定該案具有相當實績者，得為截止投標日前7年內，完成與招標 標的同性質或相當之工程契約，其單次契約金額或數量不低於招標 標的預算金額或數量之五分之三，或累計金額或數量不低於招標標 的預算金額或數量。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關訂定廠商納稅證明為廠商基本資格，其屬營業稅繳稅證明者， 為營業稅繳款書收據聯或主管稽徵機關核章之最近一期營業人銷售 額與稅額申報書收執聯。廠商不及提出最近一期證明而於投標時檢 附前一期之納稅證明，為不合格標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關訂定廠商納稅證明為廠商基本資格，其屬營業稅繳稅證明者， 為營業稅繳款書收據聯或主管稽徵機關核章之最近一期營業人銷售 額與稅額申報書收執聯。廠商不及提出最近一期證明者，得以前一 期之納稅證明代之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理採購，招標文件訂有廠商基本資格為廠商須具有維修、維 護或售後服務能力之證明，可限定廠商投標時須提出原廠代理證 明。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關於招標文件規定，得標廠商於交貨或驗收時需檢附採購標的之 原廠製造證明或原廠商品質保證書一節，尚無不當。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"機關辦理特殊採購，不得訂定「總負債金額」之門檻作為投標廠商 之資格條件。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":36,"stem":"非屬特殊或巨額採購，不 之採購，得訂定廠商投標時須提出原廠代理證明 或經銷證明。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 37 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":37,"stem":"招標機關與得標廠商簽訂採購契約時，除依採購法第37條第2項及 「押標金保證金暨其他擔保作業辦法」第33條至第33條之4規定辦 理者外，不得要求得標廠商另覓廠商連帶保證。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 37 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":37,"stem":"招標機關與得標廠商簽訂採購契約時，除依採購法第37條第2項及 「押標金保證金暨其他擔保作業辦法」第33條至第33條之4規定辦 理者外，亦得視個案需要，要求得標廠商另覓廠商連帶保證。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 37 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":37,"stem":"投標廠商未符合招標機關依採購法規定所定資格者，其投標不予受 理。但廠商之財力資格，得以金融機構之履約及賠償連帶保證責 任、連帶保證保險單代之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 37 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":37,"stem":"投標廠商未符合招標機關依採購法規定所定資格者，其投標不予受 理。但廠商之財力資格，得以銀行或保險公司之履約及賠償連帶保 證責任、連帶保證保險單代之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 37 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":37,"stem":"機關訂定投標廠商之資格條件，不得不當限制競爭，並以確認廠商 具備履行契約所必須之能力者為限。廠商人員之學歷得為基本資 格。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 37 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":37,"stem":"機關訂定投標廠商之資格條件，不得不當限制競爭，並以確認廠商 具備履行契約所必須之能力者為限。廠商人員之學歷不得為基本資 格。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 37 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":38,"stem":"政黨及與其具關係企業關係之廠商，不得參與投標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 38 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":38,"stem":"政黨及與其具關係企業關係之廠商，得參與投標或作為分包廠商。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 38 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":39,"stem":"機關辦理採購，承辦專案管理之廠商，其負責人或合夥人不得同時 為規劃、設計、施工或供應廠商之負責人或合夥人，上開所稱「規 劃、設計、施工或供應廠商」，尚不包含分包廠商。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 39 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":39,"stem":"承辦專案管理之廠商，其負責人或合夥人不得同時為與該服務有關 之規劃、設計、施工或供應廠商之負責人或合夥人。但承辦專案管 理之廠商與規劃、設計、施工或供應廠商，同時為同一其他廠商之 關係企業，則尚無不可。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 39 條","category":"政府採購法§18~§44 (招標)"},{"ty 請求釋疑之期限，至少應有等標期之四 分之一，且不得少於10日。機關釋疑之期限，不得逾截止投標日或 資格審查截止收件日前1日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 41 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":42,"stem":"機關辦理採購，得規定資格、規格及價格分段投標，但僅就資格投 標者，以限制性招標為限。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 42 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":42,"stem":"機關辦理分段開標，除第1階段應公告外，後續階段之邀標，得免 予公告。第1次公開招標，分段投標之第1階段投標廠商家數已達 採購法第48條第1項3家以上合格廠商投標之規定者，後續階段之開 標，得不受該廠商家數之限制。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 42 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":42,"stem":"機關辦理採購，得規定資格、規格及價格分段投標，但僅就資格投 標者，以選擇性招標為限。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 42 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":42,"stem":"機關採分段投標辦理採購者，未通過前一階段審標之投標廠商，不 得參加後續階段之投標；採一次投標分段開標者，其已投標未開標 之標封，仍應保存於機關，不得發還。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 42 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":42,"stem":"機關辦理分段開標，除第1階段應公告外，後續階段之邀標，得免 予公告。第1次公開招標，分段投標之第1階段投標廠商家數已達 採購法第48條第1項3家以上合格廠商投標之規定者，後續階段之開 標，仍應受該廠商家數之限制。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 42 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":43,"stem":"機關依採購法第43條第2款優先決標予國內廠商者，於國內廠商有2 家以上時，其減價或比減價格應依採購法第53條規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 43 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":43,"stem":"機關辦理採購，為保護國內廠商，得同時將採購法第43條第2款及 第44條之機制納入招標文件中規定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 43 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":43,"stem":"機關辦理採購，不得於招標文件中載明外國廠商為最低標，且其標 價符合採購法第52條規定之最低標決標原則者，以該標價優先決標 予國內廠商。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 43 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":43,"stem":"機關辦理採購，除我國締結之條約或協定有禁止規定者外，得於招 標文件中載明外國廠商為最低標，且其標價符合採購法第52條規定 之最低標決標原則者，得以該標價優先決標予國內廠商。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 43 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":44,"stem":"依「國內廠商標價優惠實施辦法」規定，採購法第44條第1項所稱 特定之採購，指機關辦理查核金額以上之採購，招標文件載明採購 標的中屬於採購法第44條第2項適用範圍之項目，並附記依同條第1 項規定得以較高標價優先決標予國內廠商者。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 44 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":44,"stem":"依「國內廠商標價優惠實施辦法」規定，採購法第44條第2項所稱 適用範圍，指經目的事業主管機關擇定，並公告於政府採購公報之 工程、財物或勞務項目。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 44 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"依採購法第21條規定辦理選擇性招標之資格審查，供建立合格廠商 名單者，招標文件得免標示開標之時間及地點。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"依採購法第21條規定辦理選擇性招標之資格審查，供建立合格廠商 名單者，招標文件應標示開標之時間及地點。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款辦理之採購，評選優勝廠商之決標 程序，係依據優勝廠商順序，依序議價。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理巨額採購，依採購法第22條第1項第7款規定於原招標公告第 111 及招標文件同時敘明後續擴充之情形，惟因故不辦理後續擴充，機條 關得主張原有採購如不包含後續擴充係未達巨額之採購，得不適用 採購法第111條規定免提報巨額採購使用情形及其效益分析。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理巨額採購，應於使用期間內，逐年向主管機關及審計機關第 111 提報使用情形及其效益分析。 條","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理巨額採購之使用情形及其效益分析之提報，以由使用或接第 111 管單位提報為原則。但機關另有分工規定者，從其規定。共同供應條 契約之採購，由訂約機關彙總提報。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":49,"stem":"依採購法第49條之規定，將公開徵求廠商提供書面報價或企劃書 之公告，公開於主管機關之資訊網路或刊登於政府採購公報，應取 得幾家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議 價？","options":["1家。","2家。","3家。","依招標文件規定家數。"],"answer":2,"law_ref":"第 49 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":49,"stem":"機關依採購法第49條之規定公開徵求廠商之書面報價或企劃書者， 其等標期（未提供電子領投標及公開閱覽），應訂定幾日以上之合 理期限？","options":["5日。","7日。","10日。","14日。"],"answer":0,"law_ref":"第 49 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":46,"stem":"關於底價之訂定，下列敘述何者為錯誤？","options":["機關得基於技術、品 質、功能、履約地、商業條款、評分或使用效益等差異，訂定不同 之底價。","未達公告金額之採購，得由承辦採購單位逕行簽報機 關首長或其授權人員核定底價。","限制性招標之議價，訂定底價 前應先參考廠商之報價或估價單。","公開招標採分段開標者，底 價應於資格審查後之下一階段開標前定之。"],"answer":3,"law_ref":"第 46 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":46,"stem":"機關辦理採購，下列敘述何者正確？","options":["底價應依圖說、規範、契 約並考量成本、市場行情及政府機關決標資料逐項編列，查核金額 以上應簽報上級機關核定。","公開招標採分段開標者，其底價應 於開價格標前定之。","機關基於技術工法之差異，訂定不同之底 價，並無不可。","於宣布最有利標之得標廠商後再洽其議價。"],"answer":2,"law_ref":"第 46 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":48,"stem":"下列敘述何者正確？","options":["機關辦理公開招標，因投標廠商家數未滿 3家而流標者，得發還投標文件。","機關於開標後因故廢標，廠 商要求發還投標文件者，機關得保留其中一份，其餘發還，或僅保 留影本。","機關於開標後因故廢標，採分段開標者，尚未開標之 部分應予發還。","以上皆是。"],"answer":3,"law_ref":"第 48 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":50,"stem":"下列何種情形，非屬採購法第50條第1項第5款所稱「不同投標廠商 間之投標文件內容有重大異常關聯」之情形？","options":["投標文件內容由 同一人或同一廠商繕寫或備具者。","押標金由同一人或同一廠商 繳納或申請退還者。","投標標封或通知機關信函號碼連號，顯係 同一人或同一廠商所為者。","A公司及B公司為關係企業，該2公 司參與同一標案之投標。"],"answer":3,"law_ref":"第 50 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":53,"stem":"機關辦理採購，下列敘述何者錯誤？","options":["查核金額以上之採購，擬 決標之最低標價超過底價百分之四未逾百分之八者，應先報經上級 機關核准後決標。","合於招標文件規定之投標廠商僅有1家或採 議價方式辦理，須限制減價次數者，應先通知廠商。","洽最低標 廠商優先減價1次時，該廠商書明照底價承作，機關得決標予該廠 商。","決標依採購法第52條第1項第2款規定辦理者，除小額採購 外，應成立評審委員會，成立時機準用採購法第46條第2項有關底 價之訂定時機。"],"answer":2,"law_ref":"第 53 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":53,"stem":"機關辦理採購，下列敘述何者正確？","options":["機關洽最低標廠商優先減 價1次時，該廠商書明照底價承作，機關得決標予該廠商。","議 價案之減價次數，適用採購法第53條關於不得逾3次之規定。","決標依採購法第52條第1項第2款規定辦理者，除小額採購外，應成 立評審委員會，並得以第94條成立之評選委員會代之。","未達公 告金額採購，依採購法第22條第1項第9款規定辦理公開評選者，其 評選程序得予簡化，不適用採購法第94條評選委員會之規定。"],"answer":2,"law_ref":"第 53 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"機關依採購法第56條第1項及第57條採行協商措施，經洽請重行遞 送投標文件者，重行遞送之投標文件，有與協商無關或不受影響之 項目者，該項目？","options":["優於原投標文件者納入評選，低於原投標文 件內容者，不納入評選。","無論是否優於或低於原投標文件應不 予評選，並以重行遞送前之內容為準。","無論是否優於或低於原 投標文件應納入評選，並以重行遞送之內容為準。","優於原投標 文件者不納入評選，低於原投標文件內容者，納入評選。"],"answer":1,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"依最有利標評選辦法規定，下列敘述何者錯誤？","options":["機關訂定評 選項目、子項及其評審標準，不得以有利或不利於特定廠商為目 的。","序位，指評選委員會依招標文件所列評比項目之重要性或 權重，評審廠商投標文件後所核給之序位。","招標文件如已訂明 固定費用或費率者，不得規定廠商須於投標文件內詳列組成該費用 或費率之內容。","總評分法中之總滿分，指招標文件所列各評選 項目滿分之合計總分數。"],"answer":2,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"機關評選最有利標，下列何者為錯誤？","options":["機關得輔以廠商簡報 及現場詢答，其列為評選項目者，所占配分或權重不得逾百分之二 十。","採分階段辦理評選及淘汰不合格廠商者，得就分數或權重 較低之階段先行評選；並以二階段為原則。","價格納入評分者， 其所占總滿分之比率，不得低於百分之二十，且不得逾百分之五 十。","選擇性招標以資格為評選項目之一者，與資格有關部分之 配分或權重，應載明於資格審查文件。"],"answer":1,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"機關評定最有利標後，對於合於招標文件規定但未得標之廠商，應 通知之事項，何者最完整正確？","options":["最有利標之標價與總評分或序 位評比結果及該未得標廠商之總評分或序位評比結果。","最有利 標之標價與總評分或序位評比結果及各未得標廠商之總評分或序位 評比結果。","最有利標之標價與總評分或序位評比結果。","該 未得標廠商之總評分或序位評比結果。"],"answer":0,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"下列敘述何者錯誤？","options":["機關評選最有利標之過程中，除評定最有 利標之當次會議應作成紀錄外，其他會議是否作成紀錄得由評選委 員會決議之。","機關採最有利標決標，以不訂底價為原則。","機關評定最有利標後，應於決標公告公布最有利標之標價及總評分 或序位評比結果。","評選委員會評選最有利標，應依招標文件載 明之評選項目、子項及其配分或權重辦理，不得變更。"],"answer":0,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"下列敘述何者錯誤？","options":["評定最有利標涉及序位評比者，招標文 件應載明各評比項目之權重。","機關採最有利標決標，其訂有底 價，而廠商報價逾底價須減價者，於採行協商措施時洽減之，不得 有超底價決標情形。","評定最有利標涉及序位評比者，應於招標 文件載明序位評比結果不合格者，不得作為協商對象或最有利標。","依最有利標評選辦法規定，招標文件未訂明固定費用或費率， 而由廠商於投標文件載明標價者，應規定廠商於投標文件內詳列報 價內容，並納入評選。"],"answer":1,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"機關依「最有利標評選辦法」辦理最有利標評選，下列何者為錯 誤？","options":["招標文件未訂明固定費用或費率，而由廠商於投標文件載 明標價者，應規定廠商於投標文件內詳列報價內容，並納入評選。","招標文件已訂明固定費用或費率者，得規定廠商於投標文件內 詳列組成該費用或費率之內容，並納入評選。","招標文件已訂 明固定費用或費率者，仍應規定廠商於投標文件內詳列組成該費用 或費率之內容，並納入評選。","招標文件已訂明固定費用或費率 者，得不規定廠商於投標文件內詳列組成該費用或費率之內容。"],"answer":2,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"依最有利標評選辦法規定，價格納入評分者，其所占總滿分之比率 不得低於？","options":["百分之二十。","百分之三十。","百分之五十。","百分之六十。"],"answer":0,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":56,"stem":"評選最有利標，下列敘述何者正確？","options":["投標廠商未出席簡報及現 場詢答者，該廠商不得參與評選，並不得作為最有利標。","廠商 簡報不得更改其投標文件之內容。惟如廠商另外提出補充資料者， 是否納入評選由評選委員決議之。","廠商簡報及現場詢答，應 與評選項目有關；其列為評選項目者，所占配分或權重不得逾百分 之十。","為利評選委員對廠商於各評選項目之表現為更深入之瞭 解，得輔以廠商簡報及現場詢答。"],"answer":3,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":57,"stem":"機關辦理採購，有關協商規定，下列敘述何者錯誤？","options":["依採購 法第55條規定採行協商措施者，其採行協商措施前之開標至審標作 業，依採購法規定應予保密。","不得將協商廠商投標文件內容、 優缺點及評分，透露予其他廠商。","採行協商措施應執行保密措 施。","原招標文件已標示得更改項目之內容，始得納入協商。"],"answer":0,"law_ref":"第 57 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":57,"stem":"依採購法規定，招標文件規定得就特定項目採行協商措施時，下列 何者為正確？","options":["以評選最優廠商為協商對象。","審標程序公開 進行。","參與協商之廠商得依據協商結果修改投標文件。","開 標程序應公開。"],"answer":2,"law_ref":"第 57 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":58,"stem":"機關辦理採購採最低標決標，依採購法第58條規定限期通知最低 標廠商提出說明後，廠商未於期限內提出合理之說明者，下列處置 何者適法？","options":["不決標予最低標廠商，並以次低標廠商為最低標廠 商。","不決標予最低標廠商，並逕予廢標。","不決標予最低標 廠商，並不發還押標金。","自次低標起，依序洽廠商是否願意減 至最低標價後決標。"],"answer":0,"law_ref":"第 58 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":58,"stem":"下列何種情況屬採購法第58條所稱總標價或部分標價偏低之情形？","options":["廠商之部分標價低於其他機關最近辦理相同採購決標價之百分 之八十者。","廠商之部分標價有對應之底價項目可供比較，該部 分標價低於相同部分項目底價之百分之八十者。","訂有底價之採 購，廠商之總標價低於底價百分之八十者。","廠商之部分標價低 於可供參考之一般價格之百分之八十者。"],"answer":2,"law_ref":"第 58 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":58,"stem":"機關辦理採購採最低標決標，最低標廠商標價低於底價百分之七 十，依採購法第58條規定，下列何者為非？","options":["洽最低標廠商說 明，如機關評估該說明合理，逕決標予該最低標廠商。","免洽最 低標廠商說明，不決標予該最低標廠商。","洽最低標廠商說明， 如機關評估該說明不合理，不決標予該最低標廠商，並以次低標為 最低標廠商。","經機關評估該標價並無降低品質、不能誠信履約 之虞，不洽最低標說明，逕決標予該最低標廠商。"],"answer":1,"law_ref":"第 58 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":58,"stem":"機關辦理採購，下列敘述何者正確？","options":["機關得於招標文件中規定 廠商之標價有採購法第58條所稱標價偏低之情形時，即應繳納差額 保證金。","最低標廠商總標價在底價以內，但未低於底價之百分 之八十，該最低標主動表示標價錯誤，要求不決標予該廠商，機關 得予接受。","最低標廠商總標價有採購法第58條所稱標價偏低之 情形，得逕請廠商於5日內提出差額保證金，未提出者，不退還押 標金。","總標價未偏低但部分標價偏低者，仍適用採購法 規定。"],"answer":3,"law_ref":"第 58 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":60,"stem":"機關辦理採購，下列敘述何者正確？","options":["機關辦理採購依採購法第 51條規定通知廠商說明，廠商未依通知期限辦理者，視同放棄，不 得以該廠商為決標對象。","機關辦理公告金額以上採購之招標， 應於決標日起20日內，將決標結果之公告刊登於政府採購公報，並 以書面通知各投標廠商。","機關依招標文件規定審查廠商投標文 件，其審查結果之通知，經廠商請求者，得以書面為之。","機關 辦理採購，其因契約變更致原決標金額增加新臺幣150萬元，如未 另訂新契約者，免辦理決標公告。"],"answer":2,"law_ref":"第 60 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":61,"stem":"某公立高中辦理94學年度畢業紀念冊編製之採購案，於94年6月15 日決標，依採購法規定，最遲應於何日前刊登決標公告？","options":["94 年7月15日。","94年8月15日。","94年7月4日。","94年7月14 日。"],"answer":3,"law_ref":"第 61 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":61,"stem":"採購法第61條所稱決標後一定期間為？","options":["自開標日起20日。","自開標日起30日。","自決標日起20日。","自決標日起30日。"],"answer":3,"law_ref":"第 61 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":61,"stem":"依採購法第61條規定辦理無法決標之公告，應於廢標後、重行招標 前刊登，並不得超過廢標後多久？","options":["一星期。","二星期。","三星期。","一個月。"],"answer":1,"law_ref":"第 61 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":51,"stem":"機關辦理採購，下列敘述何者正確？","options":["依採購法第51條規定通知綜合 廠商說明，廠商未依通知期限辦理者，視同放棄，不得以該廠商為 決標對象。","公告金額以上之招標，應於決標日起20日內，將決 標結果之公告刊登於政府採購公報，並以書面通知各投標廠商。","依招標文件規定審標，其審標結果之通知，應於審查結果完成 後儘速通知，最遲不得逾決標或廢標日10日。","未達公告金額採 購之招標，其依採購法第49條規定採公開取得書面報價方式辦理因 屬詢價性質，得依採購法第34條第1項但書規定辦理。"],"answer":2,"law_ref":"第 51 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":51,"stem":"依採購法對廠商之通知，下列何者應為書面？","options":["公告金額以上之綜合 審標結果。","公告金額以上之無法決標通知。","未達公告金額 之決標結果。","未達公告金額之無法決標通知。"],"answer":1,"law_ref":"第 51 條","category":"政府採購法§45~§62 (決標)"},{"type":"choice","law":51,"stem":"下列何者錯誤？","options":["預算新臺幣50萬元之採購以公開招標方式辦 綜合 理。","預算新臺幣170萬元之採購，詢價結果只需145萬元，以公 開取得書面報價方式辦理。","預算新臺幣20萬元之採購得以公開 評選方式辦理。","預算新臺幣9萬元小額採購以公開取得書面報 價方式辦理。"],"answer":1,"law_ref":"第 51 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":52,"stem":"依採購法第52條第1項第4款採複數決標者，其採購金額依全部項目 或數量之預算總額認定之。項目標的不同者，亦同。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 52 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":52,"stem":"依採購法第52條第1項第4款採複數決標者，其採購金額依全部項目 或數量之預算總額認定之。但項目之標的不同者，依個別項目之預 算金額認定之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 52 條","category":"政府採購法§45~§62 _ref":"第 53 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":53,"stem":"機關辦理採購之決標，所有合於招標文件規定之投標廠商僅有1 家，其標價超過底價時，須限制減價次數者，應先通知廠商。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 53 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":52,"stem":"機關辦理採購，其決標依採購法第52條第1項第2款規定採未訂底價 最低標決標原則辦理者，無論金額大小，應成立評審委員會，其成 員由機關首長或其授權人員就對於採購標的之價格具有專門知識之 機關職員或公正人士派兼或聘兼之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 52 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":52,"stem":"決標依採購法第52條第1項第2款規定辦理且設有評審委員會者，應 先審查合於招標文件規定之最低標價後，再由評審委員會提出建議 之金額。對於標價合理者，評審委員會仍應提出建議之金額。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 52 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":52,"stem":"決標依採購法第52條第1項第2款規定辦理且設有評審委員會者，應 先審查合於招標文件規定之最低標價後，再由評審委員會提出建議 之金額。但標價合理者，評審委員會得不提出建議之金額。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 52 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":55,"stem":"機關辦理以最低標決標之採購，得預先於招標公告及招標文件內預 告無法決標時，採行協商措施，因非最有利標決標故免報上級機關 核准。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 55 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":55,"stem":"機關辦理以最低標決標之採購，經報上級機關核准，並於招標公告 及招標文件內預告者，得於依規定無法決標時，採行協商措施。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 55 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":55,"stem":"機關辦理以最低標決標之採購，得經機關首長或其授權人員核准於 招標公告及招標文件內預告，於無法決標時，採行協商措施。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 55 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":56,"stem":"評定最有利標涉及序位評比者，招標文件應載明各評比項目之權 重。評比項目之子項有計分基準者，其配分方式應載明於招標文 件。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":56,"stem":"評選最有利標，為利評選委員對廠商於各評選項目之表現為更深入 之瞭解，得輔以廠商簡報及現場詢答。並得規定投標廠商未出席簡 報及現場詢答者，則為不合格標，不得參與評選。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":56,"stem":"評定最有利標涉及序位評比者，招標文件應載明各評比項目之權 重。評比項目之子項有計分基準者，其配分得免載明於招標文件。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 56 條","category":"政府採購法§45~§62 (決標)"},{"type":"yn","law":56,"stem":"機關評定 m":"採購法第107條所稱採購之文件，指採購案件自機關開始計劃至廠 第 107 商完成契約責任期間所產生之各類文字或非文字紀錄資料及其附 條 件。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 107 條","category":"政府採購法§101~§114 (附則)"},{"type":"yn","law":107,"stem":"機關辦理採購文件之保存年限，依採購法之規定；採購法未規定 第 107 者，由招標機關自行決定。 條","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 107 條","category":"政府採購法§101~§114 (附則)"},{"type":"yn","law":107,"stem":"機關辦理採購文件之保存年限，應依檔案法規定辦理。 第 107 條","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 107 條","category":"政府採購法§101~§114 (附則)"},{"type":"yn","law":107,"stem":"機關辦理工程採購設有監造人員者，應規定監造人員填寫監造日報第 107 表，並將之納為採購法第107條規定必須保存之採購文件。 條","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 107 條","category":"政府採購法§101~§114 (附則)"},{"type":"yn","law":111,"stem":"機關辦理巨額勞務採購，因廠商違約致終止契約，就終止前廠商履第 111 約情形，應依採購法第111條規定提報巨額採購使用情形及其效益 條 分析。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 111 條","category":"政府採購法§101~§114 (附則)"},{"type":"yn","law":111,"stem":"機關辦理巨額採購，應於使用期間內，逐年向上級機關提報使用情第 111 形及其效益分析。 條","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 111 條","category":"政府採購法§101~§114 (附則)"},{"type":"yn","law":111,"stem":"機關辦理巨額採購，於驗收後因故逾1年仍未啟用者應自驗收後屆 第 111 滿1年之次日起1個月內提報未啟用之原因。但第2年仍未啟用者， 條 不適用之。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 111 條","category":"政府採購法§101~§114 (附則)"},{"type":"yn","law":111,"stem":"機關辦理巨額採購，因廠商違約致終止契約者，終止前廠商履約 第 111 情形，免依採購法第111條規定提報巨額採購使用情形及其效益分 條 析。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 111 條","category":"政府採購法§101~§114 (附則)"},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"依政府公共工程計畫與經費審議作業要點，以下何者不是基本設計階段審議\n之重點？","options":["經費合理性。","技術可行性。","期程妥適性。","以上皆\n是。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者非政府協調改善我國營造工缺工之措施？","options":["合理檢討移工規定。","加強本國勞工訓練媒合。","推動營建自動化。","全面開放移工進駐\n工地。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列因應物價波動之方式，何者非屬妥適？","options":["計畫階段預為編列物調費\n及預備費。","個案契約依工程會工程採購契約範本採用3層級物調機制。","工程招標時請廠商提出放棄物調聲明書。","招標文件公告前再次訪查\n市場行情。"],"answer":2},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者非工程會推動公共工程生態檢核之措施？","options":["工程會公共工程技術\n服務契約範本納入生態環境調查。","執行機關使用之生態檢核自評表無須\n送主管機關審查。","生態檢核列為施工查核及金質獎評審重點項目。","生態檢核資訊應予公開。"],"answer":1},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者非屬「契約書圖條件不合理」之情形？","options":["保固年限過長。","訂定技術規格時，以功能或效益等精確方式說明招標需求，而不提供參考品\n牌。","未考量現場施工條件。","訂定之主要部分過於空泛。"],"answer":1},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者非政府採購多元化的履約爭議處理機制？","options":["向訴願申請調解。","由機關成立「爭議處理小組」協調爭議。","向法院提起訴訟。","雙\n方合意仲裁。"],"answer":0},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"以班班有冷氣計畫冷氣採購為例，為考量特性需求及兼顧採購效率，下列何\n者非採行之採購策略？","options":["集中採購，以縣市政府為一標。","採最有利\n標，價格納入評分占比重40%。","考量冷氣機尚有節省能源、低噪音或耐\n久性等需求，以最有利標決標。","採複數決標予多家廠商，由學校選擇不\n同冷氣機之供應商。"],"answer":1},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"工程會為協調改善營造業缺工問題，下列何者非整體性之解決對策？","options":["推\n動營建自動化。","暫緩公共工程推動。","加強本勞訓練媒合。","合理\n檢討移工規定。"],"answer":1},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"機關應務實評選規劃設計廠商，評定實務可行之方案，評選委員及工作小組\n應於評選前瞭解之事項包含？A.計畫需求與預算。B.期程。C.各廠商投標內\n容。D.契約變更方案。","options":["ABCD。","ABC。","ABD。","BCD。"],"answer":1},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"機關辦理採購前應核實編列計畫經費，下列何者非考量之因素？","options":["機關需\n求。","使用年限。","未來契約可能因廠商違約重行招標之經費。","維\n護管理。"],"answer":2},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"為避免工程採購因工期不符實際導致流標，下列何者非正確因應對策？","options":["以日曆天訂定工期，應包含預期可工作日及不可工作日或放假日。","檢討\n工期合理性並於招標文件說明已考量氣候影響之工期天數。","細部設計階\n段確認分項工程、妥適排定施工順序，並考量特殊施工資源，估算各工項工\n期。","僅配合計畫執行期限編列工期。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"機關辦理工程採購遇多次流標，經檢討原因係施工難度高，下列何項非因應\n對策?","options":["檢討有無其他可行之設計方案。","改採統包方式，由統包廠商\n於設計階段選定施工方法。","於招標階段，允許廠商提出替代方案。","增加機關工程管理費用。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"依政府公共工程計畫與經費審議作業要點基本設計階段之必要圖說之規定，\n機關當次送審基本設計之工程建造經費達新臺幣多少時，應辦理替選方案評\n估，並將替選方案評估報告納為必要圖說文件？","options":["10億元。","4億元。","1億元。","5千萬元。"],"answer":0},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"依公共建設工程經費估算編列手冊總則篇，以下何者非屬工程建造費之編列\n架構？","options":["直接工程成本。","間接工程成本。","用地取得及拆遷補償費\n用。","工程預備費。"],"answer":2},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"機關辦理工程採購估驗計價，除契約另有約定，一般每期估驗款須扣除多少\n百分比之保留款？","options":["3％。","5%。","6%。","7%。"],"answer":1},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者不是工程施工查核重點？","options":["職業安全。","檢驗停留點。","工\n區管理及人員設置。","履約保證金繳交。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者非屬工程採購得採行之招標決標策略？","options":["針對巨額工程採購，\n成立採購工作及審查小組協助審查採購需求與經費。","採購期程緊迫情\n況下，請熟識的營造廠研擬招標文件，據以採購。","以統包方式辦理之工\n程，採最有利標或採評分及格最低標方式辦理。","未達公告金額之案件，\n依採購法第23條、第49條及中央機關未達公告金額採購招標辦法，採公開取\n得廠商書面報價或企劃書方式辦理。"],"answer":1},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"機關辦理採購，於招標、決標階段可靈活運用採購策略，增加採購效率，惟\n下列何項屬錯誤之採購策略？","options":["為爭取時效，於招標文件載明「預算未完\n成立法程序前，得保留決標」之文字，提前辦理招標。","工程採購評估採\n統包方式辦理，縮短作業期程。","工程可考量公共利益，在合理範圍內縮\n短工期，於編列預算及訂定底價時，反應所增加之施工費用。","因機關因\n素採購時程延宕，採限制性招標因應。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者為採購法主管機關舉辦之獎項？","options":["金安獎。","金擘獎。","金\n質獎。","金路獎。"],"answer":2},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"下列何者非公共工程品質計畫章節內容？","options":["品質管理標準。","材料及施\n工檢驗程序。","自主檢查表。","剩餘土石方標售。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"依共同性費用編列基準，專案研析後得計列之項目，不包含下列何者？","options":["基地一般性整理。","綠建築。","挑高空間。","智慧建築。"],"answer":0},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"基於促進循環經濟效益，及輔導產業健全發展，工程會依行政院指示，推動\n部分工程材料可適材、適所、適量運用於公共工程，該等材料不包含下列何\n者？","options":["焚化再生粒料。","氧化碴。","轉爐石。","廢輪胎。"],"answer":3},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"工程會透過公共工程流標專案檢討會議發現流標皆有其個案因素，下列何者\n為非？","options":["材料短缺。","設計內容與預算編列不相同。","未按實際需要\n訂定工期。","契約書圖條件不合理。"],"answer":0},{"type":"choice","category":"政府採購全生命週期概論","law_ref":null,"stem":"以下何者非屬共同性費用編列基準表之一般性或共同性需求適用範圍？","options":["鋼筋混凝土造教 、經濟耐用等目的。","監造\n建築師、技師或其他專門職業及技術人員執行監造業務或監造簽證事項，其\n屬法令規定或契約約定應親自赴現場查驗、勘驗、初驗、驗收、會勘或出席\n會議者，應配合到場辦理、說明、會辦。","機關因專業人力或能力不足，\n需委託廠商辦理專案管理者，循預算程序編列核定後辦理即可，無須擬具委\n託專案管理計畫。","受機關委託提供採購規劃、設計或專案管理或代辦採\n購之廠商及其人員，如有犯採購法第88條、第92條之罪之嫌者，應送檢調單\n位查處。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["採購包含工程及技術\n服務者，如技術服務部分預算金額高於工程部分預算金額，即得以勞務採購\n辦理統包。","公開技術服務之預算金額及其所對應之工程標之預算金額，\n並載明超預算為不合格標，不予減價機會。","招標前依「機關委託技術服\n務廠商評選及計費辦法」訂定服務費預算書。","採購契約以採用採購法主\n管機關訂定之範本為原則。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，下列敘述何者正確？","options":["「機關委託技術服務\n廠商評選及計費辦法」之規定，僅能用於服務費用在公告金額以上之技術服\n務採購。","機關辦理設計技術服務，得由學術單位承攬。","機關辦理規\n劃、設計技術服務，得由技師公會或建築師公會承攬。","委託設計及委託\n監造得由不同廠商承作。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘\n述何者正確？","options":["建造費用不得包括廠商之工程管理費用及利潤。","建造\n費用應包括物價指數調整工程款。","建造費用應包括工程保險費。","機\n關考量個案工程內容、服務項目及難易度，可訂定超過附表所載之費率。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"某公立大學採統包方式辦理校門口意象及綠美化工程採購，預算總金額為新\n臺幣80萬元，下列何種招標方式既符合採購法規定，又較能兼顧採購效率及\n品質？","options":["公開取得報價單或企劃書參考最有利標精神，擇最符合需要者進\n行議價。","依採購法第22條第1項第9款辦理公開評選，再邀請優勝廠商進\n行議價。","以公開招標最有利標決標方式辦理。","以公開招標最低標決\n標方式辦理。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"關於採購法施行細則第22條第4項所稱「追加累計金額占原主契約金額之比\n率」，下列敘述何者正確？","options":["加帳部分之累計金額占原主契約金額之比\n率。","加帳部分及減帳部分累計後，占原主契約金額之比率。","加帳部\n分及減帳部分絕對值之累計金額占原主契約金額之比率。","單次追加金額\n占原主契約金額之比率。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理查核金額以上之工程採購，應於公告招標前辦理招標文件之公開閱\n覽。但下列何種情形，不在此限？","options":["依採購法第22條第1項第3款或第105\n條第1項第1款、第2款辦理之採購。","依招標期限標準第4條之1或第10條\n縮短或合理訂定等標期之採購。","重複性採購。","以上皆是。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"依主管機關訂定之工程採購契約範本之內容，契約價金採「總價結算」之給\n付方式辦理，機關提供之設計圖說規定油漆某辦公室內側四面牆壁，契約價\n格詳細表標示之油漆面積為1,000平方公尺。嗣後機關辦理契約變更增加油\n漆天花板面積200平方公尺。廠商按圖施作後實際丈量結果牆壁油漆面積為\n970平方公尺、天花板油漆面積為200平方公尺。機關應給付多少油漆面積之\n價金？","options":["970平方公尺。","1,170平方公尺。","1,200平方公尺。","以上皆非。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"依主管機關訂定之工程採購契約範本之內容，契約價金採「總價結算」之給\n付方式辦理，機關提供之設計圖說規定油漆某辦公室內側四面牆壁，契約價\n格詳細表標示之油漆面積為1,000平方公尺。廠商按圖施作後實際丈量結果\n油漆面積為1,200平方公尺。機關應給付多少油漆面積之價金？","options":["1,000平\n方公尺。","1,150平方公尺。","1,170平方公尺。","1,200平方公尺。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列敘述何者為正確？","options":["機關評選技術服務廠商作業，適用採購法有關最\n有利標之所有評選規定。","招標文件已訂明固定服務費用或費率者，依該\n服務費用或費率決標。","廠商之服務費用，得於訂約後全部一次預付廠\n商，以利廠商資金週轉。","機關得規定於訂約後，預付廠商之服務費用為\n契約總額之百分之四十。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列何者正確？","options":["廠商承辦專案管理技術服務，不得承攬受其管理之標\n案。","設計、監造等技術服務採購案，得委由公立專科以上技專校院相關\n科系所之專任教師辦理並簽證之。","委託監造服務案亦得同時委由承辦統\n包案之細部設計廠商辦理，以提升效率。","委託技術服務採服務成本加公\n費法計費者，廠商應記錄各項費用並提出憑證，且應為正本。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商承辦技術服務得載明之契約條款，下列何者錯誤？","options":["稅負事\n前約定，並依我國法律所定納稅義務人為納稅人。","工程具機電設備者，\n監造計畫應增設功能運轉測試等抽驗程序及標準。","有付款期限者，到期\n付款時所應達到之工作進度。","監造單位之現場人員於進駐工地前1年或\n執行業務期間，有因業務上相關之犯罪行為，經判決確定之情事，機關未必\n須限期更換該人員。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"委託技術服務廠商之服務費用，得於契約約定於訂約後預付一部分，以不逾\n契約價金總額或契約價金上限之百分之幾為原則？","options":["百分之十。","百分\n之二十。","百分之三十。","百分之五十。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商承辦之技術服務為「專案管理」者，其專案管理人員中應有多少比例以\n上為該廠商之專任職員？","options":["1/3。","1/2。","2/3。","3/4。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，其採成本加公費法計費者，其中「公費」部分\n應為定額，且應以直接薪資扣除非經常性給與之獎金後與管理費用合計金額\n多少範圍內為限？","options":["20%。","25%。","30%。","40%。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列何種採購不允許採統包方式辦理？","options":["建築工程。","勞務採購。","財物採購。","橋梁工程。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以統包辦理招標，並規定廠商於投標時提出設計圖者，得就審查達一定\n分數或名次之未得標廠商，於招標文件規定何種內容？","options":["發給獎勵金。","列為優良廠商。","列為下次邀標廠商。","發給廠商支出之一切費\n用。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「水管、電氣與建築工程合併或分開招標原則」，採預鑄工法之工程，其\n規定為何？","options":["應分開辦理招標。","應允許共同投標。","得合併辦理招\n標。","以上皆非。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理招標文件公開閱覽，未採網路電子化閱覽者，應於上班時間內為\n之，並不得少於幾日？","options":["5日。","7日。","10日。","14日。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理公告金額以上採購，於招標文件中規定得標廠商提出連帶保證廠商\n者，其履約保證金得予減收，試問其減收額度以不逾履約保證金額度之若干\n比例為限？","options":["5%。","20%。","50%。","100%。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理工程採購，於招標文件中規定優良廠商得予減收押標金等之減收\n額度以不逾原定應繳總額之若干比例為限？","options":["5%。","20%。","50%。","100%。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理工程採購，得於招標文件規定優良廠商得予減收金額之項目，不包\n括下列何者？","options":["押標金。","履約保證金。","預付款扣回款。","保固\n保證金。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"保固期內發現瑕疵者，由機關通知廠商改正。一般工程所稱上述瑕疵，通常\n不包括下列何項目？","options":["損裂。","保養。","坍塌。","漏水。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"以下若干新臺幣（下同）金額之政府採購，得不經公告程序，逕洽廠商採\n購，免提供報價或企劃書？","options":["60萬元之工程採購。","15萬元之設計服務\n採購。","30萬元之監造服務採購。","以上皆非。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"契約以工作天計算之工程，廠商提前9日完工，機關於履約期限最末日辦理\n驗收，經驗收有瑕疵，機關要求廠商於驗收次日起5日內改善完成，無任何\n不可抗力因素，廠商逾機關規定改善期限4天（中間包含2天國定假日）方改\n善完成，並經複驗合格，下列敘述何者正確？","options":["提前完工日數大於逾期改\n善日數，故未有逾期情況。","改善完成日已逾履約期限，逾期日數2日。","改善完成日已逾履約期限，逾期日數9日。","改善完成日已逾履約期\n限，逾期日數4日。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以統包方式辦理採購，下列敘述何者正確？","options":["工程、財物及勞務採購\n均得以統包方式辦理。","統包工程採購之內容至少包含細部設計及施工。","統包工程之廠商資格得通案規定為施工廠商。","統包工程已訂有設計\n準則與施工規範、明確的工作項目與技術工法者，應採最低標方式決標。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理工程採購，有部分先行使用之必要或已履約之部分有減損滅失之虞\n者，下列處理方式何者錯誤？","options":["就該部分辦理驗收。","就該部分先辦理\n驗收者，未來仍應針對該部分再辦理驗收。","就該部分辦理分段查驗供未\n來驗收之用。","不論就該

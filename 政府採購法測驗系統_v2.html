// ── HELPERS ──
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shuffle(a){
  const b=[...a];
  for(let i=b.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [b[i],b[j]]=[b[j],b[i]];
  }
  return b;
}
function show(id){
  ['s-home','s-quiz','s-result'].forEach(s=>{
    const el=$( s);
    if(el) el.classList.toggle('active', s===id);
  });
  window.scrollTo(0,0);
}

// ── DROPDOWN ──
// 用 touchstart/touchend 偵測是否為捲動，避免 iPhone 觸碰即選定
function addTapHandler(el, callback){
  let startY = 0;
  el.addEventListener('touchstart', function(e){
    startY = e.touches[0].clientY;
  }, {passive: true});
  el.addEventListener('touchend', function(e){
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if(dy < 10){ // 移動小於 10px 才視為點擊
      e.preventDefault();
      callback();
    }
  });
  // 桌機保留 click 事件
  el.addEventListener('click', function(e){
    if(!('ontouchstart' in window)) callback();
  });
}

function buildDropdown(){
  const cont = $('dropdown-items');
  // "all" option
  let btn = document.createElement('button');
  btn.className = 'dropdown-item' + (selCat==='all'?' selected':'');
  btn.textContent = '【全部題庫】（3,564 題）';
  addTapHandler(btn, function(){ selectCat('all', btn.textContent); });
  cont.appendChild(btn);
  // each category
  CATS.forEach(cat=>{
    const s = STATS[cat];
    const btn2 = document.createElement('button');
    btn2.className = 'dropdown-item' + (selCat===cat?' selected':'');
    btn2.textContent = cat + '（'+ s.total +' 題）';
    addTapHandler(btn2, function(){ selectCat(cat, btn2.textContent); });
    cont.appendChild(btn2);
  });
}

function selectCat(cat, label){
  selCat = cat;
  $('sel-text').textContent = label;
  closeDropdown();
  updateInfo();
}

function openDropdown(){
  buildDropdown();
  $('dropdown').classList.add('open');
  $('overlay').classList.add('open');
}
function closeDropdown(){
  $('dropdown').classList.remove('open');
  $('overlay').classList.remove('open');
}

$('sel-btn').addEventListener('pointerdown', function(e){
  e.preventDefault();
  openDropdown();
});
$('overlay').addEventListener('pointerdown', function(e){
  e.preventDefault();
  closeDropdown();
});
$('dropdown-close').addEventListener('pointerdown', function(e){
  e.preventDefault();
  closeDropdown();
});

// ── TOGGLE BUTTONS ──
function bindToggles(groupId, callback){
  const btns = $(groupId).querySelectorAll('.tog-btn');
  btns.forEach(btn=>{
    btn.addEventListener('pointerdown', function(e){
      e.preventDefault();
      btns.forEach(b=>b.classList.remove('on'));
      this.classList.add('on');
      callback(this.dataset.v);
    });
  });
}

bindToggles('type-btns', function(v){ selType = v; updateInfo(); });
bindToggles('count-btns', function(v){ selCount = parseInt(v); updateInfo(); });

function updateInfo(){
  let p = selCat==='all' ? ALL_Q : ALL_Q.filter(q=>q.category===selCat);
  if(selType!=='all') p = p.filter(q=>q.type===selType);
  const avail = p.length;
  const will  = selCount===0 ? avail : Math.min(selCount, avail);
  const tl    = selType==='all'?'全部題型': selType==='choice'?'選擇題':'是非題';
  $('range-info').textContent = '✦ 篩選結果：'+ tl +'共 '+ avail +' 題，本次抽出 '+ will +' 題作答';
}
updateInfo();

// ── START ──
$('btn-start').addEventListener('pointerdown', function(e){
  e.preventDefault();
  startQuiz();
});
function startQuiz(){
  retryMode = false;
  let p = selCat==='all' ? [...ALL_Q] : ALL_Q.filter(q=>q.category===selCat);
  if(selType!=='all') p = p.filter(q=>q.type===selType);
  if(p.length===0){ alert('該條件下沒有題目，請重新選擇。'); return; }
  p = shuffle(p);
  pool = selCount===0 ? p : p.slice(0, selCount);
  initQuiz();
}
function initQuiz(){
  idx=0; correct=0; wrongs=[]; answered=false;
  $('retry-banner').style.display = retryMode?'block':'none';
  show('s-quiz');
  renderQ();
}

// ── RENDER QUESTION ──
function renderQ(){
  const q = pool[idx];
  const tot = pool.length;
  $('qh-title').textContent = q.category;
  $('qh-prog').textContent = '第 '+(idx+1)+' 題 / 共 '+tot+' 題';
  $('prog-bar').style.width = (idx/tot*100)+'%';

  const badge = $('q-badge');
  badge.textContent = q.type==='choice'?'選擇題':'是非題';
  badge.className   = 'badge '+(q.type==='choice'?'badge-c':'badge-y');
  $('q-law').textContent = q.law_ref||'';
  $('q-cat').textContent = q.category;
  $('q-stem').textContent = q.stem;

  const optsEl = $('opts');
  optsEl.innerHTML = '';
  q.options.forEach((opt, i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = (q.type==='choice'?'('+( i+1)+') ':'')+opt;
    btn.addEventListener('pointerdown', function(e){
      e.preventDefault();
      pickAnswer(i);
    });
    optsEl.appendChild(btn);
  });

  $('feedback').style.display = 'none';
  $('feedback').className = 'feedback';
  $('btn-next').style.display = 'none';
  answered = false;
}

// ── ANSWER ──
function pickAnswer(chosen){
  if(answered) return;
  answered = true;
  const q = pool[idx];
  const isOk = chosen === q.answer;
  const btns = $('opts').querySelectorAll('.opt-btn');
  btns.forEach((b,i)=>{
    b.disabled = true;
    if(i===q.answer) b.classList.add(isOk?'correct':'reveal');
    if(i===chosen && !isOk) b.classList.add('wrong');
  });
  const fb = $('feedback');
  fb.style.display = 'block';
  if(isOk){
    correct++;
    fb.className = 'feedback ok';
    fb.textContent = '✓ 答對了！'+(q.law_ref?'（依據：'+q.law_ref+'）':'');
  } else {
    wrongs.push({q, chosen});
    fb.className = 'feedback ng';
    const co = q.options[q.answer];
    fb.textContent = '✗ 答錯！正確答案：'+(q.type==='choice'?'('+( q.answer+1)+') ':'')+co+
      (q.law_ref?'（依據：'+q.law_ref+'）':'');
  }
  const bn = $('btn-next');
  bn.style.display = 'inline-block';
  bn.textContent = idx===pool.length-1?'查看成績 🏆':'下一題 →';
}

// ── NEXT ──
$('btn-next').addEventListener('pointerdown', function(e){
  e.preventDefault();
  if(!answered) return;
  if(idx < pool.length-1){ idx++; renderQ(); }
  else showResult();
});

// ── ABORT ──
$('btn-abort').addEventListener('pointerdown', function(e){
  e.preventDefault();
  if(confirm('確定要提早結束並回主畫面？\n目前成績將不會儲存。')) show('s-home');
});

// ── RESULT ──
function showResult(){
  show('s-result');
  const tot = pool.length;
  const pct = Math.round(correct/tot*100);
  const pass = pct>=70;
  $('sc-pct').textContent = pct+'%';
  $('sc-lbl').textContent = pass?'及格 ✓':'未及格';
  $('sc-circle').className = 'score-circle '+(pass?'sc-pass':'sc-fail');
  $('res-sum').innerHTML = '答對 <strong>'+correct+'</strong> 題 / 共 <strong>'+tot+'</strong> 題　'+
    '<span class="verdict '+(pass?'vp':'vf')+'">'+(pass?'✓ 及格':'✗ 未及格')+'</span>';

  const rb = $('btn-retry');
  rb.disabled = wrongs.length===0;
  rb.textContent = wrongs.length===0?'無錯題可重練':'重練錯題（'+wrongs.length+' 題）';

  const ww = $('wrong-wrap');
  const wi = $('wrong-items');
  wi.innerHTML='';
  if(wrongs.length>0){
    ww.style.display='block';
    wrongs.forEach((w,n)=>{
      const q=w.q;
      const div=document.createElement('div');
      div.className='wi';
      div.innerHTML='<div class="wi-n">第 '+(n+1)+' 題</div>'+
        '<div class="wi-stem">'+esc(q.stem)+'</div>'+
        '<div class="wi-ans">✓ 正確：'+(q.type==='choice'?'('+( q.answer+1)+') ':'')+esc(q.options[q.answer])+'</div>'+
        (q.law_ref?'<div class="wi-law">依據：'+esc(q.law_ref)+'</div>':'');
      wi.appendChild(div);
    });
  } else ww.style.display='none';
}

$('btn-home2').addEventListener('pointerdown',function(e){ e.preventDefault(); show('s-home'); });
$('btn-retry').addEventListener('pointerdown',function(e){
  e.preventDefault();
  if(wrongs.length===0) return;
  retryMode=true;
  pool=shuffle(wrongs.map(w=>w.q));
  initQuiz();
});
</script>
</body>
</html>

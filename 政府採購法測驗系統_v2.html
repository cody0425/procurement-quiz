<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>政府採購法測驗系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DFKai-SB','標楷體',serif;background:#f0f4f8;min-height:100vh;font-size:16px;}
button{-webkit-appearance:none;appearance:none;border:none;cursor:pointer;font-family:inherit;font-size:16px;}

/* ── SCREENS ── */
.screen{display:none;max-width:700px;margin:0 auto;padding:16px;}
.screen.active{display:block;}

/* ── HOME ── */
.home-title{text-align:center;color:#1a365d;font-size:24px;font-weight:bold;padding:20px 0 6px;}
.home-sub{text-align:center;color:#4a5568;font-size:14px;margin-bottom:20px;}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);padding:18px;margin-bottom:14px;}
.card-label{color:#2d3748;font-size:15px;font-weight:bold;margin-bottom:10px;border-left:4px solid #3182ce;padding-left:10px;}

/* ── CUSTOM SELECT ── */
.custom-select-wrap{position:relative;}
.custom-select-btn{
  width:100%;padding:12px 40px 12px 14px;background:#fff;
  border:1.5px solid #cbd5e0;border-radius:8px;
  font-size:16px;font-family:inherit;color:#2d3748;
  text-align:left;cursor:pointer;line-height:1.4;
  display:flex;align-items:center;justify-content:space-between;
}
.custom-select-btn:active{background:#ebf8ff;border-color:#3182ce;}
.custom-select-arrow{color:#718096;font-size:12px;flex-shrink:0;margin-left:8px;}
.custom-dropdown{
  position:fixed;left:0;right:0;bottom:0;
  background:#fff;border-radius:16px 16px 0 0;
  box-shadow:0 -4px 20px rgba(0,0,0,.2);
  z-index:1000;max-height:70vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding-bottom:env(safe-area-inset-bottom,0);
  display:none;
}
.custom-dropdown.open{display:block;}
.dropdown-header{
  padding:16px;text-align:center;font-size:15px;
  color:#4a5568;border-bottom:1px solid #e2e8f0;
  position:sticky;top:0;background:#fff;z-index:1;
}
.dropdown-close{
  float:right;background:#e2e8f0;border:none;
  border-radius:20px;padding:4px 12px;font-size:13px;
  color:#4a5568;cursor:pointer;
}
.dropdown-item{
  width:100%;padding:14px 16px;background:#fff;
  border:none;border-bottom:1px solid #f0f4f8;
  font-size:15px;font-family:inherit;color:#2d3748;
  text-align:left;cursor:pointer;line-height:1.4;
}
.dropdown-item:active{background:#ebf8ff;}
.dropdown-item.selected{color:#3182ce;font-weight:bold;background:#ebf8ff;}
.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4);z-index:999;display:none;
}
.overlay.open{display:block;}

/* ── TYPE & COUNT BTNs ── */
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.tog-btn{
  flex:1;min-width:70px;padding:10px 8px;
  border:1.5px solid #cbd5e0;border-radius:8px;
  background:#fff;color:#4a5568;font-size:14px;
  font-family:inherit;text-align:center;cursor:pointer;
  transition:all .15s;
}
.tog-btn.on{background:#3182ce;color:#fff;border-color:#3182ce;}
.tog-btn:active{opacity:.8;}

.range-info{
  background:#ebf8ff;border:1px solid #bee3f8;
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:#2b6cb0;margin-top:10px;line-height:1.6;
}

.btn-start{
  width:100%;padding:15px;background:#2b6cb0;
  color:#fff;border:none;border-radius:10px;
  font-size:18px;font-family:inherit;font-weight:bold;
  cursor:pointer;margin-top:4px;
}
.btn-start:active{background:#1a4a8a;}

/* ── QUIZ ── */
.quiz-header{
  background:#2b6cb0;color:#fff;padding:12px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;border-radius:0 0 8px 8px;
  margin:-16px -16px 0;
}
.qh-left{flex:1;}
.qh-title{font-size:14px;font-weight:bold;margin-bottom:2px;}
.qh-prog{font-size:12px;opacity:.9;}
.btn-abort{
  background:rgba(255,255,255,.2);color:#fff;
  border:1px solid rgba(255,255,255,.4);border-radius:6px;
  padding:8px 10px;font-size:12px;font-family:inherit;cursor:pointer;
  white-space:nowrap;
}
.btn-abort:active{background:rgba(255,255,255,.4);}

.prog-bar-wrap{height:5px;background:#e2e8f0;margin:12px 0 0;}
.prog-bar{height:5px;background:#48bb78;transition:width .3s;}

.retry-banner{
  background:#fef3c7;border:1px solid #f6d860;
  border-radius:8px;padding:8px 14px;margin:10px 0;
  font-size:13px;color:#92400e;text-align:center;
}

.q-card{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin:12px 0;overflow:hidden;}
.q-meta{background:#f7fafc;padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;}
.badge{font-size:12px;font-weight:bold;padding:3px 8px;border-radius:20px;}
.badge-c{background:#ebf4ff;color:#3182ce;}
.badge-y{background:#f0fff4;color:#38a169;}
.q-law{font-size:12px;color:#718096;}
.q-cat-tag{font-size:11px;color:#a0aec0;margin-left:auto;}
.q-stem{padding:16px 14px 10px;font-size:15px;line-height:1.9;color:#2d3748;white-space:pre-wrap;}

.opts{padding:0 10px 10px;}
.opt-btn{
  width:100%;text-align:left;padding:12px 14px;
  margin-bottom:8px;border:1.5px solid #e2e8f0;
  border-radius:8px;background:#fff;color:#2d3748;
  font-size:14px;font-family:inherit;cursor:pointer;
  line-height:1.5;transition:background .1s,border-color .1s;
}
.opt-btn:active:not([disabled]){background:#ebf8ff;}
.opt-btn.correct{background:#f0fff4;border-color:#48bb78;color:#276749;font-weight:bold;}
.opt-btn.wrong{background:#fff5f5;border-color:#fc8181;color:#9b2c2c;}
.opt-btn.reveal{background:#f0fff4;border-color:#48bb78;color:#276749;}
.opt-btn[disabled]{cursor:default;}

.feedback{
  margin:0 10px 10px;padding:12px 14px;
  border-radius:8px;font-size:14px;line-height:1.6;display:none;
}
.feedback.ok{background:#f0fff4;border:1px solid #9ae6b4;color:#276749;}
.feedback.ng{background:#fff5f5;border:1px solid #feb2b2;color:#9b2c2c;}

.quiz-foot{padding:10px 0 4px;text-align:right;}
.btn-next{
  padding:12px 28px;background:#3182ce;color:#fff;
  border:none;border-radius:8px;font-size:15px;
  font-family:inherit;cursor:pointer;display:none;
}
.btn-next:active{background:#2c5282;}

/* ── RESULT ── */
.res-title{text-align:center;font-size:22px;font-weight:bold;color:#1a365d;margin-bottom:18px;}
.score-circle{
  width:120px;height:120px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 14px;border:8px solid;
}
.sc-pass{border-color:#48bb78;color:#276749;}
.sc-fail{border-color:#fc8181;color:#9b2c2c;}
.sc-pct{font-size:30px;font-weight:bold;}
.sc-lbl{font-size:13px;margin-top:2px;}
.res-sum{text-align:center;font-size:15px;color:#4a5568;margin-bottom:16px;}
.verdict{display:inline-block;padding:3px 14px;border-radius:20px;font-weight:bold;font-size:14px;}
.vp{background:#c6f6d5;color:#276749;}
.vf{background:#fed7d7;color:#9b2c2c;}
.res-btns{display:flex;gap:10px;margin-bottom:16px;}
.btn-home2,.btn-retry{
  flex:1;padding:13px;border-radius:8px;
  font-size:15px;font-family:inherit;font-weight:bold;cursor:pointer;border:none;
}
.btn-home2{background:#e2e8f0;color:#2d3748;}
.btn-home2:active{background:#cbd5e0;}
.btn-retry{background:#3182ce;color:#fff;}
.btn-retry:active{background:#2c5282;}
.btn-retry[disabled]{background:#a0aec0;cursor:default;}
.wrong-wrap{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.wrong-wrap h3{color:#2d3748;margin-bottom:10px;font-size:14px;}
.wi{border-bottom:1px solid #f0f4f8;padding:10px 0;font-size:13px;line-height:1.7;}
.wi:last-child{border-bottom:none;}
.wi-n{color:#718096;font-size:12px;margin-bottom:3px;}
.wi-stem{color:#2d3748;white-space:pre-wrap;margin-bottom:3px;}
.wi-ans{color:#276749;font-weight:bold;}
.wi-law{color:#a0aec0;font-size:12px;}
</style>
</head>
<body>

<!-- overlay for dropdown -->
<div class="overlay" id="overlay"></div>

<!-- ══ HOME ══ -->
<div class="screen active" id="s-home">
  <div class="home-title">📋 政府採購法測驗系統</div>
  <div class="home-sub">共 17 個單元・3,564 題</div>
  <div style="text-align:center;color:#718096;font-size:13px;margin-top:-12px;margin-bottom:16px;">✏️ 製作者：阿寬老師</div>

  <div class="card">
    <div class="card-label">選擇測驗單元</div>
    <div class="custom-select-wrap">
      <button class="custom-select-btn" id="sel-btn">
        <span id="sel-text">【全部題庫】（3,564 題）</span>
        <span class="custom-select-arrow">▼</span>
      </button>
    </div>
    <div id="range-info" class="range-info"></div>
  </div>

  <div class="card">
    <div class="card-label">測驗設定</div>
    <div style="margin-bottom:14px;">
      <div style="font-size:13px;color:#4a5568;margin-bottom:8px;">題目類型</div>
      <div class="btn-row" id="type-btns">
        <button class="tog-btn on" data-v="all">全部題型</button>
        <button class="tog-btn" data-v="choice">選擇題</button>
        <button class="tog-btn" data-v="yn">是非題</button>
      </div>
    </div>
    <div>
      <div style="font-size:13px;color:#4a5568;margin-bottom:8px;">題目數量</div>
      <div class="btn-row" id="count-btns">
        <button class="tog-btn on" data-v="10">10 題</button>
        <button class="tog-btn" data-v="20">20 題</button>
        <button class="tog-btn" data-v="30">30 題</button>
        <button class="tog-btn" data-v="50">50 題</button>
        <button class="tog-btn" data-v="0">全部</button>
      </div>
    </div>
  </div>

  <button class="btn-start" id="btn-start">開始測驗 ▶</button>
</div>

<!-- dropdown sheet -->
<div class="custom-dropdown" id="dropdown">
  <div class="dropdown-header">
    選擇題庫單元
    <button class="dropdown-close" id="dropdown-close">關閉</button>
  </div>
  <div id="dropdown-items"></div>
</div>

<!-- ══ QUIZ ══ -->
<div class="screen" id="s-quiz">
  <div class="quiz-header">
    <div class="qh-left">
      <div class="qh-title" id="qh-title">測驗中</div>
      <div class="qh-prog" id="qh-prog">第 1 題 / 共 10 題</div>
    </div>
    <button class="btn-abort" id="btn-abort">⏹ 提早結束</button>
  </div>
  <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <div class="retry-banner" id="retry-banner" style="display:none">🔄 錯題重練模式</div>

  <div class="q-card">
    <div class="q-meta">
      <span class="badge" id="q-badge">選擇題</span>
      <span class="q-law" id="q-law"></span>
      <span class="q-cat-tag" id="q-cat"></span>
    </div>
    <div class="q-stem" id="q-stem"></div>
    <div class="opts" id="opts"></div>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="quiz-foot">
    <button class="btn-next" id="btn-next">下一題 →</button>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div class="screen" id="s-result">
  <div class="res-title">📊 測驗結果</div>
  <div class="score-circle" id="sc-circle">
    <div class="sc-pct" id="sc-pct">0%</div>
    <div class="sc-lbl" id="sc-lbl">得分</div>
  </div>
  <div class="res-sum" id="res-sum"></div>
  <div class="res-btns">
    <button class="btn-home2" id="btn-home2">回主畫面</button>
    <button class="btn-retry" id="btn-retry">重練錯題</button>
  </div>
  <div class="wrong-wrap" id="wrong-wrap" style="display:none">
    <h3>❌ 答錯的題目</h3>
    <div id="wrong-items"></div>
  </div>
</div>

ice","law":22,"stem":"機關依採購法第22條第1項第11款規定採購房地產，其訂有底價 者，訂定底價之時機：","options":["辦理公告前。","開標前。","比價 前。","以上皆非。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關辦理公告金額以上房地產之採購，下列何情況依「機關指定地 區採購房地產作業辦法」規定不得免除公開徵求：","options":["毗鄰房地產 或畸零地之採購，係與現有房地產合併，以應業務需要者。","符 合採購法第22條第1項第2款之情形者。","機關間房地產之取得。","其他經主管機關認定者。"],"answer":2,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"下列敘述何者錯誤？","options":["機關依採購法第22條第1項規定辦理限制 性招標，應由需求、使用或承辦採購單位，就個案敘明符合各款之 情形，簽報機關首長或其授權人員核准。","機關辦理採購，其屬 原有採購之後續擴充，且已於招標文件敘明擴充之期間、金額或數 量者，得採限制性招標。","採購法所稱共同投標，指2家以上之 廠商共同具名投標，並於得標後共同具名簽約，連帶負履行採購契 約之責，以承攬工程或提供財物、勞務之行為。","採購法 第1項第2款所稱專屬權利，不包括商標專用權。"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關依採購法第22條第1項第6款辦理契約變更，下列何者錯誤？","options":["僅適用於工程採購。","契約金額如包括機關支出及收入金額 者，該條款所稱原主契約金額，得以支出部分之金額計算之。","該條款所稱「必須追加契約以外之工程」之情形，係指增加原契約 外之工作項目，不包括原契約項目規格之變更或既有標的數量之增 加。","機關辦理契約變更致原決標金額增加者，該增加之金額， 應依採購法第61條或第62條規定辦理公告、彙送。"],"answer":2,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"依「機關邀請或委託文化藝術專業人士機構團體提供藝文服務作業 辦法」之規定，機關辦理藝文服務採購，下列何者正確？","options":["應免 收押標金、保證金。","採公告審查程序者，審查委員會應由委員 5人以上組成。","巨額藝文服務採購不經公告審查程序辦理者， 應由機關邀集機關人員2人及文化、藝術領域之專家學者7人開會審 查，經三分之二以上人員出席，出席人員二分之一以上審查通過， 簽報機關首長或其授權人員核准。","以上皆是。"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關辦理藝文服務採購，採公告審查程序者，下列何者正確？","options":["招標文件之內容，應考量藝文服務之採購特性及實際需要，必要時 得徵詢藝文業者之意見。","審查委員會應由委員5人以上組成； 其會議之決議應有委員總額三分之二以上出席，出席委員三分之 二同意行之。","公告結果，僅1家藝文業者投標者，不得進行審 查。","以上皆是。"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"下列敘述何者錯誤？","options":["採購法第22條第1項第2款所稱專屬權利， 不包括商標專用權。","採購法第22條第1項第1款所稱無合格標， 指審標結果無廠商合於招標文件規定。","採購法第22條第1項第6 款所稱百分之五十，指追加當次金額占原主契約金額之比率。","機關依採購法第22條第1項規定辦理限制性招標，其得以比價方式 辦理者，優先以比價方式辦理。"],"answer":2,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關依採購法第22條第1項第10款規定辦理設計競賽廠商公開評 選，其投標廠商有幾家即可開標？","options":["1家。","2家。","3家。","6家。"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"某鎮公所依採購法第22條第1項第3款辦理限制性招標採購，以下何 者為正確？","options":["因採購案件為排水工程，可簽報機關首長或其授權 人員通案核准。","因屬緊急採購，僅逕洽某廠商議價即可，免優 先洽2家廠商比價。","不適用「特別採購招標決標處理辦法」。","以上皆非。"],"answer":2,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關依採購法第22條第1項第9款辦理委託資訊服務，有關廠商之服 務費用，得於契約規定於訂約後預付一部分，但該部分不得超過契 約總額上限之百分之幾為原則？","options":["五十。","三十。","二十。","十五。"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"有關機關委託廠商辦理社會福利服務，下列敘述何者不正確？","options":["得於招標文件規定得標廠商實際績效提高時，依其情形給付廠商獎 勵金。","採購評選委員會評選優勝廠商，得不以1家為限。","提供服務工作人員之薪資，應於招標文件規定採固定價格決標或不 得低於一定金額。","機關提供場地供廠商使用，皆應由廠商負責 維修，機關無需另外編列費用給付。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"下列何種情形屬採購法第22條第1項第1款所稱之「重大改變者」？","options":["投標廠商資格放寬。","履約數量明顯變更。","履約期限明 顯變更。","以上皆是。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關委託廠商承辦資訊服務採服務成本加公費法者，得於招標文件 規定得標廠商服務費用降低或實際績效提高時，得依情形給付廠商 獎勵性報酬，其屬服務費用降低者，為所減省之契約價金金額之一 定比率，以不逾百分之幾為原則？","options":["五十。","三十。","二 十。","十。"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關依「機關辦理設計競賽廠商評選及計費辦法」以公告程序辦理 設計競賽，設計競賽優勝者須於獲選後提供製作成品服務者，機關 得於招標文件規定得標廠商服務費用降低或實際績效提高時，得依 其情形給付廠商獎勵性報酬。其報酬之規定為何？","options":["屬服務費用 降低者，為所減省之契約價金之一定比率，且以不逾百分之五十為 原則。","屬實際績效提高者，為所減省之契約價金之一定比率， 且以不逾百分之五十為原則。","屬服務費用降低者，依契約所載 計算方式給付，且以不逾百分之三十為原則。","屬實際績效提高 者，依契約所載計算方式給付，且以不逾百分之三十為原則。"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關辦理設計競賽，其採服務成本加公費法者，得於招標文件規定 得標廠商服務費用降低或實際績效提高時，得依情形給付廠商獎勵 性報酬，其屬服務費用降低者，為所減省之契約價金金額之一定比 率，以不逾百分之五十為原則，其屬實際績效提高者之契約給付金 額，以不逾契約價金總額或契約價金上限之百分之幾為原則？","options":["五十。","三十。","二十。","十。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"下列何者屬採購法第22條第1項第6款之適用要件？","options":["非洽原訂 約廠商辦理，不能達契約之目的，且未逾原主契約金額百分之五十 者。","因未能預見之情形，必須追加契約以外之工程。","如另 行招標，確有產生重大不便及技術或經濟上困難之虞。","以上皆 是。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"某國立大學辦理學生活動中心興建工程，施工期間因未能預見之情 形，必須追加契約以外之工程，而擬依採購法第22條第1項第6款辦 理，下列何者非屬其適用條件？","options":["新增項目。","原契約項目數 量之增加。","原契約項目之減少。","原契約項目規格之變更。"],"answer":2,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關在原招標目的範圍內，因未能預見之情形，必須追加契約以 外之工程，如另行招標，確有產生重大不便及技術或經濟上困難之 虞，非洽原訂約廠商辦理，不能達契約之目的，且未逾原主契約金 額百分之五十者，得採限制性招標。所稱百分之五十，下列何者正 確？","options":["該次追加金額占原主契約金額。","該次追加金額占追加 後主契約金額。","追加累計金額占追加後主契約金額。","追加 累計金額占原主契約金額之比率。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關辦理委託資訊服務之公開評選屬計畫性質複雜，服務費用不 易確實預估或履約成果不確定之服務案件，服務費用之計算適用何 者計算方式？","options":["服務成本加公費法。","費用百分比法。","按 月、按日或按時計酬法。","總包價法或單價計算法。"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關辦理委託資訊服務，其服務費用未達公告金額者，下列何者不 是得適用之採購方式？","options":["公開取得書面報價或企劃書。","公開 評選。","公開招標。","統包。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關採購房地產訂有底價者，訂定底價時應考量下列何者因素？","options":["當地近期買賣實例。","政府公定價格、評定價格或標售之價 格。","房地漲跌趨勢。","以上皆是。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關指定地區採購房地產，應先編擬計畫依規定層報核定，此計畫 內容不包括下列何者？","options":["採購房地產及指定地區採購之理由及其 必要性。","政府公定或評定價格。","附近買賣實例或其他徵信 資料。","預估底價。"],"answer":3,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"委託技術服務須縮短時間完成者，得按縮短時間之程度酌增費用， 其所增費用：","options":["須採服務成本加公費法計算。","得專案議定。","須採總包價法計算。","須採建造費用百分比法計算。"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"下列何者不是機關依「機關辦理設計競賽廠商評選及計費辦法」 以公告程序辦理設計競賽，得採行的方式？","options":["公開徵求廠商提出 設計作品供評選。","在相關專業領域著有專書或研究報告，經機 關認有特殊表現或貢獻者審查擇定後，再通知廠商提出計畫書供評 選。","公開徵求廠商提出設計作品及設計說明書供評選。","公 開徵求廠商提出設計建議書，經評選入選者再邀其提出設計作品供 評選。"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"機關依機關辦理設計競賽廠商評選及計費辦法辦理設計競賽，設 計成果之製作費用，下列何者正確？","options":["採服務成本加公費法為原 則核實給付。","採總包價法為原則，屬得標廠商代收及代付之費 用亦同。","以採總包價法為原則，但屬得標廠商代收及代付之費 用，得核實給付。","按月、按日或按時計酬法，但屬得標廠商代 收及代付之費用，得核實給付。"],"answer":2,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":23,"stem":"未達公告金額之採購，以公開取得廠商之書面報價或企劃書方式辦 理者下列何者為正確？","options":["以採購法第34條公開徵求廠商提供參考 資料之方式刊登公告。","可於公告文件載明截止收件日期，不必 載明開標時間及地點。","其決標結果得不通知廠商。","廠商不 得提出異議。"],"answer":1,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":23,"stem":"未達公告金額採購之招標，其金額逾公告金額十分之一者，依「中 央機關未達公告金額採購招標辦法」規定，符合採購法第22條第1 項第16款採限制性招標者，應經需求、使用或承辦採購單位就個案 敘明邀請指定廠商比價或議價之適當理由，並經下列何程序，得採 限制性招標？","options":["簽報機關首長或其授權人員核准。","簽報主管 機關認定。","預算書敘明。","報經上級機關核准。"],"answer":0,"law_ref":"第 23 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":24,"stem":"下列敘述何者正確？","options":["機關以統包併採最有利標決標方式辦理 者，無需報經上級機關核准。","統包採購不得依採購法 第1項第9款規定辦理。","共同投標廠商應於簽約時檢附共同投標 協議書。","所稱統包，指將工程或財物採購中之設計、監造與施 工、供應、安裝或一定期間之維修等併於同一採購契約辦理招標。"],"answer":1,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":24,"stem":"某國立大學採統包方式辦理步道工程採購，總金額為新臺幣95萬 元，下列何者不是得採行的方式？","options":["依採購法第22條第1項第9款 辦理公開評選。","公開取得企劃書。","公開招標。","最有利 標決標。"],"answer":0,"law_ref":"第 24 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":25,"stem":"共同投標廠商於投標時應檢附之共同投標協議書，下列何者為非？","options":["由各成員之負責人或其代理人共同具名。","投標前應先報請 招標機關審核。","經公證或認證。","載明共同投標廠商之代表 廠商、代表人及其權責。"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":25,"stem":"共同投標廠商之共同投標協議書，下列何者為非？","options":["應載明各成 員之主辦項目及所占契約金額比率。","協議書內容與契約約定不 符者，以協議書內容為準。","應載明各成員於得標後連帶負履行 契約責任。","協議書內容，非經機關同意不得變更。"],"answer":1,"law_ref":"第 25 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":25,"stem":"機關允許共同投標時，應於招標文件中規定共同投標廠商之成員， 不得對同一採購另行提出投標文件或為另一共同投標廠商之成員。 但有下列何種情形不在此限？","options":["該採購涉及統包，以增加廠商競 爭者。","預估合於招標文件規定之投標廠商競爭不足，規定廠商 不得為不同共同投標廠商之成員反不利競爭者。","其他經上級機 關認定者。","採最有利標決標者。"],"answer":1,"law_ref" 合理期限。","5天以上合理期限。"],"answer":2,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":28,"stem":"機關辦理採購，於招標前將招標文件稿辦理公開閱覽，且招標文 件內容未經重大改變者，等標期得縮短A日。但縮短後不得少於B 日？","options":["A=2日；B=5日。","A=3日；B=5日。","A=3日；B=7日。","A=5日；B=10日。"],"answer":3,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":42,"stem":"機關辦理公開招標，依採購法第42條第2項規定辦理後續階段之邀 標，其等標期由「機關」視需要合理訂定之。前開所列「機關」係 指下列何者？","options":["招標機關。","上級機關。","主管機關。","行政院。"],"answer":0,"law_ref":"第 42 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":28,"stem":"機關辦理公開招標（未提供電子領投標及公開閱覽），依採購法 第42條第2項規定，辦理後續階段之邀標，由機關視需要合理訂 定之，但等標期不得少於幾日？","options":["3日。","5日。","7日。","10日。"],"answer":2,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":28,"stem":"機關辦理非適用WTO政府採購協定之採購公開招標，查核金額以上 未達巨額金額之採購，其等標期（未提供電子領投標及公開閱覽） 不得少於幾日？","options":["14日。","21日。","28日。","35日。"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":28,"stem":"機關辦理非適用WTO政府採購協定之採購選擇性招標之廠商資格預 先審查，公告金額以上未達巨額金額之採購，其等標期（未提供 電子領投標及公開閱覽）不得少於幾日？","options":["7日。","10日。","14日。","21日。"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":28,"stem":"機關辦理非適用WTO政府採購協定之採購選擇性招標之廠商資格預 先審查，未達公告金額之採購，其等標期（未提供電子領投標及 公開閱覽）不得少於幾日？","options":["5日。","7日。","10日。","14 日。"],"answer":1,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":28,"stem":"機關辦理非適用WTO政府採購協定之採購選擇性招標之廠商資格預 先審查，巨額之採購，其等標期（未提供電子領投標及公開閱覽） 不得少於幾日？","options":["7日。","10日。","14日。","21日。"],"answer":2,"law_ref":"第 28 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":30,"stem":"以下敘述何者錯誤？","options":["廠商以設定質權之金融機構定期存單繳納 履約保證金者，其存款人(出質人)無須為訂約廠商或其負責人。","投標廠商繳納之押標金得以公司或負責人名義簽發之支票為 之。","廠商以漁會信用部簽發之支票繳納押標金，其票面金額得 大於機關所訂押標金之額度。","廠商以臺灣銀行簽發，未填寫受 款人之支票，繳納臺北市政府辦理之甲標案押標金。"],"answer":1,"law_ref":"第 30 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":30,"stem":"機關辦理採購，關於押標金，下列敘述何者為非？","options":["其額度以 不逾預算金額或預估採購總額之百分之五為原則，且不得逾新臺幣 5000萬元。","應以投標廠商名義繳納。","應於招標文件中載明 廠商應將押標金（含現金）附於投標文件內 郵政信箱為唯一之投標送達場所。","同一投標廠 商就同一採購之投標，以一標為限。"],"answer":2,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":33,"stem":"某學校總務主任主持一開標案，經發現廠商之投標文件有下列何 種情形時，應為不合格標？","options":["投標文件置於塑膠透明資料袋內並 以膠帶密封者。","投標文件置於不透明標封袋內並以釘書針封裝 者。","標封上標示廠商之名稱及地址。","投標文件以不透明紙 箱封裝。"],"answer":0,"law_ref":"第 33 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":34,"stem":"機關辦理採購，下列敘述何者正確？","options":["廠商之企劃書，決標後得 免予保密。","招標文件於公告前應予保密。","開標後，除有特 殊情形外，底價應予公開。","機關得於招標文件中公告底價，但 應報經上級機關核准。"],"answer":1,"law_ref":"第 34 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":35,"stem":"機關辦理採購，有關替代方案之規定，下列敘述何者正確？","options":["替 代方案之適用時機，僅限招標階段。","機關允許廠商於得標後提 出替代方案者，機關審查替代方案所需費用，由廠商負擔。","採 用替代方案決標者，機關實施替代方案所增加之必要費用，由雙方 分攤。","機關得於招標文件中規定允許廠商於得標後提出替代方 案且定有獎勵措施者，其獎勵額度，為所減省契約價金之百分之六 十。"],"answer":1,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":35,"stem":"機關於招標文件中規定允許廠商於得標後提出替代方案且定有獎勵 措施者，其獎勵額度為何？","options":["不逾所減省契約價金之百分之五十 為限。但不扣除機關為處理替代方案所增加之必要費用。","不逾 所減省契約價金之百分之三十為限。但不扣除機關為處理替代方案 所增加之必要費用。","不逾所減省契約價金之百分之五十為限， 並應扣除機關為處理替代方案所增加之必要費用。","不逾所減省 契約價金之百分之三十為限，並應扣除機關為處理替代方案所增加 之必要費用。"],"answer":2,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":35,"stem":"機關辦理採購，有關替代方案之規定，下列敘述何者正確？","options":["機關於招標文件中規定允許投標廠商於截止投標期限前提出替代方 案者，替代方案標封應與主方案同時開封及審查，並於招標文件訂 明。","廠商依規定於截止投標期限前提出替代方案者，替代方案 應單獨密封，標封外標示其為替代方案，且每一項目以提出一個替 代方案為限，如未提出主方案，則以替代方案審查之。","替代方 案經綜合評估各有利不利情形，其總體效益更有利於機關者，即使 延長主方案之工期，替代方案仍得採用。","招標文件中未規定允 許提出替代方案，廠商自行提出之替代方案，仍得接受，納為決標 標的。"],"answer":2,"law_ref":"第 35 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"下列何者屬「與提供招標標的有關」之投標廠商基本資格？","options":["具 有相當財力證明。","廠商依工業團體法或商業團體法加入工業或 商業團體之證明。","具有相當經驗或實績之證明。","實收資本 額。"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"機關辦理預算金額為新臺幣4億元巨額工程採購之公開招標，經評 估有訂定特定資格之必要，其單次契約金額之訂定最高得規定廠商 提報之單次實績金額不低於新臺幣多少元？","options":["4億元。","4,000 萬元。","1億6000萬元。","1,600萬元。"],"answer":2,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"機關辦理預算金額為新臺幣2億元巨額工程採購之公開招標，經評 估有訂定特定資格之必要，其契約累計金額之訂定最高得規定廠商 提報之累計實績金額為不低於新臺幣多少金額？","options":["8,000萬元。","2億元。","2,000萬元。","8,400 萬元。"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"依投標廠商資格與特殊或巨額採購認定標準規定，何者非屬投標廠 商特定資格之證明文件？","options":["營業稅或所得稅之納稅證明。","投 標廠商現有與承包招標標的有關之專業或一般人力證明。","截止 投標日前5年內，完成與招標標的同性質或相當之工程、財物或勞 務契約。","具有符合國際或國家品質管理之驗證文件。"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"以下何者為非？","options":["巨額採購，於工程採購，為新臺幣2億元；於 財物採購，為新臺幣1億元。","機關辦理採購，得依採購案件之 特性及實際需要，訂定與提供招標標的有關或與履約能力有關之基 本資格。","招標文件得就外國廠商之投標資格及應提出之資格文 件另行規定，並附經公證或認證之中文譯本。","機關訂定招標文 件，對於投標廠商之設立地或所在地，應依採購案之性質與實際需 要予以限制。"],"answer":3,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"下列採購何者非屬特殊採購？","options":["藝術品或具有歷史文化紀念價值 之古物採購。","使用特殊施工方法或技術之工程。","興建構造 物，單一跨徑在15公尺以上之工程。","需要特殊機具、設備或技 術始能完成之財物或勞務採購。"],"answer":2,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"財物採購之採購金額在何種金額以上，係為巨額採購？","options":["新臺幣 5000萬元。","新臺幣1億元。","新臺幣2億元。","新臺幣2000 萬元。"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"下列何者係屬錯誤之敘述？","options":["履約期間逾1年之勞務採購，其以 提供勞力為主，且工作內容重複者，以第1年之預算金額訂定資格 條件。","投標廠商未符合機關依採購法第36條所定資格者，得 以銀行或保險公司之履約及賠償連帶保證責任、連帶保證保險單代 之。","機關訂定投標廠商之資格，不得不當限制競爭，並以確認 廠商具備履行契約所必須之能力者為限。","投標廠商應符合之資 格之一部分，招標文件得訂明允許以分包廠商就其分包部分所具有 者代之。"],"answer":1,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"機關辦理新臺幣1億元之非特殊工程採購，不得訂定下列何種投標 廠商資格？","options":["廠商登記或設立之證明。","廠商信用之證明。","具有相當財力之證明。","廠商具有製造、供應或承做能力之 證明。"],"answer":2,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"有關投標廠商資格之敘述，何者為正確？","options":["「投標廠商資格與 特殊或巨額採購認定標準」有關「經驗或實績」規定所稱「單次契 約金額」或「累計金額」，招標機關得本於權責自行決定係擇一訂 定或兩者俱訂。","機關辦理特殊或巨額採購，得視案件特性及需 要，訂定特定資格者，不得同時訂定基本資格。","票據交換機構 於等標期內所出具之非拒絕往來戶或最近3年內無退票紀錄證明， 方得為廠商信用之證明。","「工廠登記證明文件」為投標廠商特 定資格。"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"機關訂定招標文件，何者正確？","options":["廠商履行契約所必須具備之財 務、商業或技術資格條件，不考慮廠商在外國之商業活動。","為 因應採購性質與特性，得就投標廠商之設立地或所在地予以指定。","有關加入工業或商業團體之資格證明，除法令另有規定外，不 得限制由特定區域之團體出具。","廠商或其受雇人、從業人員具 有專門技能之資格證明，屬特定資格。"],"answer":2,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"下列何者係屬投標廠商之特定資格？","options":["所得稅或營業稅之納稅證 明。","公會會員證。","曾完成與招標標的類似之製造、供應或 承做之文件。","具有符合國家品質管理之驗證文件。"],"answer":3,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"機關訂定投標廠商之特定資格時，以下何者為是？","options":["應先評估可 能符合特定資格之廠商家數，並檢討有無不當限制競爭之情形。","得規定投標廠商之實收資本額應不低於招標標的預算金額之八 分之一。","得規定投標廠商之權益不低於招標標的預算金額之十 分之一。","得規定投標廠商於截止投標日前3年內，曾完成與招 標標的同性質之採購契約。"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"有關投標廠商資格之敘述，何者為正確？","options":["機關辦理特殊或巨 額採購，得視採購案件之特性及實際需要，訂定投標廠商之基本資 格。","機關訂定投標廠商需具有相當財力之資格證明者，其範圍 得包括實收資本額不低於招標標的預算金額之五分之二。","機關 辦理外國廠商得參與之採購，不得禁止大陸廠商投標。","機關以 廠商須有相當經驗或實績為特定資格者，其期間得限3年內者。"],"answer":0,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"某學校舉辦畢業旅行之勞務採購案，非屬特殊採購，採購金額新 臺幣100萬元，所訂之資格條件何者為非？","options":["營業稅繳款書收據 聯或主管稽徵機關核章之最近一期營業人銷售額與稅額申報書收執 聯。","由政府機關或其授權機構核發該廠商係合法登記或設立之 證明文件。","須提出最近3年內曾辦理類似活動400人以上且3次 之經驗。","票據交換機構於截止投標日之前半年內所出具之最近 3年內無退票紀錄證明。"],"answer":2,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"下列敘述何者為錯誤？","options":["興建長度在1,000公尺以上之隧道，屬 特殊採購。","採購兼有工程、勞務二種性質，而工程認定其歸屬 者，於勞務性質符合特殊採購情形者，得以該勞務性質於該採購所 占比例訂定特定資格。","投標廠商應提出之資格證明文件，廠商 得以目的事業主管機關核准之電子資料替代。","機關訂定與履約 能力有關之基本資格時，得依採購案件之特性及實際需要對其受雇 人、從業人員具有專門技能之人數，視個案需要，予以限制，並得 逾法令規定之人數。"],"answer":3,"law_ref":"第 36 條","category":"政府採購法§18~§44 (招標)"},{"type":"choice","law":36,"stem":"機關辦理為期2年新臺幣6,000萬元巨額勞務採購之公開評選招標， 第1年之預算金額為新臺幣3,000萬元，因該採購案工作內容重複且 係以提供勞力為主，經評估有訂定特定資格之必要，其單次契約金 額之訂定最高得規定廠商提報之單次契約實績金額，不低於新臺 幣多少金額？","options":["3,000萬元。","2,400萬元。","6,000萬元。","1,200 萬元。"],"answer":3,"law_ref":"第 36 條","cate 購法§18~§44 (招標)"},{"type":"choice","law":22,"stem":"下列敘述何者正確？","options":["臨時人力之僱用不適用採購法。","村 綜合 （里）非採購法所稱之機關，故不宜辦理相關工程發包、採購業 務。","被機關補助經費之法人或團體辦理查核金額以上之採購， 於開標時應報請補助機關之上級機關監督。","機關首長擔任投標 廠商不支薪理事，該廠商如參與該機關之採購，機關首長無須迴 避。"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":18,"stem":"屬性簡單之一般性技術服務案件（如測量、地質鑽探等）不得依政 府採購法規定採公開招標或選擇性招標辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 18 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":18,"stem":"機關辦理限制性招標，邀請三家以上廠商比價，僅有一家廠商投標 者，得當場改為議價辦理。原已訂定之底價則參考該廠商報價重行 訂定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 18 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":18,"stem":"屬性簡單之一般性技術服務案件（如測量、地質鑽探等）得依政府 採購法規定採公開招標或選擇性招標辦理。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 18 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":18,"stem":"機關辦理限制性招標，邀請三家以上廠商比價，僅有一家廠商投標 者，得當場改為議價辦理。原已訂定之底價無須參考該廠商報價重 行訂定。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 18 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":18,"stem":"機關採用選擇性招標方式辦理採購，得規定廠商將資格與規格合併 一次投標。審查後再邀合格廠商投價格標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 18 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":20,"stem":"機關辦理公告金額以上之研究發展採購，得採選擇性招標建立合格 廠商名單。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 20 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":20,"stem":"機關辦理查核金額以上之採購，其採選擇性招標方式辦理者，應報 經上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 20 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":20,"stem":"機關辦理公告金額以上之研究發展採購，依政府採購法第20條規 定，應採選擇性招標建立合格廠商名單。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 20 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，其預先辦理資格審查所建立之合格廠商名 單，有效期未逾3年者，得免逐年公告辦理資格審查，但應檢討修 正既有合格廠商名單。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，其預先辦理資格審查所建立之合格廠商名 單，有效期未逾3年者，且已於辦理資格審查之公告載明不再公告 辦理資格審查者，於有效期內得免逐年公告。但仍應逐年檢討修正 該名單。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"鑑於公告金額以上之勞務採購，不符政府採購法第21條第1項建立 合格廠商名單辦理採購之特性，故不得以建立合格廠商名單方式辦 理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關為特定個案辦理選擇性招標，其後續邀標之通知，機關可就個 案符合資格之廠商家數多寡，必要時以密件方式個別通知不同廠商 至不同處所遞送投標文件。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關為特定個案辦理選擇性招標，其後續邀標之通知，無論個案符 合資格之廠商家數多寡，不得個別通知不同廠商至不同處所遞送投 標文件，以維公平競爭。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關於合格廠商名單有效期內發現名單內之廠商有不符合原定資格 條件之情形者，得限期通知該廠商提出說明。廠商逾期未提出合理 說明者，機關應將其自合格廠商名單中刪除。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關於合格廠商名單有效期內發現名單內之廠商有不符合原定資格 條件之情形者，應逕將其自合格廠商名單中刪除，並依採購法第 101條及第102條規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標建立合格廠商名單後，未列入合格廠商名單之 廠商請求參加特定招標時，為符合公平原則，機關不得接受。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關依採購法第21條第1項規定建立合格廠商名單，其預先辦理廠 商資格審查階段，採購金額以該名單有效期內預估採購總額認定 之；邀請符合資格廠商投標階段，仍以前揭預估採購總額為採購金 額。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"公告金額以上之工程採購(涉及營造業或土木包工業)，得依政府採 購法第21條第1項建立合格廠商名單辦理。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，建立經常性採購之合格廠商名單，該合格廠 商名單應建立6家以上。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關依採購法第21條第1項建立合格廠商名單者，於後續邀請廠商 投標時，每次應至少邀請3家以上。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關依採購法第21條第1項建立合格廠商名單者，於後續邀請廠商 投標時，每次邀請家數，法無明文限制。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，建立經常性採購之合格廠商名單，該合格廠 商名單應建立3家以上。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，應予經資格審查合格之廠商平等受邀之機 會。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關為特定個案辦理選擇性招標，應於辦理廠商資格審查後，邀請 3家以上符合資格之廠商投標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關為特定個案辦理選擇性招標，應於辦理廠商資格審查後，邀請 所有符合資格之廠商投標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關依採購法第21條第1項規定建立合格廠商名單，其預先辦理廠 商資格審查階段，採購金額以該名單有效期內預估採購總額認定 之；邀請符合資格廠商投標階段，以邀請當次之採購預算金額認定 採購金額。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，其係依政府採購法第21條第1項為建立合格 廠商名單而預先辦理資格審查者，廠商所遞送之資格文件，未訂開 標時間地點，其拆封審查，適用政府採購法開標、監辦程序。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，預先辦理資格審查，其建立合格廠商名單 後，於名單有效期限內，機關得不再接受廠商提出資格審查之請 求。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，預先辦理資格審查，其建立合格廠商名單 後，於名單有效期限內，機關應隨時接受廠商提出資格審查之請 求。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":21,"stem":"機關辦理選擇性招標，其係依政府採購法第21條第1項為建立合格 廠商名單而預先辦理資格審查者，廠商所遞送之資格文件，未訂開 標時間地點，其拆封審查，雖得無政府採購法開標及監辦程序之適 用，但資格審查如有不公，廠商仍可依政府採購法第6章之規定提 出異議及申訴。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 21 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"採購法第22條第1項第4款及第7款分別明定採購案後續擴充得採行 限制性招標之要件，其中第7款擴充之範圍須於招標公告及招標文 件載明，而第4款則無須於原採購案公告擴充範圍。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理清潔服務採購，於招標文件中載明得依採購法第22條第1 項第7款辦理後續擴充1年，並以招標當年度基本工資估算清潔人員 薪資為固定金額給付。嗣於第2年後續擴充時，基本工資已調漲， 致原保留後續擴充之薪資金額已不足支應調整後之基本工資，機關 不得與原廠商辦理續約，應重新辦理招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理公共藝術之工程採購，得依採購法第22條第1項第14款規 定辦理限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理公共藝術之工程採購，不得依採購法第22條第1項第14款 規定辦理限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理藝文採購，其金額在公告金額以上者，依採購法第22條第 1項第14款規定採公告審查程序辦理者，應將公告刊登於政府電子 採購網，無需刊登於政府採購公報。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理藝文採購，其金額在公告金額以上者，依採購法第22條第 1項第14款規定採公告審查程序辦理者，應將公告刊登於政府採購 公報。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"具專業素養、特質之文化、藝術專業人士、機構或團體，不得主動 向機關提供其具專業素養、特質之資料，供機關依採購法第22條第 1項第14款規定作為邀請或委託之參考。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"具專業素養、特質之文化、藝術專業人士、機構或團體，得向機關 主動提供其具專業素養、特質之資料，以供機關依採購法第22條第 1項第14款規定作為邀請或委託之參考。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第14款規定辦理公告金額以上藝文採 購，得免收押標金，但保證金應於招標文件載明，不得免收。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第14款規定辦理藝文採購，以免收押標 金、保證金為原則。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託研究發展，得免收押標金，但決標後應收取保證金。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託研究發展，以免收押標金、保證金為原則。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理藝文採購，其不經公告審查程序者，應先將邀請或委託對 象之名稱、具專業素養、特質之情形及不經公告審查程序逕行邀請 或委託之理由，報經上級機關核准後方得辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理藝文採購，其不經公告審查程序者，應先將邀請或委託對 象之名稱、具專業素養、特質之情形及不經公告審查程序逕行邀請 或委託之理由，簽報機關首長或其授權人員核准後方得辦理。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關公開評選廠商承辦專業服務，其廠商資格經審查不符合招標文 件之規定者，仍得參與評選。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關公開評選廠商承辦專業服務，其廠商資格經審查不符合招標文 件之規定者，不得參與評選。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"廠商因不可歸責於其本身之事由，應機關要求對同一服務事項依不 同條件辦理多次規劃或設計者，其重複規劃或設計之部分，不得另 給服務費用。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"建造費用百分比法所稱之建造費用，指工程採購底價金額或評審委 員會建議金額，若無前2者，以工程預算代之，並包括承包商辦理 工程之各項保險費。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"建造費用百分比法所稱之建造費用，指工程採購底價金額或評審委 員會建議金額，若無前2者，以工程預算代之。不包括相關法規所 定規費、設計費等費用或除外費用。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項規定辦理限制性招標，應由需求、使用 或承辦採購單位，通案就性質相近之案件(例如搶修、搶險採購)預 為敘明符合各該款之情形，簽報機關首長或其授權人員通案核准， 以提升採購效率。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項規定辦理限制性招標，應由需求、使用 或承辦採購單位，就個案敘明符合各款之情形，簽報機關首長或其 授權人員核准。其得以比價方式辦理者，優先以比價方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"廠商因不可歸責於其本身之事由，應機關要求對同一服務事項依不 同條件辦理多次規劃或設計者，其重複規劃或設計之部分，如經機 關審查同意者，得核實另給付服務費用。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關採購公用事業依一定費率供應之標的，縱使非獨家供應，亦無 須議價程序。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關採購公用事業依一定費率供應之標的，如確屬獨家供應且無法 以議價方式辦理者，得免議價程序。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定與評選優勝廠商之議價及決 標，如有2家以上廠商為同一優勝順序者，以獲得較多委員給予第1 名者為第1序位。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定(非採固定價格或費率)與評選 資訊服務優勝廠商之議價及決標，於招標文件載明如有2家以上廠 商為同一優勝順序者，以標價低者優先議價。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定與評選優勝廠商之議價及決 標，如有2家以上廠商為同一優勝順序者，應就該等廠商進行綜合 評選1次，以總評分最高、價格與總評分之商數最低或序位合計值 最低者，優先議價。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定(非採固定價格或費率)與評選 資訊服務優勝廠商之議價，於招標文件載明如有2家以上廠商為同 一優勝順序者，就該等廠商再進行綜合評選1次，以總評分最高、 價格與總評分之商數最低或序位合計值最低者，優先議價；得分 仍相同者，以配分最高之評選項目之得分合計值較高者決定議價順 序。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定與評選資訊服務優勝廠商之議 價，如有2家以上廠商為同一優順序者，擇配分最高之評選項目之 得分合計值較高者，優先議價；得分仍相同者，就該等廠商再進行 綜合評選1次，以總評分最高、價格與總評分之商數最低或序位合 計值最低者，優先議價；其再次相同者，抽籤決定之。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定與評選優勝廠商之議價及決 標，如有2家以上廠商為同一優勝順序者，除依機關委託社會福利 服務廠商評選及計費辦法辦理者外，以標價低者優先議價。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理未達公告金額之藝文採購，應依採購法第22條第1項第14 款規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理未達公告金額之藝文採購，非依採購法第22條第1項第14 款辦理者，得準用依該款訂定之辦法之規定。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"廠商承辦專案管理技術服務，其專案管理人員至少應有三分之一為 該廠商之專任職員。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 :22,"stem":"機關辦理設計競賽採服務成本加公費法者，應於契約訂明廠商應記 錄各項費用並提出憑證，憑證並應經會計師簽證，並應於契約訂明 成本上限及逾上限時之處理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"公營事業向其他公營事業採購公告金額以上房地產為法定得免辦理 公開徵求之情形之一。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理未達公告金額之藝文採購，不得依「機關邀請或委託文化 藝術專業人士機構團體表演或參與文藝活動作業辦法」規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理某廠商電腦產品，以其商標專用權屬已立法保護之智慧財 產權為由，符合採購法第22條第1項第2款之專屬權利，無其他合適 之替代標的，故得採限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款規定辦理公告金額以上採購之公開 評選，其第1次招標自公告日起至截止收件日止之等標期(未提供電 子領投標及公開閱覽)，應訂定10日以上之合理期限。第2次以後公 開評選之期限，由機關視需要合理訂定之。但不得少於5日。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理限制性招標，邀請2家以上廠商比價，有2家廠商投標者， 即得比價；僅有1家廠商投標者，應辦理第2次比價。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理藝文工程採購，其金額在公告金額以上者，依採購法第22 條第1項第14款規定採公告審查程序辦理者，應將公告刊登於政府 採購公報。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理公告金額以上之工程採購，得依採購法第22條第1項第12 款規定向原住民個人或政府立案之原住民團體採限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理採購，屬專屬權利或獨家製造或供應，無其他合適之替代 標的之部分，其預估金額達採購金額之百分之五十以上，即得依採 購法第22條第1項第2款規定採限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理公告金額以上拆除房屋構造物之工程採購，為配合扶助原 住民政策，得依採購法第22條第1項第12款邀請2家原住民勞動合作 社比價。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款辦理委託資訊服務公開評選，招標 文件已訂明固定服務費用或費率者，依該服務費用或費率決標，得 免議價程序。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關依採購法第22條第1項第9款辦理評選，招標文件已訂明固定服 務費用或費率者，依該服務費用或費率決標，得免議價程序。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"採「限制性招標」邀請廠商進行議、比價者，需事先建立合格廠商 名單。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託資訊服務，採服務成本加公費法者，其公費係指廠商 提供服務所得之報酬，包括風險、利潤及有關之稅捐等，其金額應 為定額，且不得超過直接薪資扣除非經常性給與之獎金後與管理費 用合計金額之百分之五十。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託資訊服務，採服務成本加公費法者，其公費係指廠商 提供服務所得之報酬，包括風險、利潤及有關之稅捐等，其金額應 為定額，且不得超過直接薪資扣除非經常性給與之獎金後與管理費 用合計金額之百分之二十五。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理採購，屬專屬權利或獨家製造或供應，無其他合適之替代 標的之部分，其預估金額達採購金額之百分之五十以上，分別辦理 採購確有重大困難之虞，必須與其他部分合併採購者，得依採購法 第22條第1項第16款規定採限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":1,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理採購，屬專屬權利或獨家製造或供應，無其他合適之替代 標的之部分，其預估金額達採購金額之百分之五十以上，分別辦理 採購確有重大困難之虞，必須與其他部分合併採購者，得依採購法 第22條第1項第2款規定採限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關得依採購法第22條第1項第13款採限制性招標委託在專業領域 具領先地位之自然人或經公告審查優勝之學術或非營利機構進行科 技、技術引進、行政或學術研究發展。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關委託專業服務，其服務費用，應參酌一般收費情形核實議定。 其必須核實另支費用者，應於契約內訂明項目及費用範圍；契約未 規定者，不得另為任何給付。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關辦理委託研究發展，應依實際需要訂定研究機構之基本資格或 特定資格，不得不當限制競爭。","options":["○ 正確","✕ 錯誤"],"answer":0,"law_ref":"第 22 條","category":"政府採購法§18~§44 (招標)"},{"type":"yn","law":22,"stem":"機關為瞭解具專業素養、特質之文化、藝術專業人士、機構或團體 之情形，得於政府採購公報或主管機關資訊網路，公開徵求其提供 具專業素養、特質之資料，以供為依採購法第22條第1項第14款及 「機關邀請或委託文化藝術專業人士

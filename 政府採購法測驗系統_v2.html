部分辦理驗收或分段查驗供驗收之用，均得就該\n部分支付價金及起算保固期間。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理下列何種採購，於公告招標前無須辦理招標文件之公開閱覽？","options":["未達查核金額之特殊工程採購。","查核金額以上重複性之工程採購。","適用政府採購條約或協定之巨額工程採購。","以上皆是。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列敘述何者正確？","options":["機關以統包併採最有利標決標方式辦理者，無須報\n經上級機關核准。","統包採購不得依採購法第22條第1項第9款規定辦理。","共同投標廠商應於簽約時檢附共同投標協議書。","所稱統包，指將工\n程或財物採購中之設計、監造與施工、供應、安裝或一定期間之維修等併於\n同一採購契約辦理招標。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款辦理未達公告金額而逾公告金額十分之一之\n技術服務採購，下列何者為誤？","options":["依採購法第94條規定應成立採購評選委\n員會。","依原住民族工作權保障法施行細則第9條規定，即符合其母法第\n11條但書規定所稱「無法承包」，得免優先決標予原住民個人、機構、法人\n或團體承包。","第1次公告結果，僅1家廠商投標時，仍得開標。","準用\n「機關委託技術服務廠商評選及計費辦法」。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以統包辦理招標，下列敘述何者正確？","options":["為提升採購效率，細部設計\n未經機關審查核定，亦可先行施工。","應事先評估確認統包可提升採購效\n率、確保品質、可縮減工期且無增加經費之虞。","統包案完成後如需維護\n管理者，其設計應包含未來維護管理計畫。","招標文件就主要材料之特殊\n規範，無需載明，以免限制廠商發揮創意。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理採購金額新臺幣9,000萬元之工程採購，下列何者正確？","options":["規定\n廠商須於得標後10天內繳納履約保證金。","規定履約保證金依進度分2期\n平均發還。","規定廠商必須提出連帶保證廠商。","規定履約保證金為契\n約金額之5%。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列何者非為採購法第36條所稱之特殊採購？","options":["開挖深度在15公尺以上之\n工程。","在地面下施工之工程。","古蹟構造物之修建。","工期緊迫且\n經機關首長核定之工程。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列何者不是廠商得作為連帶保證廠商之規定？","options":["依法得為保證。","未\n參與投標。","無採購法第103條第1項不得參加投標或作為決標對象或分包\n廠商之情形者。","經主管機關核准。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列何者計費方式不適用於單獨規劃服務之採購？","options":["建造費用百分比法。","總包價法。","服務成本加公費法。","按日計酬法。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"有關押標金保證金規定，下列敘述何者錯誤？","options":["技術服務採購，招標文\n件不得明訂收押標金及保證金。","廠商以郵政匯票繳納押標金，並無不\n可。","以議價方式辦理之工程採購，招標文件明定免收押標金，並無不\n可。","機關不發還得標廠商所繳納之保證金時，其孳息亦不發還之。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商承辦技術服務，其採成本加公費法計費者，其中「管理費用」\n之上限，不得超過「直接薪資扣除非經常性給與之獎金後」之下列何者比\n率？","options":["30%。","50%。","80%。","100%。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商承辦新建建築物之技術服務，其服務費用之採購金額在新臺幣\n多少元以上且服務項目包括規劃、設計者，應要求廠商提出服務建議書及規\n劃、設計構想圖說（配置圖、平面圖、立面圖、剖面圖、透視圖等），並應\n辦理競圖？","options":["100萬元。","500萬元。","1,000萬元。","2,000萬元。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款辦理評選技術服務廠商，其投標廠商須有\n幾家方可開標？","options":["須達3家以上。","須達1家以上。","須達6家以上。","須達4家以上。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關於招標文件中規定允許一定家數內之廠商共同投標者，採購法規定以不\n超過幾家為原則？","options":["5家。","3家。","6家。","無家數規定，係由機\n關決定。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關應如何判斷工程採購是否屬特殊採購，下列何者正確？","options":["報經上級機\n關核准。","視其是否屬「投標廠商資格與特殊或巨額採購認定標準」第6\n條各款情形之一。","依工程慣例及普遍性自行判斷。","依工程困難程度\n自行判斷。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"依主管機關訂定工程採購契約範本之內容，機關辦理若干金額以上之營建工\n程，履約保證金應依工程進度分4期以上平均發還？","options":["公告金額。","查\n核金額。","巨額。","無論金額大小均須有。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"保固期內發現瑕疵，應由廠商於機關指定之期限內負責免費無條件改正。逾\n期不為改正者，按主管機關訂定工程採購契約範本之內容，機關採行下列措\n施，何者最不適當？","options":["逕為處理，所需費用由廠商負擔。","動用保固\n保證金逕為處理，不足時，向廠商追償。","依採購法第101條規定通知廠\n商。","終止契約。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列有關技術服務採購之敘述，何者錯誤？","options":["不得規定收押標金及保證\n金。","得允許共同投標。","共通性之需求得簽訂共同供應契約。","得\n允許外國廠商參與投標。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列何者係屬投標廠商之特定資格？","options":["具有相當經驗或實績者。","實收\n資本額之規定。","投標廠商現有與承包招標標的有關之專業或一般人力證\n明。","以上皆是。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"有關技術服務採購之驗收規定，下列何者正確？","options":["不得辦理分段查驗供驗\n收之用。","不得以書面審查方式。","得以召開審查會方式。","設計成\n果之驗收，於施工標驗收時方得一併辦理。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"服務成本加公費法所稱「憑證」，包括各項費用之下列何種單據？","options":["發\n票。","收據。","紀錄或報表。","以上皆是。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列敘述何者為非？","options":["機關公開評選廠商承辦技術服務之審查，其招標文\n件訂有廠商資格者，應先審查資格文件。","機關評選結果應通知廠商，對\n未獲選者並應敘明其原因。","機關依採購法第22條第1項第9款辦理評選技\n術服務廠商，其投標廠商應有3家方可開標。","採購評選委員會評選優勝\n廠商，得不以1家為限。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["未達公告金額之技術\n服務採購，其依中央機關未達公告金額採購招標辦法公開取得3家以上廠商\n之書面報價或企劃書，擇符合需要者辦理比價或議價者，得準用「機關委託\n技術服務廠商評選及計費辦法」之規定。","屬未達公告金額之案件，得採\n參考最有利標精神之決標方式辦理。","同類或同區域中，小型工程之技術\n服務案件，其採購件數較多者，不得採複數決標方式，避免集中由少數廠商\n承攬。","得依採購法第20條規定採選擇性招標方式辦理，預先辦理廠商資\n格審查，建立合格之技術服務廠商名單。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘\n述何者正確？","options":["各階段環境影響評估及相關說明書、報告書之編製及送審\n之服務費用，屬百分比計費之範疇，不得另行估算編列。","水土保持計畫\n之辦理及送審之服務費用，仍須受附表所列參考百分比之限制，不得另行估\n算編列。","申請公有建築物候選綠建築證書或綠建築標章之服務費用，仍\n須受附表所列參考百分比之限制，不得另行估算編列。","招標文件可載明\n建造費用不包括拆除工程之有價回收料之減項金額。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"建築物工程技術服務建造費用百分比參考表所列服務費用參考值，於包括\n規劃、設計及監造3項時，原則上各占多少百分比？","options":["規劃占5%，設計\n占50%，監造占45%。","規劃占15%，設計占45%，監造占40%。","規劃占\n10%，設計占45%，監造占45%。","規劃占10%，設計占50%，監造占40%。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"受機關委託提供採購規劃、設計、監造或專案管理之工程技術服務廠商如有\n綁標情事致機關遭受損害，機關應追究廠商之責任；承辦之技師或建築師有\n應付懲戒之情事，且交付懲戒符合行政程序法第7條所訂「比例原則」時，\n則依技師法第42條或建築師法第50條之規定，詳述事實並檢具違規事證移\n送懲戒。其為執業技師部分，應送下列何者機關辦理？","options":["電機技師送經濟\n部。","內政部。","技師法之中央主管機關。","直轄市、縣（市）主管\n機關。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"按主管機關訂定工程採購契約範本之物價指數調整內容，以下何者錯誤？","options":["機關依行政院主計總處發布之總指數、中分類項目指數及個別項目指\n數，可自行訂定漲跌幅逾一定比率部分，計算物價調整款。","可歸責於廠\n商原因致逾履約期限施作之部分，以施作當月指數與契約約定履約期限當月\n指數二者較低者，作為調整依據。","機關招標時未載明中分類項目及個別\n項目時，不可依中分類項目指數及個別項目指數調整工程款。","契約雙方\n得就施工時間間隔較久之項目，於訂料前約定，以訂料時或施工前一定月份\n之指數，計算物價調整款。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["機關辦理公告金額以\n上之技術服務者，以不訂底價之最有利標為原則。","機關採公開招標不訂\n底價之最有利標辦理公告金額以上之技術服務採購，於評選出最有利標廠商\n後，議價程序仍不得免除。","機關於招標文件預先載明決標金額或費率作\n為決標條件，此時得不將廠商報價納為評選項目。","機關辦理公告金額以\n上之技術服務者，依採購法第22條第1項第9款及「機關委託技術服務廠商評\n選及計費辦法」規定，參考優勝廠商報價訂定底價後辦理議價程序。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理技術服務採購，採服務成本加公費法計費者，下列何者錯誤？","options":["直接薪資包括非經常性給與之獎金。","實際薪資得包括經常性給與之獎\n金。","工作人員不扣薪假與特別休假之薪資費用，得由機關依實際需要於\n招標文件明定為實際薪資之一定比率及給付條件，但須檢據核銷。","非經\n常性給與之獎金，得由機關依實際需要於招標文件明定為實際薪資之一定比\n率及給付條件，檢據核銷。但不得超過實際薪資之百分之三十。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理履約地點位於原住民地區未達公告金額之技術服務採購，其採公開\n取得3家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議價者，\n招標機關於第1次公告開放原住民及非原住民廠商投標，並於招標公告敘明\n開標後依2階段辦理，其下列作業方式何者錯誤？","options":["第1階段先就原住民廠\n商所投之標進行審標、決標。","第1階段無法決標予原住民廠商，則作成\n紀錄後，第2階段改就全部投標廠商辦理審標。","第1階段原住民廠商之標\n價經洽減價仍超底價而不逾預算數額，可經原底價核定人或其授權人核准，\n直接決標予原住民廠商。","因提供技術服務之原住民廠商極為有限，招標\n機關為避免單一原住民廠商承接過多案件致影響履約品質，可於招標文件規\n定投標廠商須提出「具有如期履約能力之證明」。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"下列何者適合列入工程採購物價調整之項目？","options":["工程廠商之營業稅。","管理費及利潤。","依河川疏濬砂石採售分離計畫優先提供河川砂石供公共\n工程施工廠商使用之砂石。","鋼構橋之鋼筋。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款辦理採購金額新臺幣50萬元之技術服務，應\n將招標資訊公開於下列何途徑？","options":["工程會之政府採購資訊網路及政府採購\n公報。","工程會之政府採購資訊網路公開取得書面企劃書。","工程會之\n政府採購資訊網路及機關網站。","工程會之政府採購資訊網路，得免刊登\n政府採購公報。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理技術服務採購，採建造費用百分比法計費，下列何者正確？","options":["建\n築物裝修及整修工程不得比照建築物工程技術服務建造費用百分比參考表計\n費。","技術服務契約有關之各項工程，不得合併計算建造費用。","技\n術服務契約有關之各項工程，如屬分期或分區施作，且契約已明訂依分期或\n分區給付服務費用者，可分別計算建造費用，但不包括同一工程之分標採購\n案。","若後續施作工程未發包，則機關得免付費用予技術服務廠商。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，下列敘\n述何者錯誤？","options":["建造費用，指工程採購底價金額或評審委員會建議金額，\n若無前2者，以工程預算代之。但應依規定不包括若干事項之費用。","建\n造費用不包括工程保險費。","其服務費率應按工程內容、服務項目及難易\n度，參考附表1至附表4，訂定建造費用之費率級距及各級費率，簽報機關首\n長或其授權人員核定，無須於招標文件中載明。","工程於履約期間有契約\n變更、終止或解除契約之情形者，技術服務費用得視實際情形協議增減之。"],"answer":2},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["採總包價法計費者，\n其委託內容如有增減者，仍須辦理變更契約。","技術服務廠商投保專業責\n任保險所需保險費用，包含於服務費用項目之內。","服務範圍包括代辦訓\n練操作或維護人員者，機關受訓人員之旅費及生活費，應由機關自行支給，\n不包括在服務費用項目之內。","機關委託技術服務，屬私契約性質，廠商\n人員利用履約方便所為之不當審查行為，僅能透過契約約定求償，不涉及刑\n責。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"採總價結算之工程，廠商依契約約定投保，惟實際支付之保險費用低於契約\n所列該項目之金額，機關應如何處理？","options":["機關應洽廠商追回該部分價差。","機關仍應依契約所列金額支付廠商。","機關應於契約中預先明訂，廠\n商實際支付金額較契約金額少時，應退還價差予機關，實際支付金額較契約\n金額多時，機關不予追加等較利於機關之條件。","機關應洽廠商協商支付\n合理保險費。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"某工程採購之採購金額為新臺幣(下同)6,000萬元，預算為4,950萬元，底\n價為4,700萬元，經洽廠商減價結果，最低標價為以下情形時，何者敘述正\n確？","options":["標價為5,000萬元，可報上級機關核准後決標。","標價為4,900萬\n元，經原底價核定人或其授權人員核准後決標。","標價為4,800萬元，應\n報上級機關核准後始得決標。","以上皆非。"],"answer":3},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"按主管機關訂定工程採購契約範本之物價指數調整約定內容，以下何者錯\n誤？","options":["給付之物價調整款併於結算總價內。","承商保險費可予調整。","採三層級物調機制，已辦理物調項目，不得再以其他物價指數辦理調\n整。","可記載不予調整之項目或情形。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"某機關辦理垃圾棄置場處置設計監造案，機關採用限制性招標公開評選，機\n關若已將規劃報告公開，並列為招標文件一部分，參與規劃廠商去函招標機\n關表示欲投標，機關應如何處理？","options":["依法不得允許其投標。","檢討如無\n不公平競爭之虞，可同意其投標。","雖檢討無不公平競爭，仍應報請上級\n機關同意後始得同意其投標。","報主管機關決定。"],"answer":1},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，下列敘述何者錯誤？","options":["採總包價法計費者，\n無論委託內容有無增減，均不得變更契約價金。","建築師依法律規定須交\n由技術辦理設計監造所需費用，包含於服務費用項目之內。","以建造費用\n百分比法計得之服務費不包含辦理可行性研究之服務費。","履約期間在1\n年以上者，機關得於契約內訂明自第2年起得隨臺灣地區專業、科學及技術\n服務業受雇員工平均經常性薪資指數逐月計算調整契約價金。"],"answer":0},{"type":"choice","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理工程，因專業人力或能力不足，可委託專案管理廠商協助辦理之工\n作，下列何者正確？","options":["委託規劃、設計。","都市計畫、區域計畫或水土\n保持計畫等規劃之諮詢及審查。","委託可行性研究。","以上皆是。"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理營造業法規定專業工程項目，除將專業營造業納入投標廠商資格，\n不得排除綜合營造業參與投標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組發現監造單位之建築師、技師、派駐現場人員，承攬廠商\n之專任工程人員、工地主任或工地負責人、品質管理人員及安全衛生人員等\n執行職務時，有違背相關法令及契約約定，應加以記錄。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關自辦監造者，其現場人員之資格、人數、專職及登錄規定，比照委託監\n造之情形辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採服務成本加公費法者，其非經常性\n給與之獎金，得由機關依實際需要於招標文件明定為實際薪資之一定比率及\n給付條件，免檢據核銷。但不得超過實際薪資之百分之三十。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採服務成本加公費法者，其非經常性\n給與之獎金，得由機關依實際需要於招標文件明定為實際薪資之一定比率及\n給付條件，檢據核銷。但不得超過實際薪資之百分之三十。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"小規模（例如工程經費未達新臺幣100萬元）或區位偏遠之工程，其服務費\n用得依個案特性及實際需要預估編列，但不得超過建築物工程技術服務建造\n費用百分比參考表所列百分比。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"基於節省預算考量，機關或上級機關宜通案另訂定較「機關委託技術服務廠\n商評選及計費辦法」之附表所列服務費用參考百分比更低之技術服務費率上\n限範圍或標準。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，採建造費用百分比法\n之計費方式者，水土保持計畫之辦理及送審之服務費用，屬百分比計費之範\n疇，不得另行估算編列。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理驗收，如係就全部履約標的辦理驗收而無部分驗收之情形，其結果\n為一部分合格、一部分採減價收受者，後者因已減價收受，免計其逾期違約\n金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"非屬特殊採購，採購金額為新臺幣1,500萬元之技術服務採購，得訂定投標\n廠商之特定資格。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理未達查核金額之特殊工程採購，不必辦理公開閱覽。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購經採購申訴審議委員會提出調解建議或調解方案，因契約一方不同\n意致調解不成立者，廠商提付仲裁，機關不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"技術服務採購經採購申訴審議委員會提出調解建議或調解方案，因機關不同\n意致調解不成立者，廠商提付仲裁，機關不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採服務成本加公費法者，其工作人員\n不扣薪假與特別休假之薪資費用，得由機關依實際需要於招標文件明定為實\n際薪資之一定比率及給付條件，檢據核銷。但不得超過實際薪資之百分之十\n六。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採服務成本加公費法者，其工作人員\n不扣薪假與特別休假之薪資費用，得由機關依實際需要於招標文件明定為實\n際薪資之一定比率及給付條件，免檢據核銷。但不得超過實際薪資之百分之\n十六。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"預算金額新臺幣1,500萬元以上工程採購之品管人員應為專職，不得跨越其\n他標案，且施工時應在工地執行職務。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"預算金額新臺幣5,000萬元以上工程採購之品管人員應為專職，不得跨越其\n他標案，且施工時應在工地執行職務。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"預算金額新臺幣2,000萬元以上未達新臺幣5,000萬元之工程，品管人員不得\n同時擔任其他法規允許之職務。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"預算金額新臺幣2,000萬元以上未達新臺幣5,000萬元之工程，品管人員得同\n時擔任其他法規允許之職務，但不得跨越其他標案，且施工時應在工地執行\n職務。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理技術服務，招標文件明定評選項目包括計畫主持人及主要工作人員\n之優良、不良紀錄或事蹟者，應以廠商提出者為限，機關不得自行蒐集該等\n資料。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理技術服務，招標文件明定評選項目包括計畫主持人及主要工作人員\n之優良、不良紀錄或事蹟者，除廠商提出者外，機關得自行蒐集或至採購法\n主管機關網站查詢該等資料。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關基於提升採購效率，得依採購法施行細則第92條規定，於契約約定將確\n認竣工之事項一併委由監造廠商辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依採購法施行細則第92條規定，確認竣工之事項應由機關會同監造單位及廠\n商辦理；廠商未依機關通知派代表參加者，仍得予確定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，其屬特\n殊情形或需要高度技術之服務案件，致有超過各附表所列百分比之必要者，\n應敘明理由，簽報上級機關核定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，委託設計之結果須以\n經濟耐用為前提，不包括生活美學。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，委託設計之結果須符\n合經濟耐用之目的，並考量生活美學。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，委託廠商辦理設計、\n監造，其評選項目得載明如期履約能力，不包括尚在履約之契約件數、金額\n及是否逾期。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，委託廠商辦理設計、\n監造，其評選項目得載明如期履約能力，並得包括尚在履約之契約件數、金\n額及是否逾期。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"「公共工程招標文件公開閱覽制度實施要點」載明：「前項廠商或民眾意\n見之處理，應以公開方式辦理」，係指廠商或民眾意見，須先以密件方式收\n受，惟招標機關就該意見之處理情形，應予以公開，不得僅採個別答復方式\n辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"「公共工程招標文件公開閱覽制度實施要點」載明：「前項廠商或民眾意\n見之處理，應以公開方式辦理」，係指廠商或民眾意見之處理無須以密件處\n理，招標機關可將意見及處理情形個別答復提出意見者。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法之\n建造費用，招標文件可載明包括土地及權利費用。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法之\n建造費用，招標文件可載明不包括棄土費用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理招標文件公開閱覽，應於機關本身之資訊網路公開徵求廠商提供參\n考資料。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商依招標文件規定提出連帶履行契約責任廠商者，機關無須將連帶保證廠\n商及相關資料傳輸至主管機關指定之資料庫予以公告。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商依招標文件規定提出連帶履行契約責任廠商者，機關應將連帶保證廠商\n及相關資料傳輸至主管機關指定之資料庫予以公告。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法之\n建造費用，得包括主辦機關之工程管理費。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法之\n建造費用，得包括廠商之利潤。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"行政院所屬部會行總處之工程施工查核小組得查核其所屬各機關補助或委託\n其他機關、法人或團體依採購法之規定辦理之工程、勞務及財物採購。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"行政院所屬部會行總處之工程施工查核小組得查核其所屬各機關補助或委託\n其他機關、法人或團體依採購法之規定辦理之工程。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組，查核所屬（轄）機關工程品質，不包括進度。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組，應定期查核所屬（轄）機關工程品質及進度等事宜。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理採購於廠商履約過程，得辦理分段查驗，惟因其非屬驗收，其結果\n不得供驗收之用。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理採購於廠商履約過程，得辦理分段查驗，其結果並得供驗收之用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商之服務費用按月或分期支付者，如欲保留部分價金於完成全部服務項目\n後支付，其保留額度以不逾契約價金之百分之二十為原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"為利機關分散風險，除工期超過1年之工程外，機關應於工程契約中訂明無\n物價指數調整之規定，以減少履約爭議。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"為利契約風險分擔，不論履約時間長短，機關不宜於工程契約中訂明無物價\n指數調整之規定，以減少履約爭議。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理水管、電氣與建築工程之招標，其水管及電氣工程所占預算金額預\n估達查核金額以上者，應將水管、電氣與建築工程合併辦理招標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理水管、電氣與建築工程之招標，其水管及電氣工程所占預算金額預\n估達查核金額以上者，以分開招標為原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商之服務費用按月或分期支付者，如欲保留部分價金於完成全部服務項目\n後支付，其保留額度以不逾契約價金之百分之三十為原則。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理財物採購，契約無須明訂廠商執行品質管理、環境保護、施工安全\n衛生之責任。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關工程採購契約應明訂廠商執行品質管理、環境保護、施工安全衛生之責\n任，並對重點項目訂定檢查程序及檢驗標準。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理河川淤沙疏浚招標，並允許得標廠商將疏浚之淤沙代為販售，其\n中疏浚工作預估所需金額為新臺幣(下同)5,500萬元，淤沙販售價值預估為\n3,000萬元，則該案之採購金額為2,500萬元。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理河川淤沙疏浚招標，並允許得標廠商將疏浚之淤沙代為販售，其\n中疏浚工作預估所需金額為新臺幣(下同)5,500萬元，淤沙販售價值預估為\n3,000萬元，則該案之採購金額為5,500萬元。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理工程採購，不論金額大小，均應於招標文件內訂定廠商應提報品質\n計畫。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理有關景觀專業技術服務之勞務採購案件，其投標廠商資格得包括景\n觀專業服務業。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關公開評選廠商承辦技術服務，應與優勝廠商辦理議價，如須限制減價次\n數時，無須通知廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關公開評選廠商承辦技術服務，應與優勝廠商辦理議價，如須限制減價次\n數時，應先通知廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"委託技術服務案件之服務費用，應採服務成本加公費法核實議定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"委託技術服務案件之服務費用，應參酌一般收費情形核實議定。其必須核實\n另支付費用者，應於契約內訂明項目及費用範圍。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理規劃、設計及監造之技術服務，採建造費用百分比法之計\n費方式者，建造費用為結算金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理工程採購，其須辦理契約變更而有新增非屬原契約數量清單內所列\n之工程項目者，新增工程項目單價編列方式，應以原預算相關單價分析資料\n為基礎，並考慮市場價格波動情形；其底價訂定，並應符合採購法第46條規\n定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購未經調解程序者，不得由契約雙方合意逕付仲裁。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程契約未包括行政院函頒「公共工程趕工實施要點」內容，履約過程中有\n趕工之必要時，機關不得依該要點與廠商協議辦理契約變更，要求趕工並發\n放趕工費用予廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程契約未包括行政院函頒「公共工程趕工實施要點」內容，履約過程中如\n有趕工之必要，機關仍得依該要點與廠商協議辦理契約變更，要求趕工並發\n放趕工費用予廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"採購契約單價應以機關預算為基礎來調整訂定，不得以廠商報價為基礎來調\n整訂定，否則有圖利廠商之嫌。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"採購契約單價無論以機關預算或廠商報價為基礎來調整訂定，須以合理性為\n前提，並保留且善用雙方協議之機制。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理工程採購，其須辦理契約變更而有新增非屬原契約數量清單內所列\n之工程項目者，新增工程項目單價編列方式，應以市場價格為基礎，無須考\n慮原預算相關單價分析資料；其底價訂定，並應符合採購法第46條規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購得不先經調解程序，而由契約雙方合意逕付仲裁。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託監造，應於招標文件內明訂：監造單位派駐現場人員之資格及人\n數，並依據監造計畫執行監造作業。其未能有效達成品質要求時，得隨時撤\n換之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組進行查核時，應依相關法令及工程契約約定，查核工程品\n質及進度等事宜。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關工程採購契約得訂明保固期間內，採購標的因瑕疵致無法使用時，該期\n間得不予計入保固期。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"允許共同投標案件，機關可視個案需要於招標文件規定，投標文件應由全體\n共同投標廠商具名及簽署，且不允許由共同投標協議書指定之代表人簽署，\n以利後續發生履約爭議時釐清權責。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關公開徵選廠商承辦技術服務之評選，其招標文件訂有廠商資格者，應先\n審查資格文件，資格不合於招標文件之規定者，仍得參加評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理公告金額以上之建築工程採購，雖於招標文件指定特定廠牌之門片\n型式，只要不提及廠牌名稱，即無綁標之虞。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"招標文件規定於驗收完成後一次給付契約價金，無預付款。決標後因物價飆\n漲，機關應廠商要求變更契約給付契約總價20%之預付款，符合公平合理原\n則。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"某統包工程允許建築師與營造業共同投標，並於招標文件明定同時符合前述\n資格者可單獨投標。甲營造業因不具建築師資格，而與乙建築師共同投標，\n惟得標後因乙破產致無法共同履約，其契約所有權利義務，得由甲繼受，並\n可視需要提出與乙原資格條件相當之廠商，共同承擔契約之一切權利義務。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商因契約關係履行機關之採購案，機關人員對於與採購有關之意見，均可\n指示廠商辦理，以利效率。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"查核金額以上之工程採購案件，應依據「公共工程招標文件公開閱覽制度實\n施要點」於公告招標前辦理招標文件之公開閱覽。財物採購亦同。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理採購有於招標文件規定投標廠商資格允許以分包廠商資格代之者，\n就該部分不同投標廠商間所提出之分包廠商，除有符合依共同投標辦法第7\n條但書規定情形外，不得相同。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"除傳統之招標方式外，在可提升採購效率、確保品質，縮短工期及無增加經\n費之虞情形下，可將設計、監造與施工併於同一採購契約以統包方式辦理招\n標，以縮短執行時程。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"經第1次公告招標結果，無廠商投標或無合格標之案件，雖有廠商異議或申\n訴在處理中者，如計畫時程已落後之工程標，機關仍可依採購法第22條第1\n項第1款規定，不另公告招標，改採限制性招標方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"公開閱覽之承辦單位應將閱覽廠商或民眾之意見彙整加以列管，廠商或民眾\n意見之處理，應以密件方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理委託技術服務採購，其招標文件所定工程總預算，僅係參考性質非\n限制條件，為避免扼殺廠商之創造力，廠商服務建議書所提供之工程總預\n算，應不受該工程總預算之限制。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"委託技術服務採購，為落實市場競爭機制，原則上採用最低標決標之方式。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"履約時間在1年以上之委託技術服務採購案，無須於契約中訂明薪資指數調\n整之約定，屆時服務費用自動會隨工程結算金額之物價指數調整而調整。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理技術服務採購，其委託技術服務項目，不論工程性質及規模大小，\n統一照錄「機關委託技術服務廠商評選及計費辦法」所列之所有技術服務項\n目即可。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以統包辦理招標，其細部設計之審查所耗期間，一律免計工期。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理規模新臺幣1,900萬元之工程，應允許丙等綜合營造業投標。惟施\n工難度較高者，機關得限制投標資格為乙等或甲等綜合營造業。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理預算金額新臺幣2億元以上之工程，應於招標文件內明訂品管人員\n之資格、人數及其更換規定，其最低人數為至少1人。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"技術服務採購之查核金額為新臺幣5,000萬元。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程保險附加責任保險之保險期間最高（累計）保險金額可為無限制。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"監造建築師、技師或其他專門職業及技術人員執行監造業務或監造簽證事\n項，其屬應親自赴現場查驗、勘驗、初驗、驗收、會勘或出席會議者，得委\n請他人代理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法之\n建造費用，包括工程保險費。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法適\n用於施工項目費用較難事先預估之案件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商參與競圖，應以設計作品之設計理念、設計作品之創意性及符合在地\n文化、生活美學程度、設計作品反應對機關需求之瞭解程度等因素為重要考\n量，雖有超出招標文件所定之工程經費上限情形，仍得評選為優勝廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關公開徵選廠商承辦技術服務之評選，其招標文件訂有廠商資格者，應先\n審查資格文件，資格合於招標文件規定者，始得參加評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理預算金額新臺幣1,000萬元以上工程採購之採購標的，如屬營造業\n法所載專業工程項目，廠商資格規定不得只允許綜合營造業投標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款規定辦理評選技術服務廠商，其投標廠商應\n有3家方可開標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程主辦機關得就工程施工查核小組查核結果，依相關法令規定辦理相關人\n員之獎懲。其缺失情節重大者，查核小組應對工程主辦機關所屬人員依法令\n為懲戒、懲處或移送司法機關；對負責該工程之建築師、技師，報請各該主\n管機關依相關法規予以懲戒或移送司法機關。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購品管人員於接受公共工程品質管理訓練課程，取得結業證書逾5年\n者，應再取得最近5年內之回訓證明，始得擔任品管人員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"為求公正客觀，工程施工查核小組之查核委員一律由主管機關所建置之專家\n名單中遴選之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組之查核委員除由設立機關指派機關具有工程專業知識人員\n擔任外，並由主管機關所建置之專家名單中遴選之，其中外聘之專家人數不\n得少於2位。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"因工程施工查核小組之查核委員均由主管機關之專家資料庫遴聘，其既已經\n過篩選，公正性不容質疑，故辦理查核時不需迴避。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組因係查核施工品質與進度，故有關工程規劃設計、生態環\n保、材料設備、圖說規範、變更設計等缺失，不需加以記錄，僅口頭提供洽\n請改善即可。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組辦理查核之檢驗、拆驗或鑑定費用之負擔，依契約約定辦\n理。若契約未約定，而檢驗、拆驗或鑑定結果與契約約定相符者，該費用由\n查核小組所屬機關負擔；與約定不符者，該費用由廠商負擔。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"委託監造服務案亦得同時委由承辦統包案之細部設計廠商辦理，以提升效\n率。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託建築師辦理設計監造服務，採建造費用百分比法者，建築師依法\n律規定須交由結構、電機或冷凍空調等技師或消防設備師辦理之工程所需費\n用，未包含於設計監造服務費用內，應另行給付。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商承辦技術服務，其實際提供服務人員應於完成之圖樣及書表上簽署，並\n依法辦理簽證。簽證費用並得另予核實給付。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託技術服務採購採服務成本加公費法計費者，其公費得於契約約定為\n直接費用之一定比率。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組之查核委員辦理查核時，應公正執行職權，不得有「假藉\n查核之名，妨礙機關依法辦理工程施工；未經查核小組指派，自行辦理查核\n監督等情事」之情形。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"招標機關辦理工程採購，倘於招標文件載明得標後不允許提出替代方案，則\n廠商得標後，即使履約標的之需求有改變，仍須依契約約定之工法施工，不\n得辦理契約變更。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關工程履約期間辦理原有契約項目之變更追加，雖原單價施工條件已改\n變，惟因原契約已有單價，故應以原決標單價辦理始合理，不得另議單價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依營造業法，營造業非加入同業公會不得營業，機關辦理屬營造業法所稱營\n繕工程採購者，必須將加入營造公會之會員證作為投標廠商資格文件之一。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"「水管、電氣與建築工程合併或分開招標原則」所稱「水管、電氣」，例如\n「空調工程」、「電梯工程」。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"某統包工程允許建築師與營造業共同投標，並於招標文件明定同時符合前述\n資格者可單獨投標。甲營造業因不具建築師資格，而與乙建築師共同投標，\n惟得標後因乙破產致無法共同履約，其契約之一切權利義務，得由甲繼受，\n甲並得將該部分分包予丙建築師。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理預算金額新臺幣150萬元以上之工程，應於招標文件內明訂品管人\n員之資格、人數及其更換規定，其最低人數為至少1人。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"招標機關辦理工程採購，雖於招標文件載明得標後不允許提出替代方案，但\n履約期間，倘有履約標的之需求改變情事，仍得辦理契約變更。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，採建造費用百分比法\n之計費方式者，各階段環境影響評估及相關說明書、報告書之編製及送審之\n服務費用，不得超過附表所列百分比參考值，亦不得另行估算編列。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理規劃、設計及監造之技術服務，採建造費用百分比法之計\n費方式者，如工程採購無底價且無評審委員會建議金額者，建造費用以工程\n預算代之，惟應扣除建造費用所稱不包括之費用及稅捐等。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，採建造費用百分比法\n之計費方式者，替代方案、工程設計及施工可行性之審查服務費用，得由機\n關依個案特性及實際需要估算，訂定合理服務費率。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"建造費用百分比法所稱之「建造費用」，指工程採購底價金額或評審委員會\n建議金額，若無前二者，以工程預算代之。包括規費、規劃費、設計費、監\n造費、專案管理費、物價指數調整工程款、營業稅、土地及權利費用、法律\n費用、主辦機關所需工程管理費、承包商辦理工程之各項利息及保險費。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理公開評選技術服務廠商，招標文件未訂明固定服務費用或費率者，\n議價廠商之報價合理且在預算金額以內，機關得依其報價訂定底價，照價決\n標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以公開招標辦理採購金額新臺幣300萬元之技術服務採購，於招標公告\n公開預算金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理預算金額新臺幣2千萬元以上未達2億元之工程，應於招標文件內明\n訂品管人員之資格、人數及其更換規定，其最低人數為至少1人。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關依採購法第24條規定以統包辦理招標之採購，依採購法第52條及其施行\n細則第64條之2規定，得採行之決標原則，除最有利標外，尚包括評分及格\n最低標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關依採購法第24條規定以統包辦理招標之採購，僅限採最有利標之決標原\n則。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以統包方式辦理工程採購，可採最有利標決標，並規定投標廠商服務建\n議書撰寫內容，納入評選項目，落實審查。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，服務成本加公費法僅\n適用於計畫性質複雜，服務費用不易確實預估或履約成果不確定之服務案\n件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法之\n建造費用，招標文件可載明包括有價料回收金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組每年應辦理工程施工查核之件數比率以不低於當年度所屬\n新臺幣150萬元以上工程標案（不含補助及委託其他機關辦理案件）之百分\n之十為原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託技術服務採購採服務成本加公費法計費者，廠商應記錄各項費用並\n備具憑證，且憑證須為正本。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，委託廠商辦理專案管\n理之服務項目，可包括設計。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購訂有初驗程序者，於初驗階段，適用採購法第72條第2項減價收受\n之規定。倘擬減價收受，得於依採購法第72條規定辦理驗收程序之前採行。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購訂有初驗程序者，於初驗階段，尚無採購法第72條第2項減價收受\n規定之適用。倘擬減價收受，應於依採購法第72條規定辦理驗收程序之後採\n行。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託工程設計、監造，採建造費用百分比法計費，工程採購無底價且\n無評審委員會建議金額者，建造費用以工程預算代之。但應扣除規費、規劃\n費、設計費、監造費、專案管理費、物價指數調整工程款、營業稅、土地及\n權利費用、法律費用、主辦機關所需工程管理費、承包商辦理工程之各項利\n息、保險費及招標文件所載其他除外費用及稅捐等。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，採建造費用百分比法\n之計費方式者，申請公有建築物候選綠建築證書或綠建築標章之服務費用，\n包含於採建造費用百分比法所計算之服務費中。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，採建造費用百分比法\n之計費方式者，申請公有建築物候選綠建築證書或綠建築標章之服務費用，\n不含於建造費用百分比法計費範圍，應單獨列項供廠商報價，或於招標文件\n中載明固定費用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程專案管理技術服務（不含施工監造）建造費用百分比參考表所列服務費\n用參考值，包括規劃與可行性評估、規劃、設計、招標、決標、施工督導與\n履約管理之諮詢及審查。其中可行性研究之諮詢及審查占百分之五、規劃之\n諮詢及審查占百分之五、工程設計之諮詢及審查占百分之三十五、招標、決\n標之諮詢及審查占百分之十、施工督導與履約管理之諮詢及審查占百分之四\n十五為原則。各機關不得自行調整。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程專案管理技術服務（不含施工監造）建造費用百分比參考表之參考值包\n括規劃與可行性評估、規劃、設計、招標、決標、施工督導與履約管理之諮\n詢及審查。其中可行性研究之諮詢及審查占百分之五、規劃之諮詢及審查占\n百分之五、工程設計之諮詢及審查占百分之三十五、招標、決標之諮詢及審\n查占百分之十、施工督導與履約管理之諮詢及審查占百分之四十五為原則。\n各機關仍得自行調整。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理預算金額新臺幣5,000萬元以上工程採購，廠商於開工後10日內，\n將品管人員之登錄表報監造單位審查並經機關核定後，由機關填報於主管機\n關資訊網路系統備查；品管人員異動時，亦同。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理預算金額新臺幣2,000萬元以上工程採購，廠商應於開工前，將品\n管人員之登錄表報監造單位審查並經機關核定後，由機關填報於主管機關資\n訊網路系統備查；品管人員異動時，亦同。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理公告金額以上之技術服務採購，採最有利標評選優勝廠商者，應於\n開標前訂底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理公告金額以上之技術服務採購，以不訂底價之最有利標為原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，未達公告金額但逾公\n告金額十分之一之技術服務採購，仍應依採購法第22條第1項第9款辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，未達公告金額但逾公\n告金額十分之一之技術服務採購，亦可依採購法第22條第1項第9款辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採服務成本加公費法者，其直接薪資\n不包括非經常性給與之獎金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採服務成本加公費法者，其直接薪資\n包括非經常性給與之獎金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理機械系統、號誌系統、昇降設備、冷凍空調、節能績效工程等設備\n工程，不得採統包方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理建築物工程之新建、增建、改建、修建，得採統包方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理採購對於刊登廠商拒絕往來之處置，應依採購法第101條至第103條\n之規定辦理，不得任意增加其他條款。惟如有就採購法第101條第1項各款情\n形補充說明其適用情形者，無須於招標文件敘明。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，採建造費用百分比法\n之計費方式者，與同一服務契約有關之各項工程，應分別計算建造費用。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，採建造費用百分比法\n之計費方式者，與同一服務契約有關之各項工程，其非屬分期或分區或開口\n服務契約之分案工程，應合併計算建造費用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購部分履約項目屬環保產品者，適用「機關優先採購環境保護產品辦\n法」優先採購之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程採購部分履約項目屬環保產品者，不適用「機關優先採購環境保護產品\n辦法」優先採購之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"招標機關應於招標文件規定，外國營造業投標之營造業登記證及公會會員證\n須於投標前取得。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"招標機關得於招標文件規定，外國營造業投標之營造業登記證須於投標前取\n得；公會會員證則可於履約前再請領。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，同一委託技術服務契約，其服務費用之計算，\n僅能擇定1種計費方式。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，同一委託技術服務契約，其服務費用之計算，\n得擇定2種以上計費方式。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"技術服務採購金額未達新臺幣500萬元之規劃、設計採購，其採競圖方式辦\n理者，不得要求製作模型及彩繪透視圖。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"技術服務採購金額未達新臺幣500萬元之規劃、設計採購，其採競圖方式辦\n理者，得不要求製作模型及彩繪透視圖。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以統包併採最有利標決標方式辦理者，無須報經上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關以統包併採最有利標決標方式辦理者，應逐案報經上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"外國技師如欲於我國提供服務，得以外國技師執照代替我國執照。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"外國技師如欲於我國提供簽證服務，可經我國技師考試及格取得技師證書，\n或依我國與其母國所簽相互認許協議等方式，於取得我國執照後為之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，其服務\n費率應按工程內容、服務項目及難易度，參考附表1至附表4，訂定建造費用\n之費率級距及各級費率，簽報機關首長或其授權人員核定，無須於招標文件\n中載明。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，服務費用採建造費用百分比法計費者，其服務\n費率應按工程內容、服務項目及難易度，參考附表1至附表4，訂定建造費用\n之費率級距及各級費率，簽報機關首長或其授權人員核定，並於招標文件中\n載明。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，有2家以上廠商為同\n一優勝順序者，以配分最高之評選項目之得分合計值較高者優先議價；得分\n仍相同者，就該等廠商進行抽籤決定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，有2家以上廠商為同\n一優勝順序者，擇配分最高之評選項目之得分合計值較高者，優先議價；得\n分仍相同者，就該等廠商再進行綜合評選1次，以總評分最高、價格與總評\n分之商數最低或序位合計值最低者，優先議價；其再次相同者，抽籤決定\n之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，有2家以上廠商為同\n一優勝順序者，以標價低者優先議價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，機關委託廠商辦理舊\n有建築物整修之技術服務，且服務項目包括規劃、設計者，其服務費用之採\n購金額在新臺幣500萬元以上者，應辦理競圖。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，機關委託廠商辦理新\n建建築物之技術服務，且服務項目包括規劃、設計者，其服務費用之採購金\n額在新臺幣500萬元以上者，應辦理競圖。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，採最有利標方式辦理決標時，若廠商報價低於\n底價80%，且標價偏低、顯不合理，有影響履約品質之虞者，可依採購法第\n58條規定請廠商提出說明。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，對於重複性工程服務採用相同之設計圖說之情\n形，其設計費用應酌予折減給付。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理查核金額以上之工程採購，因應緊急情事，依招標期限標準第2條\n至第4條所定期限辦理不符合實際需要者，可免於公告招標前辦理招標文件\n之公開閱覽。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關工程履約期間辦理原有契約項目之變更追加數量，致契約金額逾原決標\n金額，因以原契約單價計價，爰其增加之金額無須刊登決標公告或定期彙\n送。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商承辦屬特殊採購之技術服務，招標文件得規定廠商資本額不低\n於招標預算金額之五分之一。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關辦理公告金額以上之技術服務採購，得採固定費用或費率之最有利標，\n如果廠商於投標文件內自願減價，機關仍應依招標文件規定之原定固定費用\n或費率決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"受機關委託之技術服務廠商，所訂定之技術規格如屬特殊技術規格，應要求\n該廠商於提出技術規格前，向機關書面說明其必要性。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託技術服務廠商辦理監造服務，其派遣留駐工地，持續性監督施工\n廠商按契約及設計圖說施工及查證施工廠商履約人員之資格、人數、是否專\n任、留駐工地期間及權責分工，應於委託契約載明。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"機關委託廠商辦理技術服務，除法令另有規定者外，其招標文件得依個案特\n性及實際需要載明服務之項目、工作內容及需求計畫。其需求計畫之內容並\n得包括計畫緣起、需求說明、基地現況、地質資料、工程經費上限、預計提\n供技術服務之期程等。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，可於招標文件之契約\n條款預先約定監造技師或建築師必須於查驗、初驗及驗收時親自到場辦理或\n會辦，缺席者以違約處理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"依「機關委託技術服務廠商評選及計費辦法」之規定，建造費用百分比法之\n建造費用，招標文件可載明不包括刨除路面有價料之金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"廠商有施工品質不良或其他違反公共工程施工品質管理作業要點之情事，機\n關得依契約約定暫停發放工程估驗款或為其他適當之處置，並得依採購法第\n101條至第103條規定處理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"工程及技術服務採購作業","law_ref":null,"stem":"工程施工查核小組查核紀錄應於7個工作天內送工程主辦機關；其應檢討改\n善者，工程主辦機關應於期限內改善完妥後，報查核小組備查。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"有關招標文件對於優良廠商應繳納之押標金及保證金規定，下列何者為非？","options":["繳納履約保證金後方為優良廠商者，不溯及適用減收規定。","對列為\n政府電子採購網優良廠商資料庫之廠商，機關均得據以減收押標金及保證\n金，不以招標文件載明者為限。","減收保證金後獎勵期間屆滿者，免補繳\n減收之金額。","減收保證金後發生不發還該保證金情形者，廠商應就不發\n還金額中屬減收之金額補繳之。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["採購案是否達查核金額或公告金額\n係以預算金額認定之。","採議價方式辦理之採購，得免訂定底價，但須於\n招標文件敘明理由及決標原則。","招標文件未規定廠商報價須包含5%營業\n稅者，表示廠商之報價應包含5%營業稅。","招標文件規定採電子投標之廠\n商，其押標金得予減收押標金金額之5%"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["招標文件規定最低標廠商如經機關\n通知有採購法第58條情形，應於開標當場出具願意繳納差額保證金之切結\n書，尚屬適法 。","一次投標分段開標之採購，招標文件規定投標廠商之\n內外標封須書名廠商名稱、地址，尚屬適法。","招標文件規定廠商投標文\n件份數與招標文件規定不符者為無效標，尚屬適法。","招標文件規定開標\n時廠商須攜帶資格文件正本供查驗，尚屬適法。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["投標須知應載明受理廠商異議、申\n訴、履約爭議調解之機關名稱，且三者須一致。","未達公告金額之採購，\n招標文件及公告得規定領標方式限以專人領取。","招標文件規定押標金\n以現金繳納者，應繳納至指定之收受處所或帳號，否則為不合格標，尚屬適\n法。","廠商得以現金作為押標金附於投標文件內遞送。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許廠商以電子方式領標者應於以下何者中訂明？","options":["招標公告及招標\n文件。","招標公告。","招標文件。","招標公告及機關之網站公告。"],"answer":0},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"有關共同投標之採購案件，下列敘述何者正確？","options":["招標文件中未載明允許\n廠商共同投標者，廠商採共同投標方式投標，機關仍得接受。","共同投標\n廠商之家數上限，得免於招標文件中載明。","允許廠商共同投標之案件，\n廠商單獨投標並無不可。","以聯合技師事務所投標者，亦屬共同投標。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定廠商之投標文件為不合格標之情形，下列何者非屬無效\n之規定？","options":["未檢附願繳納差額保證金之切結書。","投標文件之編排、字\n體大小、裝訂方式或份數與招標文件規定不符。","不分段開標之投標文件\n未依招標文件規定分置資格、規格或價格標封。","未依招標文件規定檢附\n廠商切結書。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列敘述，何者錯誤？","options":["機關辦理評選，得於招標文件規定過半數出席評\n選委員評定總分未達若干分者，為不合格廠商。","機關得於招標文件載明\n預算未完成立法程序前，得先辦理保留決標，俟預算通過後始決標生效。","機關得於招標文件要求電子領標廠商，應檢附工程會指定資訊系統之領\n標電子憑據。","機關辦理公開客觀評選優勝廠商，招標文件如未訂明固定\n費用或費率，應於議價時提供空白標單供廠商重行報價。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理財物採購，依採購法第49條及第93條之1規定公開取得電子報價\n單，下列敘述何者錯誤？","options":["招標文件規定只允許廠商電子領標、電子報\n價，不提供現場領標、現場投標。","招標文件規定不允許廠商於開標前補\n正非契約必要之點之文件。","廠商電子報價後，如發現標價錯誤，得允許\n廠商撤回更正。","廠商之電子化資料，視同正式文件，免另備書面文件。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列何者非屬機關應依採購法第31條第2項第7款規定，就廠商所繳納之押標\n金不予發還之情形？","options":["廠商有採購法第50條第1項第5款情形。","廠商或\n其代表人、代理人、受雇人或其他從業人員與機關人員，共同違反採購法第\n26條、第34條或第37條第1項規定。","廠商或其代表人、代理人、受雇人\n或其他從業人員與受機關委託提供採購規劃、設計、專案管理或代辦採購廠\n商之人員，共同實施採購法第89條規定構成要件事實。","廠商有採購法第\n48條第1項第2款「足以影響採購公正之違法行為者」情形。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定廠商之投標文件為不合格標之情形，下列何者屬有效之\n規定？","options":["標封封口未蓋騎縫章。","投標文件未逐頁蓋章。","廠商電子\n領標，投標文件無需檢附電子領標憑據。","分段開標之投標文件，未依規\n定分置資格、規格或價格標封。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，應依政府採購法及相關法令製作招標文件，下列敘述何者\n正確？","options":["未達公告金額採購仍適用採購法第26條規定。","適用WTO政府\n採購協定(GPA)之採購案，仍得於招標文件規定優先採購我國產品。","機\n關辦理公告招標，於招標文件就招標文件提及之特定來源地註明「或同等\n品」。","機關於招標文件規定優先採購正字標記規格產品。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"招標文件對於優先採購環保產品之敘述，下列何為是？","options":["招標標的僅部分\n屬環保產品者，仍得於招標文件載明優先採購環保產品。","招標文件明定\n提供環保標章產品之廠商，始可投標。","適用條約或協定之採購案，仍得\n優先採購環保產品。","不限定採購具環保標章之產品，但允許於價差8%內\n優先決標予環保產品廠商。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"關於共同供應契約採購，下列敘述何者錯誤？","options":["訂約機關於共同供應契約\n約定，各適用機關可自行決定是否利用共同供應契約辦理採購。","機關於\n招標文件載明共同供應契約每次最高採購量，不另訂定大量訂購金額可洽廠\n商提供優惠條件之條款。","機關於招標文件載明之共同供應契約預算金額\n係屬預估，於該契約有效期間內，各機關總訂購金額仍得逾預算數額。","利用共同供應契約訂購前，先查察其他供應來源有無較便宜且符合需要之標\n的。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列招標文件規定，何者適法？","options":["同一廠商同時做為各機\n關採購契約之連帶保證廠商者，以不超過3契約為原則。","機關以統包辦\n理招標，允許4家以內之廠商共同投標。","優良廠商減收押標金金額，其\n繳納金額為原定應繳總額之百分之三十。","允許4家以內之廠商投標，應\n載明不得單獨投標。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列招標文件之規定，何者為是？","options":["開標後發現投標廠商聲明書未加蓋廠\n商及其負責人印章者，不允許廠商補正。","招標文件規定廠商須使用機關\n指定之封套投標，否則視為無效標。","投標廠商未攜帶與投標廠商聲明書\n相符之廠商及負責人印章者，視為放棄減價權利。","得標廠商之押標金於\n完成簽約並正常履約二個月後退還。"],"answer":0},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"以下何者非屬機關得於招標文件中規定允許廠商於開標前補正之非契約必要\n之點之文件？","options":["原招標文件已標示得更改之項目。","參考性質之事項。","列入標價評比之選購項目。","其他於契約成立無影響之事項。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列招標文件之規定，何者尚屬適法？","options":["廠商出席人員不得遲到、早退，\n開標20分鐘以後不得進場。","投標廠商聲明書未加蓋廠商章者，視為不合\n格。","投標文件內容有前後不一致或書寫錯誤之情形者，視為不合格。","招標文件規定優良廠商應繳納之押標金、保證金得予減收55%。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列何者須於招標文件明定?","options":["被刊登於政府採購公報之廠商，不得參加\n投標或作為決標對象或分包廠商之期間。","廠商標價超過底價時，比減價\n格之次數。","採協商措施者，得納入協商之項目。","政黨及與其具關係\n企業關係之廠商，不得參與投標。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列何者須於招標文件載明，否則機關不能據以辦理？","options":["逾期違約金之計\n罰。","辦理部分驗收。","驗收不符時，改正期限之訂定。","減價收受\n之減價計算方式。"],"answer":0},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列敘述何者正確？","options":["機關辦理採購之標的，如法令已有允許輸入臺灣地\n區之大陸地區產品，機關尚不得拒絕廠商以之作為投標標的。","臺商於大\n陸地區投資設立之公司，仍視為我國廠商，得參與我國機關辦理之採購。","依現行相關法令規定，大陸地區廠商不得參與我機關採購。","機關辦\n理涉及大陸地區財物或勞務之採購，為免爭議，宜於招標文件載明是否允許\n廠商提供原產地為大陸地區之財物或勞務參與其採購。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列何者為非？","options":["除我國締結之條約或協定另有規定外，\n機關得視個案性質與實際需要決定是否允許外國廠商參與投標。","機關招\n標文件規定不允許外國廠商投標，我國廠商供應之財物或勞務原產地非屬我\n國者，不影響其投標資格。","跨國企業在我國經目的事業主管機關認許在\n臺營業之分公司，其如參與投標，應視為外國廠商。","大陸地區產品之原\n產地認定，依進口貨物原產地認定標準。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列投標須知之規定，何者無違反採購法之虞？","options":["以現金繳納押標金之\n憑據應附於投標文件，否則視為未繳納而為無效標。","廠商「投標標價清\n單」如經塗改，應加蓋印章，否則視為無效標。","投標文件未使用機關提\n供之封套，視為無效標。","投標文件之頁數或紙張大小與投標文件規定不\n符者，視為無效標。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"有關採購法所稱招標文件，下列敘述何者錯誤？","options":["決標後納為契約文件之\n一。","機關應據以為審標之依據。","採購法規未明定須於招標文件載明\n者，均毋需於招標文件中載明。","採購法規定應載明於招標文件者，均須\n於招標文件中載明。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列何者正確？","options":["預算金額必須於招標文件及招標公告公\n開。","未達查核金額之工程採購，仍得於公告招標前辦理招標文件之公開\n閱覽。","擬依採購法第22條第1項第7款辦理後續增購，為避免相關規定不\n一致，得將該增購之情形於招標公告載明為詳投標須知第xx點規定。","預\n計金額必須於招標文件及招標公告公開。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"下列何者非屬未達公告金額採購之特性？","options":["得免收押標金及保證金。","決標結果得免以書面通知廠商。","得免訂定底價。","免通知上級機關監\n辦。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["即使無政府採購條約或協定，外國\n廠商均可參與我國之政府採購 。","招標文件載明投標廠商須檢附票據交\n換機構於截止投標日之前一個月內所出具之非拒絕往來戶或最近3年內無銀\n行退票紀錄證明文件，尚屬適法。","器材採購之招標文件規定得標廠商交\n貨時應檢附保固證明書，尚屬適法。","招標文件不得規定外國廠商依該國\n情形提出資格文件有困難者，得敘明其情形或以其所具有之相當資格代之。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列何者正確？","options":["機關辦理非特殊或巨額採購，其招標文\n件訂定投標廠商須檢附實績證明，尚屬適法。","機關辦理採購，於招標\n文件允許廠商共同投標，其共同投標之廠商家數上限為3家，尚不違反採購\n法。","機關辦理一採購金額為新臺幣50萬元之勞務採購，不得採選擇性招\n標。","以上皆非。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，應於招標文件中規定廠商對招標文件內容有疑義者，應以書\n面向招標機關請求釋疑之期限，以下敘述何者正確？","options":["自公告日或邀標日\n起等標期之二分之一。","自公告日或邀標日起等標期之三分之一。","自\n公告日或邀標日起等標期之四分之一，且不得少於十日。","自公告日或邀\n標日起等標期之四分之一，其尾數不足一日者，以一日計。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列招標文件規定何者適法？","options":["差額保證金須於機關通知\n後3日內繳納 。","投標廠商應符合之資格之一部分，得以分包廠商就其分\n包部分所具有者代之。","查核金額以上採購，得標廠商須於簽訂契約後10\n天內繳納履約保證金。","押標金及保證金應由廠商以現金及金融機構簽發\n之本票或支票為之，其餘概不受理。"],"answer":1},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列敘述何者適法？","options":["廠商繳納押標金後未參加投標，所\n繳納之押標金應予發還。","機關辦理巨額採購，應於招標文件規定廠商之\n特定資格。","未達公告金額之採購，招標文件得明定原住民廠商免繳納押\n標金。","招標文件應明定廠商投標文件應書面密封並於騎縫處加蓋大小印\n章。"],"answer":0},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"以下何者雖未於招標文件或契約預為載明，仍得辦理？","options":["因有先行使用之\n必要者，經機關首長或其授權人員核准，辦理部分驗收。","允許一定家數\n內之廠商共同投標。","因歸責於廠商之事由致解除契約，機關不予發還該\n廠商履約保證金。","因歸責於廠商之事由造成履約延遲，機關處罰廠商每\n日契約總價千分之一之逾期違約金。"],"answer":0},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，有關招標文件對於陸資廠商之資格規定，下列何者為非？","options":["機關可依個案需要，明定允許大陸地區廠商或其產品或勞務參與。","非適用條約或協定之採購，可於招標文件規定不允許第三地區含陸資成分之\n廠商參與。","依我國法律設立登記之公司或事業，其含陸資成分達1/2以\n上之廠商，視為大陸地區廠商。","倘以公告方式辦理者，除有法規或條約\n協定之依據，並於招標文件訂定限制條件外，不得限制在臺陸資廠商參與。"],"answer":2},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，下列敘述何者適法？","options":["招標文件得明定廠商於「投標前三\n年承辦各機關之工程曾發生重大職業災害」者不得參與投標。","招標文件\n應明定允許廠商於開標前補正契約非必要之點之文件。","招標文件得明定\n廠商應於截止投標期限前將投標文件送達招標機關指定之郵政信箱。","機\n關辦理藝文採購，招標文件規定免收押標金、保證金。"],"answer":3},{"type":"choice","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許外國廠商投標之採購，下列敘述何者為是？","options":["如招標文件未訂明\n投標廠商之標價幣別得為美元，因美元為國際流通貨幣，廠商仍得以美元報\n價。","投標廠商標價幣別在二種以上者，其總價之折算，依決標前一辦公\n日臺灣銀行外匯交易收盤即期賣出匯率折算之。","外國廠商以等值外幣繳\n納押標金及保證金者，以繳納日前一辦公日臺灣銀行外匯交易收盤即期賣出\n匯率折算之。","機關不得於招標文件載明外國廠商免附具加入工業或商業\n團體之證明。"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"為利廠商對於招標文件疑義及異議之提出，機關於辦理採購招標時，招標文\n件應載明疑義、異議及檢舉受理單位、聯絡電話、傳真及地址等資料。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法規定辦理選擇性招標建立合格廠商名單者，應於辦理廠商資格\n審查之文件中載明後續採購之邀標原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理資通訊軟體、硬體或服務等有關採購，得於招標文件規定「本案涉\n及資通訊軟體、硬體或服務等相關事務，不得提供及使用大陸廠牌資通訊產\n品」，並得規定廠商執行本案之團隊成員不得為陸籍人士。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理公開招標之採購，採一次投標分段開標，則其招標文件除應明\n定如何分段開標外，並應規定廠商投標文件應如何裝封及密封，以免造成爭\n議。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"適用我國所締結之條約或協定之採購，機關於招標文件中允許非條約協定國\n廠商參與者，得明定非條約協定國廠商參與之部分，視同條約協定採購。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關採公開招標方式辦理財物採購，依規定應於招標文件公開預算金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理公開招標之勞務採購，契約期間為1年，其於招標公告及招標\n文件載明：「機關保留契約期滿得與得標廠商續約之權利」。現契約即將期\n滿，機關擬依採購法第22條第1項第7款規定與原廠商辦理續約，尚屬適法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"不適用採購法之場地出租案件，其利用政府採購公報辦理公告者，其招標文\n件內容得載明適用採購法第101條至第103條有關不良廠商處分之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法第49條及第93條之1規定採公開取得電子報價單辦理採購，依\n規定應簽名或蓋章者，不以電子簽章為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"適用條約或協定之採購案，如允許非條約或協定國家之廠商參與投標，招標\n文件不得限定非條約或協定之特定國家或地區參與投標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"適用條約或協定之採購案，如允許非條約或協定國家之廠商參與投標，招標\n文件得限定非條約或協定之特定國家或地區參與投標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理共同供應契約之採購，依規定應於招標文件載明該契約係屬共同供\n應契約。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"適用我國所締結之條約或協定之採購，機關不得於招標文件中允許非條約協\n定國廠商參與。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"適用我國所締結之條約或協定之採購，機關亦得於招標文件中允許非條約協\n定國廠商參與。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許外國廠商參與非條約協定採購者，於招標文件中規定外國廠商不適\n用採購法第37條第1項投標廠商資格規定，違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許外國廠商參與非條約協定採購者，於招標文件中規定外國廠商不適\n用採購法第37條第1項投標廠商資格規定，並不違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許廠商共同投標者，對於共同投標廠商各成員主辦事項之金額，如未\n限制其共同投標協議書所載之比率下限，屬錯誤態樣之一。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許廠商共同投標者，對於共同投標廠商各成員主辦事項之金額，並未\n限制其共同投標協議書所載之比率下限，並無不可。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，廠商之投標文件一經投遞即不得要求撤回，故機關不得允許\n廠商於開標前補正非契約必要之點之文件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，機關得允許廠商於開標前補正非契約必要之點之文件。但應\n於招標文件中預為明定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，得允許廠商在不降低原有功能條件下就技術、工法、材料或\n設備，提出可縮減工期、減省經費或提高效率之替代方案。但應於招標文件\n中預為明定，不得允許廠商於得標後提出。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，得允許廠商在不降低原有功能條件下就技術、工法、材料或\n設備，提出可縮減工期、減省經費或提高效率之替代方案。但應於招標文件\n中預為明定，並得允許廠商於得標後提出。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，其於招標文件中規定每一投標廠商出席開標會議的人數上\n限，違反採購法之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，其於招標文件中規定每一投標廠商出席開標會議的人數上\n限，並不違反採購法之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關依採購法第22條第1項第9款辦理委託研究發展之採購，預算金額為\n新臺幣500萬元。該機關決定不收取押標金，違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關依採購法第22條第1項第9款辦理委託研究發展之採購，預算金額為\n新臺幣500萬元。該機關決定不收取押標金，並不違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理一公告金額以上之採購，其於招標文件中規定得標廠商應繳納之全\n部履約保證金，得以符合招標文件所定投標廠商資格條件之其他廠商之履約\n及賠償連帶保證代之，並無違反採購法規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理一未達公告金額之採購，其於招標文件中規定得標廠商應繳納之履\n約保證金，得以符合招標文件所定投標廠商資格條件之其他廠商之履約及賠\n償連帶保證代之，並無違反採購法規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理工程採購，對於具有一定條件之優良廠商，其應繳納之押標金、履\n約保證金或保固保證金金額得予減收乙事，已明定於「押標金保證金暨其他\n擔保作業辦法」，故不須於招標文件中訂明。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理工程採購，對於公共工程金質獎獲獎廠商，其應繳納之押標金、履\n約保證金或保固保證金金額得予減收。但以招標文件中已有明定者為限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理公開招標之財物採購，允許外國廠商參與投標，其於招標文件\n規定：「投標廠商應檢附依工業團體法或商業團體法加入工業或商業團體之\n證明，但外國廠商除外」，屬無正當理由之差別待遇。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理公開招標之財物採購，允許外國廠商參與投標，其於招標文件\n規定：「投標廠商應檢附依工業團體法或商業團體法加入工業或商業團體之\n證明，但外國廠商除外」，尚屬適法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，投標廠商如欲就招標文件指定廠牌提出同等品者，均應於投\n標文件內預先提出同等品之相關資料，以供審查，避免爭議。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，招標文件允許投標廠商提出同等品，而未規定應於投標文件\n內預先提出者，得標廠商得於使用同等品前，依契約規定向機關提出同等品\n之相關資料，以供審查。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關採限制性招標之公開評選方式辦理勞務採購，應於招標文件公開預計金\n額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關採限制性招標之公開評選方式辦理勞務採購，得視需要自行決定是否於\n招標文件公開預計金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，招標文件規定投標廠商應攜帶與投標文件所使用相同之印章\n前往開標；如廠商無法攜帶該印章前往開標，不可授權代表人攜帶蓋有該印\n章之授權書，並由該代表人以簽名代替蓋章。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，招標文件規定投標廠商應攜帶與投標文件所使用相同之印章\n前往開標；如廠商無法攜帶該印章前往開標，可授權代表人攜帶蓋有該印章\n之授權書，並由該代表人以簽名代替蓋章，並無不妥。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理電腦設備採購，招標文件載明電腦之原產地不得為大陸地區，違反\n採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理電腦設備採購，招標文件載明電腦之原產地不得為大陸地區，並未\n違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定履約保證金之發還方式，依履約進度分次發還者，以4\n次為上限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定履約保證金之發還方式，依履約進度分6次發還，並無\n不妥。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關製作共同供應契約採購之招標文件，未載明允許適用機關以外之機關利\n用，即表示適用機關以外之機關得利用該共同供應契約辦理採購。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關製作共同供應契約採購之招標文件，得載明不允許適用機關以外之機關\n利用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購之預算金額包括機關自行留用之工程管理費用部分。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購之預算金額不包括機關自行留用之工程管理費用部分。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關就已公開預算金額之採購案，於招標文件規定「廠商標價超過預算金額\n者為不合格標，不予減價機會」，屬不當增列法規所無之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關得就已公開預算金額之採購案，一併於招標文件規定「廠商標價超過預\n算金額者為不合格標，不予減價機會」。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"不適用條約或協定之採購案，如允許外國廠商參與投標者，招標文件不得限\n定特定之國家或地區參與投標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理巨額採購對於核准之預期使用情形及其效益，於完成採購前有調整\n必要或明顯不符合預期者，應即檢討原因、責任歸屬並採行相關配套措施，\n重行簽報核准。但已完成採購者無需重行簽報核准。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理巨額採購對於核准之預期使用情形及其效益，於完成採購前有調整\n必要或明顯不符合預期者，應即檢討原因、責任歸屬並採行相關配套措施，\n重行簽報核准。完成採購後，亦同。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理共同供應契約之採購，無需於招標文件載明該契約係屬共同供應契\n約。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"不適用條約或協定之採購案，如允許外國廠商參與投標者，招標文件得限定\n特定國家或地區參與投標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"為落實政府鼓勵企業加薪之施政目標，機關得於招標文件之評選（審）項目\n及評審標準，載明廠商企業社會責任指標及其配分。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定廠商投標文件之編排、字體大小、裝訂方式或份數與招\n標文件規定不符者，為不合格標，尚屬適法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關不得於招標文件規定廠商投標文件之編排、字體大小、裝訂方式或份數\n與招標文件規定不符者，為不合格標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"○○保險公司台中分公司於投標當日遞送投標文件前至政府電子採購網\n（web.pcc.gov.tw）查詢該分公司、共同投標廠商、分包廠商是否為採購法\n第103條第1項之拒絕往來廠商，不必包括該公司之其他分公司。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"○○保險公司台中分公司於投標當日遞送投標文件前至政府電子採購網\n（web.pcc.gov.tw）查詢該分公司及其他分公司、共同投標廠商、分包廠商\n是否為採購法第103條第1項之拒絕往來廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"不適用採購法之閒置資產標售案件，其利用政府採購公報辦理公告者，招標\n文件仍應載明機關與廠商間之爭議得依採購法第6章爭議處理規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"不適用採購法之閒置資產標售案件，其利用政府採購公報辦理公告者，招標\n文件不得登載機關與廠商間之爭議得依採購法第6章爭議處理規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理「具敏感性或國安(含資安)疑慮之業務範疇」之資訊服務採購，於\n招標文件載明不允許陸資資訊服務業者參與，並不違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定暫停營業之廠商不得參與投標，違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定暫停營業之廠商不得參與投標，並不違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理「具敏感性或國安(含資安)疑慮之業務範疇」之資訊服務採購，於\n招標文件載明不允許陸資資訊服務業者參與，違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依據優先採購身心障礙福利機構團體或庇護工場生產物品及服務辦法規定辦\n理優先採購者，其決標方式應為最低標決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依據優先採購身心障礙福利機構團體或庇護工場生產物品及服務辦法規定辦\n理優先採購者，其決標方式得為最低標或參考最有利標決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關委託廠商辦理技術服務，涉及廠商於投標時須提出設計圖或服務建議書\n者，為避免爭議，宜於招標文件載明機關對得標者以外之其他得獎圖說之免\n費使用條件及其範圍或權限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關委託廠商辦理技術服務，涉及廠商於投標時須提出設計圖或服務建議書\n者，於招標文件載明機關對得標者以外之其他得獎圖說之有償使用條件及其\n範圍或權限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"招標文件不得允許得標廠商以銀行書面連帶保證、分段續保之方式繳納履約\n保證金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"招標文件得允許得標廠商以銀行書面連帶保證、分段續保之方式繳納履約保\n證金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理非條約協定採購，不得視實際需要於招標文件中規定允許外國廠商\n參與。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"因兩岸尚未締結與採購法第17條第1項有關之條約或協定，無論是否適用我\n國締結之條約或協定之採購，機關均得於招標文件規定不允許大陸地區廠\n商、產品或勞務參與採購。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理公開招標之勞務採購，契約期間為1年，僅於招標文件載明：\n「本合約於期滿前得經議價程序或於雙方文件同意後依本合約之條件及價金\n比例原則計算服務費，延長本合約12個月。」現契約即將期滿，機關擬依採\n購法第22條第1項第7款規定與原廠商辦理續約，尚非適法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，招標文件未規定繳納押標金，其後發現該廠商有借用他人名\n義投標之情形，則機關依「押標金保證金暨其他擔保作業辦法」計算標價5%\n之押標金金額並依採購法第31條第2項規定追繳押標金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理採購，如於招標文件規定押標金繳納方式限現金、金融機構簽\n發之本票或支票、郵政匯票、政府公債，並不違反採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"為引導國內廠商落實企業社會責任，並表彰善盡企業社會責任，機關辦理評\n選，得將廠商提供員工「工作與生活平衡」措施(如友善家庭措施、友善性\n別等)設為評選項目納入評分項目。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理工程採購，為利決標後製作契約單價並傳輸至工程價格資料庫，得\n於招標文件規定，得標廠商應依機關所定期限及空白標單格式提送決標後單\n價電子檔至機關。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法第73條之1規定，機關辦理工程採購驗收付款，應於驗收合格後，\n填具結算驗收證明文件，並於接到廠商請款單據後，15日內付款。沒有任何\n例外。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法第73條之1規定，機關辦理工程採購驗收付款，除契約另有約定\n外，應於驗收合格後，填具結算驗收證明文件，並於接到廠商請款單據\n後，15日內付款。上開付款期限，屬應向上級機關申請核發補助款者，為30\n日。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法規定辦理選擇性招標建立合格廠商名單者，於辦理廠商資格審\n查之文件中載明後續採購之邀標，每次應邀請至少3家以上廠商投標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法規定辦理選擇性招標建立合格廠商名單者，於辦理廠商資格\n審查之文件中載明後續採購之邀標原則時，其有每次僅邀請1家廠商之情形\n者，應併為載明。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，如有依採購法第22條第1項第7款規定載明後續擴充之情形，\n其採購金額及預算金額之認定，均應包括後續擴充。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，如有依採購法第22條第1項第7款規定載明後續擴充之情形，\n其採購金額之認定應包括後續擴充部分。但預算金額之認定，不包括後續擴\n充。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"議價過程中，縱廠商減價次數太多致時間過於冗長，機關仍不得通知廠商縮\n限其後續減價次數。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"議價過程中，因廠商減價次數太多致時間過於冗長，機關仍得通知廠商縮限\n其後續減價次數。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許廠商共同投標者，招標文件規定代表廠商之基本資格後，不得再就\n共同投標廠商各成員之基本資格另作規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關允許廠商共同投標者，招標文件規定代表廠商之基本資格後，可再就共\n同投標廠商各成員之基本資格另作規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法第49條規定，辦理公開徵求廠商提供書面報價或企劃書公告，\n得不於招標文件載明開標時間地點。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關不得於招標文件中規定：「廠商如以銀行之書面連帶保證或開發或保兌\n之不可撤銷擔保信用狀繳納履約保證金者，機關得視該銀行之債信、過去履\n行連帶保證之紀錄等，經機關審核後始予接受。」","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關得視個案情形及實際需要於招標文件中規定：「廠商如以銀行之書面連\n帶保證或開發或保兌之不可撤銷擔保信用狀繳納履約保證金者，機關得視該\n銀行之債信、過去履行連帶保證之紀錄等，經機關審核後始予接受。」","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，廠商未依招標文件規定繳納押標金(全部未繳)，其後發現該\n廠商有借用他人名義投標之情形，則機關依採購法第31條第2項規定應予追\n繳押標金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，招標文件規定押標金額度為新臺幣10萬元，但未明定廠商所\n繳納之押標金不予發還之情形。其後發生廠商得標後拒不簽約之情形，則該\n機關仍得依採購法第31條第2項規定不予發還押標金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理採購，招標文件規定押標金額度為新臺幣10萬元，開標時發\n現其中2家廠商除未繳納押標金外，投標文件之字跡顯係同一人繕寫，機關\n認定符合採購法第50條第1項第5款規定，該機關應依採購法第31條第2項規\n定，向該二家廠商追繳押標金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"適用我國所締結之條約或協定之工程採購，機關不得於招標文件中允許非條\n約協定國廠商參與。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"適用我國所締結之條約或協定之工程採購，機關得於招標文件中允許非條約\n協定國廠商參與，且該廠商所供應之鋼筋、水泥及砂石之原產地須屬我國或\n其他條約或協定國家。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理新臺幣20億元之工程採購，如擬收取押標金，其於招標文件規\n定押標金額度為新臺幣五千萬元，並無違反採購法規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理新臺幣20億元之工程採購，如擬收取押標金，其於招標文件規\n定押標金額度為標價之5%，並無違反採購法規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法第49條及第93條之1規定採「公開取得電子報價單」辦理採\n購，流（廢）標後，再辦理第2次招標時，不得改採書面報價作業方式。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法第49條及第93條之1規定採「公開取得電子報價單」辦理採\n購，流（廢）標後，再辦理第2次招標時，得改採書面報價作業方式。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關依採購法第49條規定，辦理公開徵求廠商提供書面報價或企劃書公告，\n仍應依採購法第45條規定於招標文件載明開標時間地點。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，為避免廠商代表人具有犯罪紀錄者參與採購，均得依個案特\n性及實際需要，於招標文件訂定廠商資格限制條件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理涉關鍵基礎設施之採購案，應於契約約定廠商履約人員於進場或參\n與工作前，自行提出或委託機關代為申請無犯罪紀錄證明，並經機關審核同\n意，始得進場或參與工作。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關委託廠商辦理技術服務，涉及廠商於投標時須提出設計圖或服務建議書\n者，不得於招標文件規定經評選達一定分數或名次之未獲選廠商，發給一定\n金額之獎勵金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關委託廠商辦理技術服務，涉及廠商於投標時須提出設計圖或服務建議書\n者，得於招標文件規定經評選達一定分數或名次之未獲選廠商，發給一定金\n額之獎勵金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理採購，招標文件規定押標金額度為新臺幣20萬元。現發現廠商\n有採購法第50條第1項第5款規定情形，因該情形非屬採購法第31條第2項情\n形，爰仍應發還該廠商押標金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理採購，招標文件規定押標金額度為新臺幣20萬元。現發現廠商\n有採購法第50條第1項第5款規定情形，機關應依採購法第31條第2項第7款規\n定，不予發還該廠商押標金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，其須繳納押標金者，得於招標文件規定押標金以金融機構本\n票、支票、保付支票或郵政匯票繳納者，應為即期並以機關為受款人。未填\n寫受款人者，不予接受。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，其須繳納押標金者，得於招標文件規定押標金以金融機構本\n票、支票、保付支票或郵政匯票繳納者，應為即期並以機關為受款人。未填\n寫受款人者，以執票之機關為受款人。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，其須繳納押標金者，得於招標文件規定押標金以設定質權之\n金融機構定期存款單繳納者，該金融機構應為與機關有往來之金融機構。但\n應提供該金融機構名稱。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，其須繳納押標金者，不得於招標文件規定押標金以設定質權\n之金融機構定期存款單繳納者，該金融機構應為與機關有往來之金融機構。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，採購標的涉及智慧財產權者，招標文件應規定由機關取得全\n部權利。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，採購標的涉及智慧財產權者，機關得視需要於招標文件規定\n取得部分或全部權利或取得授權。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，履約保證金之繳納期限，由機關視案件性質，於決標後通知\n得標廠商繳納，但應給予合理期限。查核金額以上之採購至少7日之期限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理未達公告金額之採購，其有準備招標文件供廠商領取者，該招標文\n件不必包括契約草案或條款。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理未達公告金額之採購，其有準備招標文件供廠商領取者，該招標文\n件應包括契約條款。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理採購，不論招標方式為何，悉應於招標文件中載明開標時間及地\n點。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關辦理未達公告金額之採購，招標文件得不載明開標時間及地點。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理公開招標之財物採購，採購數量為500個單位，採購金額為新\n臺幣50萬元，其於招標公告及招標文件載明：「機關保留增購採購數量之權\n利」。後續如機關擬依採購法第22條第1項第7款規定向原廠商辦理增購該數\n量，尚屬適法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"有一機關辦理公開招標之財物採購，採購數量為500個單位，採購金額為新\n臺幣50萬元，其於招標公告及招標文件載明：「機關保留增購採購數量10%\n之權利」。現機關擬依採購法第22條第1項第7款規定向原廠商辦理增購該數\n量，尚屬適法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"依採購法規定，履約保證金之繳納期限，由機關視案件性質，於決標後通知\n得標廠商繳納，但應給予合理期限。查核金額以上之採購至少14日之期限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關得於招標文件規定廠商之投標文件未檢附「願繳納差額保證金之切結\n書」即為不合格標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關於招標文件規定廠商之投標文件未檢附「願繳納差額保證金之切結書」\n為不合格標，係屬無效之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"招標機關於投標須知載明全份招標文件包含招標投標及契約文件，則決標後\n應由得標廠商製作及裝訂契約書。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"招標機關於投標須知載明全份招標文件包含招標投標及契約文件，決標後由\n機關製作及裝訂契約書。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關已於招標文件載明廠商應給付履約勞工之固定薪資者，不得於契約規定\n廠商於請領契約價金時應提出支付履約勞工薪資之證明。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關已於招標文件載明廠商應給付履約勞工之固定薪資者，得於契約規定廠\n商於請領契約價金時應提出支付履約勞工薪資之證明。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關製作招標文件，涉及履約勞工之勞動條件或權益部分，依契約辦理者，\n無須符合勞動法令相關規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"機關製作招標文件，涉及履約勞工之勞動條件或權益部分，須符合勞動法令\n相關規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"投標須知及招標文件製作","law_ref":null,"stem":"鼓勵企業加薪雖為政府之施政目標，惟機關不得於招標文件之評選（審）項\n目及評審標準，載明廠商企業社會責任指標及其配分。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購，下列何者正確？","options":["公告金額以上未達查核金額之財物採\n購，因緊急情事需決標時，經原底價核定人或其授權人員核准可超底價5％\n以內決標。","開標結果之最低報價廠商未進入底價，優先減價時填列「不\n再減價」時，不得再予最低報價廠商第1次比減價之機會。","比減價過\n程，比減價廠商有2家分別填列「願按底價承製」、「願按底價減新臺幣100\n元承製」，應宣布以「願按底價減新臺幣100元承製」之廠商決標。","以\n上皆非。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購，招標文件規定廠商之標價依規定之計算方式，有依投標標的\n之性能、耐用年限、保固期、能源使用效能或維修費用等之差異，就標價予\n以加價或減價以定標價之高低序位者，以加價或減價後之標價決定最低標\n者，係屬下列何種決標原則？","options":["最有利標。","參考最有利標精神。","最低標。","準用最有利標。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"有關底價單之保管，下列何者為非？","options":["開標前訂有底價者，主持開標人員\n及監辦開標人員應查察底價有無密封。","審標結果有廠商符合招標文件規\n定，而需進行比較廠商標價是否在底價以內之程序時，方開啟底價封。","開啟底價封後，查察實際核定之底價金額。","開啟底價封後未能當場決標\n者，會議主持人將底價單重行置入底價封即可，無需密封。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關以公開招標及最有利標方式辦理訂有底價之採購，最有利標廠商報價超\n過底價而須洽減時，以下何者敘述最正確？","options":["議價時洽減。","評選時洽\n減。","協商時洽減。","以上皆非。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["依採購法第22條第1項第9款評選2家以上優\n勝廠商，其與各該廠商議價之底價不一樣。","依採購法第49條採公開取得\n3家以上廠商之書面報價者，其底價應於開標前定之。","依採購法第22條\n第1項第9款與優勝廠商議價，訂定底價前應先參考該廠商之報價。","依採\n購法辦理公開招標，其採第56條評選最有利標者，得不訂定底價。"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["部分標價有對應之底價項目可供比較，該部\n分標價低於相同部分項目底價之80%者，得認定為部分標價偏低。","廠商\n之部分標價低於其他機關最近辦理相同採購決標價之70%者，得認定為部分\n標價偏低。","廠商之部分標價經評審或評選委員會認為偏低者，得認定為\n部分標價偏低。","廠商之部分標價低於可供參考之一般價格之70%者，得\n認定為部分標價偏低。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關辦理訂有底價之採購，關於底價之訂定，下列何者有誤？","options":["應參考圖\n說、規範、契約，並考量成本、市場行情及政府機關決標資料。","規劃、\n設計、需求或使用單位提出預估金額及其分析後由承辦採購單位簽報。","機關首長或其授權人員核定。","開標後可參考廠商標價更改底價。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"底價及價格分析中，下列何者正確？","options":["採最有利標之招標文件未訂明固定\n費用或費率，而由廠商於投標文件載明標價者，應規定廠商於投標文件內詳\n列報價內容，並納入評選。","未訂定底價之採購，除小額採購外，應成立\n評審委員會。","標價合理者，評審委員會得不提出建議之金額。","以上\n皆是。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"不訂底價之採購，其審查投標廠商之標價？","options":["不分金額均應成立評審委員\n會。","應成立評選委員會。","應成立稽核委員會。","除小額採購外，\n應成立評審委員會。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，除採最高標決標者外，下列何者有誤？","options":["底價得高於預算金\n額。","決標紀錄載明底價金額。","機關訂定底價，基於履約地差異，訂\n定不同之底價。","機關訂定底價，基於評分差異，訂定不同之底價。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依政府採購法，下列何者有誤？","options":["機關訂定底價，由需求單位提出預估金\n額及其分析後，由承辦採購單位簽報機關首長或其授權人員核定。","機關\n訂定底價，未達公告金額之採購，由承辦採購單位逕行簽報核定。","機關\n訂定底價，公告金額以上之重複性採購，由承辦採購單位逕行簽報核定。","機關訂定底價，一律由承辦採購單位簽報機關首長或其授權人員核定。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"選擇性招標底價之訂定應於何時定之？","options":["資格審查之開標前定之。","議\n價前定之。","資格審查後之下一階段開標前定之。","於比價前定之。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"以最有利標決標者，得將價格納入評選項目，下列何項次非屬評選價格之子\n項？","options":["品質。","價格組成之完整性。","折讓。","履約成本控制方\n式。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"適用最有利標標價之決定，得於評選時就廠商之報價內容，進行何程序？","options":["分析評分及比價。","分析評分及議價。","分析評分或評比。","議\n價或比價。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"總標價偏低之情形，何者錯誤？","options":["訂有底價之採購，廠商之總標價低於底\n價之85％者。","未訂底價之採購，廠商之總標價經評審或評選委員會認為\n偏低者。","未訂底價且未設置評審委員會或評選委員會之採購，廠商之總\n標價低於預算金額或預估需用金額之70％者。","訂有底價之採購，廠商之\n總標價低於底價之80％者。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"下列何者錯誤？","options":["評審委員會，機關得以採購法第94條成立之評選委員\n會代之。","最有利標決標者，以不訂底價為原則；其訂有底價，而廠商\n報價逾底價須減價者，於採行協商措施時洽減之。","查核金額以上之採\n購，最低標標價超過底價4％且未逾預算金額者，應先報經上級機關核准後\n決標。","評審委員會，其成員由機關首長或其授權人員就對於採購標的之\n「規格」具有專門知識之機關職員或公正人士派兼或聘兼之。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"下列何者正確？","options":["採總標價決標者，決標前僅就總標價之高低認定是否接\n受，不及於其所組成之單價。","機關訂定底價，不得訂定不同之底價。","招標文件得預先載明契約金額或相關費率作為決標條件。","超底價廢\n標後，重新招標時不得調整底價。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"下列何者錯誤？","options":["機關辦理減價或比減價格結果在底價以內時，除有採購\n法第58條總標價或部分標價偏低之情形者外，應即宣布決標。","最低合格\n標報價超過底價時，洽最低標廠商減價1次；減價結果仍超過底價時，由所\n有合於招標文件規定之投標廠商重新比減價格，比減價格不得逾3次。","最低標價仍超過底價8%者，報上級機關同意始可宣布決標。","機關訂定\n底價，得基於技術、品質、功能、履約地、商業條款、評分或使用效益等差\n異，訂定不同之底價。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"限制性招標之議價，訂定底價前？","options":["自行依據經驗辦理。","得先參考廠\n商之報價或估價單。","應先參考廠商之報價或估價單。","應先試洽廠商\n減價。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"限制性招標比價，底價之訂定時機為？","options":["辦理比價之開標前。","辦理比\n價前。","訂底價前應先參考廠商之報價或估價單。","以上皆是。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["未能減至機關所宣布之最低標優先減價結果\n者，機關不通知其參加下一次之比減價格。","未能減至機關所宣布之第1\n次比減價格之最低標價者，機關不通知其參加第2次之比減價格。","超底\n價決標者，決標紀錄記載超底價之金額、比率及必須決標之緊急情事。","查核金額以上之採購，上級機關派員監辦人員不得當場予以核准超底價決\n標。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["機關辦理減價或比減價格結果在底價以內\n時，除有採購法第58條總標價或部分標價偏低之情形者外，應即宣布決標。","廠商減價或比減價格結果在底價以內之情形，包括平底價之情形。","廠商標價與底價相同時仍應洽減價。","洽廠商減價時不得公開底價。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["訂有底價之採購，廠商之總標價低於底價\n80%者，得認定為總標價偏低。","未訂底價之採購，廠商之總標價經評審\n委員會認為偏低者，得認定為總標價偏低。","未訂底價且未設置評審委員\n會或評選委員會之採購，廠商之總標價低於預算金額之80%者，得認定為總\n標價偏低。","未訂底價且未設置評審委員會或評選委員會之採購，預算案\n尚未經立法程序者，廠商之總標價低於預估需用金額之70%者，得認定為總\n標價偏低。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["訂定底價確有困難之特殊或複雜案件得不訂\n底價。","以最有利標決標之採購得不訂底價。","小額採購得不訂底價。","不訂底價應報上級機關核准。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["選擇性招標之底價應於資格審查後之下一\n階段開標前定之。","公開招標採分段開標者，其底價至遲應於第2階段價\n格標開標前定之。","限制性招標之比價，其底價應於辦理比價之開標前定\n之。","限制性招標之議價，訂定底價前應先參考廠商之報價或估價單。"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關採準用最有利標辦理評選優勝廠商，下列何者為非？","options":["如採訂定底價\n者，底價得於開標前由採購評選委員會訂定之。","廠商標價合理者，可考\n慮照價訂底價，照價決標。","廠商之報價應納入評選考量。","如採訂定\n底價者，對於不同優勝序位之廠商，應訂定不同之底價。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"廢標後重行招標，有關底價之訂定，下列何者不適法？","options":["如原訂底價尚在\n保密之中，是否重訂底價，由機關首長或其授權人員決定。","如原訂底價\n尚在保密之中，是否重訂底價，由開標主持人決定。","如招標之圖說、規\n範、契約、成本、市場行情等有所改變，應重行訂定底價。","以上皆非。"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關辦理公開客觀評選優勝廠商，採不分段開標方式，有關廠商價格標之開\n啟時機，下列敘述何者正確？","options":["議價時開啟。","評選後議價前開啟。","召開評選會議時開啟。","依招標文件所定開標時間開啟。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"一般採購案（即無特殊情形者），其底價應於何時公開？","options":["開標後。","決標後。","廢標後。","流標後。"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"以下何者訂定底價前應參考廠商報價（新臺幣，下同）？","options":["300萬元工程\n採購之第2次公開招標。","500萬元工程採購之第1次公開招標。","200萬\n元財物採購之限制性招標洽原得標廠商後續擴充採購。","300萬元財物採\n購之第1次選擇性招標。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"下述有關底價之敘述，何者正確？","options":["公開招標採分段開標者，底價應於價\n格標開標前定之。","開標後發現底價訂定有誤，得重訂底價。","標價偏\n低情形，廠商表示願繳納差額保證金時，機關得告知廠商底價金額。","預\n先於招標文件公告底價。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"下列敘述何者正確？","options":["機關採未訂底價之最低標辦理採購且設有評審委員\n會者，應先審查合於招標文件規定之最低標價後，對標價合理者，評審委員\n會得不提出建議金額。","第1次公開招標未達3家流標後重新招標，底價\n不得重訂。","第1次公開招標超底價廢標後重新招標，重訂底價時不得調\n高。","查核金額以上之底價報上級機關核准。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關依「中央機關未達公告金額採購招標辦法」第2條第3項規定，於公告或\n招標文件中訂明開標時間地點，並於開標後當場審查，逕行辦理決標，下列\n敘述何者錯誤？","options":["第1次開標前，訂定底價時應先參考廠商之報價或估價\n單。","如已先簽准改採限制性招標之議價者，訂定底價時應先參考廠商之\n報價。","機關得選擇不刊登政府採購公報。","履約地點位於原住民族地\n區者，應符合原住民族工作權保障法之規定。"],"answer":0},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關辦理最低標決標案件，開標後最低標廠商之標價未進入底價，最低標廠\n商當場表示放棄優先減價，則該廠商得否參與後續比減價？","options":["不得。","得。","經其他廠商同意後仍得。","視為放棄。"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["訂定底價確有困難之特殊或複雜案件，得不\n訂底價。但應於招標文件內敘明理由及決標條件與原則。","最有利標決標\n之案件，可將履約期程之長短訂為評選項目。","適用最有利標決標之案\n件，評分最高之廠商有優先減價之權利。","不訂底價以最有利標決標之採\n購，得規定廠商於投標文件內詳列報價內容。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"下列敘述何者錯誤？","options":["採單價決標者，依預估採購所需金額認定採購金\n額。","預計金額小於或等於預算金額。","預計金額為該採購之預估決標\n金額，其性質類似底價，應由機關首長或其授權人員核定後公告。","預算\n案尚未經立法程序，亦得附條件先行辦理招標。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"未訂底價之採購，評審委員會所提出建議之金額，下列敘述何者正確？","options":["屬開標前訂定建議之金額。","標價合理者，評審委員會得不提出建議之金\n額。","審查資格後由評審委員會提出建議之金額。","機關有緊急需求\n時，得超建議之金額決標。"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["不是所有工程都須於決標日起30日內依規定\n格式傳輸至工程價格資料庫。","採購法第11條第2項所稱一定金額，為新\n臺幣1,000萬元。","工程價格資料庫係供各機關採購預算編列及底價訂定\n之參考。","工程價格資料庫，除應秘密之部分外，得有償提供廠商。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關依採購法第11條第2項規定傳輸之資料，下列何者有誤？","options":["其屬統包\n者，為得標廠商完成細部設計後，經機關核定之單價。","其內容包括得標\n廠商之契約單價及經機關核定之預算單價。","機關應於決標日起20日內，\n將資料製作成公共工程電腦估價系統格式電子檔，並透過政府電子採購網站\n傳輸至工程價格資料庫。","傳輸資料應依主管機關訂定之「公共工程施工\n綱要規範細目碼編訂原則」編訂。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"下列何者錯誤？","

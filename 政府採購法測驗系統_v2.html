ons":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"底價新臺幣（下同）700萬元，合於招標文件規定之最低標乙廠商總標價為\n470萬元，乙廠商於主持決標人員宣布決標前，當場說明標價計算錯誤，希\n能不決標予乙，主持決標人員認為其計算錯誤確有降低品質之虞，予以同\n意，但其押標金不予發還。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"底價新臺幣（下同）700萬元，合於招標文件規定之最低標乙廠商總標價為\n470萬元，乙廠商於主持決標人員宣布決標前，當場說明標價計算錯誤，希\n能不決標予乙，主持決標人員認為其計算錯誤確有降低品質之虞，予以同\n意，並退還其押標金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"個案採購涉及國家安全，機關於招標文件載明不允許在臺陸資廠商參與投\n標，屬不當限制投標廠商資格情形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"個案採購涉及國家安全，機關於招標文件載明不允許在臺陸資廠商參與，其\n依據為投標廠商資格與特殊或巨額採購認定標準第4條第1項第6款規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，於簽約時發現得標廠商於該案決標後簽約前被列為採購法\n第103條第1項不得參加投標或作為決標對象之情形，則依規定應予以撤銷決\n標、終止契約或解除契約，並得追償損失。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採購採訂有底價最低標決標原則，於最低合格標超底價者，機關辦理減\n價或比減價格結果在底價以內時，除有採購法第58條總標價或部分標價偏低\n之情形者外，應即宣布決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公營事業為嘉惠員工成立職工福利委員會，每年提撥福利金，作為員工福利\n活動之用，該委員會向保險公司投保團體保險時，除有採購法第4條或第5條\n情形者外，無採購法之適用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購依採購法第53條規定，通知廠商減價、比減價格，廠商未依通\n知期限辦理而視同放棄者，機關尚不得據此為不發還押標金之理由。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公開招標採不分段開標之採購，得於所定開標時間到達前先打開投\n標廠商標封審查其資格與規格，以減省開標時間。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公開招標採不分段開標之採購，不得以減省開標時間為由，於所定\n開標時間到達前先打開投標廠商標封審查其資格與規格。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理已立法保護之智慧財產權之公告金額以上之採購，不論其有無其他\n合適之替代標的者，均得採限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理已立法保護之智慧財產權之公告金額以上之採購，如有其他合適之\n替代標的者，尚難採限制性招標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商以其簽發之銀行支票繳納押標金，機關得予接受。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商以其簽發之銀行支票繳納押標金，機關不得接受。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購契約或招標文件標示主要工作項目，得標廠商可將該部分交由其他\n廠商辦理，其所訂合約送招標機關核備即可。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購契約或招標文件標示主要工作項目，得標廠商不可將該部分交由其\n他廠商辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關公開徵選廠商承辦專業服務之評選，其招標文件訂有廠商資格者，應先\n審查資格文件，資格不合於招標文件之規定者，仍得參加評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關公開徵選廠商承辦專業服務之評選，其招標文件訂有廠商資格，應先審\n查資格文件，資格不合於招標文件之規定者，不得參加評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"某國小採購營養午餐所需所有食品，不適用政府採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購法第67條明定得標廠商得將採購分包予其他廠商，因此採購契約約定廠\n商擬分包之項目及分包廠商，應送機關審查，違反上開規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購契約得約定廠商擬分包之項目及分包廠商，應送機關審查。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"某國小採購營養午餐所需生鮮農漁產品之食材，不適用政府採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"當合於招標文件規定之投標廠商僅有1家時，廠商標價超過底價，經洽減結\n果，廠商書面表示減至底價，或照底價再減若干數額者，機關得不予接受。\n比減價格時，僅餘1家廠商書面表示減價者，亦同。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"當合於招標文件規定之投標廠商僅有1家時，廠商標價超過底價，經洽減結\n果，廠商書面表示減至底價，或照底價再減若干數額者，機關應予接受。比\n減價格時，僅餘1家廠商書面表示減價者，亦同。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第58條規定，最低標之總標價低於底價之百分之八十，機關認為該\n總標價無顯不合理，降低品質、不能誠信履約之虞或其他特殊情形，惟該最\n低標主動表示標價錯誤，要求不決標予該最低標，機關即逕行決標予次低\n標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第58條規定，最低標之總標價低於底價之百分之八十，機關認為該\n總標價無顯不合理，降低品質、不能誠信履約之虞或其他特殊情形，該最低\n標雖主動表示標價錯誤，要求不決標予該最低標，機關無需通知最低標提出\n說明及差額保證金，仍得辦理決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法施行細則第64條之2辦理採購，有關訂定審查基準及成立審查\n委員會，不適用最有利標評選辦法及採購評選委員會之相關規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法施行細則第64條之2辦理採購，有關訂定審查基準及成立審查\n委員會，準用最有利標評選辦法及採購評選委員會之相關規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購採分項複數決標，總預算金額為新臺幣（下同）6,000萬元，但個\n別項目之預算金額未達2,000萬元，仍適用巨額採購有關廠商資格之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購採分項複數決標，總預算金額為新臺幣（下同）6,000萬元，但個\n別項目之預算金額未達2,000萬元，不適用巨額採購有關廠商資格之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公開招標，計有3家廠商參加投標，經資格規格審查後，合於招標\n文件規定之投標廠商僅有1家，因報價超底價，開標主持人不得通知該廠商\n其減價次數限制為6次。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公開招標，計有3家廠商參加投標，經資格規格審查後，合於招標\n文件規定之投標廠商僅有1家，因報價超底價，開標主持人通知該廠商其減\n價次數限制為6次。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公開招標於廢標或流標後，依原招標文件重行招標者，應有3家以上合格廠\n商投標，始可開標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公開招標於廢標或流標後，依原招標文件重行招標者，有1家以上合格廠商\n投標，即可開標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第53條規定，合於招標文件規定之投標廠商之最低標價超過底價\n時，得洽該最低標廠商減價1次；減價結果仍超過底價時，得由所有合於招\n標文件規定之投標廠商重新比減價格，比減價格不得逾3次。採限制性招標\n之議價，其減價次數亦同。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第53條規定，合於招標文件規定之投標廠商之最低標價超過底價\n時，得洽該最低標廠商減價1次；減價結果仍超過底價時，得由所有合於招\n標文件規定之投標廠商重新比減價格，比減價格不得逾3次。採限制性招標\n之議價，其減價次數由招標機關決定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"未達公告金額之採購，得基於採購標的特性通案簽請機關首長或其授權人員\n核准以限制性招標之方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"未達公告金額之採購，不得基於採購標的特性相近，採通案簽請機關首長或\n其授權人員核准以限制性招標之方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理招標，於招標文件已訂明採固定服務費用或費率決標者，如廠商自\n願降價或降低費率，因與招標文件所定內容不一致，機關應不予接受，並依\n照原定固定費用或費率決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理招標，於招標文件已訂明採固定服務費用或費率決標者，如廠商自\n願降價或降低費率，機關應予接受。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理巨額採購，採最低標決標原則，其優先減價及比減結果最低標價仍\n超過底價而不逾預算數額，機關確有緊急情事需決標時，經機關原底價核定\n人或其授權人員核准，得於不逾底價百分之八以內超底價決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理巨額採購，採最低標決標原則，其優先減價及比減結果最低標價仍\n超過底價而不逾預算數額，機關確有緊急情事需決標時，經機關原底價核定\n人或其授權人員核准，得於不逾底價百分之四以內超底價決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第53條第1項辦理減價及比減價格，其中最低標廠商於優先減\n價時，書面表示照底價承做，則機關得予接受。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第53條第1項辦理減價及比減價格，其中最低標廠商於優先減\n價時，書面表示照底價承做，機關不得接受。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，開標結果由2家廠商進行比減價格程序，第1次減價時甲廠商\n於標單上書明放棄減價，乙廠商之標單則書明願減至底價，招標機關得決標\n給乙廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，開標結果由2家廠商進行比減價格程序，第1次減價時甲廠商\n於標單上書明放棄減價，乙廠商之標單則書明願減至底價，招標機關應宣布\n乙廠商該次減價無效，進行第2次比減價格程序。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採最有利標決標之案件，評定最有利標後，得以議價方式洽廠商減價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採準用最有利標決標之案件，於評選出優勝序位後，以議價方式洽廠商\n減價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商之標價幣別，依招標文件規定在2種以上者，由機關擇其中1種或以\n新臺幣折算總價，以定標序及計算是否超過底價。該折算總價，依辦理開標\n前一辦公日臺灣銀行外匯交易收盤即期賣出匯率折算之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商之標價幣別，依招標文件規定在2種以上者，由機關擇其中1種或以\n新臺幣折算總價，以定標序及計算是否超過底價。該折算總價，依辦理決標\n前一辦公日臺灣銀行外匯交易收盤即期賣出匯率折算之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採服務成本加公費法者，應於契約訂明廠商應記錄各項費用並提出憑\n證，但契約不得訂明憑證須為正本。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採服務成本加公費法者，應於契約訂明廠商應記錄各項費用並提出憑\n證，契約並得訂明憑證須為正本。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關考量標的特性及實際需要，於招標文件明定「營利事業登記證」為投標\n廠商資格之一，符合「投標廠商資格與特殊或巨額採購認定標準」之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購案如於使用期間有由原供應廠商提供維護服務之必要者，宜考\n量採購全生命周期概念，將其維護項目納入採購標的合併招標決標，避免得\n標廠商藉後續維護，以不合理之報價迫使機關接受，獲取不當利益之機會。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第50條第2項規定撤銷決標後，原係依採購第22條第1項第9款\n至第11款規定辦理者，其評選為優勝廠商或經勘選認定適合需要者有二家以\n上，得依序遞補辦理議價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關不得意圖規避採購法之適用，無論如何，不得分批辦理公告金額以上之\n採購。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"專業服務、技術服務、資訊服務、社會福利服務及設計競賽之評選作業，均\n採準用最有利標評選優勝廠商的程序。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理一契約價金為新臺幣（下同）1,200萬元之財物採購，於履約期間\n發現須增購原契約已有之A項目150萬元，並減購原契約已有之B項目150萬\n元，屬「採購契約變更或加減價核准監辦備查規定一覽表」項次五所稱「未\n達查核金額之採購，不涉及契約價金之契約變更」之情形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商投標文件，招標文件允許使用外文。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購之查核金額為新臺幣5,000萬元。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，其預計金額得大於預算金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關考量標的特性及其實際需要，得依「投標廠商資格與特殊或巨額採購認\n定標準」第3條第1項第1款規定擇「工廠登記證明文件」為投標廠商基本資\n格之一，不以工廠管理輔導法規定必須登記者為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關利用共同供應契約採購55張辦公椅，合計新臺幣（下同）27萬5千元，\n因契約載明可附加訂購相關配備，故機關一併附加採購8萬元椅墊。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"底價新臺幣（下同）800萬元，合於招標文件規定之最低標甲廠商總標價為\n650萬元，甲廠商於主持決標人員宣布決標前，當場說明標價計算錯誤，希\n望不決標予甲，機關依採購法第58條規定決定不決標予甲，並以次低標為最\n低標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採選擇性招標建立經常性採購合格廠商名單後，如有其他廠商提出資格\n審查之請求，得予拒絕。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採選擇性招標建立經常性採購合格廠商名單後，如有其他廠商提出資格\n審查之請求，不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"履約期間逾1年之勞務採購，不論其工作內容是否重複，以履約期間之全部\n預算金額訂定資格條件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"履約期間逾1年之勞務採購，其以提供勞力為主，且工作內容重複者，以第1\n年之預算金額訂定資格條件。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託研究係指委託科技、技術引進、行政或學術研究發展計畫，屬政府採購\n法所稱之「勞務採購」，如無特殊需要，得免收押標金，但不得免收保證\n金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託研究係指委託科技、技術引進、行政或學術研究發展計畫，屬政府採購\n法所稱之「勞務採購」，如無特殊需要，得免收押標金、保證金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關於政府電子採購網之電子化採購機制，與得標廠商採電子簽章方式簽訂\n之政府採購電子契約，毋需繳納印花稅。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關於政府電子採購網之電子化採購機制，與得標廠商採電子簽章方式簽訂\n之政府採購電子契約，應依印花稅法規定繳納印花稅。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第58條規定，最低標（報價為底價75%）於機關通知期限內提出說\n明，機關認為該說明尚非完全合理，通知其於5日內提出差額保證金，廠商\n未依限提出差額保證金，機關應依招標文件規定不予發還押標金。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第58條規定，最低標（報價為底價75%）於機關通知期限內提出說\n明，機關認為該說明尚非完全合理，通知其於5日內提出差額保證金，廠商\n未依限提出差額保證金，不決標予該廠商，其有押標金者，發還之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購依採購法第53條規定，通知廠商減價、比減價格，廠商未依通\n知期限辦理而視同放棄者，其押標金應不予發還。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託公立學校辦理研究案，不適用政府採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託公立學校辦理研究案，適用政府採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第52條第1項第4款採用複數決標並以項目分別決標之採購，廠商得\n依其所投標之項目分別或合併繳納押標金。其屬合併者，應為所投標項目應\n繳押標金之和。前項合併繳納押標金者，應依所投標之項目分別發還之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第52條第1項第4款採用複數決標並以項目分別決標之採購，廠商得\n依其所投標之項目分別或合併繳納押標金。其屬合併者，應為所投標項目應\n繳押標金之和。前項合併繳納押標金者，得依所投標之項目分別發還之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公告金額以上專業服務依政府採購法第22條第1項第9款規定辦理者，其評選\n結果應通知廠商，但對於未獲選者無需敘明原因。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公告金額以上專業服務依政府採購法第22條第1項第9款規定辦理者，其評選\n結果應通知廠商，對於未獲選者應敘明原因。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購評選委員會評選優勝廠商以1家為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購評選委員會評選優勝廠商，尚不以1家為限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理公開程序之採購，如於「投標廠商聲明書」要求廠商聲明其是否屬\n公職人員利益衝突迴避法第2條所稱公職人員及第3條所規範之關係人，機關\n於履約過程始發現廠商之聲明與事實不符，機關下列處理方式何者正確？","options":["依採購法第31條規定追繳該廠商押標金。","依採購法第101條第1項規\n定通知該廠商將刊登政府採購公報。","通知公職人員利益衝突迴避法主管\n機關法務部。","減價收受。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列何者為採購人員得為之行為？","options":["於機關任職期間同時為廠商所僱用。","要求廠商提供與採購無關之服務。","主動參與公開舉行且邀請一般人\n參加之餐會。","為免有礙業務執行，於交通不便地區使用廠商提供之交通\n工具。"],"answer":3},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"依採購人員倫理準則規定，採購人員接受價值逾新台幣500元，退還有困難\n時，於獲贈或知悉起7日內作何處理？","options":["付費收受。","歸公。","轉贈\n慈善機構。","以上皆是。"],"answer":3},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列何者非採購人員應遵循者？","options":["努力發現真實，對機關及廠商之權利均\n應注意維護。","基於公共利益、採購效益或專業判斷之考量，為適當之採\n購決定。","依據法令，本於良知，公正執行職務，必要時，得接受請託或\n關說。","不接受與職務或利益有關廠商之餽贈或招待。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"機關採購專業人員於下列何種情形，喪失其採購專業人員資格？","options":["辭職後\n5年內回任機關採購職務。","調任其他機關辦理採購。","辦理採購業務\n違反法令情節重大而受申誡懲戒處分者。","以上皆非。"],"answer":3},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列有關採購評選委員會委員之規定，下列何者為非？","options":["委員對於所知悉\n之招標資訊，應予保密。","委員應公正執行職務，不為及不受任何請託或\n關說。","委員如因不可抗力因素無法出席評選會議，得在機關同意下委由\n代理人出席。","委員不得有採購人員倫理準則第7條規定之行為。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列何者屬採購人員倫理準則第2條所稱採購人員？","options":["辦理開標之人員。","訂定招標文件之人員。","處理履約爭議之人員。","以上皆是。"],"answer":3},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"以下何者有誤？","options":["發現採購人員有違反法令之情形，其主管知情不予處置\n者，應視情節輕重，依法懲處。","驗收時，因交通不便，而使用廠商提供\n之交通工具及便當，但付費予廠商。","辦理新臺幣15萬元以下之採購，未\n通知主（會）計及有關單位人員辦理監辦。","為符合社會禮儀或習俗，不\n依法令規定辦理採購。"],"answer":3},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列敘述何者正確？","options":["採購人員只要接受新臺幣500元以下之饋贈或招\n待，尚屬合宜。","機關首長非依法規兼任某財團法人之董事，如係依政府\n採購法以公告程序辦理之採購，該財團法人可以參與該機關首長所任職機關\n之採購。","機關首長尚非採購人員倫理準則所稱採購人員。","採購人員\n如有違反法令情形，依採購法第7章罰則論處。"],"answer":1},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列敘述何者正確？","options":["機關預算遭挪用致無款項及時支付廠商之情形，非\n屬採購人員倫理準則適用範圍。","接受機關委託之專案管理廠商之人員，\n辦理契約所定事項，因其非屬機關人員，爰非屬採購人員倫理準則規範範\n圍。",")負責政府採購案驗收人員與主辦人員如係夫妻關係，應予迴避。","以上皆非。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列採購人員之行為，何者無違反採購人員倫理準則之虞？","options":["於機關場\n所張貼旅行社廣告海報。","為提昇採購品質，對於未得標廠商之企劃書內\n容，提供予得標廠商參考。","因政策變更，於等標期間取消採購。","公\n開招標採分段開標，於開價格標前訂定底價。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員接受與職務或利益有關廠商之廣告物價值逾500元，退還有困難\n者，得於幾日內付費收受、歸公或轉贈慈善機構？","options":["3日。","5日。","7日。","10日。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"下列何者正確不違採購法令？","options":["於機關辦公室懸掛廠商廣告物。","採\n購人員要求得標廠商僱用採購人員親友。","採購人員下班後由得標廠商僱\n用。","採購人員不得從事足以影響採購人員尊嚴之活動。"],"answer":3},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"在非主動求取且係偶發之情形下，採購人員不接受與職務或利益有關廠商之\n餽贈或招待，反不符合社會禮儀或習俗者，得予接受。但下列何者為非可接\n受之範圍?","options":["價值在新臺幣500元以下之饋贈或飲食招待。","利用廠商免\n費提供場所辦理機關餐會活動。","基於家庭或私人情誼所為者。","公開\n舉行且邀請一般人參加之餐會。"],"answer":1},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"與職務或利益有關廠商餽贈之禮物，其價值在新臺幣多少元以下，如不接受\n反不符合社會禮儀或習俗者，得予接受？","options":["300元。","500元。","1000\n元。","2000元。"],"answer":1},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"依採購人員倫理準則規定，下列何者為採購人員應有之行為？","options":["努力發現\n真實，對機關及廠商之權利均注意維護。","公開招標之第3次招標仍僅2家\n投標不予開標。","重視廠商請託或關說。","參與廠商舉行且邀請多人參\n加之餐會。"],"answer":0},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"A為甲建築師事務所負責人，於99年7月1日自乙市政府建設處（市政府之內\n部單位）建築工程科離職，嗣後乙市政府於99年12月25日升格為乙直轄市政\n府，在A離職未滿3年，依採購法第15條第1項規定，甲建築師事務所得參與\n下列何機關之採購？","options":["原乙市政府建設處改制之乙直轄市政府建設局。","乙直轄市政府所屬公立學校。","升格為直轄市後之乙直轄市政府。","以上皆非。"],"answer":1},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"甲廠商之負責人為A機關首長之表弟，下列敘述何者正確？","options":["甲廠商不得\n參與A機關採購案之投標。","甲廠商得參與A機關採購案之投標，惟A機關\n首長應迴避。","甲廠商得參與A機關採購案之投標，且A機關首長無須迴\n避。","甲廠商不得為A機關採購案之分包廠商。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"某甲於102年1月至107年12月任職於A機關，於108年1月至109年12月任職於\nB機關，110年1月迄今任職於C民間企業，以下何者為是？","options":["某甲於110年3\n月得代理廠商向A機關接洽其於105年8月於A機關所任職務有關之事務。","某甲於111年3月皆不得代理廠商向A或B機關接洽任何其於A或B機關所任職務\n有關之事務。","某甲於111年3月得代理廠商向A機關接洽其於107年8月於A\n機關所任職務有關之事務。","以上皆非。"],"answer":2},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"原於新任首長就職前已得標廠商之負責人為新任首長胞兄，於其胞弟就職\n後，以下敘述何者正確？","options":["機關應補具相關文件報主管機關核定免除迴避\n規定之適用。","撤銷該廠商之得標資格。","機關應補具相關文件報上級\n機關備查。","機關於後續履約管理及驗收等採購事項執行時，新任首長應\n予迴避。"],"answer":3},{"type":"choice","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購，如於「投標廠商聲明書」要求廠商聲明其是否屬公職人員利\n益衝突迴避法第2條所稱公職人員及第3條所規範之關係人，遇有公職人員或\n關係人參與該公職人員服務機關或受其監督機關之採購，且該採購非屬公\n職人員利益衝突迴避法第14條第1項但書所定情形者，下列處理方式何者為\n誤？","options":["開標前發現者，依採購法第50條第1項第1款規定，該廠商所投之標\n不予開標。","開標後發現者，依採購法第50條第1項第1款規定，不決標予\n該廠商。","決標予該廠商後發現者，依採購法第50條第2項規定撤銷決標\n解除契約，並得追償損失。","決標予該廠商後發現者，報公職人員利益衝\n突迴避法之主管機關核定後免撤銷決標。"],"answer":3},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"廠商因公務目的於正當場所開會並附餐飲，邀請機關派員參加時，採購人員\n不接受與職務有關之招待，反有礙業務執行者，仍得予接受。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員有違反採購法之行為，其長官知情而不依法處置者，應一併受懲\n處。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員辦理採購受記過處分者，與操守無關，係偶發情形，且可改善者，\n經機關首長或其授權人員核准者，得免喪失採購專業人員資格。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員得利用共同供應契約採購其私人所需物品。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員違反採購人員倫理準則之規定，無論情節大小，機關於作成適當處\n置前，應先將其調離與採購有關之職務。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購法第15條第1項規定離職後之就業規範，僅適用機關承辦、監辦採購人\n員，該等人員之主管非所稱承辦、監辦採購人員，爰不適用其規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購評選委員對於受評廠商之投標文件內容及資料，除供公務上使用或法令\n另有規定外，評選前應保守秘密。決標後經機關許可，始得作為學術研究等\n用途。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某部政務次長兼任○○社團法人董事，該法人仍可參與該部之採購，且該政\n務次長無需迴避。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"業務部門人員僅偶而擬訂採購規範，因其非屬專責採購單位人員，故不適用\n採購人員倫理準則之規範。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理公開程序之採購，廠商於投標廠商聲明書聲明：「本廠商就本採購\n案，係屬公職人員利益衝突迴避法第2條及第3條所稱公職人員或其關係人」\n者，機關得決標予該廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理公開程序之採購，廠商於投標廠商聲明書聲明：「本廠商就本採購\n案，係屬公職人員利益衝突迴避法第2條及第3條所稱公職人員或其關係人」\n者，機關不得決標予該廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員利用職務關係對廠商要求餽贈價值新臺幣200元之紀念品仍在採購\n人員倫理準則可允許之範圍內。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購作業，如遇請託、關說情形，配合「聯合國反貪腐公約國際審\n查各機關落實結論性意見」以書面或口頭方式向法務部廉政署或政風單位陳\n報。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購之承辦人員與廠商之負責人為夫妻關係，如承辦人未依採購法\n第15條第2項規定迴避，該廠商亦為得標廠商時，機關尚難據此為取消其得\n標資格之依據。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某鄉公所建設課辦理該鄉道路修護工程之發包，A營造廠之負責人係該建設\n課主管之二親等親屬，A營造廠參與該工程採購之投標，該建設課主管依採\n購法第15條第2項規定應行迴避。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某鄉公所建設課以公告程序辦理該鄉道路修護工程之發包，A營造廠之負責\n人係該建設課課長之哥哥，依採購法第15條第2項規定，A營造廠不得參加該\n工程採購之投標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關未依規定處置違反採購人員倫理準則之採購人員或處置不當者，其上級\n機關得通知主管機關另為適當之處置。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關未依規定處置違反採購人員倫理準則之採購人員或處置不當者，主管機\n關得通知其上級機關另為適當之處置。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關採購主管於91年6月30日退休後，擔任A公司代表人，該公司於同年12\n月參加該代表人原任職機關辦理採購案之投標，該代表人未出席開標，未違\n反採購法第15條第1項之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關採購主管於91年6月30日退休後，擔任A公司代表人，該公司於同年12\n月參加該代表人原任職機關辦理採購案之投標，違反採購法第15條第1項之\n規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"於招標前，若有人不循法定程序，對預定辦理之採購事項，提出請求（例如\n對廠商資格、技術規範之訂定有所請求），因尚未招標，故不屬採購法第16\n條規定「請託或關說」之範圍。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"於招標前，若有人不循法定程序，對預定辦理之採購事項，提出請求（例如\n對廠商資格、技術規範之訂定有所請求），屬採購法第16條規定「請託或關\n說」之範圍。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員倫理準則所稱採購人員，指取得採購專業人員基本資格或進階資格\n者。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"投標廠商計畫書所列協同主持人為招標機關首長之配偶，不適用採購法第15\n條第2項規定，該首長無須迴避。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"投標廠商計畫書所列協同主持人為招標機關首長之配偶，適用採購法第15條\n第2項規定，該首長應行迴避。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關發現採購人員有違反政府採購法令情事，且情節重大時，於給予申辯機\n會後，始得將其調離與採購有關之職務。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關發現採購人員有違反政府採購法令情事，且情節重大時，無需給予申辯\n機會，即得先將其調離與採購有關之職務。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"依採購法第15條第1項規定所稱承辦採購人員，包括處理訂定招標文件、招\n標、決標、訂約、履約管理及驗收之人員；不包括處理爭議處理之人員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"依採購法第15條第1項規定所稱承辦採購人員，包括處理訂定招標文件、招\n標、決標、訂約、履約管理、驗收及爭議處理之人員。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員倫理準則所稱採購人員，指機關辦理採購法採購事項之人員均屬\n之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"業務單位承辦人員並無參加開標，雖有規劃訂定招標文件，仍不適用採購人\n員倫理準則。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"建築師接受機關委託執行建築工程規劃設計及監造業務時，因非機關之採購\n人員，故不適用採購人員倫理準則之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"建築師接受機關委託執行建築工程規劃設計及監造業務時，準用採購人員倫\n理準則之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購，如自行發現招標文件之規定或作業程序違反政府採購法令規\n定，但因無廠商異議，故不必改正後再辦。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購，於自行發現招標文件之規定或作業程序違反政府採購法令規\n定者，除有為因應緊急情況或公共利益之必要者外，應予改正後再辦。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員如有違反法令規定情形，依個案情形，將可能負擔行政責任及刑事\n責任，惟尚不致構成民事責任。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員如有違反法令規定情形，依個案情形，將可能負擔行政責任、刑事\n責任及民事責任。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"業務單位承辦人員並無參加開標，但有規劃訂定招標文件，仍適用採購人員\n倫理準則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"依採購法第15條第1項規定，承辦、監辦採購人員離職後擔任廠商之負責\n人，該廠商於該人員離職後5年內不得參與其原任職機關採購之投標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"依採購法第15條第1項規定，承辦、監辦採購人員離職後擔任廠商之負責\n人，該廠商於該人員離職後3年內不得參與其原任職機關採購之投標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購法第15條第1項所稱「承辦採購人員」，包括機關首長亦為適用對象。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關資訊規劃處辦理資訊委外建置標案，某公司負責人為該機關綜合企劃\n處處長退休未滿3年，該公司不得參與該採購案；惟如該退休處長非廠商負\n責人，僅為投標廠商之計畫團隊成員之一，尚不違反採購法第15條第1項規\n定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關副首長負責督導機關之採購業務，並兼任○○財團法人董事，該法人\n參與該機關之採購，該副首長不適用採購法第15條第2項規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關副首長負責督導機關之採購業務，並兼任○○財團法人董事，該法人\n參與該機關之採購，該副首長適用採購法第15條第2項規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"C君原係機關採購單位主管，離職後3年內任職某基金會，該基金會將C君列\n為工作團隊成員，並代表該基金會參與其原任職機關之投標，未違反採購法\n第15條第1項規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"C君原係機關採購單位主管，離職後3年內任職某基金會，該基金會將C君列\n為工作團隊成員，並代表該基金會參與其原任職機關之投標，違反採購法第\n15條第1項規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"依公務員服務法規定，承辦、監辦採購人員離職後第5年如擔任與其離職前\n職務直接相關之營利事業董事、監察人、經理、執行業務之股東或顧問，可\n能涉及罰金及徒刑之處分。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"依公務員服務法規定，承辦、監辦採購人員離職後3年內如擔任與其離職前5\n年內之職務直接相關之營利事業董事、監察人、經理、執行業務之股東或顧\n問，可能有罰金及徒刑之處分。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關首長二親等以內之親屬A員任職於廠商，但非廠商負責人，該廠商命A\n員參與該採購事項，機關首長不適用採購法第15條第2項迴避之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關首長二親等以內之親屬A員任職於廠商，但非廠商負責人，該廠商命A\n員參與該採購事項，機關首長適用採購法第15條第2項規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關公務員因執行職務知有犯罪嫌疑者，非屬機關權責，可不予理會。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關公務員因執行職務知有犯罪嫌疑者，應依刑事訴訟法第241條規定告\n發。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購經檢討屬技術服務廠商人員規劃設計錯誤、監造不實或管理不\n善者，僅依契約約定追究其責任即可，涉及承辦建築師、技師或技術顧問公\n司之責任，無需依建築師法、技師法或工程技術顧問公司管理條例之規定，\n提報主管機關予以懲戒，以符合一罪不二罰原則。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購如經檢討屬技術服務廠商人員規劃設計錯誤、監造不實或管理\n不善者，除依契約約定追究其責任外，如涉及承辦建築師或技師之責任者，\n應依建築師法、技師法規定提報該法主管機關予以懲戒。涉及技術顧問公司\n之責任者，另依工程技術顧問公司管理條例之規定處理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關採購主管於108年2月底離職後，擔任B公司之負責人，B公司於110年3\n月參加該機關辦理之採購，並未違反採購法第15條第1項規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"某機關採購主管於107年2月底離職後，擔任B公司之負責人，B公司於110年3\n月參加該機關辦理之採購，並未違反採購法第15條第1項規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員為社會禮儀，逢年過節得接受與職務或利益有關廠商之價值新臺幣\n500元之餽贈。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員不接受與職務或利益有關廠商之價值新臺幣200元之餽贈，反不符\n合社會禮儀或習俗者，得予接受，但以非主動求取，且係偶發之情形為限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購，發生無預算即先決標，或預算遭挪用致無款項及時支付廠商\n之情形，係為考量加速採購效率，尚屬可行。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"機關辦理採購，如發生無預算即先決標，或預算遭挪用致無款項及時支付廠\n商之情形，應依「採購人員倫理準則」第12條第1項處置相關人員。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"公職人員利益衝突迴避法第14條規定，公職人員或其關係人，不得與公職人\n員服務之機關團體為補助、買賣、租賃、承攬或其他具有對價之交易行為。\n但受機關監督者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"公職人員利益衝突迴避法第14條規定，公職人員或其關係人，不得與公職人\n員服務或受其監督之機關團體為補助、買賣、租賃、承攬或其他具有對價之\n交易行為。但符合該條第1項各款但書之情形者，不在此限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"採購人員有違反採購人員倫理準則之情事者，機關得依公務員服務法、公務\n員懲戒法、公務人員考績法及其他相關規定處置。其觸犯刑事法令者，應移\n送司法機關處理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"依採購人員倫理準則第8條規定，不接受與職務或利益有關廠商價值在新臺\n幣600元以下之廣告物、促銷品、紀念品、禮物、折扣或服務，反不符合社\n會禮儀或習俗者，得予接受。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"道德規範及違法處置","law_ref":null,"stem":"C君原係機關採購單位主管，離職後任職某基金會，該基金會將C君列為工作\n團隊成員，於離職後3年內參與其原任職機關之投標，違反政府採購法第15\n條第1項規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["採最有利標決標，於評定出最有\n利標後，應再洽廠商減價。","訂有底價之採購，廠商報價金額與底價相同\n時，機關得要求廠商再減價。","公開開標之案件，機關得於招標文件中限\n制有權參加開標之每一投標廠商人數。","公開客觀評選優勝廠商，其與優\n勝廠商議價之次數不得超過3次。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["機關於招標文件規定廠商投標時須\n檢附之營業稅納稅證明，依採購法令規定廠商不及提出最近一期證明者，得\n以前一期之納稅證明代之。","機關於招標文件中規定廠商投標時，限使\n用機關所提供之標封否則投標無效，尚無不可。","依採購法規定，機關發\n給、發售或郵遞招標文件時，不得登記領標廠商之名稱。但詢問領標廠商名\n稱或索取名片尚無不可。","採公開招標分段開標者，得僅就資格投標。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者正確？","options":["依採購法規定，機關得於招標文件規定廠商應於投\n標標封封口蓋騎縫章及投標文件應逐頁蓋章，否則為無效標。","依「投標\n廠商資格與特殊或巨額採購認定標準」規定，機關得就投標廠商資格條件，\n於招標文件規定廠商投標時須檢附經股東會通過同意該廠商參與本採購案投\n標之會議紀錄。","依採購法規定，機關不得於招標文件或招標公告規定廠\n商僅能親自領取招標文件而不得採郵遞方式領取。","依採購法規定，僅就\n資格、規格合併投標者，以選擇性招標為限。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["有一新臺幣85萬元古蹟構造物之修\n建採購，該採購案於招標文件中不得訂定特定資格。","機關辦理採購，使\n用主管機關制定之招標投標簽約三用文件，於決標後毋須通知廠商至機關\n簽約。","評定最有利標，如將廠商簡報列為評選項目者，其配分不得逾\n10%。","廠商以釘書針裝訂投標標封，非屬書面密封，機關應不予接受。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列何者正確？","options":["規定廠商代表於開標當時必須攜帶與投\n標文件所用相同之印鑑，否則無權出席。","招標文件對親自及郵遞領取訂\n定不同之截止期限。","廠商信用證明限公告日後所取得者。","開標後不\n公開審標。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"採購法限制性招標之敘述，下列何者錯誤？","options":["僅適用於公告金額以上之採\n購。","無須報上級機關核准。","包括採公開評選優勝廠商之情形。","得以比價方式辦理者，優先以比價方式辦理。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關依採購法第22條第1項第7款辦理限制性招標之情形，下列敘述何者正\n確？","options":["招標公告及招標文件均須載明後續擴充之期間、金額及數量。","招標公告及招標文件均須載明後續擴充之期間、金額或數量。","計算採購\n金額時無須將預估後續擴充項目所需金額計入。","招標公告及招標文件已\n敘明後續擴充之金額，機關於該金額內辦理後續擴充，無須經議價程序。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關擬依採購法第22條第1項第6款辦理限制性招標之情形，下列敘述何者\n正確？","options":["原契約項目數量之增加，其增加之契約金額，不列入追加累計\n金額。","原契約項目規格之變更，其增加之契約金額，不列入追加累計金\n額。","因故減項辦理招標，履約期間因尚有預算，逕依本款向得標廠商辦\n理契約變更，採購原減項內容。","不同區域之地下管線工程，如契約未載\n明屬同一招標目的範圍，非屬原招標目的範圍。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關依採購法第22條第1項第16款辦理限制性招標之情形，下列敘述何者錯\n誤？","options":["公告金額以上採購，招標前應報經主管機關認定。","未達公告金\n額之採購，招標前無須報經主管機關認定。","未達公告金額採購，其金額\n逾公告金額十分之一者，通案簽經機關首長或其授權人員核准依該款辦理。","未達公告金額採購，其金額逾公告金額十分之一者，其簽辦文件應就個\n案敘明邀請指定廠商比價或議價之適當理由。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者正確？","options":["依採購法第22條第1項第9款辦理技術服務採購之\n公開評選，其招標資訊得免刊登政府採購公報。","機關以限制性招標辦理\n者，均無須刊登政府採購公報。","機關辦理採購，採購標的中僅40％為專\n屬權利，只要經機關評估無其他合適之替代標的，仍得依採購法第22條第1\n項第2款規定採限制性招標。","依採購法第22條第1項第10款辦理限制性招\n標者，投標廠商僅1家即得辦理開標。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"採購法第22條第1項第6款有關「未逾原主契約金額百分之五十者」，其是否\n逾50%之計算，下列分子之計算何者正確？","options":["以單次金額計算。","以追\n加與追減絕對值之累計金額計算。","以追加與追減之累計金額計算。","以追加累計金額計算。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"關於招標文件規定廠商必須取得ISO9000系列驗證者，下列敘述何者正確？","options":["僅巨額採購得規定之。","僅特殊採購得規定之。","巨額採購或特殊\n採購得規定之。","公告金額以上之採購皆得規定之。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列關於機關辦理巨額採購之描述何者正確？","options":["預期使用情形及其效益目\n標、開始使用日期及使用年限、評估使用情形及其效益之分析指標，應於採\n購完成後，開始啟用前簽經機關首長或其授權人員核准。","向主管機關提\n報採購之使用情形及其效益分析，如屬勞務採購者，其使用期間為契約約\n定之履約期間，除工作內容重複者外，以契約工作完成後1次提報為原則。","如驗收後因故逾1年仍未啟用者，應自驗收後每屆滿1年之次日起1個月內\n逐年向上級機關提報未啟用之原因，俟啟用後再改向主管機關提報使採購之\n使用情形及其效益分析。","向主管機關提報巨額採購之使用情形及其效益\n分析，除以電子化方式為之外，應另備書面文件通知主管機關。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"採購法第50條第1項第5款所稱「不同投標廠商間之投標文件內容有重大異常\n關聯者」不包括下列何種情形？","options":["分包廠商為同一廠商者。","押標金由\n同一人繳納或申請退還者。","電子郵件網址相同者。","投標文件內容由\n同一人繕寫或備具者。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"經常性採購以選擇性招標建立合格廠商名單方式辦理者，應建立至少幾家以\n上之合格廠商名單？","options":["3家。","10家。","6家。","2家。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"底價之訂定時機，下列何者為正確？","options":["公開招標採分段開標者，其底價應\n於價格標開標前定之。","選擇性招標應於規格標審查後之下一階段開標前\n定之。","限制性招標之比價及議價，訂定底價前應先參考廠商之報價或估\n價單。","採公開取得3家以上廠商之書面報價或企劃書者，其底價應於進\n行比價或議價前定之。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者超底價決標時，須報經上級機關核准？","options":["超過底價8%者。","超\n過底價4%而未超過8%者。","查核金額以上之採購而超過底價4%但未超過8%\n者。","查核金額以上之採購。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關依採購法第42條第1項辦理分段開標，下列敘述何者為錯誤？","options":["機關\n辦理一次投標分段開標，投標廠商已投標而未開標之部分，原封發還。","採公開招標者，得僅就資格投標。","未通過前一階段審標之投標廠商，不\n得參加後續階段之投標。","採一次投標分段開標者，廠商應將各段開標用\n之投標文件分別密封。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關依採購法第42條第1項辦理分段開標，下列敘述何者為正確？","options":["採分\n段開標者，得先辦理價格標後再審查資格或規格標。","僅就資格投標者，\n以公開招標為限。","採分段投標，未通過前一階段審標之投標廠商，不得\n參加後續階段之投標。","不論採分段開標或未分段開標，廠商均應將各段\n開標用之投標文件分別密封。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列廠商行為何者非採購法處罰之犯罪行為？","options":["意圖影響決標價格而以契\n約使廠商不為價格之競爭。","意圖影響採購結果而借用他人名義投標。","意圖獲取不當利益而拒不履行契約。","以詐術使廠商無法投標。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬可能有圍標之嫌？","options":["不明人士蒐集領標廠商名稱。","投標\n廠商間彼此熟識。","投標文件內容由同一人或同一廠商繕寫或備具。","押標金由同一人或同一廠商繳納或申請退還。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"以下何者不得採書面驗收，應辦理現場查驗？","options":["未達公告金額之工程採\n購，其採購金額逾公告金額十分之一者。","小額採購。","部分驗收其驗\n收金額不逾15萬元者。","即買即用或自供應至使用之期間甚為短暫，現場\n查驗有困難者。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理契約變更，「加帳金額」為新臺幣(下同)50萬元，「減帳金額」為\n50萬元，則其變更部分計算是否監辦之金額為多少？","options":["100萬元。","50\n萬元。","0元。","依原契約金額。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理採購採最低標決標時，認為最低標廠商之總標價或部分標價偏低，\n顯不合理，有降低品質、不能誠信履約之虞或其他特殊情形時，下列處置何\n者最適法？","options":["不經廠商說明，逕不決標予最低標廠商，押標金退還。","逕洽該廠商承諾繳差額保證金後決標。","不決標予最低標廠商，並不發還\n押標金。","如不擬決標予該廠商，仍須限期通知該廠商提出說明。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列敘述，何者正確？","options":["公開招標之開標及決標時間，不\n得逾等標期屆滿當日或次一上班日，以免相隔天數過長，徒生爭議。","機\n關得於招標文件規定投標廠商須出席開標以備減價或比減價，否則即視為\n無效標。","採行協商措施時，其審標程序應公開進行，惟審標內容應予保\n密。","公開開標之案件，機關得於招標文件中限制有權參加開標之每一投\n標廠商人數。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理某履約期限為2年之巨額清潔勞務採購，預算金額1年為新臺幣(下\n同)2,000萬元，合計為4,000萬元，經檢討有必要訂定具有相當財力之特\n定資格條件，機關得於招標文件訂定投標廠商之實收資本額為？","options":["600萬\n元。","150萬元。","250萬元。","400萬元。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"某機關辦理一非屬特殊性質之財物採購，其採購金額為5,320萬元，廠商\n資格規定廠商實收資本額得要求不低於下列何者金額？","options":["5,320萬元。","5,400萬元。","500萬元。","不得限定資本額。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"招標文件有關廠商資格「投標時須檢附代理日本日立HITACHI公司電梯維護\n保養之授權書面資料證明影本」之規定，屬於下列何項採購錯誤行為態樣？","options":["投標當時即必須擁有指定之設備。","投標當時即必須於指定地區設有\n分公司或維護站。","投標時須檢附原廠製造證明、原廠代理證明、原廠願\n意供應證明、原廠品質保證書。","限定國內廠商投標時須檢附與國外廠商\n技術合作之證明。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，機關得於招標文件規定之事項，下列何者正確？","options":["限定國\n內廠商投標時須檢附與國外廠商技術合作之證明。","廠商投標時所檢附之\n型錄須蓋代理廠商之章。","廠商投標時所檢附之型錄須為正本，不得為影\n本。","允許投標廠商於投標文件內預先提出同等品者，廠商應於投標文件\n內敘明同等品之廠牌、價格及功能、效益、標準或特性等相關資料，以供審\n查。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法令規定，下列敘述何者正確？","options":["僅巨額採購始可訂定特定資格。","採單價決標者，招標文件應載明預估數量。","訂定廠商特定資格時，\n得限公部門（政府機關、公營事業、公立學校）之實績始可接受。","公會\n會員證，為廠商投標時所必要檢附的文件證明。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"有關廠商資格之敘述，何者為正確？","options":["採購標的內之重要項目，有就該等\n項目訂定分包廠商資格之必要者，適用採購法有關投標廠商資格之規定。","廠商履行契約所必須具備之資格條件，其僅就廠商在我國之商業活動為\n整體考量即已符合規定。","機關辦理一採購，其兼有工程、財物及勞務\n等性質，而以工程認定其採購性質，雖該採購之勞務部分符合特殊採購情形\n之一，仍不得就勞務部分訂定特定資格。","依政府機關組織法律組成之非\n公司組織事業機構參加投標時，仍應繳驗目的事業主管機關核發之行業登記\n證、承攬或營業手冊及依商業團體法加入商業團體等。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"有關投標廠商資格規定之敘述，下列何者正確？","options":["廠商應附公會出具之\n投標比價證明書，以證明其依法參加工業團體或商業團體。","投標時廠\n商即應擁有履約所需之設備。","開標時廠商應攜帶所有資格文件正本供查\n驗。","投標廠商得出具承諾於得標後一定期間內建立自有或特約維修站或\n場所。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬錯誤行為？","options":["營業稅證明限當期。","信用證明限公告日後\n取得。","得以實績為特定資格。","資本額限公告日前者。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬於資格限制競爭的情形？","options":["限公部門（政府機關、公營事\n業、公立學校）之實績。","限國內之實績。","廠商納稅之證明（如營業\n稅或所得稅等）。","限特定地區公會之會員。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者正確？","options":["規定投標當時即必須擁有指定之設備。","規定廠商所\n附型錄均須為正本。","規定廠商提出之實績證明須為公家機關。","規定\n外標封上應標示廠商名稱及地址。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列非屬政府採購錯誤行為態樣？","options":["履約期限為日曆天未載明假日是否計\n入。","非特殊採購規定特定資格。","未將選購項目計入採購金額。","特殊或巨額採購不訂定特定資格。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列招標方式何者正確？","options":["未達公告金額之採購不公開取得報價單，通案\n以議價或比價方式辦理。","公開招標可單就資格標辦理招標。","機關依\n採購法第22條第1項第9款辦理之採購，屬限制性招標，其公開評選後應辦理\n議價。","分段開標，得依價格、資格、規格之順序開標。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬政府採購錯誤行為態樣之一？","options":["允許投標廠商查看其他廠商\n之投標文件。","投標文件審查結果，未通知投標廠商。","廠商未依通知\n出席開標即視為無效標。","機關於招標文件規定廠商得請求釋疑之期限，\n大於等標期之四分之一。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬政府採購錯誤行為態樣之一？","options":["不考慮廠商單價是否合理而\n強以機關預算單價調整廠商單價。","不同數量之2項以上標的，以單價和\n決標。","私下洽投標廠商協助審查其他廠商之投標文件。","已決標之採\n購案，未得標廠商要求發還投標文件者，機關得保留其中一份，其餘發還，\n或僅保留影本。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者為非？","options":["訂定投標廠商資格及規格均不得不當限制競爭。","招\n標文件得不記載終止或解除契約之條件。","履約期限過短違反公平合理原\n則。","評選委員不得由他人代理出席。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬政府採購錯誤行為態樣之一？","options":["未將國內員工總人數逾100\n人之得標廠商資料彙送至主管機關決標資料庫。","刁難廠商使用同等品。","未規定主要部分卻刁難廠商分包。","遇有犯採購法第87條至第92條罪\n之嫌者，通知檢警調單位。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者不正確？","options":["招標公告之增購條件及上限寫「詳招標文件」即可。","招標公告之採購金額，應為預算金額加計後續擴充項目所需金額。","依採購案需要，招標文件得公告底價。","機關依採購法第22條第1項第9款\n辦理之採購，雖屬限制性招標，仍應刊登政府採購公報。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依投標廠商資格與特殊或巨額採購認定標準規定，不得訂定下列何種資格證\n明？","options":["營業稅或所得稅之納稅證明。","協會會員證。","招標文件規定\n之樣品。","會計師簽證之財務報表。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列關於準備招標文件之敘述，何者正確？","options":["採購法已規定之事項，均不\n必再於招標文件規定。","規定廠商對於機關之決定不得異議。","規定廠\n商之投標文件應以書面密封。","規定投標文件標封應於封口蓋騎縫章，否\n則無效。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"未達公告金額之採購，得免收押標金、保證金之情形為何？","options":["僅押標金。","僅保證金。","押標金或保證金。","均不得免收。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列關於押標金之規定，何者係屬採購錯誤行為？","options":["以金融機構定期存款\n單繳納者，其申請設定質權時，應由質權人會同辦理。","以金融機構支票\n繳納者，應為即期。","應以投標廠商名義繳納。","得以主管機關核定之\n電子化方式繳納。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者正確？","options":["投標廠商繳納之押標金如有不予發還之情形者，全\n部不予發還，包含其依招標文件規定額度溢繳之部分。","甲廠商之子公司\n經機關依採購法規定列為拒絕往來廠商，其效力不及於甲廠商。","採購法\n第22條第1項第6款所稱「必須追加契約以外之工程」之情形，不含原契約項\n目規格之變更。","機關辦理招標文件公開閱覽，對於閱覽廠商或民眾意見\n之處理，應以密件方式辦理。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列採購法第58條執行情形，何者正確？","options":["最低標廠商報價偏低，顯不合\n理、有影響履約品質之虞，機關得未通知廠商說明即不決標予該廠商，改決\n標予次低標。","訂有底價之採購，機關如發現底價偏高造成最低標標價偏\n低者，不適用採購法第58條之規定。","機關通知最低標廠商限期繳納差額\n保證金時，應一併告知底價，以利廠商核計差額保證金額度是否正確。","最低標廠商報價偏低，顯不合理、有影響履約品質之虞，如其願意繳納差額\n保證金，機關即應決標予該廠商。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者為是？","options":["開價格標即為開標。","廠商未依通知出席即視為無效\n標。","審標時對投標文件疑問，個別洽詢。","允許投標廠商查看其他廠\n商投標文件。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列招標文件規定何者為非？","options":["限制投標廠商出席公開開標會議之人數。","廠商未附具投標廠商聲明書者，不得於開標後補正。","廠商出席開標\n人員應攜帶廠商大小章。","廠商不及提出最近一期營業稅納稅證明者，得\n以前一期之納稅證明代之。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者正確？","options":["機關辦理財物採購，尚非一定須要求投標廠商投標\n文件應檢附採購標的之型錄供審查。","招標文件不得免費提供廠商領取。","採購法第22條第1項第6款所稱「必須追加契約以外之工程」之情形，不\n包括原契約項目規格之變更。","機關依科學技術基本法第6條第4項規定辦\n理之採購，不適用採購法，惟為促進競爭，仍可利用政府電子採購網辦理公\n告事宜。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關採最低標決標，一開價格標就有2家廠商標價相同且低於底價，其後續\n處理程序何者正確？","options":["由該2家廠商比減1次，以低價者決標。","由該\n2家廠商比減2次，以低價者決標。","由該2家廠商比減3次，以低價者決\n標。","逕行抽籤決定之。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬政府採購錯誤行為態樣？","options":["限定投標廠商之所在地。","營\n業稅之繳納證明限當期者。","押標金繳納額度為標價百分之三。","決定\n最有利標，再洽廠商減價。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬政府採購錯誤行為態樣？","options":["抄襲特定廠商之規格資料。","廠商實績限公部門或國內實績。","型錄須為正本。","因有特殊情形必須\n延長驗收期限，簽報有權人員核准。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者為是？","options":["決標之單價金額為新臺幣5,000元，於辦理決標公\n告時決標金額填列為新臺幣5,000元，尚屬適法。","複數決標案件，決標\n公告時決標金額應合併計算填列。","有一採購案，原契約金額為新臺幣\n200萬元，機關因業務需要而追加新臺幣8萬元，依規定仍應辦理定期彙送。","減價收受金額之計算得預先於契約中約定。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬政府採購錯誤行為態樣之一？","options":["查驗或驗收時依廠商建議\n之區域鑽心取樣。","訂有底價之採購，廠商報價與底價相同，機關未予決\n標，而要求廠商減價。","未更改招標文件內容而重行訂定之底價，除有正\n當理由外，較廢標前合格廠商之最低標價為高。","公告底價。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列關於投標廠商特定資格之規定，何者係屬正確？","options":["所得稅或營業稅之\n納稅證明。","公會會員證。","曾完成與招標標的類似之製造、供應或承\n做之文件。","財力及實績證明。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關依「投標廠商資格與特殊或巨額採購認定標準」訂定「具有相當財力」\n之特定資格證明，下列何項規定不得訂定？","options":["流動負債不低於流動資產。","權益不低於招標標的預算金額十二分之一。","實收資本額不低於招標\n標的預算金額之十分之一。","總負債金額不超過權益4倍。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"公開招標廢標後大幅修改招標文件後再行辦理招標必須多少家以上廠商投標\n始得開標？","options":["3家。","1家。","由機關決定。","視招標文件之規定。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何種採購不允許採統包方式辦理？","options":["工程採購。","勞務採購。","財物採購。","設計加施工案。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關內之監辦人員對採購不符合採購法規定程序而提出意見，下列作法何者\n為正確之行為？","options":["辦理採購之主持人或主驗人如不接受，應納入紀錄，報\n機關首長或其授權人員決定之。","辦理採購之主持人或主驗人得不接受，\n但應納入紀錄，陳報機關首長或其授權人員備查。","由辦理採購之主持人\n或主驗人決定是否接受，如不接受，應納入紀錄。","辦理採購之主持人或\n主驗人決定是否接受，如不接受，並得納入紀錄。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"最低標廠商報價低於底價百分之八十，但在底價百分之七十以上時，下列敘\n述何者正確？","options":["要決標給最低標時，該商一定須繳交差額保證金。","若\n決標給次低標時，則一定不須繳交差額保證金。","縱使最低標廠商說明合\n理要決標給該商亦須繳交差額保證金。","最低標廠商之說明機關如認為合\n理，則不須繳交差額保證金。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者錯誤？","options":["未達公告金額之工程或財物採購，得由機關視需要決定\n是否填具結算驗收證明書。","結算驗收證明書或其他類似文件，機關應於\n驗收完畢後15日內填具。","機關辦理採購，有部分先行使用之必要或已\n履約之部分有減損滅失之虞者，應先就該部分辦理驗收或分段查驗供驗收之\n用，並得就該部分支付價金。但保固應自全部驗收起算。","驗收人對工程\n或財物隱蔽部分拆驗或化驗者，其拆除、修復或化驗費用之負擔，依契約約\n定。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"採購法就機關處理未得標廠商之已開標文件的方式何者為非？","options":["保留其中\n一份。","僅保留影本。","經廠商要求全部予以退還。","採分段開標者\n尚未開標之部分應予發還。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"有關投標廠商資格規定之敘述，下列何者不正確？","options":["訂定特定資格應先評\n估廠商家數，及檢討有無不當限制競爭。","訂定廠商實績時，宜限國內政\n府部門（政府機關、公營事業、公立學校），較易查證。","非特殊或巨額\n採購，不得訂特定資格。","投標廠商之設立地或所在地，除其他法令另有\n規定者，不應予以限制。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者為是？","options":["履約保證金以不逾契約價金百分之十為原則。","保固保證金以不逾預算百分之十為原則。","差額保證金額度係最低標標價\n與底價之差額。","押標金不得逾新臺幣1,000萬元。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關依採購法第26條第3項規定，於招標文件要求或提及之參考廠牌應符合\n之情形，下列敘述何者錯誤？","options":["所列廠牌目前均有製造、供應，容易取\n得，價格合理，能確保採購品質，且無代理商、經銷商有公平交易法所稱之\n獨占或聯合行為之情事。","所列廠牌之價格、功能、效益、標準及特性，\n均屬相當。","所列廠牌係供廠商就所列廠牌擇一履約，廠商不得拒絕採\n用。","所列廠牌數量不以3家為限。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理公告金額以上醫療器材採購其有關採購標的規格之訂定，下列敘述\n何者錯誤？","options":["依功能或效益。","所標示特性不得限制競爭。","有國際\n標準或國家標準者從其規定。","指定進口品。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者錯誤？","options":["廠商領標，目前多為利用政府電子採購網採電子領\n標。","公開招標之等標期，自機關傳輸招標資訊至主管機關資料庫當日起\n算。","廠商領標時不得登記領標廠商名稱。","平底價亦應決標。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理採購，下列敘述何者正確？","options":["公告日108.4.8至截止投標日\n108.4.30，投標須知規定：「廠商對招標文件內容有疑義者，得於公告之次\n日起4日內以書面向本機關請求釋疑」。","經評定為最有利標之廠商，因\n故未於規定期限內完成訂約者，依規定沒收其押標金，機關得依評比序位，\n依序洽請其他廠商完成簽約。","以單價決標者，應於招標文件載明預估數\n量或採購金額上限。","流標或廢標後大幅修改招標文件重行招標，而依採\n購法第48條第2項規定以第2次招標處理。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者錯誤？","options":["公開取得企劃書之招標方式得搭配參考最有利標精神擇\n最優者議價。","機關依採購法第22條第1項第9款辦理公開評選，機關得評\n選2家以上優勝廠商辦理比價。","機關驗收完畢後填具結算驗收證明書或\n其他類似文件予廠商者，其開立之對象應為該採購契約之當事人。","押標\n金得以未載明受款人之金融機構支票繳納。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列有關投標廠商資格條件之敘述，何者正確？","options":["如屬特殊或巨額採購，\n得限定投標廠商須具有曾完成公部門（政府機關、公營事業、公立學校）之\n相當經驗或實績。","投標廠商提出之資格證明文件影本未加蓋廠商印章或\n未載明與正本相符者，無效。","限定國內廠商投標時須檢附與國外廠商技\n術合作之證明。","採購兼有工程、財物或勞務2種以上性質，而以其中之\n一認定其歸屬者，其他性質符合特殊採購情形者，得以該其他性質於該採購\n所占比例或相關部分訂定特定資格。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"採購金額新臺幣50萬元之案件以公開招標方式辦理，若無電子領標投標，其\n等標期最少應有幾天？","options":["5天。","7天。","14天。","3天。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列有關規格條件之敘述，何者正確？","options":["如機關經檢討以正字標記為規格\n標示符合所需之功能或效益者，得指定使用「正字標記」產品，無須於招標\n文件註明「或同等品」字樣。","機關所擬定之技術規格，其在目的或效\n果上有無限制競爭，得以符合該規格之廠商家數多寡作為判斷依據，如逾3\n家，即無限制競爭之情形。","廠商得標後提出之同等品，其價格如較契約\n所載原要求或提及者為低，應自契約價金中扣除。","須檢附本地代理商保\n證書。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["評定最有利標，如係採固定費率或\n公布決標價格者，不得再要求廠商詳列組成該價格之內容或納入評選。","機關辦理公開招標，其採分段開標者，依採購法規定，開第1段標當日必須\n審標完畢。","機關辦理公開招標，於招標公告所定開標時間未到即先開啟\n廠商標封審標，並不符合採購法之規定，不得採行。","機關辦理設計競賽\n設計成果之製作費用，以採單價計算法為原則。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理採購，下列敘述何者錯誤？","options":["廠商將投標文件置於不透明之信\n封，以膠帶封裝者，符合採購法第33條第1項所稱書面密封。","機關得於\n招標文件中規定允許廠商於開規格標前補正非契約必要之點之文件。","同\n一投標廠商就同一採購之投標，以一標為限；其有違反而於開標前發現者，\n所投之標應不予開標。","廠商以自身公司簽發之支票繳納押標金，不符合\n採購法之規定。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，機關得於招標文件規定之事項，下列何者正確？","options":["限廠商\n代表於開標當時必須攜帶與投標文件所用相同之印鑑，否則無權參與減價或\n比減價。","廠商投標當時即必須於指定地區設有分公司或維護站。","投\n標時須檢附原廠製造證明及原廠品質保證書。","小額採購仍可以訂定底價\n方式辦理採購。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理評分及格最低標採購，下列敘述何者錯誤？","options":["採分段開標。","公開招標於開標後參考審查合格廠商之標價訂定底價。","不得於招標文件\n規定，已達及格分數之廠商尚須過半數審查委員會委員評定方開啟其價格\n標。","雖採評分審查方式，本質上仍屬最低標。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理小額採購，下列敘述何者正確？","options":["其驗收，仍適用採購法之監辦\n規定。","不得未經公告程序，逕洽廠商辦理採購。","均無須簽訂契約。","不得採公開招標辦理。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬政府採購錯誤行為態樣之一？","options":["規定決標後樣品檢驗不合格\n不發還押標金。","議價案於議價前參考廠商之報價或估價單訂底價。","使用主管機關之招標投標簽約三用格式，廠商決標後須至機關簽約。","決\n定最有利標後再洽廠商減價。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列敘述何者為是？","options":["財物採購之招標文件，不得比照工程採購案件辦理\n公開閱覽。","招標文件之售價逾新臺幣1,000元者，即有違反法令規定之\n虞。","機關提供標封供廠商使用，但不限定廠商未使用即為不合格標或無\n效標，尚非不可。","總價承攬契約，不論數量不符或漏項均應由廠商吸\n收。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["廠商以未載明受款人之銀行支票繳\n納押標金者，機關得拒絕接受。","開標後發現廠商繳納之押標金額度不足\n者，得允許補繳差額。","採公開招標辦理者，得於招標文件規定廠商1次\n投標，但就資格、規格、價格分段開標。","工程驗收時，為考量驗收效\n率，可由廠商自行點選取樣。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理公開招標，公告金額以上未達查核金額之採購，其等標期（未提供\n電子領投標及公開閱覽）不得少於幾日？","options":["5日。","7日。","14日。","21日。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"採購金額新臺幣80萬元之案件以公開取得3家以上報價單，擇符合需要者方\n式辦理，若無電子領標投標，其等標期最少應有幾天？","options":["5天。","7天。","14天。","3天。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法令規定，下列敘述何者正確？","options":["訂定廠商特定資格時，得規定具\n有相當設備者。","訂定廠商資格時，得規定廠商投標當時即必須於指定地\n區設有分公司或維護站。","對於任何產品，機關均得於招標文件規定廠商\n都要檢附型錄。","廠商出席開標人員應攜帶廠商大小章。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"公開招標有關規格訂定，下列何者正確？","options":["廠商所提供之型錄，應逐頁加\n蓋廠商及負責人章。","公告金額以上採購，得指定進口品。","未達公告\n金額之採購，不適用採購法第26條規定。","不得在招標文件註明「同等\n品」字樣。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列關於規格之敘述，何者不正確？","options":["若規定正字標記，應允許同等品競\n標。","美國之標準為大多數廠商所遵循，故不必規定允許同等品。","型\n錄係佐證廠商所報規格，不一定須為正本。","公告金額以上之採購，不得\n指定須為進口品。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列關於技術規格之規定，何者係屬採購錯誤行為？","options":["機關辦理公告金額\n以上之採購，應依功能或效益訂定招標文件。其有國際標準或國家標準者，\n應從其規定。","招標文件允許投標廠商提出同等品者，機關於招標文件中\n規定廠商應於投標文件內預先提出以供審查，並無違反採購法規定。","機\n關於招標文件要求特定之商名，並註明「或同等品」字樣者，即不違採購\n法。","採購法第26條第3項所稱同等品，指經機關審查認定，其功能、效\n益、標準或特性不低於招標文件所要求或提及者。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬規格限制競爭的情形？","options":["型錄須為正本。","以ISO9001驗\n證證書作為產品規範。","型錄須蓋代理廠商之章。","公告金額以上之採\n購無法精確說明招標要求而列出特定廠牌，同時允許提出同等品供審查。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"某國立大學採統包方式辦理校門口意象及綠美化工程採購，採購金額為新臺\n幣98萬元，下列何者不是得採行之招標方式？","options":["公開取得企劃書。","依\n採購法第22條第1項第9款辦理公開評選。","公開招標。","依中央機關未\n達公告金額採購招標辦法第2條第1項第2款辦理限制性招標。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"選擇性招標之開標，下列何者不是選擇性招標之資格審查，供建立合格廠商\n名單後續邀標得採行的方式？","options":["個別邀請所有符合資格之廠商投標。","公告邀請所有符合資格之廠商投標。","由使用單位自符合資格之廠商名單\n中自行擇定邀請廠商投標。","以抽籤方式擇定邀請符合資格之廠商投標。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關為特定個案辦理選擇性招標，有關邀請符合資格廠商投標之邀請方式，\n下列敘述何者正確？","options":["依辦理廠商資格審查文件所標示之邀請順序，依\n序邀請符合資格之廠商投標。","以抽籤方式擇定邀請符合資格之廠商投\n標。","於辦理廠商資格審查後，邀請所有符合資格之廠商投標。","以上\n皆非。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列敘述何者正確？","options":["機關辦理公告金額以上之限制性招\n標須報上級機關核准。","招標文件中公告底價須報上級機關核准。","未\n達公告金額以取最有利標精神擇符合需要廠商辦理議價者須報上級機關核\n准。","預算案尚未經立法程序，得附條件先行辦理招標。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，下列何者須報上級機關核准？","options":["機關辦理公告金額以上之\n選擇性招標。","招標文件中公告底價。","工程案採最有利標決標。","機關辦理公告金額以上之限制性招標公開評選優勝廠商。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"未達公告金額而逾公告金額十分之一案件，不能以下列哪一種方式辦理？","options":["公開招標。","公開取得3家以上廠商之書面報價。","簽經機關首長核\n准後，採限制性招標。","不經公告程序逕洽廠商採購。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非採購法之監辦時機？","options":["開標。","比價。","查驗。","驗\n收。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者不會有違反採購法第6條第1項規定之虞？","options":["預算新臺幣50萬元之\n採購，以公開徵求廠商提供報價單及指定廠牌方式辦理決標。","不適用我\n國締結之條約、協定之採購，僅允許我國廠商投標。","規定投標廠商須為\n製造廠之代理商。","規定投標廠商須於招標機關之所在地轄區有實際工作\n經驗。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者正確？","options":["標價偏低，未經分析逕行決標。","標價偏低，未通知\n廠商說明即逕通知繳納差額保證金。","標價偏低，未繳納差額保證金前即\n決標而於決標後通知繳納差額保證金。","機關經檢討標價偏低之最低標\n廠商標價後，認無顯不合理，無降低品質、不能誠信履約之虞或其他特殊情\n形，擬照價決標予該最低標。最低標如不接受決標或拒不簽約，不發還押標\n金。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"投標廠商之標價超過底價時，下列何者為正確？","options":["議價之減價次數不得逾\n3次。","比減價格之次數為不得逾3次，不包括洽最低標減價1次。","比\n減價格之次數由機關限制次數，但應事先通知各比減廠商。","依招標文件\n規定。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何種屬「投標廠商資格與特殊或巨額採購認定標準」第5條第1項第5款\n所稱國際或國家品質管理之驗證文件？","options":["公共工程金質獎證書。","CNS\n15013（醫療器材品質管理系統）。","食品GMP認證。","CAS（台灣優良\n農產品）驗證證書。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關以公開招標搭配採購法第56條規定之最有利標決標方式辦理採購，下列\n敘述何者錯誤？","options":["不論採購金額大小，均應先報經上級機關核准。","採\n購標的包括工程、財物或勞務。","議價程序不得免除。","應成立採購評\n選委員會。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者非屬巨額財物採購之應辦事項？","options":["招標前簽准預期使用情形。","成立採購工作及審查小組。","報上級機關派員監辦。","訂定投標廠\n商之特定資格前，評估可能符合特定資格之廠商家數。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者可能有圍標之嫌，於開標時宜注意之？","options":["同一人代表2家公司出\n席開標。","不同投標廠商之領標網路位址（IP）相同。","不同投標廠商\n所繳納之押標金，疑似由同一人出具。","以上皆是。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列有關採購實務之規定，何者為非？","options":["廠商如因市場發生缺貨或停產之\n情形，擬以等級高於原契約型錄之產品交貨，尚無不可。","廠商因查驗或\n驗收不合格，遭機關部分解除或部分終止契約，情節非重大者，仍有採購法\n第101條第1項第8款之適用。","自然人得標後，不得以該個人獨資之工作\n室變更簽約主體。","投標文件內容於投標前經塗改，並由廠商代表人於塗\n改處蓋章或簽名者，仍屬有效。"],"answer":1},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關依採購法第22條第1項第11款辦理經公開徵求之限制性招標，下列敘述\n何者錯誤？","options":["不得以正進行建造中，且尚未取得使用執照及權利書狀之房\n地，為採購徵選之標的。","辦理採購前應先編擬計畫依規定層報核定。","簽辦文件應敘明採購房地產及指定地區採購之理由及其必要性。","無\n須將公開徵求房地產之公告刊登於政府採購公報並公開於資訊網路。"],"answer":3},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"採購法第22條第1項第4款所稱「原供應廠商」，下列何者非屬「原供應廠\n商」之範圍？","options":["原訂約廠商之關係企業。","原製造廠商。","原訂約廠\n商之分包廠商。","原訂約廠商。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"有關技術規格之敘述，何者為正確？","options":["機關所擬定、採用或適用之技術規\n格，其在目的或效果上有無限制競爭，應以符合該規格之廠商家數多寡作為\n判斷依據。","機關已於招標文件精確描述技術規格，可一併列出參考廠\n牌，以方便投標廠商詢價。","採購法第26條第1項至第3項規定技術規格\n之訂定順序，即機關應優先依同條第1項規定，訂定符合機關需求之技術規\n格；無法依第1項規定訂定技術規格時，再依序依第2項、第3項規定辦理。","機關依採購法第11條之1規定成立採購工作及審查小組，其任務不包括確\n認招標文件所訂技術規格是否為「機關所必須」之需求。"],"answer":2},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"機關採選擇性招標建立合格廠商名單方式辦理採購，其預先辦理廠商資格審\n查，名單有效期為2年，每年預估採購總額為新臺幣(下同)200萬元。今利用\n該名單邀請符合資格廠商參加80萬元投標，本次採購之採購金額應認定為？","options":["80萬元。","200萬元。","400萬元。","480萬元。"],"answer":0},{"type":"choice","category":"錯誤採購態樣","law_ref":null,"stem":"下列何者屬巨額工程採購之應辦事項？","options":["應採行統包方式辦理。","成立\n採購工作及審查小組。","訂定投標廠商之特定資格。","允許共同投標。"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理技術服務廠商公開客觀評選之採購，將廠商主要工作人員具備採購\n法專業知識之情形納入評選項目，尚無違反法令規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理財物出租、變賣等收入性之招標，雖不適用採購法，但其招標文件\n內容仍得引用採購法有關救濟與不良廠商處分之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理財物出租、變賣等收入性之招標，不適用採購法，其招標文件內容\n不得引用採購法有關救濟與不良廠商處分之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關基於專業考量，得於審標時私下洽投標廠商協助審查其他廠商之投標文\n件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，機關不得允許投標廠商查看其他廠商之投標文件。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法第58條規定，最低標之總標價低於底價之百分之七十，機關認為顯\n不合理，有降低品質、不能誠信履約之虞，機關得逕行通知其繳交差額保證\n金後決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法第58條規定，最低標之總標價低於底價之百分之七十，經洽廠商說\n明後，機關認為顯不合理或尚非完全合理，有降低品質、不能誠信履約之虞\n或其他特殊情形者，不通知最低標提出差額保證金，逕不決標予該最低標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"招標文件規定廠商報價金額包括機關支出及收入金額者，其採購金額以支出\n所需金額及收入金額合計認定之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"招標文件規定廠商報價金額包括機關支出及收入金額者，其採購金額以支出\n所需金額認定之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"旅遊服務不符合採購法第22條第1項第9款所稱專業服務，不得依該條款辦理\n公開評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關依採購法第22條第1項第9款規定，以公開評選方式辦理旅遊服務，尚屬\n適法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"分批辦理採購不須將各批合計總金額認定其採購金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"分批辦理採購，應將各批合計總金額認定其採購金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"對於未達公告金額而逾公告金額十分之一之採購，上級機關得通案授權機關\n以議價或比價方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"對於未達公告金額而逾公告金額十分之一之採購，上級機關不得通案授權機\n關以議價或比價方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"採購法有關投標廠商資格之規定，僅適用於規範投標廠商，因此，採購標的\n內之重要項目，有就該等項目訂定分包廠商資格之必要者，不適用之。","options":["○ 正確","✕ 錯誤"],"answer":1},{" ":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"特殊或巨額之採購，須由具有相當經驗、實績、人力、財力、設備等之廠商\n始能擔任者，得另規定投標廠商之特定資格。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理公開招標之第1次開標，有3家廠商投標，其中有1家廠商標封雖未\n標示廠商名稱及地址，但因投標廠商家數已達3家，故本案應開標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關採分段開標時，可先開價格標後再審查資格或規格標，以提升採購效\n率。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理採購，投標廠商應提出之資格證明文件，以正本為原則，以影本檢\n附者應加蓋廠商印章並註明與正本相符。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關須於招標文件規定投標廠商之標封須密封並於封口加蓋廠商印章，所送\n影本亦應加蓋廠商印章。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關採最低標為決標原則之採購案，遇有最低標廠商之總標價偏低，顯不合\n理，有降低品質、不能誠信履約之虞或其他特殊情形時，請該最低標廠商提\n出說明，如經評估其說明合理，應予決標，無須通知繳納差額保證金。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理技術服務廠商公開客觀評選之採購，將廠商主要工作人員具備採購\n法專業知識之情形納入評選項目，屬不當限制競爭。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"工程或財物採購於驗收完成後，無論金額大小，均應填具結算驗收證明書或\n其他類似文件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"開標結果最低標廠商報價偏低，機關可不必分析其價格是否合理也不須通知\n廠商說明即逕行通知最低標廠商繳納差額保證金後予以決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"機關辦理巨額採購前，應就完成採購後之預期使用情形及其效益目標、評估\n使用情形及其效益之分析指標、預計採購期程、開始使用日期及使用年限，\n簽經機關首長或其授權人員核准。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，機關得於招標文件規定投標文件之編排、字體大小、裝訂方\n式或份數應與招標文件規定相符，否則為無效標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，機關發給、發售或郵遞招標文件時，不得登記領標廠商之名\n稱。但詢問領標廠商名稱或索取名片尚無不可。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"錯誤採購態樣","law_ref":null,"stem":"依採購法規定，機關得於招標文件規定廠商應於投標標封封口蓋騎縫章及投\n標文件應逐頁蓋章，否則為無效標。","options":["○ 正確" ons":["未達公告金\n額採購之決標公告資訊。","採購法第34條第1項但書之公開說明或公開徵\n求廠商提供參考資料之公告。","採購法第22條第1項第14款之公開審查之\n公告。","財物之變賣或出租公告。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列何者應於招標公告或招標文件公開預算金額？","options":["公告金額以上採購。","查核金額以上採購。","巨額金額以上採購。","特殊採購規定廠商具\n有相當財力。"],"answer":3},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"單筆訂購金額達多少以上時，機關不得透過共同供應契約執行請購及下訂？","options":["公告金額。","查核金額。","巨額。","任何金額皆不限。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列何者錯誤？","options":["機關允許廠商電子投標，於招標文件中規定，決標後於\n期限內以書面文件辦理簽約者，書面文件內容應與電子投標文件相同，其不\n同者，以後者為準。","機關允許廠商電子投標者，得辦理電子開標及電子\n決標。其開標得免公開為之。","機關辦理採購，除我國締結之條約或協\n定另有規定者外，依採購法第93條之1規定辦理電子領標並於招標公告敘明\n者，其等標期得縮短3日。但縮短後均不得少於7日。","機關提供電子招標\n文件，得向廠商收取必要之成本費用，其金額由招標機關定之。其另有書面\n文件者，不得高於書面文件發售費用。"],"answer":2},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列政府採購資訊何者應刊登採購公報1日，並公開於主管機關之政府採購\n資訊網站：","options":["採購法第49條公開取得廠商書面報價或企劃書之公告。","採購法第61條規定之決標結果或無法決標之公告。","採購法第100條第2項\n多餘不用堪用財物之無償讓與公告。","採購法第34條第1項但書規定之公\n開說明或公開徵求廠商提供參考資料之公告。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列何者資訊應公開於採購網站：","options":["財物之變賣或出租公告。","與政府\n採購有關之法令。","採購法第49條公開取得廠商書面報價或企劃書公告。","採購申訴審議委員會之審議判斷。"],"answer":2},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"機關辦理電子採購，下列何者錯誤：","options":["機關利用主管機關指定之資訊系統\n辦理招標文件之公開發給、發售或公開閱覽，得免另備書面文件。","機關\n允許廠商電子投標者，得於招標文件中規定，以電子投標文件簽約，或決標\n後於期限內以書面文件辦理簽約。","機關允許廠商電子投標者，得辦理電\n子開標及電子決標。","電子開標及電子決標應公開為之，但得不通知投標\n廠商到場。其監辦方式得由監辦單位採書面審核監辦。"],"answer":3},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"機關得於招標文件中規定廠商電子投標使用之檔案格式，或廠商列印電子招\n標文件投標之格式，其檔案格式或列印格式為：","options":["任一型態及格式。","須為自由軟體。","不應限制廠商之競爭。","不得壓縮。"],"answer":2},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"機關登錄完成公告及領標文件傳輸，可利用政府採購資訊網站那一功能來免\n費模擬廠商領標的使用？以確保招標文件正確無誤。","options":["領標憑據序號。","檢驗上傳標案。","電子領標。","領標家數查詢。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"電子招標文件若有異動，且刊登公告，則應於機關端那一功能之更正作業，\n進行抽換：","options":["新增招標公告。","更正招標公告。","領標管理。","檢\n驗上傳標案。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列何者無須使用憑證IC卡進行數位簽章或加密？","options":["電子訂購。","電子\n開標。","電子支付。","檢驗上傳標案。"],"answer":3},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列何者不是政府採購卡的使用方式：","options":["預借現金卡。","轉帳卡。","信用卡。","儲值卡。"],"answer":0},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"各式招標公告如登載標的分類為工程類或財物類，採統包方式之採購案，其\n決標方式可選取何者？(A)最低標。(B)評分及格最低標。(C)最有利標。(D)\n最高標。","options":["C。","BC。","ABC。","ABCD。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"機關依採購法第49條及第93條之1規定採「公開取得電子報價單」辦理採\n購，廠商電子報價時，不可使用下列何種憑證進行數位簽章及加密？","options":["廠\n商本身名義之工商憑證。","廠商本身名義之組織及團體憑證。","投標廠\n商負責人或取得授權足以代表投標廠商之自然人憑證。","投標廠商負責人\n之信用卡。"],"answer":3},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"機關允許廠商以電子化方式辦理領標者，應於招標公告及招標文件中規定，\n並於招標文件中規定，廠商得以下列方式之一投標：","options":["書面投標。","電\n子投標。","書面投標或電子投標。","以上皆是。"],"answer":3},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"依政府採購法第61條規定辦理無法決標之公告，應於廢標後、重行招標前\n刊登，並不得超過廢標後多少天：","options":["30天。","21天。","14天。","7\n天。"],"answer":2},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"有關電子憑據的描述下列何者有誤？","options":["具有數位簽章。","領標電子憑據\n可以用來確認廠商是否繳費電子領標。","廠商投標未附領標電子憑據，機\n關仍得決標予該廠商。","廠商於等標期內以領標之電子憑據，可以再次免\n費下載同一案同次公告之招標文件。"],"answer":2},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"機關辦理電子採購，主管機關指定之資訊系統全部或部分功能，因故暫停服\n務時，下列處理方式何者有誤？","options":["招標及詢價階段：機關待系統恢復後再\n行傳輸電子招標文件。","領標階段：廠商以招標文件規定之其他方式領\n標。","領標階段：待系統恢復後再行電子領標。","開標階段：確知無廠\n商電子投標時，仍必須待系統恢復後再行開標。"],"answer":3},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列敘述何者錯誤?","options":["機關採未經公告之限制性招標辦理議價，如議價不\n成無須刊登無法決標公告。","機關採限制性招標公開評選辦理專業服務，\n第1 次公告結果只有1家廠商投標，應不予開標並刊登無法決標公告。","機關採公開招標，第1次公告結果只有1家廠商投標，應刊登無法決標公告。","機關依採購法第48條第1項第1款不予開標決標，應刊登無法決標公告。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列敘述何者正確？","options":["現行主管機關發行之政府採購公報為紙本及電子\n化併行。","機關得於招標文件規定採電子投標之廠商，其押標金得予減\n收50％。","共同供應契約應公開於主管機關指定之資訊網站，供各機關利\n用。","政府採購卡之持卡人資格經取消者，其政府採購卡即失效。"],"answer":2},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"於政府電子採購網新增公開取得報價單與企劃書公告，選擇不刊登政府採購\n公報，於星期一上班日下午17時35分傳輸，該公告於廠商端何時可以查詢：","options":["次二上班日。","次一上班日","當日20時以後。","當日18時以後。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"採購法第102條第3項規定之廠商名稱與相關情形（拒絕往來廠商），下列\n何者正確？","options":["應刊登採購公報1日，並公開於主管機關之政府採購資訊網\n站。","應公開於採購網站，必要時並得刊登採購公報。","得公開於採購\n網站，必要時並得刊登採購公報。","報上級機關決定公告方式。"],"answer":0},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"電子招標文件檔案：","options":["不可以壓縮。","可以壓縮。","除圖檔可以壓縮\n外，其餘不可壓縮。","除圖檔不可壓縮外，其餘可以壓縮。"],"answer":1},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"下列事項何者無須傳輸至主管機關之政府採購資訊網站？","options":["公告金額十分\n之一以下之採購。","未得標廠商名單。","得標廠商預估分包予中小企業\n之金額。","如有契約變更或加減價之情形，致原決標金額增加達公告金額\n者。"],"answer":0},{"type":"choice","category":"電子採購實務","law_ref":null,"stem":"以下就「線上繳納押標金」服務，對於招標方式之適用情形說明，何者正\n確？","options":["僅適用於「公開取得電子報價單」採購機制。","不適用於公告金\n額以上之案件。","不適用於經公開評選或公開徵求之限制性招標。","各\n式招標方式皆適用。"],"answer":3},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理未達公告金額但逾公告金額十分之一之公開取得書面企劃書者，依\n規定應公告於「公開取得書面報價或企劃書」網站，並應刊登政府採購公\n報，邀請廠商遞送企劃書，並得參考最有利標的精神擇符合需要者依序議\n價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理未達公告金額但逾公告金額十分之一之公開取得書面企劃書者，應\n於政府電子採購網刊登「公開取得書面報價或企劃書」公告，得免刊登政府\n採購公報，邀請廠商遞送企劃書，並得參考最有利標的精神擇符合需要者依\n序議價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"未達公告金額採購之決標公告資訊應公開於政府採購資訊網站及刊登政府採\n購公報。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"銷售政府採購公報及提供政府採購網站資訊服務，得向採購公報訂戶及資訊\n服務使用者收費；其收費標準，由銷售廠商定之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第61條規定辦理無法決標之公告，應於廢標後、重行招標前刊登，\n並不得超過廢標後2星期。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第27條第1項規定辦理之招標公告，應登載事項，不包括履約期\n限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第27條以公告方式辦理之招標公告，其應登載之事項不包括「是否\n屬公共工程實施技師簽證者」。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第27條以公告方式辦理之招標公告，應登載「是否屬公共工程實施\n技師簽證者」之事項。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第61條規定辦理決標結果之公告，採用複數決標之方式者，其每一\n次決標及不同標的或底價之項目，應俟全部項目決標後，合併刊登決標公\n告。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第61條規定辦理決標結果之公告，採用複數決標之方式者，其每一\n次決標及不同標的或底價之項目，應分別刊登決標公告。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第27條第1項規定辦理之招標公告，應登載事項，包括履約期限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"依採購法第61條規定辦理無法決標之公告，應於廢標後、重行招標前刊登，\n並不得超過廢標後3星期。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關依採購法第49條及第93條之1規定採「公開取得電子報價單」辦理採\n購，決標後利用政府電子採購網製作之電子契約，應依印花稅法規定徵免印\n花稅。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關依政府採購法第22條辦理之限制性招標均免公開於政府採購資訊網站。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關欲使用GCA或XCA憑證IC卡進行電子採購作業時，須至政府採購資訊網站\n辦理開卡才可使用。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關依採購法第49條及第93條之1規定採「公開取得電子報價單」辦理採\n購，決標後利用政府電子採購網製作之電子契約，不適用印花稅法規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理招標公告，預算金額不得為零。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理有收入情形之採購案，其招標公告之預算金額得為零。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府支付採購價金，限以政府採購卡為之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府支付採購價金，得以政府採購卡為之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"ste ],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"招標公告後，發現已上傳之招標文件錯誤，利用文件上傳功能修正文件，得\n免刊登更正招標公告。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"招標公告後，發現已上傳之招標文件錯誤，必須進行更正招標公告。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"新增非複數決標之公開取得報價單或企劃書第2次及以後招標公告時，機關\n無須先傳輸前一次之無法決標公告，即可新增第2次及以後招標公告。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"新增非複數決標之公開取得報價單或企劃書第2次及以後招標公告時，機關\n應先傳輸前一次之無法決標公告始得新增第2次及以後招標公告。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關利用領標家數查詢，經由電子領標憑據序號，可以查詢領標廠商基本資\n料。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關利用領標家數查詢，經由電子領標憑據序號，可以查詢廠商電子領標之\n情形。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"採購法第49條公開取得廠商書面報價或企劃書之公告應公開於採購網站並刊\n登採購公報。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"採購法第49條公開取得廠商書面報價或企劃書之公告應公開於採購網站，必\n要時得刊登採購公報。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"採購案之案號及名稱經招標公告後，如有誤繕，可藉由招標更正公告修正。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"採購案之案號及名稱一經招標公告則無法修改。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關於等標期內因物價波動或外幣費率調漲，致有追加預算金額情形，得免\n更正預算金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"因應物價波動或外幣費率調漲，致有追加預算金額情形，未及時於等標期內\n更正預算金額，屬機關傳輸政府採購資訊錯誤行為態樣。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理採購，其與廠商間之通知、說明、減價、比減價格、協商、更改原\n報內容、重新報價，不得以電子資料傳輸方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理採購，其與廠商間之通知、說明、減價、比減價格、協商、更改原\n報內容、重新報價，得以電子資料傳輸方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"電子領標階段，主管機關指定之資訊系統全部或部分功能，因故暫停服務，\n機關應予廢標，另行公告招標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"電子領標階段，主管機關指定之資訊系統全部或部分功能，因故暫停服務，\n機關得視個案受影響情形公告延長等標期。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購公報由行政院公共工程委員會授權民間報業發行。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購公報由行政院公共工程委員會發行。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關與廠商於電子採購網電子招標及投標，得免採用數位簽章製作電子文\n件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關與廠商於電子採購網電子招標及投標，應採用數位簽章製作電子文件。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理採購，得以電子化方式為之，除電子化資料外，應另備正式書面文\n件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理採購，得以電子化方式為之，其電子化資料並視同正式文件，得免\n另備書面文件。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關政府採購卡持卡人辦理公務採購，其使用政府採購卡之相關紀錄，併入\n持卡人個人信用紀錄。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關政府採購卡持卡人辦理公務採購，其使用政府採購卡之相關紀錄，與持\n卡人個人信用無關。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關刊登招標公告，「履約期限」、「廠商資格條件摘要」等欄位於招標文\n件已有說明，僅需填列「詳招標文件」即可。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關刊登招標公告，其「履約期限」、「廠商資格條件摘要」等必填之欄\n位，填列「詳招標文件」，屬招標公告違反法令情形。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"於練習區(http://webtest.pcc.gov.tw/)新增公告，點選「上傳至正式\n區」，公告會刊登於正式區(http://web.pcc.gov.tw/)。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"於練習區(http://webtest.pcc.gov.tw/)新增公告，點選「上傳至正式\n區」，公告仍在練習區，並不會刊登於正式區(http://web.pcc.gov.tw/)。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"電子招標文件及電子投標文件，應以掃描電子文件代之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"電子招標文件及電子投標文件，其以文字或圖形檔處理有困難者，得以掃描\n電子文件代之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理決標結果之公告，決標金額如以單價決標者，為決標單價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關辦理決標結果之公告，決標金額如以單價決標者，為單價乘以預估數量\n之總金額或預估採購總金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購公報於每一日曆天出刊發行。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購公報於例假日時不出刊發行。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購卡指金融卡業務機構發給機關，用以支付政府採購價金之金融卡，\n轉帳卡、儲值卡。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購卡指信用卡業務機構發給機關，用以支付政府採購價金之信用卡，\n轉帳卡或儲值卡。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關依投標廠商資格與特殊或巨額採購認定標準第5條第3項規定辦理者，免\n公開預算金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關依投標廠商資格與特殊或巨額採購認定標準第5條第3項規定辦理者，應\n於招標公告或招標文件公開預算金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購卡得預借現金或融資。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"政府採購卡不得預借現金或融資。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關允許廠商以電子領標方式領取招標文件，當機關之招標文件須作更正\n時，除刊登更新公告外，需個別通知領標廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"機關允許廠商以電子領標方式領取招標文件，當機關之招標文件須作更正\n時，必須刊登更正公告。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"「線上繳納押標金」服務，目前僅適用於採「公開取得電子報價單」辦理之\n案件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","ca 錯誤"],"answer":1},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"決標公告應自決標日起30日內刊登；無法決標公告應於廢標後、重行招標前\n刊登，並不得超過廢標後2星期。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"電子採購實務","law_ref":null,"stem":"提供電子領標之標案，未上傳招標文件，亦可完成招標公告傳輸。","options":["○ 正確","✕ 錯誤"],"answer":1}];

const STATS = {"政府採購法§1~§17 (總則)": {"total": 319, "choice": 41, "yn": 278}, "政府採購法§18~§44 (招標)": {"total": 697, "choice": 120, "yn": 577}, "政府採購法§45~§62 (決標)": {"total": 116, "choice": 30, "yn": 86}, "政府採購法§87~§100 (罰則)": {"total": 161, "choice": 30, "yn": 131}, "政府採購法§101~§114 (附則)": {"total": 87, "choice": 23, "yn": 64}, "政府採購全生命週期概論": {"total": 56, "choice": 24, "yn": 32}, "工程及技術服務採購作業": {"total": 255, "choice": 71, "yn": 184}, "投標須知及招標文件製作": {"total": 164, "choice": 35, "yn": 129}, "底價及價格分析": {"total": 140, "choice": 44, "yn": 96}, "採購契約": {"total": 162, "choice": 33, "yn": 129}, "履約管理及驗收": {"total": 111, "choice": 14, "yn": 97}, "爭議處理": {"total": 128, "choice": 45, "yn": 83}, "最有利標及評選優勝廠商": {"total": 230, "choice": 67, "yn": 163}, "財物及勞務採購作業": {"total": 406, "choice": 142, "yn": 264}, "道德規範及違法處置": {"total": 86, "choice": 21, "yn": 65}, "錯誤採購態樣": {"total": 267, "choice": 109, "yn": 158}, "電子採購實務": {"total": 179, "choice": 58, "yn": 121}};

// ── STATE ──
let selCat    = 'all';
let selType   = 'all';

let pool      = [];

"law_ref":null,"stem":"以下何者正確？","options":["主會計人員不得為採購案之承辦人員。","採購案之承\n辦人員不得為所辦採購案之監辦人員。","採購案之承辦單位主管不得為該\n採購案之監辦人員。","以上皆非。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者不符合採購法第33條之規定？","options":["機關不得指定以郵政信箱為唯一\n之投標送達場所。","投標信封上或容器外應標示廠商名稱及地址。","廠\n商將投標文件置於不透明之信封，並以釘書針封裝，機關得予拒絕。","機\n關得於招標文件中規定允許廠商於開標前補正非契約必要之點之文件。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關公營事業徵求經銷商之行為，下列何者為非？","options":["有償委任之委託經銷\n契約，具一定事務之委託處理，且約定其對價者，應適用採購法。","如以\n賣斷方式銷售予經銷商，由經銷商自負盈虧，而不具有償委任之約定條款\n者，無採購法之適用。","如契約載明經銷價格、經銷範圍或獨家經銷權\n之授與、責任購貨額、銷售獎勵金等，未具有償委任性質者，無採購法之適\n用。","如係勞務採購性質者，非屬採購法第22條第1項第15款所定「提供\n服務以供轉售目的所為之採購」。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第42條第1項辦理分段開標，下列何者錯誤？","options":["僅就資格投\n標者，以選擇性招標為限。","辦理1次投標分段開標，其已投標未開標之\n部分，不得發還。","未通過前一階段審標之投標廠商，不得參加後續階段\n之投標。","採1次投標分段開標者，廠商應將各段開標用之投標文件分別\n密封。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列敘述何者正確？","options":["逾履約期限後遇颱風來襲致無法交貨，颱風來襲天\n數不計逾期違約金。","機關人力不敷分派時，得指派技工、工友或臨時人\n員擔任主驗人員。","勞務採購於驗收完畢後15日內應填具結算驗收證明\n書。","採召開審查會方式辦理勞務採購之驗收者，主持人得視同主驗人。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"某機關辦理保全勞務採購，年預算為新臺幣(以下同)120萬元，其依採購法\n第22條第1項第9款辦理公開評選，並於招標文件及招標公告中載明訂約二\n年，履約期間評鑑優良者，機關保留後續依同條項第7款議價權利二次每次\n一年，下列敘述何者為正確？","options":["採購金額為480萬元，預算金額為120萬\n元。","採購金額為480萬元，預算金額為240萬元。","採購金額為240萬\n元，預算金額為120萬元。","採購金額為240萬元，預算金額為240萬元。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第22條第1項第9款所辦理專業服務性質之採購，其以服務成本加公\n費法計費時，全部公費應為定額，且不得超過直接薪資扣除非經常性給與\n之獎金後與管理費用合計金額之比率為何？","options":["6%。","25%。","10%。","15 %。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"各機關得就以下何種具有共通需求特性之採購，與廠商簽訂共同供應契約？","options":["財物或勞務。","財物或工程。","勞務或工程。","財物、勞務或工\n程。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理未達公告金額之專業服務採購，下列何者有誤？","options":["公告金額十分\n之一以下採購之招標，得不經公告程序，逕洽廠商採購，免提供報價或企劃\n書。","機關辦理位於原住民地區未達公告金額之採購，應符合原住民族\n工作權保障法第11條之規定。","公開取得3家以上廠商之書面報價或企劃\n書，擇最符合需要者，可於截止收件日前先簽請機關首長或其授權人員核\n准，敘明屆時如公告結果，未能取得3家以上廠商之書面報價或企劃書者，\n將改採限制性招標。","不得依「機關委託專業服務廠商評選及計費辦法」\n辦理。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理經常性採購，其依採購法第49條規定，將公開徵求廠商提供書面報\n價或企劃書之公告，公開於主管機關之資訊網路或刊登於政府採購公報，第\n1次應取得幾家以上廠商之書面報價或企劃書，擇符合需要者辦理比價或議\n價？","options":["1家。","2家。","3家。","6家。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"在服務成本加公費法中，所稱之公費係指下列何者？","options":["直接薪資。","直\n接成本。","合理成本。","廠商提供服務所得之報酬。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"決標依採購法第52條第1項第2款規定辦理者，下列敘述何者正確？","options":["不論\n採購金額為何皆應成立評審委員會。","評審委員會之成立時機，準用採購\n法第46條第2項有關底價之訂定時機。","評審委員會之成員適用採購評選\n委員會組織準則之規定。","不論最低標價是否合理，評審委員會悉應提出\n建議之金額。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依政府採購法規定，機關辦理查核金額以上之採購，經減價結果最低標價超\n過底價百分之五而不逾預算數額，機關確有緊急情事需決標時，應經下列何\n者核准？","options":["上級機關。","審計機關。","主計機關。","採購法主管機\n關。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關以選擇性招標辦理屬經常性採購建立合格廠商名單之「材料試驗服\n務」，其辦理廠商資格審查之公告應有幾家廠商投標始得審查？","options":["3家。","4家。","5家。","6家。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理清潔外包之巨額勞務採購案，預算金額6,000萬元（無後續擴\n充），經檢討有必要訂定實收資本額之資格，履約期限為3年，每年均為\n2,000萬元，除有特殊情形者外，機關得訂定之實收資本額上限為何？","options":["800萬元。","600萬元。","200萬元。","2,000萬元。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列敘述何者錯誤？","options":["招標公告後，有採購計畫變更擬取銷採購之情形\n者，機關得不依招標文件所定時間開標、決標。","採購之開標得限制投標\n廠商出席人數。","採購之開標得視個案情形，規定投標廠商之負責人應親\n自出席，且不得授權代表出席。","機關辦理公開招標採購，因投標廠商家\n數未滿3家而流標者，得發還投標文件。廠商要求發還者，機關不得拒絕。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理設計競賽之評選，下列敘述何者為非？","options":["招標文件訂有廠商資格\n者，資格文件與設計建議書得合併審查。","機關評選結果應通知廠商，對\n未獲選者並應敘明其理由。","評選優勝廠商，得不以1家為限。","評選\n作業準用最有利標之評選規定。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"第1次招標於1家廠商參加時即得開標決標，屬下列何種招標方式？","options":["經常\n性採購採建立合格廠商名單之選擇性招標。","未達公告金額採公開招標。","依採購法第22條第1項第9款辦理公開評選。","公開招標搭配最有利標\n決標者。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第22條第1項第9款規定辦理公開客觀評選為優勝者採限制性招標，\n其底價訂定時機為何？","options":["評選前定之。","開標前定之。","與優勝廠商\n議價前定之。","資格審查後定之。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列公營事業機構之金融服務態樣，何者適用採購法？","options":["資金借貸。","財務調度之理財行為。","委託金融機構代收款並支付手續費。","買賣或\n發行債券。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"公務機關間依政府採購法第105條取得勞務者，下列敘述何者錯誤？","options":["公\n立學校或公營事業得向政府機關採購。","須經雙方分別隸屬之上級機關\n核准。","不適用政府採購法第2章及第3章之所有條文。","仍適用監辦規\n定。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關規格之訂定，下列何者正確？","options":["得訂明「正字標記」產品，但須於招\n標文件註明「或同等品」字樣。","公告金額以上採購，應至少指定3家以\n上廠牌。","未達公告金額之採購，得指定進口品。","廠商所提供之型\n錄，應逐頁加蓋廠商及負責人章。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採選擇性招標建立合格廠商名單方式辦理清潔勞務採購，其預先辦理廠\n商資格審查，名單有效期為2年，年預算為200萬元。該機關於名單有效期內\n利用該名單邀請符合資格廠商參加100萬元投標，本次採購之採購金額應認\n定為？","options":["50萬元。","100萬元。","200萬元。","400萬元。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"分項複數決標之敘述，下列何者錯誤？","options":["招標文件訂明得由廠商分項報價\n之項目。","底價得依項目分別訂定。","押標金應依招標文件規定之全部\n項目計算繳納。","得分項簽約及驗收。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者非採購法規定之押標金繳納種類？","options":["金融機構之書面連帶保證。","信用合作社簽發之支票。","保險公司之連帶保證保險單。","郵政匯\n票。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者情形，機關得免於招標文件或招標公告公開預算金額？","options":["巨額採\n購規定廠商具有相當實績之特定資格者。","巨額採購規定廠商實收資本額\n之特定資格者。","查核金額以上之勞務採購。","未達公告金額之工程採\n購。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採服務成本加公費法計費之勞務採購，下列何者為非？","options":["契約規定成\n本上限及逾上限時之處理。","廠商應記錄各項費用並提出憑證。","憑證\n應包括各項費用之發票、收據、紀錄或報表且僅得為正本。","機關得至廠\n商處所辦理查核憑證。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商辦理專業服務，因涉及不同性質之專門技術，廠商資格規定投\n標廠商須具有各項專業能力之履約資格，為利工作介面管理或促進競爭，\n得於招標文件規定允許共同投標，惟家數以不超過幾家為原則？","options":["3家。","5家。","10家。","15家。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關允許共同投標時，應於招標文件中規定共同投標廠商之成員，不得對同\n一採購另行提出投標文件或為另一共同投標廠商之成員。但有下列何種情形\n不在此限：","options":["採最有利標決標者。","該採購涉及特殊工法，得為不同廠\n商共同投標，增加競爭者。","其他經上級機關認定者。","該採購涉及統\n包，以增加廠商競爭者。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商承辦專業服務，其履約期限達多少時間以上，得於契約內訂明\n自該期間屆滿之次年起得隨物價指數調整契約價金？","options":["1年。","2年。","3年。","5年。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理藝文採購採公告審查程序，下列敘述何者錯誤？","options":["審查委員會應\n由5人以上組成。","會議之決議應有委員總額二分之一以上出席，出席委\n員過半數之同意行之。","招標文件應訂明審查項目、審查標準及評定優勝\n者之方式。","審查委員會之成員應自主管機關網站公布之評選委員名單中\n遴聘，且不得少於三分之一。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採購兼有工程、財物、勞務2種以上性質，難以認定其歸屬者，係按其\n性質所占何項金額比率最高者歸屬之？","options":["採購金額。","預估金額。","預計金額。","預算金額。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關以個案選擇性招標方式辦理採購者，第1次開標應至少有幾家以上之合\n格廠商始可開標？","options":["3家。","1家。","6家。","2家。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購可訂定投標廠商特定資格之情形，以下何者為非？","options":["標的需要特\n殊專業或技術人才始能完成者。","標的需要特殊技術始能完成者。","服\n務費用達新臺幣2000萬元以上者。","廠商或其受雇人需具政府機關核發之\n專業技術證明始能完成者。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理巨額勞務採購，訂定廠商特定資格，規定投標廠商需於截止投標\n日前5年內，曾完成與招標標的同性質勞務契約，其屬單次契約金額之規定\n者，最高以招標標的預算金額之多少為限？","options":["五分之一。","五分之二。","二分之一。","五分之三。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列敘述何者正確？","options":["機關採複數決標辦理採購，其允許依不同數量報價\n者，可依標價及可決標之數量依序決標，但不得有不同之決標價。","機關\n採分項報價分項決標辦理者，廠商不得依其所投標之項目分別繳納押標金。","機關辦理減價或比減價格結果在底價以內時，除有採購法第58條總標價\n或部分標價偏低之情形者外，應即宣布決標。","複數決標不適用於採最有\n利標決標原則者。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商標價幣別為外幣者，應以決標前一辦公日台灣銀行外匯交易收盤之\n何種匯率折算總價？","options":["現鈔賣出匯率。","現鈔買入匯率。","即期賣出\n匯率。","即期買入匯率。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"履約保證金以不逾契約金額百分之多少為原則？","options":["百分之五 。","百分\n之十 。","百分之十五。","百分之二十。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"押標金之額度以不逾廠商標價百分之多少為原則？","options":["百分之一 。","百\n分之五 。","百分之十。","百分之十五。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商應遞送投標文件份數為何？","options":["機關於投標須知敘明。","廠商自行決\n定份數。","1式3份。","1式2份。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"營建機具綜合保險之採購性質係屬？","options":["勞務採購。","財物採購。","工\n程採購。","兼有工程、財物採購之性質。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"查核金額以上採購案件，其應報請上級機關派員監辦之情形，何者正確？","options":["3,000萬元財物採購之驗收。","4,000萬元工程採購之議價。","1,000\n萬元勞務採購之開標。","2,000萬元工程採購之查核。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第65條規定，得標廠商應自行履行勞務契約，下列何者正確？","options":["不得轉包、不得分包。","不得轉包、得分包。","得轉包、不得分包。","得轉包、得分包。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關承租辦公廳舍，係屬於何種採購？","options":["委任之勞務採購。","租賃之勞\n務採購。","委任之財物採購。","租賃之財物採購。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者非屬勞務採購？","options":["印製機關之年刊。","辦理公務車輛保險。","採購軟體之使用權利。","辦理公有財產之營運管理。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列有關勞務採購之敘述，何者錯誤？","options":["得採統包方式辦理招標。","得\n允許共同投標。","具共通需求特性得簽訂共同供應契約。","得允許外國\n廠商參與投標。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關勞務採購之驗收規定，下列何者錯誤？","options":["得辦理分段查驗供驗收之\n用。","得以書面審查方式。","得召開審查會方式。","免辦理驗收。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"採最低標決標，最低標廠商報價總標價(540萬元)低於底價（700萬元），\n機關得通知廠商繳納差額保證金之額度？","options":["260萬元 。","120萬元 。","160萬元 。","20萬元。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購案之招標文件標示得標廠商應自行履行契約之部分工作項目，就\n該部分之履約，下列敘述何者正確？","options":["不得轉包。","得分包。","得轉\n包、不得分包。","得轉包、得分包。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"關於招標文件規定就得標廠商實際績效提高時給予獎勵性報酬，該獎勵性\n報酬以契約價金總額或契約價金上限之多少比率為限？","options":["5%。","10%。","15%。","20%。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款公開評選辦理委外訓練之勞務採購3年，1年\n預算為新臺幣(以下同)1,500萬元，其上網公告時，應填列之採購及預算金\n額各為多少元？","options":["採購金額為1500萬元，預算金額為1500萬元。","採購\n金額為4500萬元，預算金額為4500萬元。","採購金額為1500萬元，預算金\n額為4500萬元。","採購金額為4500萬元，預算金額為1500萬元。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關投標廠商家數之規定，下列何者錯誤？","options":["以公開招標方式辦理第2次\n開標，招標機關得規定有2家以上合格廠商投標，始得開標。","依採購法\n第22條第1項第9款辦理之公開客觀評選者，無投標廠商須3家之規定。","以選擇性招標方式為特定個案辦理之資格標，無投標廠商家數須6家之規\n定。","依採購法第20條第1款規定辦理選擇性招標，為建立合格廠商名單\n辦理資格審查者，投標廠商家數下限為3家。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列有關共同投標之敘述，何者錯誤？","options":["共同投標廠商之資格，已得互為\n補充，故機關不得於招標文件中再規定允許其應符合資格之一部分，得以分\n包廠商就其分包部分所具有者代之。","機關於招標文件規定，契約價金由\n代表廠商統一請(受)領，並非指發票全由代表廠商統一開立。","共同投標\n協議書所載各成員所占契約金額比率，得經機關同意後變更。","共同投標\n廠商成員有破產致無法繼續共同履約，關於另覓之廠商資格應與該成員原資\n格條件相當之廠商繼受。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關投標廠商資格之規定，下列何者應於招標文件中預為載明？","options":["投標廠\n商應符合資格之一部分，得由分包廠商就其分包部分所具有者代之。","投\n標廠商之財力資格，得以保險公司連帶保證保險單代之。","外國廠商應提\n出之資格文件依該國情形提出有困難者，得於投標文件內敘明其情形或以其\n所具有之相當資格代之。","對於資格條件提出異議之規定。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關分項複數決標之採購，下列敘述何者錯誤？","options":["開標結果無廠商投標之\n項目，如符合採購法第22條第1項第1款適用情形者，得由招標機關簽報機關\n首長或其授權人員核准後採限制性招標。","依標價及可決標之數量依序決\n標，得允許相同項目有不同之決標價。","機關得於招標文件中規定各項目\n得標廠商正取及備取之家數上限。","廠商得依其參與投標之項目或數量分\n別繳納押標金。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商得書寫照底價承製之情形，下列何者錯誤？","options":["議價案。","合於招標\n文件規定之投標廠商僅有1家。","比減價格時僅餘1家廠商。","屬優先減\n價廠商之權利。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商之標價超過底價時，下列何者正確？","options":["議價之減價次數不得逾3\n次。","比減價格之次數為不得逾3次，不包括洽最低標減價1次。","比減\n價格之次數由機關限制次數，但應事先通知各比減廠商。","依招標文件規\n定。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者正確？","options":["機關將審查廠商投標文件之結果通知各該廠商者，最遲\n不得逾決標或廢標日30日。","機關採最有利標決標者，2家以上廠商標價\n相同，且均得為決標對象時，應由該等廠商再行比減價格1次，以低價者決\n標。","機關採最低標決標，其招標標的在2項以上而未採分項決標者，得\n以各項單價加總計算，決定最低標。","機關辦理公告金額以上之專業服\n務、技術服務、資訊服務、社會福利服務或文化創意服務者，以不訂底價之\n最有利標為原則。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關利用共同供應契約辦理採購，如發現契約價格高於市場行情，下列處理\n方式何者為非？","options":["不利用共同供應契約辦理採購。","利用政府電子採購\n網「商品市價通報機制」通報訂約機關辦理查價。","仍可利用該契約下\n訂。","自行依採購法辦理採購。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商辦理節能路燈換裝暨維護，由廠商先行自籌資金汰換為節能燈\n具並負責維護，惟其費用將由機關逐年支應，廠商未負擔盈虧，下列何者\n為是？","options":["屬採購法第99條之態樣，其甄選投資廠商之程序，適用採購。","屬採購法第2條所稱採購，適用採購法。","適用促進民間參與公共建設\n法。","由機關就採購法或促進民間參與公共建設法擇一辦理。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商辦理屬具國安(含資安)疑慮之資訊開發系統，下列何者為非？","options":["機關得於招標文件載明不允許經濟部投資審議委員會公告之陸資資訊服\n務業參與。","機關得於招標文件載明分包廠商不得為經濟部投資審議委員\n會公告之陸資資訊服務業。","投標廠商應於投標廠商聲明書聲明是否為陸\n資資訊服務業。","招標文件不允許經濟部投資審議委員會公告之陸資資訊\n服務業參與，屬不當限制投標廠商資格情形。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依政府採購法第22條第1項第13款委外辦理研究發展，採經公告審查優\n勝之學術或非營利機構，下列何者正確？","options":["經國家發展委員會評鑑為優\n等之研究機構。","機關依內部作業規定組成審查委員會，就國家發展委員\n會評鑑名單之研究機構評比為優勝者。","利用主管機關之資訊網路公告徵\n求，經審查委員會審查為優勝者。","經主管機關審查通過者。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"某機關辦理印刷勞務採購，每年預算為250萬元，採建立合格廠商名單之選\n擇性招標，名單有效期為3年，其資格審查的公告等標期(無公開閱覽及電子\n領投標)應不少於幾日？","options":["5。","7。","10。","14。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何種採購不允許採統包方式辦理？","options":["工程採購。","勞務採購。","財物採購。","以上皆非。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商資格規定廠商需出具權益證明（特定資格），機關係規定該項權益\n之最低額度，但該額度應以招標標的預算金額多少為限？","options":["十二分之一。","十分之一。","八分之一。","五分之一。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商提供專業服務所得之報酬為服務成本加公費法中之何種服務費用？","options":["直接薪資。","管理費用。","公費。","其他直接費用。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購契約要項，機關於採購契約規定逾期違約金，以契約價金總額之多少\n比率為上限？","options":["10%。","20%。","50%。","無上限，契約載明即可。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採公開招標辦理50萬元之採購，第1次開標須有幾家合格廠商投標始可\n開標？","options":["3家。","2家且簽准。","1家且事先簽准。","6家。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"未達公告金額之財物採購，得免收押標金、保證金之情形為何？","options":["僅押標\n金得免收。","僅保證金得免收。","押標金及保證金均得免收。","押標\n金及保證金均不得免收。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關以數量為組合之複數決標之敘述，下列何者錯誤？","options":["招標文件得訂明\n廠商報價數量之上、下限。","得依不同數量報價者，依標價及可決標之數\n量依序決標。","依不同數量報價者，決標價應相同。","依不同數量決標\n者，得分別簽約及驗收。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依政府採購法第22條第1項第9款辦理50萬元之專業服務採購，應將招標\n資訊公開於何處？","options":["主管機關資訊網路及政府採購公報。","主管機關資\n訊網路及機關門首公告。","主管機關資訊網路及任一報紙。","主管機關\n資訊網路，得免刊登政府採購公報。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商未於投標文件外標封標示名稱及地址之情形，下列何者正確？","options":["得於\n開標前補正。","得於開標後補正。","無效標，但得列入家數計算。","無效標，並不得列入家數計算。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"台北市政府依政府採購法第105條第1項第3款向經濟部工業局承租房地產，\n下列敘述何者錯誤？","options":["須經雙方直屬上級機關核准。","得不適用政府採\n購法規定之招標方式。","仍應依規定辦理監辦。","決標後得不刊登決標\n公告或傳輸決標資料。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者係屬投標廠商之特定資格？","options":["廠商信用證明。","實收資本額之\n規定。","曾完成與招標標的類似之製造、供應或承做之文件。","政府機\n關核發之專業(技)證照。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，下列何者正確？","options":["超底價廢標，第2次招標重訂底價時，\n底價不得調高。","公開招標採分段開標者，其底價應於開價格標前定之。","查核金額之採購，底價應一併檢送請上級機關派員監辦。","底價得委\n由代辦採購機關訂定。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公開招標，採不分段開標者，其招標文件所標示之開標時間，下列\n何者正確？","options":["與等標期間無關，得視個案情形決定之。","不得於等標期\n屆滿當日。","僅限等標期屆滿之次一上班日。","為等標期屆滿當日或次\n一上班日。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商應提出之資格證明文件，下列何者正確？","options":["其影本未加蓋廠商印\n章者，機關應予拒絕。","以影本為原則，但機關得通知投標廠商提出正本\n供查驗。","不得以目的事業主管機關核准之電子資料替代。","投標廠商\n聲明書如有誤繕，得洽投標廠商更正。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者非機關辦理採購，得擇定之基本資格？","options":["具有相當財力之證明。","廠商具有維修、維護或售後服務能力之證明。","廠商具有製造、供應\n或承做能力之證明。","廠商之受雇人具有專門技能之證明。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法辦理採購，下列何者正確？","options":["開標後，除有特殊情形外，底\n價應予公開。","廠商之企劃書，決標後得免予保密。","招標文件於公告\n前應予保密。","機關得於招標文件中公告底價，但應報經上級機關核准。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關押標金保證金規定，下列何者錯誤？","options":["查核金額以上之勞務採購，招\n標文件明定免收押標金。","廠商以郵政匯票繳納押標金，並無不可。","以議價方式辦理之財物採購，招標文件明定免收押標金，並無不可。","機\n關不發還得標廠商所繳納之保證金時，其孳息應發還之。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"未達公告金額之採購，依採購法第22條第1項第9款（公開評選優勝廠商）辦\n理者，下列何者正確？","options":["應刊登政府採購公報及成立採購評選委員會。","免依採購法第94條成立採購評選委員會。","第1次招標，必須有3家以\n上合格廠商始可開標。","得選擇免刊登政府採購公報。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者錯誤？","options":["機關辦理採購，應以維護公共利益及公平合理為原則。","採購人員得基於公共利益、採購效益或專業判斷之考量，為適當之採購\n決定。但僅限於不違反採購法規定之範圍內。","公營事業之採購適用採購\n法。","自然人不得為簽約對象。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者正確？","options":["公告金額以上採購之開標，應檢送相關文件報請上級機\n關派員監辦。","開標主持人不接受上級機關監辦人員對採購不符合採購法\n規定程序而提出之意見者，宜納入紀錄並報機關首長或其授權人員核准。","採購法所稱上級機關，指辦理採購機關直屬之上一級機關。","以上皆\n非。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者非採購法所稱採購？","options":["影印機之租用。","呆料之變賣。","權\n利之買受。","契約工之僱傭。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何事項屬採購法所稱「監辦」之範疇？","options":["廠商規格之審查。","商業\n條款之審查。","是否依規定報經上級機關核准之情形。","底價訂定之審\n查。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者屬採購法並未明定須報請主會計及有關單位監辦之情形？","options":["開\n標。","驗收。","估驗。","議價。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者正確？","options":["機關辦理減價或比減價格結果與底價相同時，仍得洽該\n商再減價1次。","採議價方式辦理採購，依採購法令規定減價次數不得逾3\n次。","選擇性招標之經常性採購，應建立3家以上之合格廠商名單。","機關辦理限制性招標，邀請3家廠商比價，如有2家廠商投標，即得進行比\n價。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購採最低標決標時，如最低標廠商之總標價或部分標價偏低，其\n優先處理方式下列何者正確？","options":["限期請其提出擔保。","審查其是否有顯\n不合理，有降低品質、不能誠信履約之虞或其他特殊情形。","不決標予該\n廠商，並以次低標廠商為最低標廠商。","限期通知該廠商提出說明或擔\n保。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關審標事宜，下列何者正確？","options":["廠商任何投標文件內明顯打字或書寫錯\n誤，機關得允許廠商更正。","投標廠商依招標文件規定檢附之型錄得於交\n貨時始予審查。","審標應公開為之。","審查結果應通知投標廠商，對不\n合格之廠商，並應敘明其原因。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列敘述何者錯誤？","options":["投標廠商應提出之資格證明文件，除招標文件另\n有規定者外，以影本為原則。","廠商資格證明文件影本之尺寸與正本不一\n致，機關得予拒絕。","查核金額以上之採購，履約保證金之繳納期限，應\n訂定14天以上之合理期限。","廠商履行契約所必須具備之財務、商業或技\n術資格條件，應不以其為政府機關、公立學校或公營事業所完成者為限。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商辦理資訊整體委外服務，其委外時程及契約期間不得逾幾年？","options":["10年。","8年。","5年。","1年。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商承辦專業服務，其採服務成本加公費法計費者，其中「管理\n費用」之上限，不得超過「直接薪資扣除非經常性給與之獎金後」之比率為\n何？","options":["30%。","50%。","80%。","100%。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商辦理專業服務，得於契約規定於訂約後預付一部分，但以契\n約總額或預估給付總額之比率上限為何？","options":["10%。","20%。","30%。","40%。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理設計競賽廠商評選，得標廠商進行設計成果製作，其成果製作費用\n以何種方式計費為原則？","options":["建造費用百分比法。","總包價法。","按日\n計酬法。","服務成本加公費法。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理藝文採購，其採公告審查方式辦理者，應成立審查委員會辦理審\n查，審查委員會應有委員總額多少比例以上出席始得作成決議？","options":["1/3。","2/3。","1/2。","3/4。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款評選廠商委託專業服務，下列評選與決標作\n業，何者有誤？","options":["先審查廠商資格，資格不合者，其他部分不予審查。","評選結果通知廠商，對未獲選者並敘明其原因。","評選優勝廠商不以1\n家為限。","招標文件已訂明固定服務費用，評選優勝廠商後，再擬訂底價\n與優勝廠商辦理議價。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理3年期清潔外包勞務採購，預算金額合計3000萬元，具有相當經驗\n或實績者。其範圍得包括於截止投標日前5年內，完成與招標標的同性質或\n相當之勞務契約，其單次契約金額或數量不低於招標標的預算金額或數量之\n五分之二，所稱「預算金額」，除有特殊情形者外，應以下列何者訂定資\n格條件？","options":["第1年預算金額。","3年預算金額之平均。","採購金額。","3年預算總額。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"委託專業服務採服務成本加公費法計費者，其中直接薪資部分，除契約所載\n直接從事專業服務工作人員之實際薪資外，下列何者為另加之費用？","options":["實\n際薪資之一定比率作為工作人員不扣薪假與特別休假之薪資費用。","非經\n常性給與之獎金。","依法應由雇主負擔之勞工保險費、積欠工資墊償基金\n提繳費、全民健康保險費、勞工退休金。","以上皆是。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者計費方式不適用於專業服務採購？","options":["建造費用百分比法。","總\n包價法。","服務成本加公費法。","按日計酬法。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理複數決標，應合於最有利標或最低價格之競標精神，若其不同性質\n之數項財物併案招標，其各項財物係可分別使用且屬不同行業廠商供應者，\n應如何辦理？","options":["仍以總標單最低者。","允許分項報價及分項複數決標。","以分項報價中最低價。","其允許依不同數量報價者，可依標價及可決\n標之數量依序決標，但不得有不同之決標價。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理藝文採購，其採公告審查程序者，應成立審查委員會辦理審查；\n審查委員會並應由委員幾人組成？","options":["5人以上。","3人以上 。","5-17\n人。","7-25人。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列敘述何者正確？","options":["參加比減價格之廠商，其未能減至機關所宣布之前\n1次減價或比減價格之最低標價，得不通知其參加下1次之比減價格。","查\n核金額以上之採購，其超底價決標，應先報經上級機關核准。","機關辦理\n比減價格，應以3次為限，不得限制次數為1次或2次。","依採購法規定，\n超底價決標之上限為底價的百分之四。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"投標廠商之標價超過底價時，下列何者錯誤？","options":["機關得通知議價之減價次\n數不得逾5次。","招標文件得規定比減價格之次數為不得逾2次。","機\n關採最低標決標者，2家以上廠商標價相同，且均得為決標對象時，其比減\n價格次數雖已達採購法第53條或第54條規定之3次限制者，仍應由該等廠商\n再行比減價格1次，以低價者決標。比減後之標價仍相同者，抽籤決定之。","機關辦理決標，合於決標原則之廠商無需減價或已完成減價或綜合評選\n程序者，得不通知投標廠商到場。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採用複數決標方式辦理採購者，下列何者不符採購法規定？","options":["訂有底\n價之採購，其底價依項目或數量分別訂定。","得依不同數量報價者，依標\n價及可決標之數量依序決標，並得有不同之決標價。","分項標的不同，決\n標數量無法精確預估者，得以單價和計算。","項目之標的不同者，得依個\n別項目之預算金額認定採購金額。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何者正確？","options":["機關於簽約後發現得標廠商於決標後有採購法第103條\n第1項不得參加投標或作為決標對象之情形者，應撤銷決標。","機關依採\n購法第50條第2項規定撤銷決標後，其原係採最有利標為決標原則者，得洽\n次優廠商議價。","機關於廠商得標後將其終止契約，其原係採最低標為決\n標原則者，得以原決標價依決標前各投標廠商標價之順序，自標價低者起，\n依序洽其他合於招標文件規定之未得標廠商減至該決標價後決標。","以上\n皆非。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"採購法第50條第1項第5款所稱「不同投標廠商間之投標文件內容有重大異常\n關聯者」不包括下列何種情形？","options":["分包廠商為同一廠商者。","押標金由\n同一人繳納或申請退還者。","電子郵件網址相同者。","投標文件內容由\n同一人繕寫或備具者。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關於簽約後發現得標廠商於決標前有採購法第50條第1項情形者，下列何\n者不符合採購法規定？","options":["終止契約或解除契約。","追償損失。","因終\n止契約或解除契約反不符公共利益，並經機關首長核准者繼續履約。","於\n解除契約後依採購法施行細則第58條辦理。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理未達公告金額之採購，依公開取得書面報價刊登招標公告資訊網\n路，其第1次之等標期(提供有電子領投標)不得少於幾日？","options":["3日。","5\n日。","7日。","4日。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，下列何者正確？","options":["公開招標第1次開標，因未滿3家而流標\n者，第2次招標之等標期間得予縮短，並得不受3家以上合格廠商之限制。","機關辦理公開招標，因投標廠商家數未滿3家而流標者，得發還投標文\n件。但招標文件規定不予發還者，機關得予拒絕。","機關為特定個案辦\n理選擇性招標之採購，應有3家以上合格廠商投標，始得開標。","未達公\n告金額之公開招標，第1次招標之等標期(未提供電子領投標及辦理公開閱\n覽)，應至少為5日。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第48條第1項規定，公開招標之第1次開標須達幾家合格廠商投標始\n可開標？","options":["3家。","2家。","1家。","6家。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關訂定底價時，以下何種採購得由承辦採購單位逕行簽報核定，免經規劃\n設計或使用單位提出預估金額及其分析？","options":["未達查核金額採購。","特殊\n採購。","商業性轉售之採購。","重複性採購。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公告金額以上未訂底價採最低標決標之採購，最低合格標之標價是\n否合理，由下列何者審定之？","options":["機關首長或其授權人員。","底價審議委\n員會。","開標主持人。","評審委員會。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公開招標採不分段開標之採購，其招標文件所標示之開標時間，不\n得為何？","options":["送樣審查合格後。","等標期屆滿當日。","等標期屆滿之次\n一上班日。","與招標公告所標示之開標時間一致。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商承辦資訊服務於招標文件訂明固定服務費用者，如何決標？","options":["參考最優勝廠商報價訂定底價，與優勝廠商辦理議價，低於底價時決\n標。","依招標文件所載服務費用決標。","依招標文件所載服務費用之八\n成決標。","依招標文件所載服務費用為底價，與優勝廠商辦理議價，低於\n底價決標。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第105條規定，公務機關間財物或勞務之取得，經雙方直屬上級機\n關核准者，得不適用該法招標、決標之規定。所稱公務機關係指何機關？","options":["公立學校。","公營事業。","政府機關。","以上皆是。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"公務機關間財物或勞務之取得，經雙方直屬上級機關核准者，得不適用採購\n法招標、決標之規定。但不包括採購法下列哪些條文之規定？","options":["第62條。","第27條。","第53條。","第26條。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"關於資訊服務採購，下列何者有誤？","options":["指提供與電腦軟體或硬體有關之服\n務。","不包括與硬體有關之服務。","機關辦理重大新興資訊業務或重大\n設備汰舊換新，得以整體委外服務方式，委託廠商提供電腦軟硬體、通信設\n施、人力及技術等之整體性資訊服務。","整體委外時程及契約期間，最長\n不得逾10年。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列敘述何者正確？","options":["機關評選專業服務廠商作業，適用採購法有關最有\n利標之所有評選規定。","招標文件已訂明固定服務費用或費率者，依該服\n務費用或費率決標。","廠商之服務費用，得於訂約後全部一次預付廠商，\n以利廠商資金週轉。","機關得規定於訂約後，預付廠商之服務費用為契約\n總額之百分之四十。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款辦理委託專業服務，下列有關招標文件或契\n約規定，何者有誤？","options":["得標廠商提高績效者，依契約價金總額之百分之五\n發給獎勵報酬。","採成本加公費法計費，訂定成本上限及逾上限之處理方\n式。","訂約後預付契約總額百分之四十之預付款。","履約期限3年，自\n第2年起得隨物價指數調整契約價金。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理委託印刷裝訂勞務採購，因屬經常性採購，採選擇性招標方式辦理\n建立合格廠商名單，其於辦理廠商資格審查之文件中預先載明之後續邀標方\n式，下列何者錯誤？","options":["個別邀請所有符合資格之廠商投標。","依辦理廠\n商資格審查文件所標示之邀請順序，依序邀請符合資格之廠商投標。","以\n抽籤方式擇定邀請符合資格之廠商投標。","以廠商之資本額多寡決定邀請\n之次數。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列何種情形適用政府採購法？","options":["農會以自有財源辦理勞務採購。","機\n關辦理冷凍肉品採購。","國立台灣大學向其實驗林管理處茶園採購茶葉。","以上皆非。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第11款及機關指定地區採購房地產作業辦法辦理\n房地產之勘選，下列何者為非？","options":["不論採購金額大小，無須於招標前報上\n級機關核准。","如招標文件已訂明決標之固定金額者，則以該金額決標，\n並得免除議價程序。","如欲採行協商措施，應預先於招標文件標示得更改\n之項目。","投標廠商家數無限制，縱僅1家廠商投標亦可開標。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"某機關擬委託廠商提供清潔服務，預算編列1年為80萬元，並於招標公告及\n招標文件敘明履約情形良好者，將依採購法第22條第1項第7款續約1年。\n經向廠商詢價1年約需70萬元。請問採購金額為何？","options":["80萬元。","70萬\n元。","140萬元。","160萬元。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採選擇性招標建立合格廠商名單方式辦理清潔勞務採購，其預先辦理廠\n商資格審查，名單有效期為2年，每年預算為200萬元。本次資格標審查之採\n購金額應認定為何？","options":["50萬元。","100萬元。","200萬元。","400萬\n元。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"公務機關依政府採購法第105條第1項第3款提供財物或勞務予其他機關之年\n度總額達巨額採購金額，且占該公務機關年收入之多少比例以上者，其上\n級機關應檢討該公務機關年度內提供財物或勞務予其他機關之成本效益？","options":["10%。","20%。","30%。","50%。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"依政府採購法規定，下列何種情形未明定須報經機關首長或其授權人員核准\n（定）？","options":["未達查核金額採購之減價收受。","底價之訂定。","公開招\n標第一次流標，第二次招標得不受三家合格廠商家數之限制。","原訂驗收\n日期之延期。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關利用共同供應契約訂購電腦主機20台，契約載明可附加訂購相關配備，\n以下何者非屬可附加訂購之採購標的(15萬元以下)？","options":["20個電腦滑鼠。","10個電腦鍵盤。","15個桌上型擴音設備。","25個照明燈具。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"訂約機關辦理共同供應契約，其採分項複數決標者，以下何者為非？","options":["就\n不同項次標的分別訂定單筆訂購金額或數量之合理上限。不另訂定大量訂購\n優惠條款。","限制得標廠商家數，以促進價格競爭。","招標文件得訂明\n如投標廠商同意跟進最低決標價格時，均得併列為得標廠商。","應符合採\n購法第52條第1項第4款規定之競標精神。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關利用共同供應契約辦理採購，其單筆訂購金額或數量如已逾契約所定訂\n購金額或數量之上限，機關應如何處理？","options":["由機關自行依採購法規定辦理\n採購。","可採分次訂購，以免逾契約之訂購上限。","於徵得廠商同意\n後，仍得訂購高於契約採購上限之金額或數量。","於徵得訂約機關同意\n後，仍得訂購高於契約採購上限之金額或數量。"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"政府採購法主管機關指定行政院人事行政總處辦理英語線上訓練共同供應契\n約，該處再洽臺灣銀行採購部代辦採購，其簽訂共同供應契約之適用機關\n範圍為？","options":["全國機關 。","中央機關。","公共工程委員會及其所屬機\n關 。","人事行政總處及其所屬機關。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，下列敘述何者正確？","options":["採購法第45條所稱開標，指開啟廠\n商投標文件之價格標封。","招標文件規定開標時投標廠商之負責人未出席\n者，投標無效。","機關辦理第1次公開招標，有3家以上廠商投標即可開\n標。","機關於招標文件規定投標廠商出席開標之人數不逾2人。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務性質採購，下列敘述何者正確？","options":["不得依「共同投標辦法」規定辦理\n採購。","得依「統包實施辦法」規定辦理採購。","得依「替代方案實施\n辦法」規定辦理採購。","不得依「最有利標評選辦法」規定辦理採購。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依政府採購法第22條第1項第13款委外辦理學術研究發展，下列敘述何\n者錯誤？","options":["得逕邀在專業領域具領先地位之自然人，並以該自然人為計畫\n主持人。","得委託經公告審查優勝之學術或非營利機構。","成立審查委\n員會辦理審查，適用採購評選委員會組織準則及審議規則之規定。","計畫\n書經審查通過後，再辦理議價。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列招標方式之開標，何者無廠商家數之限制？","options":["第1次公開招標。","選擇性招標建立經常性採購合格廠商名單。","公開取得書面報價或企劃\n書。","限制性招標經公開評選。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採公開招標不分段開標最低標得標，應於開標現場宣布之事項，下列何\n者為非？","options":["投標廠商之名稱或代號。","投標廠商之家數。","投標廠商\n之標價。","投標廠商之出席代表姓名。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"國營銀行為利執行存款業務之現金運送需要，辦理保全（警衛勤務）勞務採\n購案，下列何者為非？","options":["為利個案需要，契約載明保全人員之年齡、身高\n及體重條件，尚無不可。","履約期間3年，得以第1年預算金額訂定資格條\n件。","招標文件得允許免收押標金或保證金，惟如認有需要亦可收取。","應符合勞動法令合理編列預算，以保障勞工權益。"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託專業服務，其屬採購標的內之重要項目，有訂定分包廠商資格之必要\n者，適用政府採購法有關投標廠商資格之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第58條規定，最低標之總標價低於底價之百分之八十，機關認為顯\n不合理，有降低品質、不能誠信履約之虞或其他特殊情形，應先通知最低標\n提出說明。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第13款辦理委託研究發展，其費用未達公告金額\n者，不得依「機關委託研究發展作業辦法」規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，得指定使用「正字標記」產品，無須在招標文件註明「或同\n等品」字樣。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，得指定使用「正字標記」產品，惟應在招標文件註明「或同\n等品」字樣。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"不同性質之數項財物併案招標，各項財物係可分別使用且屬不同行業廠商供\n應者，不採分項複數決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"不同性質之數項財物併案招標，各項財物係可分別使用且屬不同行業廠商供\n應者，採分項複數決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採購現成財物，如投標廠商於投標文件標示之製造廠商，於截止投標期\n限前因他案被列為拒絕往來廠商，因與該投標廠商之資格無關，故機關仍得\n決標予該投標廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採購現成財物，如投標廠商於投標文件標示之製造廠商，於截止投標期\n限前因他案被列為拒絕往來廠商，機關應不決標予該投標廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關於開標後因故廢標，其採分段開標者，尚未開標之部分應由機關保存歸\n檔，不予發還。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關於開標後因故廢標，其採分段開標者，尚未開標之部分應予發還。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商不得以不具備履行契約分包事項能力或未依法登記或設立之廠商為分包\n廠商。對於分包廠商履約之部分，由該分包廠商負完全責任，與得標廠商無\n關。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商不得以不具備履行契約分包事項能力或未依法登記或設立之廠商為分包\n廠商。對於分包廠商履約之部分，得標廠商仍應負完全責任。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"合於招標文件規定之最低標廠商，其總標價在底價以內，雖未低於底價之百\n分之八十，惟該最低標廠商主動表示標價錯誤，要求不決標予該廠商，機關\n尚不得依採購法第58條規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第58條規定，最低標之總標價低於底價之百分之八十，機關認為顯\n不合理，有降低品質、不能誠信履約之虞或其他特殊情形，機關得逕行通知\n最低標提出差額保證金並辦理決標，免先通知最低標提出說明。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商投標文件，招標文件得禁止使用外文。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關公開徵選廠商承辦專業服務之評選，評選後，應與優勝廠商辦理議價，\n如須限制減價次數時，以3次為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關公開徵選廠商承辦專業服務之評選，評選後，應與優勝廠商辦理議價，\n如須限制減價次數時，應先通知廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"招標文件允許外國廠商參與投標者，我國廠商所供應財物之原產地非屬我國\n者，視同我國廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"招標文件允許外國廠商參與投標者，我國廠商所供應財物之原產地非屬我國\n者，視同為外國廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關合併辦理數種特殊性勞務採購，依政府採購法第20條第4款規定為個案\n採選擇性招標，並採分項決標，各項提出資格文件供審查之廠商及實際審查\n後之投標廠商家數，均受採購法第48條第1項關於3家以上合格廠商投標之限\n制。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關合併辦理數種特殊性勞務採購，依政府採購法第20條第4款規定為個案\n採選擇性招標，並採分項決標，各項提出資格文件供審查之廠商及實際審查\n後之投標廠商家數，均不受採購法第48條第1項關於3家以上合格廠商投標之\n限制。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理決標，合於決標原則之廠商無需減價或已完成減價或綜合評選程序\n者，仍應通知投標廠商到場。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理決標，合於決標原則之廠商無需減價或已完成減價或綜合評選程序\n者，得不通知投標廠商到場。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法規定，機關不得於招標文件中規定或於比減價格或採行協商措施前\n通知參加比減價格或協商之廠商比減價格或綜合評選之次數為1次或2次。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法規定，機關得於招標文件中規定或於比減價格或採行協商措施前通\n知參加比減價格或協商之廠商比減價格或綜合評選之次數為1次或2次。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"最低標廠商甲優先減價時表示無法減價，仍可參加比減價格。甲於第1次比\n減價格時表示無法減價，機關不得通知該廠商參加第2次比減價格。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"最低標廠商甲優先減價時表示無法減價，仍可參加比減價格。甲於第1次比\n減價格時表示無法減價，機關得不通知該廠商參加第2次比減價格。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購法第52條第1項第1款規定訂有底價之採購，以合於招標文件規定，且在\n底價以內之最低標為得標廠商，不包括平底價之情形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購法第52條第1項第1款規定訂有底價之採購，以合於招標文件規定，且在\n底價以內之最低標為得標廠商，包括平底價之情形。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"合於招標文件規定之投標廠商之最低標價超過底價時，得洽該最低標廠商減\n價1次；減價結果仍超過底價時，得由所有合於招標文件規定之投標廠商重\n新比減價格，比減價格次數由開標主持人定之，不受3次之限制。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商投標文件，招標文件不得禁止使用外文。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關以公開招標辦理新臺幣1,200萬元之勞務採購，除有政府採購公告及公\n報發行辦法第11條第2項之情形外，應於招標公告公開預算金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"底價新臺幣（下同）800萬元，合於招標文件規定之最低標甲廠商總標價為\n650萬元，甲廠商於主持決標人員宣布決標前，當場說明標價計算錯誤，希\n望不決標予甲，機關應不接受其要求，照價決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關審查廠商投標文件時，發現其內容有不明確、不一致或明顯打字或書寫\n錯誤之情形者，得通知投標廠商提出說明，其依據為機關依採購法第33條於\n招標文件中規定允許廠商於開標前補正非契約必要之點之文件者。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關審查廠商投標文件時，發現其內容有不明確、不一致或明顯打字或書寫\n錯誤之情形者，得通知投標廠商提出說明，其依據為機關依採購法施行細則\n第60條之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關以公開招標辦理新臺幣1,200萬元之勞務採購，無須於招標公告公開預\n算金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"合於招標文件規定之最低標廠商，其總標價在底價以內，雖未低於底價之百\n分之八十，惟該最低標廠商主動表示標價錯誤，要求不決標予該廠商，機關\n得依採購法第58條規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託專業服務案件之服務費用，應參酌一般收費情形核實議定。其必須核實\n另支付費用者，應於契約內訂明項目及費用範圍；契約未約定者，不得另為\n任何給付。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"選擇性招標建立合格廠商名單之後續邀標方式應逐一函邀，不得公告為之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"選擇性招標建立合格廠商名單之後續邀標方式，包括公告邀請符合資格之廠\n商投標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"各機關為節省採購成本及人力，得就具有共通需求特性之道路維護工程採\n購，與廠商簽訂共同供應契約。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"各機關為節省採購成本及人力，得就具有共通需求特性之警衛、駕駛、自強\n活動等勞務採購，與廠商簽訂共同供應契約。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商承辦專業服務，不得於招標文件規定得標廠商服務費用降低或\n實際績效提高時，依其情形給付廠商獎勵性報酬。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商承辦專業服務，得於招標文件規定得標廠商服務費用降低或實\n際績效提高時，得依其情形給付廠商獎勵性報酬。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託專業服務案件之服務費用，應參酌一般收費情形核實議定。其必須核實\n另支付費用者，不必契約內訂明項目及費用範圍。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採服務成本加公費法者，應於契約訂明廠商應紀錄各項費用並提出憑\n證，憑證可包括各項費用之發票或收據，但不包括紀錄或報表。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採服務成本加公費法者，應於契約訂明廠商應紀錄各項費用並提出憑\n證，憑證應包括各項費用之發票、收據、紀錄或報表。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商之服務費用，按月或分期支付者，無須於契約中訂明各次付款條件及金\n額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商之服務費用，按月或分期支付者，應於契約中訂明各次付款條件及金\n額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關資訊業務整體委外服務，機關現有電腦軟硬體及通信設施，其所有權將\n移轉予得標廠商者，廠商之報價無須分別載明現有電腦軟硬體及通信設施之\n折價及契約期間之費用。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關資訊業務整體委外服務，機關現有電腦軟硬體及通信設施，其所有權將\n移轉予得標廠商者，廠商之報價應分別載明現有電腦軟硬體及通信設施之折\n價及契約期間之費用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關以公告程序辦理設計競賽，不得採分階段評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關以公告程序辦理設計競賽，得採二階段評選：公開徵求廠商提出設計建\n議書，經評選入選者再邀其提出設計作品供評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"開標後發現不同投標廠商間之投標文件內容有重大異常關聯者，例如：廠商\n之投標文件內容由同一人或同一廠商繕寫或備具者；押標金由同一人或同一\n廠商繳納或申請退還者，機關仍應決標予該等廠商，並同時移送司法機關，\n經一審為有罪判決者，始得終止或解除契約，並得追償損失。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"開標後發現不同投標廠商間之投標文件內容有重大異常關聯者，例如：廠商\n之投標文件內容由同一人或同一廠商繕寫或備具者；押標金由同一人或同一\n廠商繳納或申請退還者，機關應不決標予該等廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採最低標決標者，開標後發現有2家以上廠商標價相同，且均得為決標\n對象時，應由該等廠商再行比減價格1次，以低價者決標。比減後之標價仍\n相同者，繼續比減價格至該2家廠商標價有差異為止，並以低價者決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採最低標決標者，開標後發現有2家以上廠商標價相同，且均得為決標\n對象時，應由該等廠商再行比減價格1次，以低價者決標。比減後之標價仍\n相同者，抽籤決定之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第52條第1項第4款採用複數決標方式，其允許依不同數量報價\n者，依標價及可決標之數量依序決標，但不得有不同之決標價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第52條第1項第4款採用複數決標方式，其允許依不同數量報價\n者，依標價及可決標之數量依序決標，並得有不同之決標價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"由員工自行付費，雖以機關名義購買保險，不適用採購法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"由員工自行付費且非以機關名義購買保險，不適用於採購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依行政程序法第15條規定，機關依法規將其權限之一部分，委任所屬下級機\n關執行之職權委任事項，為採購法第2條所稱勞務委任。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依行政程序法第15條規定，機關依法規將其權限之一部分，委任所屬下級機\n關執行之職權委任事項，無採購法之適用。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款公開評選廠商承辦專業服務，採固定服務費\n用決標，故後續免與優勝廠商辦理議價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第9款公開評選廠商承辦專業服務，採固定服務費\n用決標，後續仍應與優勝廠商辦理議價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關利用共同供應契約採購新臺幣（下同）5萬元電腦周邊設備，如契約載\n明可附加訂購相關配備者，一併訂購8萬元之相關附加配備。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關利用共同供應契約採購新臺幣（下同）5萬元電腦周邊設備，如契約載\n明可附加訂購相關配備者，一併訂購3萬元之相關附加配備。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購得於契約規定，廠商履約人員應依機關通知撤換，廠商不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購得於契約規定，廠商履約人員有不適任之情形者，機關得通知廠商\n撤換，廠商不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購需經一定履約過程，非以現成勞務供應者，不得於契約中就重點項\n目訂定檢查程序及標準。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購需經一定履約過程，非以現成勞務供應者，得於契約中就重點項目\n訂定檢查程序及標準。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購標的於使用期間有由原供應廠商提供維修服務之必要者，其第2年使用\n期間之維修服務，不得附於採購標的合併辦理招標決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購標的於使用期間有由原供應廠商提供維修服務之必要者，其第1年使用\n期間之維修服務，以附於採購標的合併招標決標為原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"終止或解除契約，屬不可歸責於廠商之情形者，機關得依其所認定之適當方\n式，自行或洽其他廠商完成被終止或解除之契約；其所增加之費用，由原契\n約廠商負擔。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"終止或解除契約，屬可歸責於廠商之情形者，機關得依其所認定之適當方\n式，自行或洽其他廠商完成被終止或解除之契約；其所增加之費用，由原契\n約廠商負擔。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採購「商品檢驗法」所定應施以檢驗之商品，驗收時尚無須取得檢驗合\n格相關證明文件，但應檢查商品本體上亦應貼附商品檢驗標識，始符合規\n定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關採購「商品檢驗法」所定應施以檢驗之商品，驗收時均應取得檢驗合格\n相關證明文件，並檢查商品本體上亦應貼附商品檢驗標識，始符合規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理重大新興資訊業務或重大設備汰舊換新，不得以整體委外服務方\n式，將屬財物採購之電腦軟硬體、通信設施與勞務採購之人力及技術同時委\n託廠商提供。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理重大新興資訊業務或重大設備汰舊換新，得以整體委外服務方式，\n將屬財物採購之電腦軟硬體、通信設施與勞務採購之人力及技術同時委託廠\n商提供。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購法第22條第1項第13款所稱具領先地位之自然人，指在相關專業領域之\n表現，曾獲國內政府機關、學術機構或具有公信力之團體獎勵或表揚者，尚\n不包括國外獲獎者。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購法第22條第1項第13款所稱具領先地位之自然人，得為在相關專業領域\n之表現，曾獲國內外政府機關、學術機構或具有公信力之團體獎勵或表揚\n者。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第50條第2項規定撤銷決標或解除契約時，其原係採最有利標\n為決標原則者，得以原決標價依決標前各投標廠商標價之順序，自標價低者\n起，依序洽其他合於招標文件規定之未得標廠商減至該決標價後決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第50條第2項規定撤銷決標或解除契約時，其原係採最低標為\n決標原則者，得以原決標價依決標前各投標廠商標價之順序，自標價低者\n起，依序洽其他合於招標文件規定之未得標廠商減至該決標價後決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"旅遊服務得為專業服務，依採購法第22條第1項第9款規定辦理，且履約地點\n在原住民地區者，應適用原住民族工作權保障法第11條規定，優先由原住民\n承作。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"旅遊服務得為專業服務，採行採購法第22條第1項第9款規定辦理者，不論履\n約地點是否在原住民地區，均無須適用原住民族工作權保障法第11條優先由\n原住民承作之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關得視實際需要，將費用未達公告金額之委託研究發展案，依採購法第22\n條第1項第13款及「機關委託研究發展作業辦法」規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託法人或團體代辦採購，其委託屬勞務採購。受委託代辦採購之法人\n或團體，不須具備熟諳政府採購法令之人員來承辦業務。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託法人或團體代辦採購，其委託屬勞務採購。受委託代辦採購之法人\n或團體，須具備熟諳政府採購法令之人員來承辦業務。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"決標依採購法第52條第1項第2款規定辦理者，合於招標文件規定之最低標價\n逾評審委員會建議之金額或預算金額時，經減價及比減價格結果，最低標價\n仍逾越上開金額，得經機關首長或其授權人員核准，於不逾上開金額百分之\n八以內超建議金額決標。但查核金額以上之採購，超過建議金額百分之四\n者，應先報經上級機關核准後決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"決標依採購法第52條第1項第2款規定辦理者，合於招標文件規定之最低標價\n逾評審委員會建議之金額或預算金額時，經減價及比減價格結果，最低標價\n仍逾越上開金額時，應予廢標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，招標文件規定廠商報價金額包括機關支出及收入金額者，以\n收入金額認定採購金額。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，招標文件規定廠商報價金額包括機關支出及收入金額者，以\n支出金額認定採購金額。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公營事業為銷售目的委託仲介促銷，非屬採購行為，不受採購法之規範。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公營事業為銷售目的委託仲介促銷，屬採購行為，受採購法之規範。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理印刷服務採購，採分批交貨，各次交貨付款前，均應辦理驗收。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理印刷服務採購，採分批交貨，採購法並未規定各次交貨付款前，均\n應辦理驗收。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"投標文件份數多寡，由投標廠商視情況決定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"投標文件份數多寡，由招標機關視情況決定，於招標文件載明。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"非屬特殊採購預算金額為新臺幣1,500萬之勞務採購，得訂定投標廠商之特\n定資格。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關發現廠商投標文件所標示之分包廠商，於截止投標或截止收件期限前屬\n採購法第103條第1項規定期間內不得參加投標或作為決標對象或分包廠商之\n廠商者，廠商得依原標價以其他合於招標文件規定之分包廠商代之，並通知\n機關。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關發現廠商投標文件所標示之分包廠商，於投標後至決標前方屬採購法第\n103條第1項規定期間內不得參加投標或作為決標對象或分包廠商之廠商者，\n廠商得依原標價以其他合於招標文件規定之分包廠商代之，並通知機關。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第49條以公開取得方式辦理未達公告金額之旅遊服務採購，係\n以機關地點是否位於原住民地區，來判斷是否應適用原住民族工作權保障法\n第11條規定，優先由原住民承作。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第49條以公開取得方式辦理未達公告金額之旅遊服務採購，係\n以履約地點是否位於原住民地區者，來判斷是否應適用原住民族工作權保障\n法第11條規定，優先由原住民承作。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關與廠商因履約爭議合意仲裁，機關依仲裁法委任仲裁代理人，係依仲裁\n法規定辦理，無採購法之適用。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關與廠商因履約爭議合意仲裁，機關依仲裁法委任仲裁代理人，屬勞務採\n購，應依採購法之規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理決標，最低標標價為「零」或「負數」之廠商，為無效標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理決標，除有採購法第58條情形者外，得認定最低標標價為「零」或\n「負數」之廠商得標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商以現金繳納押標金並附於投標文件內遞送者，為合格標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"廠商以現金繳納押標金並附於投標文件內遞送者，為不合格標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依「機關指定地區採購房地產作業辦法」公開徵求勘選認定適合需要之\n房地產，應依採購法第94條規定，成立採購評選委員會。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依「機關指定地區採購房地產作業辦法」公開徵求勘選認定適合需要之\n房地產，因非屬評選，無採購法第94條之適用，免成立採購評選委員會。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第11款及機關指定地區採購房地產作業辦法辦理\n房地產之勘選者，於招標前均須報上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第11款及機關指定地區採購房地產作業辦法辦理\n房地產之勘選者，不論採購金額大小，無須於招標前報上級機關核准。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，不得禁止大陸地區產品投標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購，得否允許大陸地區廠商為投標廠商，係由招標機關視個案性\n質及實際需要於招標文件中載明，採購法並無禁止規定，惟應符合「臺灣地\n區與大陸地區人民關係條例」之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第14款規定採公告審查程序辦理藝文採購，除招\n標文件另有規定外，公告結果，僅一文化、藝術專業人士、機構或團體投標\n者，不得進行審查。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第22條第1項第14款規定採公告審查程序辦理藝文採購，除招\n標文件另有規定外，公告結果，僅一文化、藝術專業人士、機構或團體投標\n者，仍得進行審查。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託研究發展其整體規劃部分於招標文件將執行事項列為擴充項目時，整體\n規劃部分之採購金額無須將該等執行事項之預估金額計入。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託研究發展其整體規劃部分於招標文件將執行事項列為擴充項目時，整體\n規劃部分之採購金額應將執行事項之預估金額計入。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"委託專業服務，其屬採購標的內之重要項目，有訂定分包廠商資格之必要\n者，不適用政府採購法有關投標廠商資格之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法規定，機關之作為，只要沒有支付費用予廠商之情形，即非屬採購\n法所稱採購，不適用該法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理採購依採購法第51條、第53條、第54條或第57條規定，通知廠商說\n明、減價、比減價格、協商、更改原報內容或重新報價，廠商未依通知期限\n辦理者，視同棄權，並列為不合格標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"招標機關依採購法第58條規定認為廠商標價偏低且廠商無法提出合理說明\n時，得沒收其押標金並以次低標為最低標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"招標文件資格規定之一為公會會員證，而某學校投標未檢附該文件，機關可\n基於學校本無該文件為由，依採購法第6條第2項規定，審查其為合格標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"決標依採購法第52條第1項第2款規定辦理者，除小額採購外，應成立評審委\n員會，其成員之組成準用採購法第94條之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"某機關依採購法辦理公開招標，招標文件載明得於開標當日辦理決標，廠商\n未到場說明或減價者視同放棄。開標結果5家投標廠商均合格，惟報價均超\n底價，最低報價之3家均未到場，主持人請第4低標廠商優先減價，該廠商減\n至底價後辦理決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"採購法所稱財物，例如各種物品（生鮮農漁產品除外）、材料、設備、機具\n與其他動產等。但不包括權利。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"公立學校向政府機關採購財物且為公告金額以上之採購，方得準用特別採購\n招標決標處理辦法之規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"適用機關利用共同供應契約訂購物品，於選定廠商後，仍應依規定於廠商繳\n納履約保證金後簽訂契約。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"某中央機關利用共同供應契約採購電腦設備計新臺幣（下同）120萬元，如\n擬另增購相關配備約20萬元，得逕洽該共同供應契約廠商訂購，免辦理議價\n程序。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關委託廠商承辦專業服務，其服務費用之計算，得採建造費用百分比法計\n費。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"關於預算尚未完成立法程序，不得先行辦理招標程序。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依機關委託研究發展作業辦法第3條第1項規定選定在專業領域具領先地\n位之自然人，該項研究發展案件得以該自然人以外之人擔任計畫主持人。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"勞務採購需於原契約所訂事項以外增加服務事項，金額在公告金額以上且未\n逾原主契約金額百分之五十時，得依政府採購法第22條第1項第6款規定採限\n制性招標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理公告金額以上且以分段開標方式辦理，除第1階段應公告外，後續\n階段之邀標，仍應予公告。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"為利廠商繳納及轉帳作業，押標金金額與履約保證金金額，應劃一標準。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理委託研究發展，其費用在公告金額以上者，應依採購法第22條第1\n項第13款及「機關委託研究發展作業辦法」規定辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"非以現成財物供應之財物採購，得標廠商以其他廠商履行契約，屬轉包行\n為。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關審查廠商投標文件，審查結果應於完成後儘速通知投標廠商，最遲不得\n逾決標或廢標日10日。對不合格之廠商，無須敘明其原因。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理財物採購，招標文件雖未規定允許廠商提出替代方案，一投標廠商\n得就同一採購提供2種樣品並分報2種價格，供機關自行選擇。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理電腦設備及維護，其中電腦設備約占總價七成，維護費用（含軟\n體、硬體）約占總價三成，得標廠商將硬體維護部分交由別家公司代為履\n行，屬轉包情形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"現行財產保險商品多屬定型化契約，故機關辦理保險採購非屬專業服務，不\n得依「機關委託專業服務廠商評選及計費辦法」以公開評選方式擇優勝廠商\n方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依押標金保證金暨其他擔保作業辦法規定，機關辦理財物採購得於招標文件\n規定得標廠商繳納履約保證金後，應另行提出其他廠商之舖保。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依採購法第50條第2項規定終止契約時，原係採最低標為決標原則者，\n得依採購法施行細則第58條規定，以原決標價依決標前各投標廠商標價之順\n序，自標價低者起，依序洽其他合於招標文件規定之未得標廠商減至該決標\n價後決標。其無廠商減至該決標價者，得依採購法第52條第1項第1款、第2\n款及招標文件所定決標原則辦理決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"新臺幣（下同）2,000萬元之勞務採購，經評估無不當限制競爭情形，機關\n得依實際需要，訂定投標廠商之實收資本額不得低於300萬元。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"監辦人員之監辦，對於機關所為實質或技術之審查事項有違反法令情形者，\n不得提出意見。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"監辦人員之監辦，對於機關所為實質或技術之審查事項有違反法令情形者，\n仍得提出意見。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理委託研究發展，得規定公立或非營利之研究機構免繳驗納稅證明或\n加入工業或商業團體之基本資格證明文件。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"合於招標文件規定之投標廠商之最低標價超過底價時，得洽該最低標廠商減\n價1次；減價結果仍超過底價時，得由所有合於招標文件規定之投標廠商重\n新比減價格，比減價格不得逾3次。機關限制廠商比減價格或綜合評選之次\n數為1次或2次者，應於比減價格或採行協商措施前通知參加比減價格或協商\n之廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"非屬特殊採購，採購金額為新臺幣1,500萬之勞務採購，不得訂定投標廠商\n之特定資格。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"決標依採購法第52條第1項第2款規定辦理者，除小額採購外，得成立評審委\n員會，其成立時機，比照採購法第46條第2項有關底價之訂定時機。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"決標依採購法第52條第1項第2款規定辦理者，除小額採購外，應成立評審委\n員會，其成立時機，比照採購法第46條第2項有關底價之訂定時機。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關審查廠商投標文件，審查結果應於完成後儘速通知投標廠商，最遲不得\n逾決標或廢標日30日。對不合格之廠商，並應敘明其原因。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關審查廠商投標文件，審查結果應於完成後儘速通知投標廠商，最遲不得\n逾決標或廢標日10日。對不合格之廠商，並應敘明其原因。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"機關依政府採購法第22條規定評選委託專業服務廠商，如最優勝廠商有2家\n以上，且非採固定服務費用或費率計費時，則以抽籤方式決定優先議價廠\n商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"財物及勞務採購作業","law_ref":null,"stem":"依採購法第58條規定，最低標之總標價低於底價之百分之八十，機關認為顯\n不合理，有降低品質、不能誠信履約之虞或其他特殊情形，最低標依機關所\n定期限提出說明後，機關如認為該說明合理，則於通知最

options":["除限制性招標議價外，底價係未見廠商報價前預估成本\n及競爭等情形所訂定決標之底限。","最有利標於評選時參考廠商提出之報\n價內容進行分析評分或評比。","底價應依圖說、規範、契約並考量成本、\n市場行情及政府機關決標資料逐項編列。","為提升議價效率，機關得於廠\n商議價過程中建議廠商減至底價。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"招標機關辦理採購，以最有利標決標，故不訂底價，下列何種敘述為不正\n確？","options":["未違反採購法第47條之規定。","規定廠商於投標文件中詳列報價\n內容。","招標文件無需載明評選項目。","得依招標文件規定採行協商措\n施以便洽廠商更改投標文件內容。"],"answer":2},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"採固定價格評選優勝廠商，為避免廠商產生超額利潤並維護招標機關權益，\n下列何者應納入評分項目？","options":["價格。","標的之功能、效益。","品質的\n可靠度。","廠商提出與採購標的相關之創意事項。"],"answer":3},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"依採購法，下列何者有誤？","options":["機關於第1次比減價格前，應宣布最低標廠\n商減價結果。","最低標廠商優先減價時得書面表示減至底價。","第2次\n以後比減價格前，應宣布前一次比減價格之最低標價。","機關得限制廠商\n比減價格之次數為2次。"],"answer":1},{"type":"choice","category":"底價及價格分析","law_ref":null,"stem":"機關辦公傢俱招標案，依採購法規定採最低標決標，最低標廠商標價為新臺\n幣（下同）410萬元，低於底價600萬元，機關認為廠商提出之說明尚非完全\n合理，關於差額保證金之通知，下列何者正確？","options":["不通知該廠商提出。","通知該廠商繳納10萬元。","通知該廠商繳納70萬元。","通知該廠商\n繳納190萬元。"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關依實際需要，得於招標文件中公告底價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理小額採購，仍應訂定底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"未訂底價之採購，以合於招標文件規定，標價合理，且在預算數額以內之最\n低標為得標廠商，非屬採購法規定之決標原則之一。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"未訂底價之採購，以合於招標文件規定，標價合理，且在預算數額以內之最\n低標為得標廠商，為採購法規定之決標原則之一。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關訂定底價，不得基於廠商產品品質之差異，訂定不同之底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關訂定底價，得基於廠商產品品質之差異，訂定不同之底價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購，其採最有利標決標原則，如招標文件訂明固定費用或費率\n者，因價格不納入評選，故機關不得規定廠商於投標文件內詳列報價內容。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購，其採最有利標決標原則，如招標文件訂明固定費用或費率\n者，價格雖不必納入評選，但機關仍得規定廠商於投標文件內詳列報價內\n容。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"某機關辦理未達查核金額之採購，底價係由機關首長授權處長核定，開標結\n果最低標價仍超過底價3%但不逾預算數額，機關確有緊急情事需決標，應經\n處長核准後方可決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"某機關辦理未達查核金額之採購，底價係由機關首長授權處長核定，開標結\n果最低標價仍超過底價3%但不逾預算數額，機關確有緊急情事需決標，應經\n處長或其授權人員核准後即可決標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"單價偏低之情形，不包括誤報（少1位數）之情形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"單價偏低之情形，有可能係誤報（少1位數）或故意低報（先領款之部分高\n報，後領款之部分低報）。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購，均應訂定底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購，符合得不訂定底價情形者，招標文件應敘明理由及決標條件\n與原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理減價或比減價格結果在底價以內時，除有採購法第58條總標價或部\n分標價偏低之情形者外，應即宣布決標。所稱在底價以內，不包括平底價之\n情形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理減價或比減價格結果在底價以內時，除有採購法第58條總標價或部\n分標價偏低之情形者外，應即宣布決標。所稱在底價以內，包括平底價之情\n形。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理公開取得廠商書面報價之採購，僅1家廠商投標，當場改採限制性\n招標之議價，其底價訂定前應先參考廠商之報價或估價單。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"流標後因底價未開啟，其重行招標，即使招標條件均未改變，底價仍應重新\n訂定並經機關首長或其授權人核准，不得沿用原底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"流標後因底價未開啟，其重行招標，如招標條件均未改變，底價得經機關首\n長或其授權人核准免再重新訂定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理最有利標決標之採購且廠商須報價者，應審查廠商總價（不包括單\n價），並考量該價格相對於廠商所提供之品質等非價格項目，是否合理、完\n整，以作為評分或決定最有利標之依據。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理最有利標決標之採購且廠商須報價者，應審查廠商單價及總價，並\n考量該價格相對於廠商所提供之品質等非價格項目，是否合理、完整，以作\n為評分或決定最有利標之依據。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理查核金額以上之採購，訂定底價應報上級機關核定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"以轉售或供製造成品以供轉售之採購，其底價涉及商業機密者，底價於決標\n後得不予公開，但應通知得標廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理查核金額以上之採購，訂定底價無需報上級機關核定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"以轉售或供製造成品以供轉售之採購，其底價涉及商業機密者，底價於決標\n後得不予公開，但應通知各投標廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購案如於使用期間有由原供應廠商提供維護服務之必要者，其後\n續數年維護服務之價格，不可附於採購標的合併招標決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理採購案如於使用期間有由原供應廠商提供維護服務之必要者，其後\n續數年維護服務之價格，可附於採購標的一併考量，合併招標決標，以免造\n成後續維護作業發生困難。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關對於採購標的，不得因廠商交付標的之品質、功能、使用效益等有所差\n異，而訂定不同之底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關對於採購標的，基於廠商交付標的之品質、功能、使用效益等差異之考\n量，而訂定不同之底價，尚無不可。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理工程採購之預算金額達新臺幣1,000萬元以上者，僅須於決標後將\n得標廠商之決標單價資料透過政府電子採購網傳輸至工程價格資料庫。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理工程採購之預算金額達新臺幣1,000萬元以上者，應於決標後一定\n期限內將得標廠商之契約單價及經機關核定之預算單價資料透過政府電子採\n購網傳輸至工程價格資料庫。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關廢標後重行招標，如招標之圖說、規範、契約、成本、市場行情等有所\n改變，不須依採購法第46條規定重行訂定底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關廢標後重行招標，如招標之圖說、規範、契約、成本、市場行情等有所\n改變，應依採購法第46條規定重行訂定底價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"合於招標文件規定之投標廠商之最低標價超過底價時，得洽該最低標廠商減\n價1次；減價結果仍超過底價時，得由所有合於招標文件規定之投標廠商重\n新比減價格，上述最低標廠商減價1次及比減價格之次數合計不得逾3次。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"合於招標文件規定之投標廠商之最低標價超過底價時，得洽該最低標廠商減\n價1次；減價結果仍超過底價時，得由所有合於招標文件規定之投標廠商重\n新比減價格，上述比減價格之次數合計不得逾3次。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理訂有底價之採購，以合於招標文件規定，且在底價以內之最低標為\n得標廠商者，因物價商情上揚，為利決標，底價得以超過預算金額訂定之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關辦理訂有底價之採購，以合於招標文件規定，且在底價以內之最低標為\n得標廠商者，雖因物價商情上揚，底價仍不得以超過預算金額訂定之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"機關利用主管機關之採購資訊系統傳輸決標公告，其有底價而不予公開者，\n應敘明理由。採單價乘以預估數量之和決標並以單價訂定契約者，因係以單\n價訂定契約，故僅需傳輸單價資料。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"採購法第11條第2項所稱一定金額，為工程採購之查核金額，新臺幣5,000萬\n元。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"採購法第11條第2項所稱一定金額，為新臺幣1,000萬元。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"依採購法第54條，當合於招標文件規定之最低標價，逾評審委員會建議之金\n額時，招標機關尚不得未洽廠商減價，即逕行宣布廢標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"依採購法第54條，當合於招標文件規定之最低標價，逾評審委員會建議之金\n額時，招標機關得依廠商之報價情形判斷，不請廠商減價，逕行宣布廢標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"投標廠商之標價幣別，依招標文件規定在2種以上，如最低標廠商之總標價\n（經折算後）有採購法第58條前段情形，致未能於辦理決標作業當日完成決\n標程序者，製作保留決標紀錄，載明如有決標時，以最低標廠商之說明經機\n關首長或其授權人認可核定之日為決標日。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"投標廠商之標價幣別，依招標文件規定在2種以上，如最低標廠商之總標價\n（經折算後）有採購法第58條前段情形，致未能於辦理決標作業當日完成決\n標程序者，製作保留決標紀錄，載明如有決標時，以保留決標日為決標日。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"底價及價格分析","law_ref":null,"stem":"採適用最有利標決標時，以不訂底價為原則。其訂有 業務，以整\n體委外服務方式，不可包括硬體設備等財物採購。","符合經濟部投資審議\n司公告「具敏感性或國安（含資安）疑慮之業務範疇」者，得禁止以陸資資\n訊服務業為分包廠商。","得要求廠商駐點服務人員簽具保密切結書。","可採行最有利標決標。"],"answer":0},{"type":"choice","category":"採購契約","law_ref":null,"stem":"依採購法主管機關之「採購契約範本附記條款特別聲明」，廠商於履約過程\n使用資通訊產品履約時，下列何者不得使用？","options":["中國大陸廠牌之資通訊產\n品。","日本國廠牌之資通訊產品。","韓國廠牌之資通訊產品。","美國\n廠牌之資通訊產品。"],"answer":0},{"type":"choice","category":"採購契約","law_ref":null,"stem":"有關採購法主管機關所定「採購契約範本附記條款特別聲明」載明履約禁用\n中國大陸廠牌資通訊產品、不得提供公務機密予AI及使用AI履約須報機關同\n意等規定，下列何者錯誤？","options":["履約過程及履約標的禁止使用及採購中國\n大陸廠牌資通訊產品〔含軟體、硬體及服務（含生成式AI程式如：Deepseek\n等）〕。","廠商履約過程及成果需透過使用及採購生成式AI以產出履約標\n的內容或相關文件者，應先徵得機關同意始得為之。","廠商不得向生成式\nAI提供採購案涉及公務應保密、個人及未經機關（構）同意公開之資訊，亦\n不得向生成式AI詢問可能涉及採購案機敏或個人資料之事項。","契約本文\n之效力優於本特別聲明附記條款。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列何者錯誤？","options":["機關通知廠商變更契約，廠商於機關接受其所提出須變\n更之相關文件前，不得自行變更契約。","機關於接受廠商所提出須變更之\n事項前即請求廠商先行施作，其後如未依原通知辦理契約變更者，應補償廠\n商所增加之必要費用。","契約所定事項如有違反法令或無法執行之部分，\n該部分無效。該無效之部分，機關及廠商必要時得依契約原定目的更正之。","機關以正式公文通知廠商變更契約，縱廠商表示反對，契約變更仍生效\n力。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"契約訂有分段進度及最後履約期限，且均訂有逾期違約金者，屬全部完工後\n使用或移交之情形，其逾期違約金之計算下列何者為是？","options":["逾分段進度但\n未逾最後履約期限，計算逾分段進度之違約金。","逾分段進度且逾最後履\n約期限，應就逾分段進度及最後履約期限部分，分別計罰違約金。","分段\n完工期限與其他採購契約之進行有關者，逾分段進度但未逾最後履約期限，\n其有逾分段進度已收取之違約金者，於未逾最後履約期限後發還。","最後\n履約期限與其他採購契約之進行有關者，未逾分段進度但逾最後履約期限\n者，計算逾最後履約期限之違約金。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列何者錯誤？","options":["機關對於廠商、分包廠商及其人員因履約所致之人體傷\n亡或財物損失，不負賠償責任。","因可歸責於廠商之事由，致機關遭受損\n害者，廠商應負賠償責任，機關得於招標文件預先載明廠商無需對「所失利\n益」負賠償責任。","契約之一方未請求他方依契約履約者，得視為或構成\n一方放棄請求他方依契約履約之權利。","契約所定技術規格違反採購法第\n26條規定，廠商得敘明理由，檢附規格、功能、效益及價格比較表，徵得機\n關書面同意後，以其他規格、功能及效益相同或較優者代之。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"招標文件未另定契約生效條件者，下列何者為契約生效日？","options":["決標日。","決標日之次一上班日。","雙方完成契約簽署之日。","依機關指定之\n日期。"],"answer":0},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列敘述何者正確？","options":["分包廠商不得將分包契約再行分包。","轉包廠商\n如有再轉包者，其中間轉包之廠商雖未與機關訂有契約，亦未實際履行契約\n者，仍應與得標廠商及最後轉包廠商對機關負連帶履行及賠償責任。","機\n關要求廠商報備其分包契約時，廠商應一併將分包部分設定權利質權予分包\n廠商。","廠商就分包部分設定權利質權予分包廠商，則該分包廠商所負契\n約連帶瑕疵擔保責任，與得標廠商相同。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列就採購法主管機關訂定之採購契約範本之敘述何者正確？","options":["屬必要條\n件。","以採用為原則。","範本內容均不可修改。","只要預先聲明即可\n不必採用。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"機關視個案性質，於工程採購招標文件中要求廠商履約期間辦理營造綜合保\n險，下列敘述何者有誤？","options":["工程有延期或遲延履約，保險期間順延。","將機關及其技術服務廠商、施工廠商及全部分包廠商列為共同被保險人。","附加第三人建築物龜裂倒塌責任險或鄰近財物附加條款。","載明每一\n事故之廠商自負額下限。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列何者情形，致廠商履約費用增加或減少者，契約價金得予調整？","options":["匯\n率變動。","汽油價格上漲。","政府縮短工時政策。","員工罷工。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"依採購法主管機關訂定之工程採購契約範本，契約價金係以總價決標，且以\n契約總價給付，工程標的中某項之實作數量較契約所定數量增加達百分之十\n八，以下何者正確？","options":["以契約變更增加該項契約價金百分之十五。其他百\n分之三，由廠商自行負擔。","應完全由廠商自行負擔。","應以契約變更\n增加該項契約價金百分之十八。","由機關與廠商各負擔一半。"],"answer":0},{"type":"choice","category":"採購契約","law_ref":null,"stem":"以下簽訂契約之方式，何者為非？","options":["採購個案，招標文件預先載明分訂2\n個契約，而與廠商訂定2個契約。","採購個案，因採複數決標，得標後，\n分別與廠商就其得標項目訂定契約。","採購個案，因採共同投標，得標\n後與各該成員就其主辦項目，分別訂定契約。","機關利用共同供應契約採\n購，下訂後無須再與廠商簽訂契約。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列敘述何者正確？","options":["得標廠商其於國內員工總人數逾100人，履約期間\n僱用身心障礙者及原住民人數各應達國內員工總人數1%之規定，須於契約明\n定始生效力。","政府採購契約約定履約期限以日曆天計算者，如該履約期\n間之末日適逢星期假日、國定假日或其他休息日，而契約未有特別約定者，\n適用民法第122條所定「以其休息日之次日代之」。","契約應訂明得標廠\n商其於國內員工總人數逾100人，履約期間僱用身心障礙者及原住民人數不\n足者，應分別依規定繳納代金，並將繳納證明文件影本送機關查核。","得\n標廠商擬分包之項目及分包廠商，屬得標廠商之權責，機關不得予以審查。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列敘述何者正確？","options":["契約文件不包括招標文件。","對於分包廠商履約\n之部分，得標廠商仍應負完全責任。但分包契約報備於機關者不在此限。","分包契約報備於採購機關，並經得標廠商就分包部分設定權利質權予分\n包廠商者，其分包部分之瑕疵擔保責任，由分包廠商承擔，得標廠商得免除\n其責任。","契約條款預先置於招標文件。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列何者非機關得辦理採購契約價金調整之情形？","options":["因國內政府法令之變\n更。","因國外稅捐變更。","總價結算工程契約之單項履約數量因契約變\n更須增減。","依契約約定辦理物價指數調整。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"依採購契約要項，逾期違約金，以契約價金總額之多少比率為上限？","options":["10%。","20%。","30%。","40%。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"得標廠商，在何種情形下，得請求契約變更？","options":["所交之財物不符契約約\n定。","機關之需求變更。","契約原標示之廠牌型號停產。","所使用之\n材料不符契約約定，要求減價收受。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列何者非屬契約文件？","options":["契約本文。","投標文件。","招標文件。","拒絕往來廠商名單。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"逾期違約金，為損害賠償預定違約金，以日為單位，請問下列情形何者不\n宜？","options":["違約金之上限定為契約總價之百分之五十。","每逾1日以契約總\n價之一定比率處罰。","違約金之上限定為契約總價之百分之二十。","每\n逾1日以定額處罰。"],"answer":0},{"type":"choice","category":"採購契約","law_ref":null,"stem":"契約約定所有應檢驗或測試之費用應由廠商負擔。在何種情況下應由機關負\n擔？","options":["檢驗結果合格。","測試結果不合格。","檢測契約約定以外之項\n目結果合格。","檢測契約約定以外之項目結果不合格。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"機關與廠商於契約之相互通知，除得於契約中約定外，不宜以下列何種方式\n為之？","options":["書面文件。","信函。","傳真。","口頭。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列敘述何者正確？","options":["契約變更以機關公文通知即為有效。","廠商履約\n結果涉及智慧財產權者，機關應取得全部權利。","機關對於廠商及其人員\n因履約所致之人體傷亡或財物損失，不負賠償責任。","機關應就廠商向保\n險人索賠所費時間給予延長履約期限。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列敘述何者錯誤？","options":["機關得於契約約定，廠商擬分包之項目及分包廠\n商，機關得予審查。","機關應對廠商工地作業及施工方法之適當性、可靠\n性及安全性負完全責任。","機關得於契約約定履約爭議經契約雙方同意並\n訂立仲裁協議書後，依契約約定及仲裁法規定提付仲裁。","採購標的之送\n達地點及履約處所，應於契約內訂明。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列何種情形，廠商尚不得敘明理由，檢附規格、功能、效益及價格比較\n表，徵得機關書面同意後，以其他規格、功能及效益相同或較優者代之？","options":["契約原標示之廠牌或型號不再製造或供應。","契約原標示之分包廠商\n不再營業或拒絕供應。","較契約原標示者更優或對機關更有利。","契約\n原標示之廠牌價格高，契約價格無法容納。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列敘述何者錯誤？","options":["契約文件包括招標文件及其變更或補充。","廠\n商之投標文件非屬契約文件。","契約文件得包括以書面、錄音、錄影、照\n相、微縮、電子數位資料或樣品等方式呈現之原件或複製品。","契約所包\n括之各種文件，應明定其效力及優先順序。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"下列敘述何者錯誤？","options":["採購契約要項內容，由機關依採購之特性及實際需\n要擇訂於契約。","契約文字應以中文書寫，其與外文文意不符者，除契約\n另有約定者外，以中文為準。","契約變更，除採購法另有規定外，非經機\n關及廠商雙方之合意，作成書面紀錄，並簽名或蓋章者，無效。","任何契\n約均應記載固定金額之總價。"],"answer":3},{"type":"choice","category":"採購契約","law_ref":null,"stem":"契約訂有分段進度及最後履約期限，且均訂有逾期違約金，屬分段完工使用\n或移交者，除分段完工期限與其他採購契約之進行有關者外，逾分段進度且\n逾最後履約期限者，其逾期違約金之計算下列何者為是？","options":["扣除已分段完\n工使用或移交部分之金額，計算逾最後履約期限之違約金。","計算逾分段\n進度之違約金。","分別計算違約金。但逾最後履約期限之違約金，應扣除\n已分段完工使用或移交部分之金額計算之。","個別計算違約金。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"某工程採購在開標前，機關發現招標文件之「工程規範說明書」漏印兩頁重\n要圖說。此時機關最適當的處置為何？","options":["已有廠商投標，為保護投標廠商\n權益，應照常開標決標，事後再辦理變更。","重要圖說屬「變更或補充招\n標文件內容」之情形，應不予開標。","繼續開標，但要求投標廠商現場\n簽名表示不計較漏印部分。","只要投標廠商超過3家，即可視為不影響公\n正，繼續辦理決標。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"機關辦理工程採購之估驗計價付款期限，下列敘述何者正確？","options":["依行政院\n主計總處之「公款支付時限及處理應行注意事項」辦理。","依個案契約約\n定辦理；契約未約定者，依採購法第73條之1規定辦理。","契約不得約定\n機關應於15工作天內完成審核並付款予廠商。","依採購法規定，不論是否\n涉及向上級機關申請核撥補助款者，期限均相同。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"統包工程採購，契約價金係以總價決標，且以契約總價給付。某項目實作數\n量較核定詳細表所定數量增加8％時，就契約價金之結算，下列何者正確？","options":["以契約變更增加該項目契約價金3％。","以契約變更增加該項目契約價\n金8％。","不予增加契約價金。","視經費情況協議之。"],"answer":2},{"type":"choice","category":"採購契約","law_ref":null,"stem":"廠商於履約過程使用中國大陸廠牌資通訊產品（含中國大陸生成式AI程式\nDeepseek），下列何者錯誤？","options":["機關得以書面通知廠商終止或解除全部\n或部分契約。","廠商於得標後只要不簽署「使用資通訊產品禁制事項同意\n書/切結書」就可以使用中國大陸廠牌資通訊產品。","致第三人權利受有\n損害者，廠商應負責任。","廠商違反契約禁制事項，適用契約本文關於權\n利及責任條款之違約責任，就機關所受損害負賠償之責。"],"answer":1},{"type":"choice","category":"採購契約","law_ref":null,"stem":"機關辦理勞動派駐採購，下列何者為是？","options":["機關不得指揮監督管理派駐勞\n工。","可採行最有利標決標。","機關得於要派契約中訂明派駐勞工年齡\n不得逾60歲。","機關得於招標文件訂明得標廠商應僱用原派駐勞工。"],"answer":1},{"type":"yn","category":"採購契約","law_ref":null,"stem":"決標或簽約後發現所列廠牌目前無法製造、供應，不容易取得，價格不合\n理，不能確保採購品質，或代理商、經銷商有公平交易法所稱之獨占或聯合\n行為之情事之一者，契約約定之採購標的，廠商得敘明理由，檢附規格、功\n能、效益及價格比較表，徵得機關書面同意後，以其他規格、功能及效益相\n同或較優者代之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"採購契約","law_ref":null,"stem":"決標或簽約後發現所列廠牌目前無法製造、供應，不容易取得，價格不合\n理，不能確保採購品質，或代理商、經銷商有公平交易法所稱之獨占或聯\n合行為之情事之一者， ory":"履約管理及驗收","law_ref":"第 72 條","stem":"機關辦理採購，有部分先行使用之必要或已履約之部分有減損滅失\n之虞者，得先就該部分辦理驗收或分段查驗供驗收之用，並得就該\n部分支付價金及起算保固期間。但以契約有規定者為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 46 條","stem":"機關依採購法第72條規定辦理減價收受，其減價之金額，尚無須依\n採購法第46條規定訂定底價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"履約管理及驗收","law_ref":"第 72 條","stem":"機關驗收結果與契約規定不符，依採購法第72條規定於必要時辦理\n減價收受者，尚無須經廠商同意。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"履約管理及驗收","law_ref":"第 72 條","stem":"機關驗收結果與契約規定不符，依採購法第72條規定於必要時辦理\n減價收受者，尚須經廠商同意後，方得辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 72 條","stem":"機關辦理採購，有部分先行使用之必要或已履約之部分有減損滅失\n之虞者，應先就該部分辦理驗收或分段查驗供驗收之用，並得就該\n部分支付價金及起算保固期間。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"履約管理及驗收","law_ref":"第 72 條","stem":"機關辦理採購，有部分先行使用之必要或已履約之部分有減損滅失\n之虞者，應先就該部分辦理驗收或分段查驗供驗收之用，並得就該\n部分支付價金。但保固期間之起算仍應自全部驗收之日起算。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 46 條","stem":"機關依採購法第72條規定辦理減價收受，其減價之金額，尚須依採\n購法第46條規定訂定底價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 73 條","stem":"機關辦理付款及審核程序，除契約另有約定外，依採購法規定，其\n付款及審核期限包括例假日、特定假日。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 73 條","stem":"公告金額以上之工程或財物採購於驗收後，符合公用事業依一定費\n率所供應之財物或其他經主管機關認定之情形者，免填具結算驗收\n證明書。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"履約管理及驗收","law_ref":"第 73 條","stem":"公告金額以上之財物採購於驗收後，屬公用事業依一定費率所供應\n之財物者，應填具結算驗收證明書或其他類似文件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 73 條","stem":"機關開具之結算驗收證明書應由驗收及監驗人員分別簽認，並加蓋\n機關印信。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"履約管理及驗收","law_ref":"第 73 條","stem":"機關開具之結算驗收證明書，蓋機關印信免由主驗或監驗人員簽\n認。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 73 條","stem":"機關辦理驗收時得視案件性質免製作紀錄。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"履約管理及驗收","law_ref":"第 73 條","stem":"機關辦理付款及審核程序，除契約另有約定外，依採購法規定，其\n付款及審核期限，係指實際工作日，不包括例假日、特定假日及退\n請受款人補正之日數。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"choice","category":"履約管理及驗收","law_ref":"第 64 條","stem":"採購契約得訂明因政策變更，廠商依契約繼續履行反而不符公共利\n益者，得終止或解除部分或全部契約，但應報經核准之權責為？","options":["經機關首長或授權人員核准。","經上級機關核准。","經主\n管機關核准。","經審計單位核准。"],"answer":1},{"type":"choice","category":"履約管理及驗收","law_ref":"第 65 條","stem":"機關得於招標文件中規定，違反採購法第65條規定轉包者，廠商所\n繳納之何種比率履約保證金（含其孳息）不予發還？","options":["全部。","轉包部分。","已完成履約部分。","致部分終止或解除契約\n者，依該部分所占契約金額比率計算之。"],"answer":0},{"type":"choice","category":"履約管理及驗收","law_ref":"第 65 條","stem":"下列何者錯誤？","options":["採購法規定，得標廠商不得轉包之主要部分，\n指招標文件標示為主要部分；或招標文件標示或依其他法規規定\n應由得標廠商自行履行之部分。","機關得視需要於招標文件中訂\n明得標廠商應將專業部分或達一定數量或金額之分包情形送機關備\n查。","得標廠商違反規定轉包者，機關得解除契約、終止契約或\n沒收保證金，並得要求損害賠償。","得標廠商不得將採購分包予\n外國廠商。"],"answer":3},{"type":"choice","category":"履約管理及驗收","law_ref":"第 67 條","stem":"以下何種廠商得為採購之分包廠商？","options":["被刊登政府採購公報之不\n良廠商。","提供該採購專案管理服務之廠商。","提供該採購審\n標服務之廠商。","以上皆非。"],"answer":3},{"type":"choice","category":"履約管理及驗收","law_ref":"第 67 條","stem":"廠商不得以不具備履行契約分包事項能力或未依法登記或設立之廠\n商為分包廠商。對於分包廠商履約之部分，得標廠商應負之責任，\n下列何者正確？","options":["仍應負催告責任。","仍應負部分責任。","就報備於機關情形負責。","仍應負完全責任。"],"answer":3},{"type":"choice","category":"履約管理及驗收","law_ref":"第 67 條","stem":"分包廠商及於得標廠商對於機關之價金或報酬請求權之條件？","options":["分包契約報備於採購機關，並經得標廠商就分包部分設定權利質權\n予分包廠商者。","分包契約報備於採購機關，或經得標廠商就分\n包部分設定權利質權予分包廠商者。","載明分包廠商者。","分\n包契約報備於採購機關，並經機關同意者。"],"answer":0},{"type":"choice","category":"履約管理及驗收","law_ref":"第 15 條","stem":"工程施工查核小組依採購法第70條規定進行查核時，以下何者敘述\n為錯誤？","options":["得通知工程主辦機關就指定之工程項目進行檢驗、拆\n驗或鑑定。","查核小組查核紀錄應於7個工作天內送工程主辦機\n關。","查核小組定期辦理查核，應預先通知赴工地進行查核，主\n動出示查核小組之書面通知及相關證明文件。","查核委員辦理查\n核時之迴避，準用採購法第15條第2項及第3項之規定。"],"answer":2},{"type":"choice","category":"履約管理及驗收","law_ref":"第 71 條","stem":"下列何者不得為所辦採購之主驗人或樣品及材料之檢驗人？","options":["機\n關總務人員。","該採購案件最基層之承辦人員。","需求單位人\n員。","承辦採購單位之主管。"],"answer":1},{"type":"choice","category":"履約管理及驗收","law_ref":"第 71 條","stem":"機關依採購法第71條第1項規定辦理財物採購驗收，下列何者不是\n得採書面驗收，免辦理現場查驗之情形？","options":["即買即用。","分批\n驗收，其驗收金額不逾公告金額。","經政府機關或公正第三人查\n驗，並有相關品質或數量之證明文書者。","小額採購。"],"answer":1},{"type":"choice","category":"履約管理及驗收","law_ref":"第 71 條","stem":"採購之驗收，無初驗程序者，除契約另有規定者外，機關應於接獲\n廠商通知備驗或可得驗收之程序完成後幾日內辦理驗收，並作成驗\n收紀錄？","options":["30日。","20日。","15日。","10日。"],"answer":0},{"type":"choice","category":"履約管理及驗收","law_ref":"第 71 條","stem":"機關辦理驗收，得委託專業人員或機構人員擔任何種工作？","options":["主\n驗。","會驗。","協驗。","監驗。"],"answer":2},{"type":"choice","category":"履約管理及驗收","law_ref":"第 72 條","stem":"下列何者錯誤？","options":["機關依採購法第72條第1項辦理部分驗收，其\n所支付之部分價金，以支付該部分驗收項目者為限，並得視不符\n部分之情形酌予保留。","機關辦理採購，有部分先行使用之必要\n或已履約之部分有減損滅失之虞者，應先就該部分辦理驗收或分段\n查驗供驗收之用。","機關依採購法第72條第1項通知廠商限期改\n善、拆除、重作或換貨之限期，應於契約預先規定。","結算驗收\n證明書或其他類似文件，除有特殊情形經核准者外，機關應於驗收\n完畢後15日內填具。"],"answer":2},{"type":"choice","category":"履約管理及驗收","law_ref":"第 73 條","stem":"依採購法規定，機關辦理工程採購之付款及審核程序，下列何者有\n誤？","options":["驗收付款者，機關應於接到廠商請款單據後，15日內付\n款。","機關應在廠商提出相關文件及付款單據後，如發現有文\n件不符、不足或有疑義者，通知廠商澄清或補正之次數不得超過\n1次。","機關不得於契約另為約定。","定期估驗或分階段付款\n者，機關應於廠商提出估驗或階段完成之證明文件後，15日內完成\n審核程序。"],"answer":2},{"type":"choice","category":"履約管理及驗收","law_ref":null,"stem":"以下何者敘述錯誤？","options":["機關驗收人對工程或財物隱蔽部分拆驗或綜合\n化驗者，其拆除、修復或化驗費用之負擔，契約未規定者，應由機\n關負擔。","機關允許保證金得以連帶保證代之或減收者，機關應\n於招標文件中規定，同一廠商同時作為各機關採購契約之連帶保證\n廠商者，以2契約為限。","採購申訴審議委員會之審議判斷，視\n同訴願決定。","押標金得以郵政匯票繳納。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依政府採購法，下列何者有誤：","options":["申訴審議判斷指明原採購行為違反法令\n者，招標機關應自收受審議判斷書之次日起20日內另為適法之處置。","申\n訴審議判斷指明原採購行為違反法令者，廠商得向招標機關請求償付其準備\n投標、異議及申訴所支出之必要費用。","申訴提出後，廠商得於審議判斷\n送達前撤回之。","申訴經撤回後，得再行提出同一之申訴。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商對於採購之過程、結果提出異議者，為接獲機關通知或機關公告之次日\n起：","options":["15日。","20日。","7日。","10日。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"申訴廠商於第1次預審會議期日前撤回採購申訴者，所繳審議費？","options":["不予\n退還。","無息退還二分之一。","無息退還三分之一。","無息退還全\n部。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"就採購履約爭議調解，下列何者為正確？","options":["調解程序以不公開為原則。","調解過程中，採購程序應暫停。","機關得拒絕廠商申請之調解。","機關申請調解，無需經廠商同意。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"下列何者非採購調解事件應不予受理之事由：","options":["當事人不適格。","已提\n起仲裁、申請調解或民事訴訟。","他造當事人拒絕繳納調解費。","非屬\n政府採購事件。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商與臺北市政府工務局自辦之採購案件產生採購履約爭議時，得向：","options":["臺北市政府採購申訴審議委員會申請調解。","行政院公共工程委員會採購\n申訴審議委員會申訴。","臺北市政府採購申訴審議委員會申訴。","行政\n院公共工程委員會採購申訴審議委員會申請調解。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"機關辦理採購，下列何者為非？","options":["申訴事件，在為實體審查前，應先繳納\n審議費用。","關於招標文件之申訴事件，未投標之廠商亦得提出。","申\n訴事件，應先為實體審查，其無不受理之情形者，再為程序審查。","廠商\n誤向非管轄之機關申訴者，以該機關收受之日，視為提起申訴之日。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"採購申訴事件之代理人就其受委任事件，有為一切申訴行為之權。但下列何\n事項，非受特別委任，不得為之：","options":["撰寫申訴書。","撤回申訴。","出\n席預審會議。","代收審議判斷書。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商或機關向採購申訴審議委員會申請履約爭議調解時，其調解標的金額為\n新臺幣（下同）5億元以上者，應繳納調解費：","options":["10萬元。","20萬元。","35萬元。","100萬元。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"目前臺東縣政府未設採購申訴審議委員會，對於臺東縣政府所屬之機關、學\n校自辦之採購如發生爭議，臺東縣政府得如何處理？","options":["委請臺北市政府採\n購申訴審議委員會處理。","委請政府採購法主管機關所設之採購申訴審議\n委員會處理。","委請高雄市政府採購申訴審議委員會處理。","由臺東縣\n議會處理。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"機關申請調解，廠商不同意調解時，採購申訴審議委員會應如何處理？","options":["不受理。","駁回。","視同未提出申請。","請其撤回。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"申訴審議委員會就調解事件進行程序審查時，如發現申請人委託律師提出調\n解而未檢具委任狀時，應：","options":["逕不予受理。","駁回。","命其補正。","退件。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會之決議，應有多少以上委員出席，出席委員過半數同意\n行之？","options":["四分之一。","三分之一。","二分之一。","三分之二。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"政府採購之調解應自收受調解申請書之次日起多久期間內完成調解程序。但\n經雙方同意延長者，得延長之？","options":["4個月。","3個月。","2個月。","6\n個月。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"對於政府採購，下列何者敘述為不正確？","options":["採購申訴得僅就書面審議。","申訴提出後，廠商得於審議判斷送達前撤回。","調解屬廠商申請者，\n機關不得拒絕。","廠商對於驗收爭議得提出異議、申訴。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依政府採購法調解成立，其調解成立書性質：","options":["視同訴願決定。","與確\n定判決有同一效力。","不具強制執行名義。","視同法院判決。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"機關與廠商因採購履約爭議未能達成協議者，得向採購申訴審議委員會申\n請：","options":["申訴。","仲裁。","調解。","訴訟。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"有關政府採購法第101條之申訴案，廠商不服申訴審議判斷之結果者，得於\n審議判斷書送達之次日起2個月內，向：","options":["行政法院提起行政訴訟。","所轄之地方法院提起民事訴訟。","所轄之高等法院提起民事訴訟。","招\n標機關之上級機關提起訴願。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商對於招標文件異議之處理結果不服，或招標機關逾規定期限不為處理\n者，得向採購申訴審議委員會申訴之門檻為：","options":["公告金額以上。","查核\n金額以上。","不論金額大小。","公告金額十分之一以上。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"政府採購申訴案件經審議判斷指明原採購行為違反法令者，廠商得向招標\n機關請求償付？","options":["準備投標、異議及申訴所支出之必要費用。","所失利\n益。","押標金。","另行訴訟之費用。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會委員之人數依法為？","options":["5人至17人。","7人至35人。","沒有明文規定。","以上皆是。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依法不得設立採購申訴審議委員會之機關為：","options":["政府採購法之主管機關。","直轄市政府。","縣（市）政府。","鄉公所。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"政府採購申訴案件每一案件之收費（新臺幣）為？","options":["5萬元。","3萬元。","依個案認定。","不用收費。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商於等標期內向招標機關提出異議，如仍不服該異議處理結果，應於接\n獲招標機關異議處理結果幾日內，向採購申訴審議委員會提出申訴：","options":["15\n天。","20天。","10天。","沒有限制。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"有關政府採購之申訴，下列何者為非？","options":["自收受異議處理結果之次日起\n15日內提出。","應具申訴書，並由申訴廠商簽名或蓋章。","申訴審議判\n斷，視同訴願決定。","申訴之提起，以申訴廠商寄出申訴書之日為準。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"政府採購之異議，招標機關應自收受廠商異議之次日起幾日內為適當之處\n理？","options":["10日。","15日。","20日。","1個月。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"政府採購法第75條及76條規定之異議、申訴程序，係在處理何種爭議：","options":["招標、審標、決標。","履約。","驗收。","保固 。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"政府採購履約爭議調解程序，不適用廠商與機關何種爭議（下列何者為\n非）：","options":["招標、審標、決標。","履約。","驗收。","保固。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商與機關之間因採購履約產生爭議，得選用下列何種方式解決爭議？","options":["訴訟。","仲裁。","向採購申訴審議委員會申請調解。","以上皆是。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"採購申訴審議判斷之效力？","options":["視同確定判決。","視同訴願決定。","視\n同仲裁判斷。","視同調解成立書。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商誤向該管採購申訴審議委員會以外之機關申訴者，收受申訴書之機關應\n於收受之次日起幾日內將申訴書移送於該管採購申訴審議委員會，並通知申\n訴廠商？","options":["5日。","7日。","3日。","10日。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依政府採購法，下列何者有誤：","options":["調解事件應自收受調解申請書之次日起\n4個月內完成調解程序。但經雙方同意延長者，得延長之。","對於政府採\n購法第102條規定之異議處理結果不服者，應申請調解。","已提起仲裁且\n在進行中之爭議不得向採購申訴審議委員會申請調解。","已提起訴訟且在\n進行中之爭議不得向採購申訴審議委員會申請調解。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依政府採購法，下列何者有誤？","options":["調解案之他造當事人應自收受調解申請\n書副本之次日起15日內，以書面向採購申訴審議委員會陳述意見，並副知申\n請人。","調解，以公開為原則。","就調解事件有法律上利害關係之第三\n人，調解委員得依職權審酌通知其參加調解程序。","申訴會於調解時，得\n囑託具專門知識經驗之機關、學校、團體或人員鑑定，並得邀請學者或專家\n諮詢。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依政府採購法，下列何者正確：","options":["異議逾越法定期間者，應不予受理，並\n以書面通知提出異議之廠商。","異議逾越法定期間者，仍得予受理。","廠商誤向非管轄之機關提出異議者，該收文機關亦得就廠商之異議加以處\n理。","機關處理異議，不應給予異議廠商陳述意見之機會。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依政府採購法，下列何者有誤：","options":["廠商提出申訴時，應繳納審議費，每一\n申訴事件為新臺幣3萬元。","招標機關自行依申訴廠商之請求，撤銷或變\n更其處理結果者，採購申訴審議委員會應作成申訴不受理之決議。","廠商\n提出申訴但拒繳納審議費，採購申訴審議委員會仍得受理。","申訴事件經\n審查無不受理之情形者，由採購申訴審議委員會主任委員指定委員1人至3人\n為預審委員，進行實體審查。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商申請調解，已繳納調解費新臺幣（下同）10萬元，於通知調解期日後始\n發現有當事人不適格之情事，應退還調解費多少元？","options":["0元。","5萬元。","9萬5,000元。","10萬元。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"高雄市某漁會接受內政部補助辦理採購(非藝文採購)，補助金額為新臺幣\n（下同）150萬元，採購金額為200萬元，投標廠商不服決標結果，可向下列\n哪一個採購申訴審議委員會申訴？","options":["高雄市政府採購申訴審議委員會。","行政院農業委員會設置之採購申訴審議委員會。","行政院公共工程委\n員會採購申訴審議委員會。","以上皆非。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"依政府採購法，下列何者有誤：","options":["招標機關處理異議為不受理之決定時，\n仍得評估其事由，於認其異議有理由時，自行撤銷或變更原處理結果或暫停\n採購程序之進行。","政府採購法第75條第1項第3款所定期限之計算，其經\n機關通知及公告者，廠商接獲通知之日與機關公告之日不同時，以公告之日\n起算。","異議不合規定，但其情形可補正者，應定期間命其補正；逾期不\n補正者，不予受理。","機關依政府採購法第102條規定將異議處理結果以\n書面通知提出異議之廠商時，應附記廠商如對該處理結果不服，得於收受異\n議處理結果之次日起15日內，以書面向採購申訴審議委員會提出申訴。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商或機關向採購申訴審議委員會申請履約爭議調解時，其調解費為新臺幣\n（下同）100萬，於第1次調解期日之次日起10日內撤回調解，應退還調解費\n為：","options":["20萬元。","30萬元。","50萬元。","80萬元。"],"answer":3},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"政府採購申訴案件經審議判斷指明原採購行為違反法令者，招標機關應自\n收受審議判斷書之次日起幾日內另為適法之處置：","options":["10日。","15日。","20日。","30日。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商對於招標機關依政府採購法第31條規定不予發還或追繳押標金爭議，得\n向採購申訴審議委員會申訴之門檻為：","options":["公告金額以上。","查核金額以\n上。","不論金額大小。","公告金額十分之一以上。"],"answer":2},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"「廠商請求機關展延工期不成故申請調解，並繳納調解費新臺幣（下同）10\n萬元，嗣於第1次調解期日之次日起10日內以書面撤回調解，則應退還調解\n費多少元？","options":["0元。","5萬元。","9萬5,000元。","10萬元。"],"answer":1},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"某法人接受補助辦理採購(非藝文採購)，採購金額為新臺幣（下同）200萬\n元，臺中市政府補助50萬元，內政部補助100萬元，且由臺中市政府及內政\n部共同辦理監督，廠商就此採購案申訴時，應向下列哪一個採購申訴審議委\n員會申訴？","options":["行政院公共工程委員會採購申訴審議委員會。","臺中市政\n府採購申訴審議委員會。","臺北市政府採購申訴審議委員會。","以上皆\n是。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"廠商對於機關辦理之採購提出異議逾法定期限時，機關對於異議之處置，何\n者為是？","options":["應不予受理。","應為實體審查。","移受理申訴之機關。","移上級機關。"],"answer":0},{"type":"choice","category":"爭議處理","law_ref":null,"stem":"主管機關及直轄市、縣（市）政府為處理中央及地方機關採購之廠商申訴及\n機關與廠商間之履約爭議調解，分別設採購申訴審議委員會；置委員至多：","options":["20人。","25人。","30人。","35人。"],"answer":3},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商提出採購申訴，應同時繕具副本送招標機關。機關應自收受申訴書副本\n之次日起15日內，以書面向該管採購申訴審議委員會陳述意見。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商提出採購申訴，應同時繕具副本送招標機關。機關應自收受申訴書副本\n之次日起10日內，以書面向該管採購申訴審議委員會陳述意見。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會之審議判斷書如指明機關原採購行為違反法令者，應一\n併於審議判斷中建議招標機關處置方式。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會之審議判斷書如指明機關原採購行為違反法令者，亦得\n一併於審議判斷中建議招標機關處置方式。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商申請調解時，其請求事項目前仍在法院審理中，且未合意停止訴訟，為\n利爭議加速解決，採購申訴審議委員會仍應受理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商申請調解時，其請求事項目前仍在法院審理中，且未合意停止訴訟，該\n調解案採購申訴審議委員會應不予受理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關依政府採購法第101條通知廠商後，廠商於規定期限內提出異議申訴，\n經申訴審議結果指明不違反政府採購法或並無不實者，機關應先確定該廠商\n未於法定期限內提起行政訴訟，再將其名稱及相關情形刊登政府採購公報。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關依政府採購法第101條通知廠商後，廠商於規定期限內提出異議申訴，\n經申訴審議結果指明不違反政府採購法或並無不實者，機關應即將廠商名稱\n及相關情形刊登政府採購公報，尚不必先確定該廠商是否提起行政訴訟。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商對於未達公告金額之採購，不得依政府採購法第102條規定提出申訴。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商對於未達公告金額之採購，得依政府採購法第102條規定提出申訴。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關辦理技術服務採購案，與廠商之履約爭議經採購申訴審議委員會提出調\n解建議或調解方案，因機關不同意致調解不成立者，廠商提付仲裁，機關得\n視個案特性及實際需要決定是否接受。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關對於廠商依政府採購法第101條所為通知，應附記廠商不服該通知時應\n於接獲通知之次日起15日內向機關提出書面異議。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關對於廠商依政府採購法第101條所為通知，應附記廠商不服該通知時應\n於接獲通知之次日起20日內向機關提出書面異議，如未提出異議者，將刊登\n政府採購公報。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"招標機關處理異議為不受理之決定後，縱認為異議有理由時，仍不得自行撤\n銷或變更原處理結果或暫停採購程序之進行。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"y ptions":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商與機關間關於政府採購履約或驗收之爭議，得依政府採購法之規定提出\n異議及申訴。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴逾越法定期間，雖得不予受理，惟有正當理由時，應予受理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購履約爭議，機關依政府採購法第85條之1規定，向採購申訴審議委員會\n申請調解，另一方之當事人不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴應具申訴書，惟異議得以言詞向機關提出。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會得命調解當事人接受調解建議。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商於履約中因違反契約約定事項，遭機關計罰違約金，廠商就此得提出調\n解。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商於履約中因違反契約約定事項，遭機關計罰違約金，廠商就此得提出申\n訴。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關辦理之設計監造採購案，與廠商就工期發生爭議，廠商申請調解，並經\n採購申訴審議委員會作成調解建議，廠商同意建議，但機關不同意建議，故\n廠商提付仲裁時，機關不可拒絕仲裁。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商對於招標機關追繳或不予發還押標金之異議處理結果不服，因該採購案\n未達公告金額，故不得再提出申訴。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關辦理技術服務採購，與廠商之履約爭議經採購申訴審議委員會提出調解\n建議，因機關不同意致調解不成立者，廠商提付仲裁，機關得視個案特性及\n實際需要決定是否接受。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關辦理技術服務採購案，與廠商之履約爭議經採購申訴審議委員會提出調\n解建議，因機關不同意致調解不成立者，廠商提付仲裁，機關不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"提起採購申訴或履約爭議調解後，即不得撤回。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"主管機關及直轄市、縣（市）政府為處理中央及地方機關採購之廠商申訴及\n機關與廠商間之履約爭議調解，分別設採購申訴審議委員會；置委員7人至\n35人。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商對於未達公告金額以上採購之異議處理結果不服，而向招標機關提出不\n服之事實及理由者，機關應將其移送於該管採購申訴審議委員會，並通知申\n訴廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關依政府採購法第101條第1項各款通知廠商將刊登政府採購公報之裁處權\n時效為5年。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關依政府採購法第101條第1項各款通知廠商將刊登政府採購公報之裁處權\n時效為3年。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關通知廠商依政府採購法第101條第1項第1款規定將刊登政府採購公報，\n經廠商書面異議後，機關逾2個月未為異議處理，廠商遂向採購申訴審議委\n員會提出申訴，此時機關應將廠商刊登政府採購公報。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"機關通知廠商依政府採購法第101條第1項第1款規定將刊登政府採購公報，\n經廠商書面異議後，機關逾2個月未為異議處理，廠商遂向採購申訴審議委\n員會提出申訴，此時機關不得將廠商刊登政府採購公報。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"申訴廠商於第1次預審會議期日前撤回採購申訴者，所繳審議費無息退還三\n分之一。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"申訴廠商於第1次預審會議期日前撤回採購申訴者，所繳審議費無息退還二\n分之一。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"政府採購調解申請人在我國無住所、事務所或營業所者，無需委任在我國有\n住所、事務所或營業所之代理人為之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"政府採購調解申請人在我國無住所、事務所或營業所者，應委任在我國有住\n所、事務所或營業所之代理人為之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商提出申訴時併請求暫停採購程序，採購申訴審議委員會於完成申訴審議\n前，為確保廠商權益，應通知招標機關暫停採購程序。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"廠商提出申訴時併請求暫停採購程序，採購申訴審議委員會於完成申訴審議\n前，必要時得通知招標機關暫停採購程序。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會委員可聘請社會公正人士但不具有法律或採購相關專門\n知識之人擔任。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會委員須聘請具有法律或採購相關專門知識之公正人士擔\n任。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴不得僅就書面審議之，應以言詞為之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴得僅就書面審議之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會之審議判斷指明原採購行為違反法令者，招標機關得向\n行政法院提起行政訴訟。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"爭議處理","law_ref":null,"stem":"採購申訴審議委員會之審議判斷指明原採購行為違反法令者，招標機關應另\n為適法之處置。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第56條第1項及第57條採行協商措施者，下列敘述何者錯誤？","options":["應就所有合於招標文件規定之投標廠商分別協商。","評選委員會辦理\n第2次綜合評選時，其未參與第1次綜合評選之委員，不得參與。","不論廠\n商投標文件內容是否因協商而更改，評選委員會辦理第2次綜合評選，應就\n全部評選項目重行評分（比），以評定最有利標。","原招標文件已標示得\n更改項目之內容，始得納入協商。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員有下列何種情形，應即辭職或予以解聘？","options":["委員之配偶與\n受評選之廠商3年內曾有委任關係。","機關認為委員不能公正執行職務。","採購案件涉及共同生活家屬之利益。","以上皆是。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列關於協商措施之敘述，何者錯誤？","options":["評選結果無法評定最有利標，如\n原招標文件未標示得協商更改之項目者，不得採行協商措施，應予廢標。","評選委員會辦理第2次綜合評選時，其未參與第1次綜合評選之委員，不\n得參與。","協商程序應以召開會議方式為之，不得僅以書面方式辦理。","採行協商措施時，應平等對待所有合於招標文件規定之投標廠商。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"未達公告金額之採購案，依採購法第22條第1項第9款及第10款辦理者，下列\n何者正確？","options":["應報上級機關核准。","等標期設定為5天。","第1次招\n標，必須有3家以上合格廠商始可開標。","應刊登政府採購公報及成立採\n購評選委員會。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關於評選後，應彙整製作總表，由參與評選全體委員簽名/蓋章，載明下\n列事項，何者不正確？","options":["採購案。","各受評廠商名稱及標價。","本委\n員會全部委員姓名、職業、評選優勝廠商及出席委員姓名。","各出席委員\n對於各受評廠商之評分或序位評比結果，應標示各出席委員姓名，不得以代\n號代之。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款規定以經公開評選之限制性招標辦理專業服\n務之評選優勝者，下列敘述何者正確？","options":["應先報經上級機關核准。","須\n與優勝廠商辦理（依序）議價後決標，惟如已於招標文件訂明決標之固定金\n額或費率者，則以該金額或費率決標，免議價程序。","應成立採購評選委\n員會。","不適用於未達公告金額之採購。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會之任務，何者不正確？","options":["訂定或審定招標文件之評選項\n目、評審標準及評定方式。","辦理廠商評選。","協助機關解釋與評審標\n準、評選過程或評選結果有關之事項。","協助機關辦理廠商資格審查。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列採行協商措施之行為，何者有誤？","options":["與廠商個別進行協商，不合併處\n理。","執行保密措施。","將協商廠商投標文件優缺點及評分，告知其他\n廠商。","作成協商紀錄。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者非屬機關採最有利標決標之必要事項？","options":["綜合評選。","訂定底\n價。","成立採購評選委員會。","採購評選委員會委員自接獲評選有關資\n料之時起，不得就該採購案參加投標、作為投標廠商之分包廠商或擔任工作\n成員。其有違反者，機關應不決標予該廠商。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採最有利標決標，對於受評廠商之資料，下列何者有誤？","options":["評選後仍\n應保守秘密。","得標廠商受評選之樣品或模型，得於決標後公開。","未\n得標廠商之樣品或模型，得於決標後發還。","所有受評選廠商之樣品或模\n型，應於決標後公開。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採最有利標決標，訂有底價，而廠商報價逾底價須減價者，其洽減時\n機，下列何者正確？","options":["辦理評選前。","評定最有利標後議價前。","採\n行協商措施時。","評定最有利標後決標前。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者非屬採最有利標決標之用詞？","options":["協商。","評審委員會。","評\n審標準。","計數之綜合評選。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標者，下列何者有誤？","options":["廠商簡報及現場詢答，應與評選項\n目有關。","廠商簡報不得更改廠商投標文件內容。","投標廠商未出席簡\n報及現場詢答者，其投標文件無效。","廠商於簡報時另外提出變更或補充\n資料者，該資料應不納入評選。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採總評分法評定最有利標者，下列何者有誤？","options":["價格納入評分，以總評分\n最高，且經機關首長或評選委員會過半數之決定者為最有利標。","價格不\n納入評分，考量廠商之總評分，以經機關首長或評選委員會過半數決定最優\n者為最有利標。","招標文件載明之固定價格給付，以總評分最高，且經機\n關首長或評選委員會過半數之決定者為最有利標。","價格不納入評分，綜\n合考量廠商之總評分及價格，以整體表現經機關首長或評選委員會過半數決\n定最優者為最有利標。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員自何時起，不得就該採購案參加投標、作為投標廠商之\n分包廠商或擔任工作成員？","options":["接獲評選有關資料之時起。","截止投標之\n時起。","開標之時起。","召開評選會議之時起。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評定最有利標涉及評分者，下列何者有誤？","options":["招標文件應載明各評選項目\n之配分。","個別子項不合格即不得作為協商對象者，個別子項不合格之情\n形，招標文件應載明。","招標文件應載明總滿分及其合格分數，或各評選\n項目之合格分數。","招標文件應載明總滿分及其合格分數，及各評選項目\n之合格分數。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選最有利標，下列何者正確？","options":["投標廠商未出席簡報及現場詢答者，\n其投標文件無效。","將廠商簡報及現場詢答列為評選項目，所占配分為\n25%。","廠商得利用簡報機會更改廠商投標文件內容。","廠商利用簡報\n另外提出補充資料者，該資料應不納入評選。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"辦理最有利標，將廠商簡報及現場詢答列為評選項目者，所占配分或權重不\n得逾何比率？","options":["百分之十。","百分之二十。","百分之五十。","無強\n制規定。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第10款規定辦理招標，下列何者正確？","options":["應依\n採購法第94條成立採購評選委員會。","限工程採購。","招標文件不得訂\n明固定金額或費率。","由廠商自行報價者，價格不應納入評選範圍。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採最有利標決標者，下列敘述何者不是採購法之規定？","options":["招標前應先\n報經上級機關核准。","比減價格。","招標文件規定評審標準。","依機\n關首長或評選委員會過半數之決定評定最有利標。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條規定，以「準用最有利標決標方式」辦理招標，第1次\n開標幾家以上合格廠商投標，方可開標？","options":["2家。","3家。","4家。","1家。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員對於會議之決議有不同意見者，如要求將不同意見載入\n會議紀錄或將意見書附於會議紀錄，以備查考時，採購評選委員會應如何處\n理？","options":["可以拒絕。","應提付評選委員會議決定是否拒絕。","不得拒\n絕。","由主席決定是否拒絕。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選最有利標，如招標文件規定廠商須簡報及現場詢答而有廠商未出席者，\n下列敘述何者正確？","options":["該廠商所投之標不予開標，列為無效標。","該廠\n商所投之標不予評選，列為不合格標。","不影響該廠商投標文件之有效\n性。","以上皆非。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法規定，下列有關採購評選委員會之敘述，何者錯誤？","options":["召集人、\n副召集人均為委員。","召集人應由機關首長或其授權人員指定機關內部人\n員擔任。","委員會會議，由召集人召集之，並為主席。","召集人未能出\n席或因故出缺時，由副召集人代理之。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者屬最有利標錯誤行為態樣？","options":["出席之評選委員遲到早退，未全程\n參與，或由他人代理。","評選時允許廠商於簡報時更改投標文件內容。","評選委員會於評選時，任意變更招標文件之評選規定。","以上皆是。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法規定，下列有關廠商簡報及現場詢答之敘述，何者錯誤？","options":["係為\n利評選委員對廠商於各評選項目之表現為更深入之瞭解。","其列為評選項\n目者，所占配分或權重不得逾百分之二十。","投標廠商未出席簡報及現場\n詢答者，即不得作為協商或決標對象。","簡報不得更改廠商投標文件內\n容。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法規定，下列有關採總評分法評定最有利標之敘述，何者錯誤？","options":["應於招標文件載明各評選項目之配分。其子項有配分者，亦應載明。","得\n於招標文件載明個別子項不合格即不得作為協商對象。","如有分階段辦理\n評選及淘汰不合格廠商之評定方式者，以2階段為原則。","如已於招標文\n件訂明固定費用者，仍得規定廠商於投標文件內詳列組成該費用之內容，惟\n不得納入評選。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何種採購不適用採購法第22條第1項第9款及第10款評選優勝廠商之評選\n規定？","options":["專業服務。","統包工程。","設計競賽。","資訊服務。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關為辦理下列事項，何者免成立採購評選委員會？","options":["採購法第22條第1\n項第9款規定之評選優勝者。","採購法第22條第1項第10款規定之評選優\n勝者。","採購法第22條第1項第11款規定辦理房地產之勘選認定適合需要\n者。","採購法第56條規定之評定最有利標。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依「中央機關未達公告金額採購招標辦法」第2條第1項第3款規定，公\n開取得書面報價或企劃書，採用最有利標之精神，擇最符合需要者議價。下\n列何者不正確？","options":["應依採購法第94條成立採購評選委員會。","限採購金\n額未達新臺幣150萬元之採購。","招標文件得訂明固定金額或費率。","第1次公告，其等標期至少應有5日，必要時應延長之。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者有誤？","options":["協商係針對原招標文件已標示得更改項目之內容。","協商係針對評選第1名之廠商。","協商結束後，應予廠商依據協商結果，\n於一定期間內修改投標文件重行遞送之機會。","招標文件未標示得採協商\n措施者，不得採行。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會辦理評選，下列何者有誤？","options":["委員無法親自辦理評選及出\n席會議，得覓代理出席。","機關於委員評選後，應彙整製作總表，載明採\n購案名稱、參與評選委員姓名、受評廠商名稱、各出席委員對於各受評廠商\n之評選結果及總評選結果，由參與評選全體委員簽名或蓋章。","最後1次\n會議紀錄應於當次會議結束前作成並予確認。","委員認有調查或實地勘驗\n之必要時，得經委員會決議後實施調查或勘驗。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評定最有利標涉及評分者，下列何者不是招標文件應載明事項？","options":["總滿分\n及其合格分數，或各評選項目之合格分數。","總評分合格者之第1名即為\n最有利標。","總評分不合格者，不得作為協商對象或最有利標。","各評\n選項目之配分。其子項有配分者，亦應載明。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款規定評選資訊服務廠商作業，何者正確？","options":["準用採購法有關最有利標之評選規定。","底價應於開標前訂定。","如為固定服務費用或費率者，評選優勝廠商後即辦理決標免議價程序。","評選優勝廠商後即辦理比價。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法規定，下列協商措施何者錯誤？","options":["應平等對待所有合於招標文件\n規定之投標廠商。","與廠商個別進行協商。","得採協商措施之項目，不\n以招標文件已標示得更改項目之內容為限。","執行保密措施。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法規定，有關採購評選委員會之成立時點，下列何者作業錯誤？","options":["評選項目、評審標準及評定方式有前例或條件簡單者，於招標前成立。","評選項目、評審標準及評定方式有前例或條件簡單者，於招標後開標前成\n立。","評選項目、評審標準及評定方式有前例或條件簡單者，於開標後\n評選前成立。","不論評選項目、評審標準及評定方式是否有前例或條件簡\n單，均於招標前成立。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購採最有利標決標者，下列敘述何者正確？","options":["價格納入評選項\n目者，採購評選委員就價格給予評分時，應以比較入圍廠商標價之高低為評\n分基礎。","不論案件性質，採購評選委員會應於招標前成立。","採購評\n選委員評選及出席會議，得由代理人為之。","以不訂底價為原則，其訂有\n底價，而廠商報價逾底價須減價者，於採行協商措施時洽減之。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列敘述何者錯誤？","options":["評選委員會委員對於受評廠商之資料，評選前應予\n保密，但決標後除有特殊情形外，應予公開。","機關採最有利標決標，以\n不訂底價為原則。","機關評定最有利標後，應於決標公告公布最有利標及\n採行協商措施時其他參與協商廠商之標價及總評分或總序位。","評選委員\n會之會議紀錄，除涉及個別廠商之商業機密者外，投標廠商並得申請閱覽、\n抄寫等。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者非屬「採購評選委員會審議規則」第6條第2項所稱「明顯差異」之\n情形？","options":["多家廠商參與評選，同一廠商，有委員評定其序位為最優，同時\n亦有委員評定其序位為最差；且評定序位最優委員之評定分數為高分，評定\n序位最差委員之評定分數為低分。","同一廠商之評選分數，有委員評定為\n高分，亦有委員評定為不合格分數。","同一廠商之同一評選項目，不同委\n員之評選結果，有委員評定為高分，亦有委員評定為0分。","序位和最低\n之第1名廠商，但評選委員評定其序位第一非為最多。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關於招標文件載明固定費用或費率，準用最有利標公開評選優勝廠商者，\n下列敘述何者錯誤？","options":["得於招標文件規定廠商報價超過該費用或費率者為\n不合格標。","該費用或費率之組成內容納入評分者，該評選項目所占比率\n或權重得低於20%。","於評選優勝廠商後，得免議價程序，依招標文件所\n載明之固定費用或費率決標。","如廠商於投標文件內自願減價，依自願減\n價之金額決標。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法規定，下列何者須報上級機關核准？","options":["機關辦理公告金額以上之\n選擇性招標。","招標文件中公告底價。","採最有利標決標。","機關辦\n理公告金額以上之限制性招標公開評選優勝廠商。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會召集人及副召集人之產生，下列何者不正確？","options":["召集人及\n副召集人均為委員。","由委員互選產生。","召集人由機關首長擔任，或\n由機關首長或其授權人員指定一級主管以上人員擔任。","副召集人由機關\n首長或其授權人員指定機關內部人員擔任。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列敘述何者為是？","options":["採購評選作業採分階段辦理評選及淘汰不合格廠商\n者，因前一階段已淘汰部分不合格廠商，爰評選結果以後階段之評分(比)結\n果為準。","旅遊服務屬採購法第22條第1項第9款規定所稱之專業服務，得\n採準用最有利標之決標方式。","機關依採購法第22條第1項第9款規定辦理\n經公開評選之限制性招標，為提升採購品質，得於招標文件規定，投標廠商\n如僅有1家並經資格審查合格時，提高合格門檻分數。","準用最有利標決\n標之採購案，於評選出優勝廠商後，尚有議價程序，爰機關應於議價現場再\n將投標單交廠商填寫投標價。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依「最有利標評選辦法」採行分階段辦理評選者，下列敘述何者正確？","options":["得於第1階段評選採票選法(未經評分)，票選前3名廠商始得進入第2階段\n評選。","第2階段之評選項目應與第1階段之評選項目相同。","分階段辦\n理評選以3階段為原則。","以上皆非。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者錯誤？","options":["公開取得企劃書之招標方式得搭配參考最有利標精神擇\n最符合需要者議價。","機關依採購法第22條第1項第9款辦理公開評選，機\n關得評選2家以上優勝廠商辦理比價。","公開取得企劃書之招標方式得搭\n配參考最有利標精神擇定2家以上符合需要者辦理比價。","依採購法第22\n條第1項第10款辦理公開評選，得標廠商得不以1家為限。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依「最有利標評選辦法」規定，價格納入評分者，其所占總滿分之比率不得\n逾何比率？","options":["百分之十。","百分之二十。","百分之三十。","百分之\n五十。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列有關最有利標決標規定之敘述何者正確？","options":["採購評選委員會得要求廠\n商修正所提送企劃書後再辦理評選。","採購評選委員評選不得給予不同廠\n商相同分數。","公立學校家長會會長如擔任採購評選委員，非屬政府機關\n之現職人員者，得以專家學者身分擔任評選委員。","以上皆非。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"未達公告金額之採購，依「中央機關未達公告金額採購招標辦法」第2條第1\n項第3款，參考最有利標之精神，擇符合需要者之評審小組之組成人數，下\n列何者為是？","options":["至少5人。","限於5至17人。","應與工作小組人數相\n同。","由機關自行核定。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關以公開招標搭配採購法第56條規定之最有利標決標方式辦理採購，下列\n敘述何者錯誤？","options":["不論採購金額大小，均應先報經上級機關核准。","招\n標文件規定於無法評定最有利標時，得採行協商措施。","議價程序不得免\n除。","應成立採購評選委員會。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議，出席委員中之專家學者人數應至少2人且不得少於出\n席委員人數之比率為何？","options":["三分之一。","三分之二。","四分之一。","四分之三。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議之決議，有關出席委員人數之敘述，下列何者不符合\n規定？","options":["委員總額8人，出席委員人數5人，出席委員中之專家學者人數\n2人。","委員總額7人，出席委員人數4人，出席委員中之專家學者人數\n2人。","委員總額5人，出席委員人數3人，出席委員中之專家學者人數2\n人。","委員總額11人，出席委員人數5人，出席委員中之專家學者人數2\n人。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議之決議，有關出席委員人數之敘述，下列何者不符合\n規定？","options":["委員總額11人，出席委員人數9人，出席委員中之專家學者人\n數4人。","委員總額7人，出席委員人數4人，出席委員中之專家學者人數\n2人。","委員總額10人，出席委員人數7人，出席委員中之專家學者人數\n2人。","委員總額5人，出席委員人數3人，出席委員中之專家學者人數2\n人。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購以最有利標決標，成立評選委員會時若委員共5人，則專家學\n者人數至少為幾人？","options":["1人。","2人。","5人。","4人。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議之決議，有關出席委員人數之敘述，下列何者不符合\n規定？","options":["委員總額11人，出席委員人數9人，出席委員中之專家學者人數\n4人。","委員總額11人，出席委員人數8人，出席委員中之專家學者人數\n4人。","委員總額11人，出席委員人數7人，出席委員中之專家學者人數\n3人。","委員總額11人，出席委員人數5人，出席委員中之專家學者人數2\n人。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列有關評選委員會之敘述何者正確？","options":["機關應利用採購法主管機關建置\n之專家學者建議名單資料庫，遴選專家學者委員。","其他政府機關之現職\n人員，得以專家學者身分擔任評選委員。","某評選委員與受評廠商間於一\n年前有僱傭關係，該委員應不計入委員總額，且其評分應不予採計。","以\n上皆非。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列敘述，何者正確？","options":["採購案如因評選委員會無法評選出最有利標致廢\n標者，投標廠商不得申請閱覽、抄寫、複印或攝影評選委員會之會議紀錄。","工作小組成員由機關首長或其授權人員指定機關人員或專業人士擔任，\n屬機關人員者，均應具有採購專業人員資格。","評選委員對於受評廠商之\n投標文件內容及資料，於開始評選前應予保密。評定最有利標後，則無須保\n密。","機關成立評選委員會，專家學者人數不得少於三分之一，且不得為\n政府機關之現職人員。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關評選最有利標，下列何者為正確？","options":["評選委員會會議，應有委員總額\n二分之一以上出席，其決議應經出席委員過半數之同意行之。出席委員中之\n專家、學者人數應至少2人且不得少於出席委員人數之三分之一。","評選\n委員會委員及參與評選工作之人員對於受評廠商之資料，除供公務上使用\n或法令另有規定外，應保守秘密。惟評選後應予解密。","評選委員會委員\n自接獲評選有關資料之時起，不得就該採購案參加投標。其有違反者，機關\n應不決標予該廠商。但得作為分包廠商。","評選委員會委員名單，未公開\n者，於開始評選前應予保密。評選出優勝廠商或最有利標後，亦同。"],"answer":0},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列敘述何者錯誤？","options":["採購評選委員會之專家學者，如中途請辭，並非一\n定要補聘委員。","機關不得於招標文件中預為規定，投標廠商之企劃書份\n數不足，即為不合格標。","依採購法主管機關之解釋，評選結果應簽報機\n關首長或其授權人員核定，爰機關首長不宜擔任採購評選委員。","採購評\n選委員會議之列席人員，雖不得參與評分，惟徵得主席同意後，可對廠商提\n出詢問。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法規定，有關採購評選委員會之組成，下列敘述何者錯誤？","options":["委員\n應具備與採購案相關之專門知識。","委員人數應符合5人以上之規定，而\n且必須為奇數。","召集人由機關首長擔任，或由機關首長或其授權人員指\n定一級主管以上人員擔任。","專家學者人數不得少於三分之一，且不得為\n政府機關之現職人員。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"有關採購評選委員會之組成，下列敘述何者不符合規定？","options":["委員總額7\n人，其中專家學者3人。","委員總額6人，其中專家學者3人。","委員總\n額5人，其中專家學者2人。","委員總額4人，其中專家學者2人。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者有誤？","options":["採購評選委員會成立後，其委員名單應即公開於主管機\n關指定之資訊網站。","採購評選委員會委員名單，公開前應予保密。","採購評選委員會委員名單，其未公開者，於開始評選前應予保密。","採購\n評選委員會委員名單，於評選出最有利標後，得密封保密，不必解密。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款規定辦理採購，下列何者不正確？","options":["應依\n採購法第94條成立採購評選委員會。","評定優勝廠商後議價。","招標文\n件得訂明固定金額或費率。","經評選而無法評選出優勝廠商者，評選委員\n名單不應解密。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關成立之工作小組就受評廠商資料擬具初審意見，下列何者不是應載明\n事項？","options":["採購案名稱。","工作小組人員姓名、職稱及專長。","受評\n廠商於各評選項目所報內容是否具可行性，並符合招標文件所定之目的、功\n能、需求、特性、標準、經費及期程。","受評廠商之經驗或實績。"],"answer":3},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列何者非屬工作小組初審意見所應載明之事項？","options":["採購案名稱。","受\n評廠商於各評選項目之得分或序位。","受評廠商於各評選項目所報內容是\n否具可行性，並符合招標文件所定之目的、功能、需求、特性、標準、經費\n及期程。","受評廠商於各評選項目之差異性。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第56條規定，以「最有利標決標原則」辦理招標，下列何者不\n正確？","options":["以不訂底價為原則。","評定最有利標後得議減價格。","評選\n結果應簽報機關首長或其授權人員核定 。","以公開招標方式辦理，第1次\n開標應有3家以上合格廠商投標，方可開標。"],"answer":1},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"下列敘述何者為正確？","options":["機關採最有利標之決標，決定最有利標後，應再\n洽該廠商辦理議價。","機關辦理統包工程採購，可依採購法第22條第1項\n第9款之規定評選優勝廠商。","評定最有利標涉及評分，評選項目子項有\n配分者，其配分應載明於招標文件。個別子項不合格即不得作為最有利標\n者，亦應於招標文件載明其情形。","採最有利標決標原則得通案報上級機\n關核准。"],"answer":2},{"type":"choice","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會之委員評選結果，下列何者有誤？","options":["不同委員之評選結果\n有明顯差異時，召集人提交本委員會議決。","不同委員之評選結果有明顯\n差異時，依本委員會決議辦理複評。","不同委員之評選結果有明顯差異，\n複評結果仍有明顯差異時，由本委員會決議之。","不同委員之評選結果有\n明顯差異時，應廢棄原評選結果，重新辦理評選。"],"answer":3},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關應於採購評選委員會成立時，一併成立工作小組，協助採購評選委員會\n辦理與評選有關之作業。但案件性質單純、緊急或宜由採購評選委員會逕為\n評選者，得免成立工作小組。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關應於採購評選委員會成立時，一併成立工作小組，協助採購評選委員會\n辦理與評選有關之作業。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"準用最有利標案件，評選委員會開會辦理評選時，未就工作小組初審意見逐\n項討論，該案承辦人員發言向主席表示程序違法，該發言不符合採購法規\n定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"準用最有利標案件，評選委員會開會辦理評選時，未就工作小組初審意見逐\n項討論，該案承辦人員發言向主席表示程序違法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"準用最有利標辦理評選優勝廠商，非採固定費用或費率者，機關依序洽優勝\n廠商辦理議價，如針對優勝序位第2廠商訂定之底價，比優勝序位第1廠商訂\n定之底價高，仍屬合理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"準用最有利標辦理評選優勝廠商者，如訂定底價，針對優勝序位第2廠商訂\n定之底價，比優勝序位第1廠商訂定之底價高，並不合理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"準用最有利標案件，評選委員會開會辦理評選時，不同委員之評選結果有明\n顯差異，召集人未就此提會討論，該案承辦人發言向召集人表示程序違法，\n該發言不符合採購法規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"準用最有利標案件，評選委員會開會辦理評選時，不同委員之評選結果有明\n顯差異，召集人未就此提會討論，該案承辦人發言向召集人表示程序違法，\n係屬正確之提醒。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選委員會評選最有利標，應依招標文件載明之評選項目、子項及其配分或\n權重辦理，不得變更。但經評選委員會決議後得於評選前宣布者，不在此\n限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選委員會評選最有利標，應依招標文件載明之評選項目、子項及其配分或\n權重辦理，不得變更。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員及參與評選工作之人員對於受評廠商之資料，評選前，\n應保守秘密。評選後則應予解密。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員及參與評選工作之人員對於受評廠商之資料，評選前，\n應保守秘密。評選後除供公務上使用或法令另有規定外，應保守秘密。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款公開客觀評選優勝廠商之決標程序，優勝廠\n商在2家以上者，得以比價方式辦理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款公開客觀評選優勝廠商之決標程序，優勝廠\n商在2家以上者，依優勝序位，依序議價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標之採購，其評選項目有子項者，該子項無須載明於招標文\n件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標之採購，其評選項目有子項者，該子項應載明於招標文件。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標之採購，其有應予淘汰或不予評比之情形者，其情形得免載\n明於招標文件。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標之採購，其有應予淘汰或不予評比之情形者，其情形應載明\n於招標文件。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"主管機關建置之專家學者建議名單資料庫雖係供機關遴選委員參考使用，未\n自該資料庫遴選仍應敘明理由。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會辦理第2次綜合評選，應就廠商因協商而更改之項目重行評\n分（比），其他未更改項目之原評分（比）結果，亦可異動。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會辦理第2次綜合評選，應就廠商因協商而更改之項目重行評\n分（比），其他未更改項目之原評分（比）結果，因無異動，第2次綜合評\n選時不必重行評分（比）。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關於採購評選委員會成立時，應一併成立3人以上之工作小組，其成員以\n機關人員為限，且至少應有1人具有採購專業人員資格。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關於採購評選委員會成立時，應一併成立3人以上之工作小組，其成員並\n不以機關人員為限，且至少應有1人具有採購專業人員資格。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理招標，於招標文件已訂明固定價格給付，但仍要求廠商於投標文件\n詳列組成該費用之內容，並納為評選項目之一，所佔配分比率為10%，並不\n適法。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理招標，於招標文件已訂明固定價格給付，但仍要求廠商於投標文件\n詳列組成該費用之內容，並納為評選項目之一，所佔配分比率為10%，尚屬\n適法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"招標文件列有得協商更改之項目者，不論是否採固定金額或費率給付，價格\n應列為協商項目之一才合理。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"招標文件列有得協商更改之項目者，除已標示固定金額或費率給付者外，價\n格須列為協商項目之一才合理。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會依採購法第22條第1項第9款規定評選優勝專業服務廠商，其\n優勝廠商以1家為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會依採購法第22條第1項第9款規定評選優勝專業服務廠商，其\n優勝廠商得不以1家為限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員本人或其配偶與受評選之廠商或其負責人間現有或5年\n內曾有僱傭、委任或代理關係者，應予辭職或解聘，不得辦理評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員本人或其配偶與受評選之廠商或其負責人間現有或3年\n內曾有僱傭、委任或代理關係者，應予辭職或解聘，不得辦理評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，投標廠商於評選後得申請複印之資料，不包括評選委員會之\n會議紀錄。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，投標廠商於評選後得申請複印之資料，包括評選委員會之會\n議紀錄。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"招標文件已訂明固定費用或費率，不得規定廠商於投標文件內詳列報價內\n容，並納入評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"招標文件未訂明固定費用或費率，而由廠商於投標文件載明標價者，應規定\n廠商於投標文件內詳列報價內容，並納入評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採序位法評定最有利標，序位第1之廠商有2家以上，且均得為決標對象\n時，應以獲得評選委員評定序位第一較多者決標，無其他擇定方式。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採序位法評定最有利標，序位第1之廠商有2家以上，且均得為決標對象\n時，應以配分最高之評選項目之得分合計值較高者決標，無其他擇定方式。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第56條第1項及第57條採行協商措施者，評選委員會辦理第2次\n綜合評選時，其未參與第1次綜合評選之委員，仍得參與。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第56條第1項及第57條採行協商措施者，評選委員會辦理第2次\n綜合評選時，其未參與第1次綜合評選之委員，不得參與。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第56條第1項及第57條採行協商措施者，評選委員會辦理第２\n次綜合評選，應就廠商因協商而更改之項目與其他未更改項目，均分別重行\n評分（比），以評定最有利標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第56條第1項及第57條採行協商措施者，評選委員會辦理第２\n次綜合評選，應就廠商因協商而更改之項目重行評分（比），與其他未更改\n項目之原評分（比）結果，合併計算，以評定最有利標。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理委託專業服務，評選優勝廠商時，因價格係屬議價階段事項，不得\n將廠商報價納入評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理委託專業服務，評選優勝廠商時，即應將廠商報價納入評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"有關評選項目、評審標準及評定方式之訂定及審定，應經評選委員會召開會\n議審查，沒有例外。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"有關評選項目、評審標準及評定方式之訂定及審定，如係由機關預擬草案，\n並經機關以書面洽各評選委員審查結果均無意見者，得免另行召開會議。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理公開招標一次投標分段開標，並採最有利標決標，如價格列為評選\n項目之一，機關應就廠商企劃書內所列標價予以審查，至價格標階段始開啟\n投標廠商之價格標封以利減價或宣布決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理公開招標一次投標分段開標，並採最有利標決標，如價格列為評選\n項目之一，評選階段應開啟投標廠商之價格標封納入評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理最有利標決標，於評選過程中發現A評選委員，為該案投標廠商甲\n於投標文件所載顧問，機關於要求A評選委員迴避後，仍得決標予甲廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理最有利標決標，於評選過程中發現A評選委員，為該案投標廠商甲\n於投標文件所載顧問，機關應不決標予甲廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依「採購評選委員會審議規則」第14條之1規定，委員自接獲評選有關資料\n之時起，不得就該採購案參加投標、作為投標廠商之分包廠商或擔任工作成\n員。所稱工作成員，包含投標廠商之投標文件所述人力組織，但不包含參與\n或協助該採購案之相關人員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依「採購評選委員會審議規則」第14條之1規定，委員自接獲評選有關資料\n之時起，不得就該採購案參加投標、作為投標廠商之分包廠商或擔任工作成\n員。所稱工作成員，包含投標廠商之投標文件所述人力組織及參與或協助該\n採購案之相關人員均屬之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款規定辦理評選專業服務廠商，須有3家以上\n合格廠商投標，方得開標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款規定辦理評選專業服務廠商，得於招標文件\n中明訂「第1次招標應有3家以上合格廠商投標，方得開標」之規定。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選項目、評審標準及評定方式有前例或條件簡單者，得由機關自行訂定或\n審定，免於招標前由採購評選委員會為之。但本委員會仍應於招標前成立。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，對於評選項目及子項之計分，招標文件不得載明扣分機制。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，對於評選項目及子項之計分，招標文件得載明扣分機制。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標之採購，投標文件經審查合於招標文件規定者，始得為協商\n及評選之對象。該審查以投標廠商資格條件為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標之採購，投標文件經審查合於招標文件規定者，始得為協商\n及評選之對象。該審查不以投標廠商資格條件為限。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，對於評選項目及子項之計分，得以部分或全部投標廠商之投\n標文件內容為計分基準。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，對於評選項目及子項之計分，不得以部分或全部投標廠商之\n投標文件內容為計分基準。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，將廠商簡報及現場詢答列為評選項目者，其所占配分或權重\n不得低於百分之二十。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，將廠商簡報及現場詢答列為評選項目者，其所占配分或權重\n不得逾百分之二十。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評定最有利標涉及序位評比且價格納入評比者，價格所占全部評選項目之權\n重，不得低於百分之十，且不得逾百分之五十。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評定最有利標涉及序位評比且價格納入評比者，價格所占全部評選項目之權\n重，不得低於百分之二十，且不得逾百分之五十。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"未達公告金額之採購，以公開取得企劃書方式辦理者，得參考最有利標精神\n擇最符合需要者逕行決標，免辦理議價或比價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"未達公告金額之採購，以公開取得企劃書方式辦理者，得參考最有利標精神\n擇最符合需要者，再邀請該最符合需要者，辦理議價或比價。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理公告金額以上之採購，其依「機關辦理設計競賽廠商評選及計費辦\n法」採限制性招標方式辦理者，準用最有利標評選規定，應報經上級機關核\n准。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理公告金額以上之採購，其依「機關辦理設計競賽廠商評選及計費辦\n法」採限制性招標方式辦理者，準用最有利標評選規定，無須報經上級機關\n核准。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選項目、評審標準及評定方式有前例或條件簡單者，得由機關自行訂定或\n審定，免於招標前成立採購評選委員會為之。但本委員會仍應於開標前成\n立。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法第22條第1項第9款辦理委託資訊服務公開客觀評選優勝廠商，應於\n確定優勝廠商後，再開啟該廠商之標價封辦理議價。如須訂定底價，於參考\n議價廠商之報價後訂定之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依採購法第22條第1項第9款辦理委託資訊服務公開客觀評選優勝廠商，廠商\n提出之報價，應納入評選，不得於確定優勝廠商後，再開啟該廠商之標價封\n辦理議價。如須訂定底價，於開標後議價前參考議價廠商之報價訂定之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法規定採行協商措施者，開標、投標、審標程序及內容均應予保\n密，且原招標文件已標示得更改項目之內容，始得納入協商。上開所稱審\n標，不包括評選及洽個別廠商協商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法規定採行協商措施者，開標、投標、審標程序及內容均應予保\n密，且原招標文件已標示得更改項目之內容，始得納入協商。上開所稱審\n標，包括評選及洽個別廠商協商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議紀錄至遲應於下次開會時分送各出席委員，並予確認。\n如有遺漏或錯誤，得於紀錄宣讀後，提請主席裁定更正。最後一次採購評選\n委員會會議紀錄應於當次會議結束後一週內作成並予確認。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"主管機關建置之專家學者建議名單資料庫係供機關遴選委員參考使用，未自\n該資料庫遴選無須敘明理由。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會之職掌，包括訂定或審定招標文件所有內容。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會之職掌，不包括訂定或審定招標文件之評選項目、評審標準\n及評定方式以外之其他內容。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"依「最有利標評選辦法」規定，價格納入評分者，其所占總滿分之比率不得\n低於百分之二十。如機關於招標文件載明固定費用或費率，該費用或費率之\n組成內容納入評分者，該評選項目所占比率或權重得低於百分之二十。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"工作小組擬具初審意見，以記名方式秘密為之為原則。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"工作小組擬具初審意見，以不記名方式秘密為之為原則。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"工作小組就受評廠商資料擬具之初審意見，如無法明確表達受評廠商於各評\n選項目之「差異性」，得僅載明「符合」、「尚可」，或僅載明投標文件之\n頁碼。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"工作小組就受評廠商資料擬具之初審意見，如僅載明「符合」、「尚可」，\n或僅載明投標文件之頁碼，屬採購法主管機關訂定之錯誤行為態樣。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會之正、副召集人由機關內部人員擔任者，應由一級主管以上\n人員任之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會召集人由機關首長或其授權人員指定者，應由一級主管以上\n人員任之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理公告金額以上之採購，依採購法第94條規定辦理評選者，不得將採\n購評選委員評選後所彙整製作之總表併於決標結果之通知事項，主動通知各\n投標廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理公告金額以上之採購，依採購法第94條規定辦理評選者，如將採購\n評選委員評選後所彙整製作之總表併於決標結果之通知事項，主動通知各投\n標廠商，尚無不可。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，投標廠商於評選後得申請複印之資料，不包括機關於委員評\n選後彙總製作之總表。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，投標廠商於評選後得申請複印之資料，包括機關於委員評選\n後彙總製作之總表。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評定最有利標涉及評分且子項有配分者，招標文件免載明子項之配分。但應\n於開標前訂定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評定最有利標涉及評分且子項有配分者，招標文件應載明子項之配分。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採最有利標決標者，招標文件已訂明固定費用或費率者，不得規定廠商\n於投標文件內報列關於費用或費率之內容，亦不得納入評選。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採最有利標決標者，招標文件已訂明固定費用或費率者，仍得規定廠商\n於投標文件內報列關於費用或費率之內容，並納入評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依「機關辦理設計競賽廠商評選及計費辦法」以公告程序辦理設計競\n賽，其非採固定費用或費率者，得於招標文件明定優勝廠商在2家以上者，\n依配分最高之評選項目之得分合計值較高者，優先議價；得分仍相同者，抽\n籤決定之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關不得遴選現任各級民意機關民意代表為採購評選委員會之委員；各級民\n意機關辦理採購，亦同。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員於所評採購個案決標後，得擔任得標廠商該案之履約工\n作成員，或協助履約。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員於所評採購個案決標後，不得擔任得標廠商該案之履約\n工作成員，或協助履約。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"招標文件得規定同一評選項目，不同委員之評選結果有明顯差異時，最高分\n及最低分者均不計入。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"招標文件不得規定同一評選項目，不同委員之評選結果有明顯差異時，最高\n分及最低分者均不計入。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員對於會議之決議有不同意見者，得要求將不同意見載入\n會議紀錄或將意見書附於會議紀錄，以備查考。但委員會得決議拒絕上開要\n求。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會委員對於會議之決議有不同意見者，得要求將不同意見載入\n會議紀錄或將意見書附於會議紀錄，以備查考。委員會不得拒絕。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採總評分法評選最有利標者，總評分最高之廠商，有2家以上相同，\n且均得為決標對象時，得依招標文件規定對總評分相同廠商再行綜合評選1\n次，以總評分最高者決標。綜合評選後之總評分仍相同，未達採購法第56條\n規定之3次限制者，得再綜合評選，達3次者逕行抽籤決定之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採總評分法評選最有利標者，總評分最高之廠商，有2家以上相同，\n且均得為決標對象時，得依招標文件規定對總評分相同廠商再行綜合評選1\n次，以總評分最高者決標。綜合評選後之總評分仍相同者，抽籤決定之。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選委員會辦理廠商評選後，可代替機關做出決標決定，評選結果無須另行\n簽報機關首長核定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"招標機關首長及一級主管以上人員均無法出任採購評選委員會之召集人時，\n得改由一級副主管代之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"為借重評選委員之專業知識，得標廠商得聘任採購評選委員會委員擔任履約\n工作成員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採總評分法評定最有利標者，於招標文件未載明固定價格給付之情形下，得\n採行之方式包括價格不納入評分，以非價格項目表現經機關首長或評選委員\n會過半數決定最優者為最有利標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，如其評選項目、評審標準及評定方式有前例或條件簡單者，\n採購評選委員會得於評選前成立。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關首長或其授權人員如認為評選結果有需評選委員會檢討之情形（例如\n投標價格不合理、評選結果有明顯差異卻未處理等），應於評選紀錄加註意\n見，惟不得將評選結果退回評選委員會，以示對評選委員專業之尊重。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"各委員針對評選後彙總製作之總表未表示不同意見，且於該表簽認，即可認\n定不同委員之評選結果無明顯差異。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理公開客觀評選優勝廠商，招標文件如未訂明固定費用或費率，而係\n由廠商於投標文件載明標價者，因評選後尚有議價程序，機關應於議價時方\n開啟廠商報價單。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"為利業務推行，工作小組成員可兼任評選委員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"準用最有利標案件，投標廠商於各評選項目所報內容是否符合招標文件規\n定，係屬該案承辦採購人員審標事項，而非工作小組工作事項。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"最有利標案件，工作小組初審意見載明各投標廠商之標價，不可另有其差異\n性之說明文字，以免影響評選委員之公正性。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關成立採購評選委員會後，於評選前因故需增聘評選委員，應徵得全體委\n員同意始得為之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依「最有利標評選辦法」採行分階段辦理評選者，其第2階段之評選項\n目應與第1階段之評選項目相同，以避免發生評審標準不一致之不合理情\n形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會置召集人1人，綜理評選事宜，其擔任評選委員會議之主\n席，得不參與評分（比）。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會之評選過程之作業，不適用監辦規定；惟機關如於評選階段\n就價格與參與評選廠商進行協商，則仍適用監辦規定。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採最有利標決標之採購，評選項目如包括過去履約績效，其子項得包括如履\n約紀錄、經驗、實績、法令之遵守、使用者評價、如期履約效率、履約成本\n控制紀錄、勞雇關係或人為災害事故等情形。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關評定最有利標後，對於合於招標文件規定但未得標之廠商，應通知其最\n有利標之標價與總評分或序位評比結果及該未得標廠商之總評分或序位評比\n結果。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會開會，召集人為工務局長，其副局長為工作小組成員，工務\n局長臨時有事未能出席，可由副局長代理主持會議。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關評選結果無法評定最有利標時，得就原招標文件已標示得更改項目之內\n容，採行協商措施。關於協商程序之進行應以召開會議方式為之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"有關評選項目、評審標準及評定方式之訂定及審定，如係由機關預擬草案，\n再函請各評選委員以書面審查並回覆意見方式辦理者，得由機關依各委員意\n見修改，免另行召開會議。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依「最有利標評選辦法」採行分階段辦理評選者，得於第1階段評選採\n票選法（未經評分），票選前3名廠商始得進入第2階段評選，以避免因參與\n評選廠商過多，致評選會議時間無法掌控。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依「機關辦理設計競賽廠商評選及計費辦法」以公告程序辦理設計競\n賽，其非採固定費用或費率者，得於招標文件明定優勝廠商在2家以上者，\n依優勝序位，自最優勝者起，依序以議價方式辦理。但有2家以上廠商為同\n一優勝序位者，由評選委員綜合評選1次，評定優勝順序，再相同者抽籤決\n定之。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"評選委員會辦理廠商評選，應由各評選委員分別於機關備具之評分表逐項載\n明各受評廠商之評分，不得由評選委員先行逐項討論後方予以評分。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第56條第1項及第57條採行協商措施者，不論廠商投標文件內\n容是否因協商而更改，評選委員會辦理第２次綜合評選，應就全部評選項目\n重行評分（比），以評定最有利標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第22條第1項第9款辦理技術服務採購之公開評選，議價採訂定\n底價者，其以序位法評定優勝廠商時，得不將價格納入評選，於依序議價時\n再開啟價格封參考其報價訂定底價後辦理議價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購，採行公開招標並搭配最有利標決標原則者，得分2階段辦\n理，先評選出數名優勝廠商後，再依序以議價之方式辦理決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採總評分法評定最有利標並於招標文件載明價格納入評分以總評分最高\n為最有利標者，得於招標文件規定，總評分最高之廠商，有2家以上相同，\n且均得為決標對象時，得擇配分最高之評選項目之得分較高者決標。得分仍\n相同者，以標價最低者決標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，評定最有利標涉及序位評比且價格納入評比者，得擇各評選\n委員給予第1名最多之廠商為得標廠商。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採序位法評定優勝廠商，得於招標文件規定廠商名次加總相同者，以評\n選委員評定名次第1名較多者優先議價。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會評選最有利標，應依招標文件載明之評選項目、子項及其配\n分或權重辦理；如需變更，應徵得所有參與評選廠商之同意，並不得有差別\n待遇之情形。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，得於招標文件規定合格分數為70分，並規定過半數出席評選\n委員評定總分未達70分者，為不合格廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第94條規定遴選專家學者評選委員之程序，以利用主管機關建\n置之專家學者建議名單資料庫遴選專家學者為限。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選，得於招標文件規定合格分數為70分，並規定出席評選委員評\n定之平均分數未達70分者，為不合格廠商。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會專家學者委員之聘兼程序，不以機關出具聘書（函）為限，\n機關出具之相關文書如有明示、默示或經解釋為有聘兼之意思表示，即可認\n定為已完成「聘兼」程序。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"召集人及副召集人如均無法出席採購評選委員會議，應檢討會議時間之妥適\n性及召集人、副召集人未出席會議之原因，並另訂時間開會。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"為落實行政院以政策工具鼓勵企業加薪之施政目標，機關採評選方式辦理採\n購，其招標文件之評選（審）項目及評審標準，得視個案特性及實際需要，\n載明廠商企業社會責任指標及其配分。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會或個別委員評選結果與工作小組初審意見有異時，評選委員\n會或該個別委員可免敘明理由列入會議紀錄。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會或個別委員評選結果與工作小組初審意見有異時，應由評選\n委員會或該個別委員敘明理由，並列入會議紀錄。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議紀錄至遲應於下次開會時分送各出席委員，並予確認。\n如有遺漏或錯誤，得於紀錄宣讀後，提請主席裁定更正。最後一次採購評選\n委員會會議紀錄應於當次會議結束前作成並予確認。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議表決時，主席得命採購評選委員會以外之人員退席，包\n括辦理評選作業之承辦人員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"採購評選委員會會議表決時，主席得命採購評選委員會以外之人員退席。但\n辦理評選作業之承辦人員不必退席。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"公立學校或公營事業辦理評選作業，依規定其採購評選委員會專家學者之委\n員，不得為政府機關之現職人員，故得由該公立學校或公營事業之人員，擔\n任該學校或事業之專家學者之委員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"公立學校或公營事業辦理評選作業，依規定其採購評選委員會專家學者之委\n員，不得為政府機關之現職人員，仍不得由該公立學校或公營事業之人員，\n擔任該學校或事業之專家學者之委員。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購之評選，應成立5人以上評選委員會，專家學者人數不得少於\n二分之一。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購之評選，應成立5人以上評選委員會，專家學者人數不得少於\n三分之一。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購評選時，不可將專家學者過去未出席評選會議情形，納入遴選\n專家學者評選委員之參考。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購評選時，可將專家學者過去未出席評選會議情形，納入遴選專\n家學者評選委員之參考。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第94條及「採購評選委員會組織準則」第4條規定遴選專家學\n者擔任評選委員，以主管機關建置之專家學者建議名單之資料庫名單為限，\n簽報及核定，均受該建議名單之限制。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關依採購法第94條及「採購評選委員會組織準則」第4條規定遴選專家學\n者擔任評選委員，並非以主管機關建置之專家學者建議名單之資料庫名單為\n限，簽報及核定，均不受該建議名單之限制。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"甲以自己具有與採購案相關專門知識向機關舉薦為評選委員，經機關評估無\n利益衝突後得遴選為採購評選委員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"甲以自己具有與採購案相關專門知識向機關舉薦為評選委員，縱使機關評估\n無利益衝突，仍不得遴選為採購評選委員。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關成立採購評選委員會，擬聘請專家學者擔任委員，經簽報機關首長或其\n授權人員核定後，無需經其本人同意。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關成立採購評選委員會，擬聘請專家學者擔任委員，經簽報機關首長或其\n授權人員核定後，仍應經其本人同意。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理不同之採購案，不得遴聘相同之專家、學者擔任評選委員。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理不同之採購案，遴聘相同之專家、學者擔任評選委員，尚無違反採\n購法。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購採最有利標決標，如發生廠商於得標之後拒不簽約致撤銷決標\n之情形，得由次最有利標廠商遞補得標。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理採購採最有利標決標，如發生廠商於得標之後拒不簽約致撤銷決標\n之情形，得召開評選委員會會議，依招標文件規定重行辦理評選。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採序位法評定最有利標，評選委員辦理序位評比，應就各評選項目分別\n評分後予以加總，並依加總分數高低轉換為序位；且應予不同廠商不同之序\n位。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關採序位法評定最有利標，評選委員辦理序位評比，應就各評選項目分別\n評分後予以加總，並依加總分數高低轉換為序位；不同廠商得有相同之序\n位。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選作業，如將「過去履約績效」列為評選項目，除投標廠商以自\n己名義所完成者外，得包含投標廠商計畫主持人或相關工作團隊成員之經驗\n實績。","options":["○ 正確","✕ 錯誤"],"answer":1},{"type":"yn","category":"最有利標及評選優勝廠商","law_ref":null,"stem":"機關辦理評選作業，如將「過去履約績效」列為評選項目，應為投標廠商以\n自己名義所完成者，不包含投標廠商計畫主持人或相關工作團隊成員之經驗\n實績。","options":["○ 正確","✕ 錯誤"],"answer":0},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理評選，下列敘述何者錯誤？","options":["評選委員會依招標文件規定評選\n出優勝廠商，即代表該廠商投標文件內容已被接受，不應再強制要求廠商修\n正。","機關於評選後彙總製作之總表，屬投標廠商得申請閱覽、抄寫、複\n印或攝影之範圍，不得併於決標結果之通知事項，主動通知各投標廠商。","機關對於評選委員會違反政府採購法之決議，不得接受。","招標文件\n如已訂定由評選委員會過半數之決定評定最有利標或優勝廠商者，除有發現\n違反法令之情事外，機關首長不得變更該評選結果。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"機關辦理80萬元勞務採購，其履約地點在原住民地區，下列何者錯誤？","options":["得免收履約保證金。","依原住民族工作權保障法第11條規定應優先由原住\n民廠商承包。","招標文件可規定投標廠商如為原住民廠商者免繳押標金，\n如為非原住民廠商者應繳押標金，以促進原住民就業。","第一次公告，即\n開放原住民及非原住民廠商投標。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"下列敘述何者正確？","options":["機關不得於招標文件內載明「廠商於得標後應儘量\n僱用當地住民以增加就業機會」。","我國簽署WTO政府採購協定後，所有\n採購案不得再限定採用國產品。","旅遊服務屬政府採購法第22條第1項第9\n款規定所稱之「專業服務」。","機關辦理財物採購，現階段得規定僅允許\n「正字標記」之產品參與投標。"],"answer":2},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"有關保證金之規定，下列何者正確？","options":["機關辦理簽約，得不以廠商先繳納\n履約保證金為條件。","得標廠商之履約保證金如有溢繳情形，尚無違反採\n購法。","廠商以設定質權之金融機構定期存單繳納履約保證金，於向金融\n機構設定質權時，無須質權人(機關)會同辦理。","以上皆是。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"未達公告金額之採購，以公開取得廠商之書面報價或企劃書方式辦理者，下\n列何者正確？","options":["以採購法第34條公開徵求廠商提供參考資料之方式刊登公\n告。","第1次公告結果，未能取得3家以上廠商之書面報價或企劃書者，得\n經機關首長或其授權人員核准，改採限制性招標。","廠商不得提出異議及\n申訴。","應刊登政府採購公報。"],"answer":1},{"type":"choice","category":"財物及勞務採購作業","law_ref":null,"stem":"保固保證金以不逾契約金額百分之多少為原則？","options":["百分之二十。","百分\n之十。","百分之五。","百分之三。"],"answer":3},{"type":"choice","category":"財物及勞務採購作業",
